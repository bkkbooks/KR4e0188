body:
  text: 皇甫司勳集卷六十明皇甫汸撰跋語文疏書少宰霍公西漢書後門人皇甫汸曰昔者薛收問於文中子曰續書之始於漢何也曰六國之弊亡秦之酷吾不忍聞也又焉取皇綱乎漢之統天下也其除殘穢與民更始而興其視聽乎此渭涯夫子西漢書之所由作也其言綜史傳系皇綱述炎厯之大經大法黜嬴紹姬可以監興亡核治忽辨是非究成敗書之教也或當書而不書不當録而録豫奪之法嚴褒貶之義備春秋之旨也教準書傳而不泥旨範春秋而不誣典矣淵矣可以觀矣昔有作者博文寡要雜記委瑣宗本誕章殆弗及也其與荀恱紀倫乎聖君賢相書紳置座繹思而允蹈焉謂亡禆於政吾不信矣吾不信矣題周山人留别西湖詩後詩之淵妙近體難工而鮮戾選體易似而實離世之擬迹於江篇行剽於沈集者辭語匪不艷繢而姿神興態絶無可玩辟則倩衣於毛嬙借飾於西子然腰慙玉束眉謝蛾顰始勞髣佛終露本來作者既非匠心覽者又皆庸目乃曰甲幾魏晉乙庶齊梁是何古人之多也豈不誣哉周山人雅精於詩兩遊越中得詩數十首咸足稱美近體如弔嶽墓登天竺諸篇特為藝林所賞至留别西湖兼簡田憲使童侍御劉山人一篇尤為選體之冠婉麗以會景俊逸以宣情㫪容以達氣縱筆二百言無一字溪徑真得古人之髓不徒索之形骸矣蓋西湖佳地也三君英流也在昔謝監舊園之篇寄懷於顔范臨海之作屬意於羊何殆有以也詞旨並妍古今同調矣田子近輯西湖覽勝集搜採羣玉此其瑶圃之一枝云書吳氏醫説後蓋聞方技者皆生生之具王官之一守也藝文志載醫經昉於素問經方原於本草七略分為二家自後立説寖廣去病寖微未嘗不苦其蔓且泥也善乎許嗣宗曰醫特意耳脈之候幽而難明吾意所解口不能宣也虛著方劑終無益於世遂不著論然越人之遇長桑授以禁方漢詔太倉長所能治病有其書無有皆安受學華他之死焚其書竟罔傳者則五色所書鴻寶所録又可盡廢耶栝州吳氏球世業醫積學五十餘年博極奇祕察脈最精處劑惟當診療輒多驗者又為人亷潔醇良固可信而託也因著疏義辨疑諸篇凡九種共二十卷刻之以附甲乙之部覽其書咸足發明血脈經絡表裏及虛實之分順逆之節氣感之應寒溫之性水火之别如探黑白焉亦専心矣夫自六塵伐性七竇移情衛生虧攝機速蹶痿求緩齡於金液假息於銀丸方匪對症藥或誤人此醫之全十無三四也養生食療二篇濟物尤𢎞矣年踰七旬官知無恙步履輕捷是豈空言者哉余攜內之栝甫八閲月忽遘疾不治奄忽郡舍始恨得吳之晚掩卷流涕識諸簡末題竹堂寺僧保遺卷先君記文也在昔敝廬結於槐里鄰寺標兹竹堂王父就釋𢎞之招情緣奄謝先君題鎮公之卷手澤猶存逮後業染俗流傳非慧照一彈指頃瑶簹將雙樹俱凋幾過門牆寶塔與千花共燼嗟夫教本示寂焉取於遺法既淪空無貴乎保此余之展玩增慨牽率綴言以授宗衍者也批點唐詩正聲跋蘇子若川問詩於余余􅀈以解頤新語間又持唐詩正聲乞余批點因其傾素遂爾操朱蓋詩有秀句有幽句有麗句有妙句有奇句皆為加點至神句則為圈之夫景會則秀興逺則幽才充則麗情來則妙思苦則竒而超逸則神矣此作詩以覔句為難鍊字為工也能熟玩味之而參以新語其於風人之旨殆庶幾乎張氏墨迹跋雲間張子持其先大夫龍山公墨迹二卷視余以余先子中憲公與龍山同登進士蓋世講也展卷諦觀點畫精妙勢若飛動由其先大父東海公以字學著稱先朝過庭之餘自得戈法若芝旭之遙華而羲獻之濟美也詩亦每有真趣間合雅音玩之足為心印況手澤存焉斯張氏之遺寶亦翰苑所共珍者哉楚藩建承運殿兩院三司賀文楚藩以承運殿上請天子詔可乃敕所司輸財於公帑用民於農隙對揚絲綸之命肇土木之工月應黃鍾星臨營室兹蓋賢藩夾輔之義懋著故聖朝親睦之典特隆者也𣲖演文昭封分楚望禮樂能述為善逈邁於東平江漢上遊覽勝實誇乎南紀崇基因舊大厦更新一水晴懸粲煙霞於鸚鵡兩峯高峙擁嵐霧於龜蛇櫨構環縈桁梧綺錯雲來扣座影搖鴻烈之經日映金鋪光射駝文之璽輪奐成隆棟之吉本支奠磐石之宗修竹夾植而檀欒叢桂紛披而馥郁規模𢎞麗層臺不數乎章華制度森嚴邃宇恍同乎景福四墉既列百堵皆興于焉攸躋以攸寧信哉移氣而移體大國觀風並叨持斧之使小山侍宴每隨飛蓋之遊願景運之丕承常歌魯衛綴鄙辭於善頌愧擬鄒枚吳郡創建大中大夫劉公祠移文蓋聞宫鳴徵應響韻相趨桂馥蘭芬氣味斯合風存往哲好出秉彞故經海隅者每興感於魯連過延陵者亦佇想於吳季悉由異代矧乃同鄉若太中大夫劉公昌者性資天挺問學夙成敏可射碑強能覆奕葉文莊見之心醉耿清惠契以神交擢巍科於先朝馳休譽於英廟大梁督學造士殆及萬人祕閣纂修著書將踰千卷鄉稱師範企偉烈於西河國尚儒流擬高蹤于北海稽之於禮既合祭社之文秩之以祀亦協置祠之義生不視産死罔遺財子奄隕年孫遭終窶家湫隘而僅餘容主之奧墳單露而奚有建廟之基亷吏可為不可為斯文幾喪幸未喪比蒙郡邑循吏覃舉廢之仁臺司憲職隆恤幽之典卜地而授以經始給資而相其落成然工役浩繁土木重大求致美於輪奐必取盈于繦錢凡我搢紳先生縫掖後進景行芳躅追慕緇衣徇義則金在必捐樂施則劒亦思棄堂構既備靈爽攸棲漢章芻絮不奠於桓談之家晉安藴藻奚告於梁鴻之墓哉重修陳太保祠疏古稱孝行通乎神明誰謂仙機涉于玄渺陳氏買羔奉母何言鐺底之燋吕師施藥療人即顯壺中之祕開以既盲之視延斯垂絶之年王虛牀若有人董永門忽無見徵諸往牒信此精誠東吳傳為美談先朝錫以旌典爰飾廟貌用激輿情久因兵燹屢遭遂使風雨不蔽舉莫可廢貫亦宜仍將俾户産感雉之兒家生召鱗之子人非望報天自降祥者也吳郡天平山重建雲泉寺疏人世恆理有廢有興佛家業緣不生不滅覩崇基於肯構辨浩劫於沉灰奚謂山靈徒俾城化若夫天平山者在郡西南之陽距城二十餘里巒稱卓立峯號飛來龜龍之石勢殊形而雲壑之泉聲互響梵宫壯麗環日月於重廊法像莊嚴煥煙霞於祕殿經營殫智本僧逺之道場奏請蒙恩為相公之祠宇松楸攸寓香火斯存自宋迄元烽塵貽戚我明逮武崑燎為災祗樹與鴈塔俱平洹沙將猴池共盡雙林鞠為茂草初地失其布金大界輪回兆雲泉於白馬鬼神呵護存忠烈於靈光范之子孫無慮千數誰其恢復有緬二卿太僕惟一光祿惟丕物色乎異人先容以展謁乃有某者標秀慧宗研精戒律寓燕京而等什遊吳苑以同支瞻眺興嗟徘徊寄慨痛銀繩於已絶閔璇剎之將傾遂發菩提心爰資𢎞覺力告諸宰官善士念兹鄉國先賢望墓田於西陵雀臺遺令啓津梁於東渡鷲嶺遐蹤羞澀空囊蕭條餘鉢將使周官授矩以揆日郢客運斤而成風梓匠勇趨檀越喜捨繦錢斗粟罔非夙世之因片瓦尺椽並是他生之果花重開於四照法再演於三乘美哉輪奐之新宛矣山川之舊普霑玄貺廣被洪庥釋氏以功德濟衆生欲報之德相公以憂樂關天下樂觀厥成皇甫司勳集卷六十
