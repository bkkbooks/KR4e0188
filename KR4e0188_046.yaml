body:
  text: 皇甫司勳集卷四十六明皇甫汸撰序壽壽李司封先生二親序李先生燕居進門弟子而詔之曰我自昔遜于學造于鄉賔于天子乃今服在王官淹兹天邑我母太夫人倏而届耆司封家君亦且臻斯境矣餘月六日實太夫人以降之辰乃不遑一觴之將我是以明發有懷于閩之隈詩云陟彼屺兮瞻望母兮言不遑也小子識之門弟子避席曰嘗聞冬為𤣥英一曰安寧𤣥英之義順而精矣季冬之月日在婺女婺女之義巽而貞矣在𤣥為羡黃純坤矣越載生明幾漸盈矣誕彌獻嵗寅贊成矣太夫人之賢而壽也宜哉先生曰媺哉言乎爾徴之天道已乎門弟子又曰嘗聞藐焉方輿志秉隂矣揚州之域建歐寧矣碧水丹山竅厥靈矣侯虛侯止氣化凝矣川后貢符淑女生矣太夫人之賢而壽也宜哉先生曰媺哉言乎爾徵之地道已乎門弟子又曰嘗聞顓頊之裔國氏曰曹爰歸於李亦帝之苖太夫人嗣音于姑于姑有光朂爾君子君子克昌恃爾多男靡不允臧隂範于里里尚乎中行太夫人之賢而壽也宜哉先生曰媺哉言乎爾徵之人道已乎二三子出汸也後先生謂汸曰夫二三子之言何如汸曰徵天道者胚胚乎端之諶乎地道其淵淵乎末之濳乎人道則彰彰乎其幾矣夫太夫人女順刑于家母儀流于國壽不于其賢哉壽不於其賢哉君子載儀得此令妻以莫不宜眉壽與齊可以觀德也夫乃若先生待詔摛藻司封握爵崇以顯榮褒章殊典渥焉來貺扈以寵珍夙夜匪懈守官遹訓昭以令名可以觀孝也夫于是為封君壽及其太夫人何妻不敢先夫子不敢以母踰父之誼也是故以言乎德德惟懋矣以言乎孝孝惟則矣以言乎三才則備矣先生曰汸也之言可以壽吾二人已乎小子識之遂退而書為序賡為詩歌者凡十又一人寄壽少宰汝湖謝公七十序㑹稽郡少宰汝湖謝公壽届七十厥配毛夫人與之偕老從弟某佐刺澶州思以頌其兄時僚友咸喜聞其事而願為之辭幕乃曰倬彼安西述德江左晉肇高風宋振休烈迄明繩祖嗣登三傳遹美千祀乃誕少宰早發巋科寅清建禮端揆副銓奕葉簪組蟬聫彪映皇極錫福惟德是備俾昌而大俾耆而艾敬獻一觴之祝謝子曰昔賢恥居紈袴不言門第名遂身退有遺榮者矣非吾所願聞也尉乃曰公性亶聰哲學臻博極摛藻掞天敷文緯國講筵兼席啓沃洪毗貢舉掄才得人斯盛功言並懋是為不朽敬獻一觴之祝謝子曰職在太史金匱掌之公猶曰名與身孰親也丞乃曰在昔東山之卧埭墅流輝烏衣之遊華萼相飭今留園嘉麗不減東山敦賞子姓絶勝烏衣酒肴雜陳無吝百金絲竹間奏恆卜清夜逍遙以適性恬淡以引年身其康强子孫其逢吉敬獻一觴之祝謝子曰美哉幾乎然唐風之誡宴樂枚發之侈遊盤衛生者方以為蹶機也刺史曰稽山之陽禹穴在焉是史公觀道之所也臨海之嶠石門通焉是康樂窮探之徑也姚江之濵鏡湖滙焉是賀監避喧之地也耶溪天姥往往畸人羽客靈異出焉公將有見於昭曠與造物者遊餐霞茹芝輕舉高蹈而淑媛相內家省無憂同躋壽域邁其徽音自是甲子寧有既乎某少業公門如彼靈運鍾情惠連其詩曰親親子敦余賢賢吾爾賞復見於今矣敬獻一觴之祝謝子曰美哉言乎蔑以加矣余不復請矣敬為刺史舉觴丞乃授簡緘文發使馳之會稽奉壽介溪嚴相公八十詩并序蓋聞聖王膺厯則皤首盈朝哲后垂綃斯宿齒在位道論軒時謨明堯日此名世之烈每際乎中興平格之徵無爽於保義者也大師相介溪嚴公産應星精神由嶽降早發藝苑晚陟台司今天子勵精飭治於上而公篤棐承休於下懋簡宸衷贊成幾務交孚匪偶相得益彰逮上聿修𤣥默公爰守清靜遇有道之長著不息之久用是閲崇品垂鴻勳享榮名躋上壽自天申命豈人可徼致哉嘉靖紀年三十有八載公年八十王正之吉實維誕辰內外卿士大夫奔走歡慶輸琛輦璧奇巧纎縟以將其儀公郤而不登膾鮮臛肥甘和芳越以羞其爼公撤而不御纓緌聫耀履綦響臻來獻其觴斯受而酬之凌雲鬱思掞天矕藻跽陳其辭則樂而聽之頌者曰公在講幄則帝心格聖學純是宜清燕以接公掌成均則德教敷英才育是宜延胄以資公佐銓管則俊良升茂異拔是宜總攝以聽公作秩宗則朝章釐祀事舉謁欵薦殷郊廟用享是宜百祿以遒公入政垣天子是毗多歷年所以公有調燮之功而甘露降慶雲興雨罔愆期雪必應候是宜蟒服以庸以公有密勿之功而嘉禾屢生兩岐之麥三秀之草嵗馳驛匭是宜賜第以居以公有啓沃之功而𤣥豹馴白鹿孳靈瑞雀時奏坰牧是宜銀章以綰旌忠勤敏達焉以公有經緯之功而𢎞文丕變大雅復作是宜大官推食侑以上尊焉以公有運壽之功而西戎賔洽倭夷即序踰沙軼漠納賮充庭是宜錫公彤弓以威彤矢副焉以公有包容之量撝謙之度是宜錫公乘輿以朝上殿優禮焉以公上壽國脉下殖民生不獨自引其年而已是宜授公師傅之任兼宰職位特進焉湛恩汪濊隆古罕見衆皆歌而頌之史官書其事盟府載其勳矣豫小子汸復奚辭之加乃作而歎曰美哉壽乎聖天子減五登三其數尚八蓋八者數之始也天道以八節成嵗功地道以八方正疆域帝道以八柄馭臣下相道以八統詔庶民音以從律風以宣氣法以出治政以經邦咸八也伏羲作易始畫八卦重之為六十四演之為四千九百六十過此以往巧厯不能得而數寧有窮乎若夫起尚父於渭濵迎申公於魯邸並以八十之年為始進之日矧公嗇神葆真身康力健聰朗猶少視履旋吉子孫濟美可以長生可以事君俾公耆艾而熾若淑而昌天實為之天道不息而帝克配焉聖壽無疆而公克贊焉數之適相值也汸既麾之門墻越在草莽追惟疇昔不忘國士之知願厠邑人之祝敬上詩一首凡十有六句倍八也總百有十二字符公算云位極名高壽更綿古來能得幾人全香山未許遺榮日渭水才逢兆夢年六考久膺黃閣寄兩朝常侍赤墀前題封細字猶能草應制新辭到處傳三世絲綸親見掌一門簪紱總稱賢大官分膳充羔鼎元夕留燈照綺筵禁內賜輿師禮重殿中扶拜帝恩偏遙心欲獻南華頌直擬春秋至八千奉壽存齊徐相公六十詩并序雲間存齊徐公之入相也嵗幾一紀年甫六旬壬戌季秋既望五日近台垣而開壽域追佳節而秩初筵信福履之永綏古今所稀覯也一時展慶者軒騎粲其盈門觴籌交於四座小子汸乃從吳下賦詩以將或曰相公之誕朝中鴻筆巨卿暨海內綴文之士莫不矕鸞鳯以攄辭效岡陵而製頌山林外史奚足為重亦遙厠其末耶余曰不然天保之詩曰萬壽無疆斯天子之壽羣臣能頌之矣而何取於華封之祝閟宫之詩曰千嵗無有害斯諸侯之壽羣下能頌之矣而何取於麥丘之辭蓋人有隱而重言有微而徵也矧余與公忝鄉曲之誼䝉筆札之知者哉身已棄置志無所干言非溢美而貢諛殆有足采者矣辭曰少年名冠曲江春扈聖今為第一人共道嵗星曾誕倩由來嵩嶽果生申校書盡欲窺中祕抗疏寧辭作外臣宣室召歸資啓沃平津特拜掌絲綸掄才悉采東南美典禮嘗懷夙夜寅壽介六旬花始甲期逢九月菊司辰上尊賜出皆成露御饌頒來併是珍敕降紫泥承㫖渥句題紅藥見詩神謝庭濟美堪稱鳯漢閣酬勳待畫麟已羡黑頭登極品還將黃髮頌無垠代郡守壽文太史九十序聞有夭壽有人壽有家壽有鄉壽有國壽若夫挺靈錫哲為世作模此天申之壽而年蓋不足加焉立德纂言垂名不朽此人修之壽而爵固不足多焉杖屨以安庋閣以奉此子孫之隆孝養也耆德宿望表正一方此鄉人之所以尚齒也燕饗有禮告存有秩此先王之所以引年也若太史衡山先生者秉倫鑒於三吳寄典刑於一代非古所謂達尊者耶今上御極之初端冕右文側席求士遂企弓旌之招膺圭璋之薦待詔金馬給札蘭臺亦一時之奇遇也然非公所好乃倦長卿之遊高仲連之蹈抗跡山棲委懷邱索書絶交於貴門足不踐於令室四十載矣由是清節著於中朝懿行重於鄉閭文章載於史館聲名燁於海內兼以妙解詩律則少陵非工並精翰墨則內史為劣戲染六角價踴市間誤㸃尺幅異域爭購皆其餘事而公不以自詡也余昔家食時即聞其名想見其人而不可得幸而出守兹郡間造其廬接其光儀承其謦咳始大慰平生而公躋九十之年耳目聰明步履輕捷日通問字之賔不輟揮毫之典使淄川朝訪猶可受伏生之經魯邸夕延尚堪備申公之顧蓋公雖遊於羣藝之苑而不以雕篆傷氣雖産於紛華之俗而能以恬淡養心宜享遐永之齡綏康寧之福者也其視巋科顯仕為何如哉竊怪夫養禮廢缺無復鳩玉之頒燕饗之制珍糜之從蒲輪之遣公誕之辰聞其子姓昆弟聚族羅拜觴而祝焉在詩曰為此春酒以介眉壽則家為之壽矣履綦響臻軒車駢集觴而頌焉在詩曰酌以大斗以祈黃耉則鄉為之壽矣燕饗之禮獨可廢乎矧今之郡古之國也今之守古之候也敬老尊賢牧守之職也陳蕃下榻於南州謝眺餉秉於東海前史紀之矣乃與二三僚友圖為公觴昉鄉飲之期惇大賔之享乃敕酒正具醪外饔司割樂師登歌擯紹贊儀公其照臨庠舍揖讓阼階余等次第更起而獻壽焉展乞言之思惠周行之示在詩曰如岡如陵三壽作朋庶幾乎聖朝之憲章國老之遺義歟僉曰善是舉也嘉禮既洽衆賔有懌余忝主者宜書其事俾吳人傳之為美談云爾敢曰文乎哉七叩壽林叟七袠閩中林子大黼幼挺英資長臻博極冠齡駿發篋遊京國賈生浮湘而賦雄史遷探㑹而道得曾大父勿齊公為姑蘇教授化覃吳中余先祖祠部公亦出其門學正濟美綽有父風逮孫思所將子徂東雅多交知籍甚聲稱余兄弟因投分於潘嶽遂忘年於禰衡庚申孟秋十有二日壽届古稀林子圖展家慶陟岵興思乃謁大夫問所以壽其親者大夫曰余吳人也而子又久處於吳將筐洞庭之甘橘匭茂苑之香粳和蓴羮於鱸膾泛蘭醑以縹清食俾口爽飲俾顔柔子歸而享以為壽可乎林子曰膳有常珍窮味非養也大夫曰閶闔之肆筒綺華縟弱以羅紈纎以紗縠符彩揚輝侈袂炫服被之夏凉襲之冬燠子歸而獻以為壽可乎林子曰裋褐敦素致飾非衷也大夫曰越有狡童亦有靜姝歌以麗曲間以吳歈靡曼子夜激楚陽阿子歸而奏以為壽可乎林子曰五聲病耳荒樂非康也大夫曰豫章之材湖賔之石運以郢斤驅以秦力延般師於香山構溫房於清室君子攸躋於以燕息子歸而居以為壽可乎大夫曰賁園掃徑崇高非制也大夫曰言游妙藝粲若春敷掞為藻繢咀為道腴將使機雲綴辭翰融託諷賡松柏之章第南山之頌子歸而稱以為壽可乎林子曰贈人以金不若贈人以言僕所願聞也幸終教之大夫曰列鼎充飫不若雞豚之逮存也營燥置萬不若結駟之及門也思所公雅抱經世之才不膺一命之寄昭德繩武惟爾是兾子共乘嘉運參彚征踐文陛彯華纓父以子貴封爵並榮則向之飲食服冕聲樂居處奚求而不得哉林子曰爰思奮飛聊以俟時然僕聞善養豈利祿之貽哉大夫曰孝莫大於顯親顯莫大於令名使子坐閲卿二策足要津建鍾鼎之鴻業垂竹帛之休聲載在史諜曰思所有子若此爾祖清白所傳相與不朽矣林子於是緘大夫之辭歸而揚之莆里百拜稽首洽我婦子錫以純嘏綏以福履公為舉觴靡不懌喜原壽為太僕史年兄七袠嘉靖甲子八月初吉玉陽史上卿年躋七十擬香山而開社置鄭驛以通賔四方緘文馳幣獻觴介壽者冠蓋相望司勳氏自姑蘇往道遇荆溪丈人曰公奚往得無為玉陽君來乎余曰然丈人曰美哉壽矣公知何修而臻此乎司勳氏辴然而咍曰豫先子中憲公與其考光祿公暨仲氏司直君與太僕君同舉於鄉榮叨兩世誼協通家曷為不知也粵稽往諜邈矣史氏佚産周而濬源丹弼漢以垂裔託肺腑於椒房奉綸絲於楓陛蟬聫纍朝本枝百世家埒嬴訾鄉稱鼎貴蓋聞飲食爽口被服華榮安居移氣廣樂娛情皆所以養生也聞之卿家有若嘉肴脭膬㫖酒縹清腆出牙調芳由狄營食之飽德酌之飲醇故庋閣畜之異膳寢遊從以常珍非享此而壽乎丈人曰薄滋味者不悅膏粱嗜肥甘者命曰腐腸上壽不為也又若綺縠纎眇戍削允精純綿麗密在笥必盈彯纓緤組散耀垂文故高年䝉匹帛之賜禦寒有重裘之溫非緣此而壽乎丈人曰裋褐苟完聊以飾躬服之取灾或由不𠂻上壽不為也若夫閒宫顯敞洞房穾深翬鳥殊制鈲槻異形丹堊所不及施寒暑所不能侵于時燕處君子攸寧非居此而壽乎丈人曰吉祥止止生於虛白高明之愆懼瞰其室上壽不取也若夫金石遞奏絲竹駢羅選舞燕趙發曲陽阿貼席銜簪綽雪回波聽之忘倦觀者宣和非御此而壽乎丈人曰五色令人目盲五聲令人耳聾釋氏戒欲哲人黜聰上壽不為也司勳氏曰蓋聞心憂則形槁志暢則體充玉陽君早司文部晚簡青宫金紫濟美寵光有融胡求不得胡欲不從非以此而能壽乎丈人曰道家之言貴於止足玉陽君超然遺榮反其初服奪鳯池而不驚解龜組而非辱上壽不願也司勳氏曰蓋聞義興奧區仙靈窟宅洞壑標奇張善著跡法可回金藥能反白玉陽君結侣方外釋戀域中朝延園客夕訪壺公雙𤣥觀妙五藴了空非緣此而壽乎丈人曰似矣然瓊蘂無徵石髓難識不若嗇精葆真調心守寂庶可引年而却疾也司勳氏曰蓋聞積善者䝉餘慶隂德者獲顯報匪自天申實由人召玉陽君慷慨好施閔窮必賑允恭之粟散之如期孟嘗之劵折而不問所賴全活奚止萬命此非仁者宜壽乎又若翁伯移權蕭生平諍攀樹免侵隴之仇守劍改盜牛之行容人之度既優戢德之私難罄又若倭夷肆衄流劫鄉邑召募勇敢授之計畫義聲彰聞盜戒不入民之安堵伊誰之力人皆好之而欲其生天亦惡得而不聽之民哉丈人頷之曰㫖矣斯言得之矣向所啓我富貴紛華而屬厭神仙迂誕而不經善慶恩德庶有憑哉司勳氏曰天道難諶望報抑豈玉陽君之心哉聞之堂構在溧别業棲荆銅官嘉麗玉女澄泓珍果夏熟瓊樹冬榮招雍門之客集蜀郡之英摛藻詠勒鴻銘圖邙洛之勝寫郊居之情高堂不能傾曲池何時平衍後昆之裕垂不朽之聲所謂百千萬年眉壽無有害者豈特皤首黃髮間哉斯地也榜蜚觀擬鈞天檢祕祝表祈年嵗八月誕之先祓齊室備吉蠲肅虎拜望龍顔以仰答聖天子之寵綏豈敢自幸其履旋而已哉玉陽君之壽信無涯矣丈人聞之鼓枻而去莫知所止司勳氏乃届上卿之廬載拜而獻觴焉玉陽君亦載拜而酬之因告以丈人之語相與歡喜此殆麥丘之示德音絳縣之占甲子願代副墨請書其事大司馬齊安劉公七十序世之恆言曰北吏尊而南兵重云夫謂北吏尊者非以太宰秉銓握爵綜核功叙藻别材流華階顯級賢可越次而豫之否則不崇朝而奪之天子勞求於上惟宰臣是咨第曰俞往哉汝諧耳南太宰視空篆稽恆牒不得操黜陟之權即考核臧否亦止於畿輔之內而不能行於天下均為太宰而勢尊相萬也夫謂南兵重者非以大司馬掌兵戎守京邑防扈陵寢控制江介疆域既廣機務實殷北司馬近在輦轂憑藉寵靈外靖邊烽分建督撫各鎮要害從中制之均為司馬而任重亦相萬也是二官缺必簡才猷懋著德望兼隆者僉謀而特命之不輕授焉若今齊安劉公少懷楚璧長挺周楨蜚聲郎署參秩藩臬肅憲臺端宣威齊魯所在底績乃拜為南司徒地總財賦職専錢榖稱平凖焉曾不待年聿反初服栖遲江漢偃仰林臯幾十年矣今上嗣極覃側席之憂搜在野之逸詔使馳於南楚旌車賁於東山時己丑䝉召者凡五人公為之首帝眷尤渥不踰年而有天曹之移才數月而膺夏官之拜公乃感恩思奮精白承休可謂卷舒隨時龍蛇互用者矣兹地也高帝定鼎以來成祖留守之後陋視豐鎬劣觀關洛鍾山之陽王氣磐鬱石城之勝江流環繞垂二百年矣先帝時乃以倭夷構釁繼之悍戍逞凶烽火照於甘泉戈㦸交於都市雖尋就翦滅而長漸滋蔓式遏永圖罔可弛者况艨衝巨艦非驍騎之雄鉏耰棘矜非控弦之利公至坐鎮而彈壓之不越帷幄之中樽爼之上而潜銷妖氛默褫鯨魄者多矣以公平昔談道德而趨仁義說禮樂而敦詩書文武為憲吉甫是班柔惠且直申伯惟二公所謂社稷臣者非耶隆慶己巳年躋七十仲夏望後實惟誕辰凡陪都百寮公侯卿士咸來獻壽浮以菖艾羞以含桃掞藻摛繢升歌播頌者纓緌輝映綦履響臻余跧伏東海之濵追緬曲江之誼雖不能越山川以厠於稱觴之儔亦欲擬岡陵而附於操觚之末適太學余生祝者歙人也嘗遊公之門乞言以贈司勳氏曰子行將壽大司馬乎夫禹敷九土排淮導河注江達海此其上游公為奠安所以壽國脈也濠潁舒亳之間此其要衝公當一面所以壯國威也揚州之域海陵之倉苞篚之入魚鹽之利由兹以通所以阜國財也東連吳越西引荆蜀南跨閩粵此其都㑹公保障之所以固邦家之基于億萬年也公豈獨際昌期享黃髮為身壽而已哉稽之彞典由南司馬擢北太宰者僅有其人滁陽任淺業亦不竟嘉靖改元若太原喬公勳名炳曄今猶想見將俟之公矣夫郟鄏之厯數過卜綘縣之甲子靡算公殆與國同久者哉余子載拜緘文以行少司馬新安汪公五袠序萬厯二載今司馬氏南明汪公五十之期里人典客黃君汝㑹問壽於司勳氏蓋嘗從余遊而其子太學生立孝等為公姻末用是效祝於司馬徵言於司勳者也美哉壽乎為人臣皆欲獻其君蹄縷之微願為天子壽也為人子皆欲獻其親雞豚之養樂其逮存也朋友之交亦先為壽酌以大斗以祈黃耉者也若罔所烜赫於時稱述於後彭殤等耳惡在其不朽也于是乎有垂帛之勳藏山之業焉將與日月爭光霄壤俱敝者也余不能詳司馬氏之行而好讀司馬氏之書若副墨所載汪故潁川之苖裔也後徙新安少田賦以賈代耕大父客遊燕代遂用盬鹽起致饒裕尋罷歸折節為巖穴處士之行元子復修業而息之然好行仁義生司馬氏受大夫封蓋積德百年而興者公方在紈綺博綜綈緗甫冠射策發科試縣令遊郎署出領劇郡臻於乂理為良二千石肅憲七閩聲名籍甚張而能弛屏居谼中慕金庭玉柱之勝乃東遊吳㑹浮五湖探兩山余遇於吳門見其充腴粹盎似有道者謂宜壽既而詔起持斧鄖陽憺其威稜晉為少司馬按周禮夏官之職恪修舉之訓士卒勵車徒蒞兵詰戎佐天子中興之烈每念封疆嚴禦侮宣威於外將繫南越之頸而笞其背修德於內審黃石而存苞桑勳莫大焉間治古文辭取法太史襲跡先秦黃山白嶽闡其雲秀衡郢之室咸瘞草焉海內宗之新安諸彥自昔詹程輩為之减價功德並邵而言益彰非與日月爭而霄壤俱耶問其齒才蘧大夫耳俾爾耆而艾曷所底焉于是典客南向再拜緘司勳言北向再拜為司馬壽束帛加璧馳之京師皇甫司勳集卷四十六
