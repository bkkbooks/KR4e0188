body:
  text: 皇甫司勲集卷八明皇甫汸撰五言古詩還山詩四首少值時運昌因遭世網誤銓宰乏明藻官邪以彰賂申椒詎見芳蛾眉秪成妬高揖聊遂初幽貞履吾素狺犬方吠人跕鳶復邅路破甑苟不完奚取孟生顧虛舟自相觸安得䝉莊怒歸休眷長林途窮日云暮炫服耻遊越朱絃謬入齊木彊闕文理君房特妙辭一丁且未解子雲翻好竒登乗多擁腫徒以先容貲列肆爭售碈抱璞或致疑蘇糞充華綃芳蘭委幽畦鉛刀俾操割安用鏌邪為駿足泛清駕寧肯受鞿羈願為鴻鵠舉寥天戾羽儀朅予歸頗怡室人交不喜童子前致辭主人何為爾昔聞車馬喧盈門結如綺今來雀可羅蓬蒿但荒里朱幡引鄙夫金章粲誰子百卉榮悴遷四運代成紀太宰填圜扉中丞棄東市羲㫖示凶終道家明殆止傖奴慎勿言嗟哉吾已矣饕富易決性縻爵豈知身舉國將嚇鳥矜位乃驕人清廟懼為犧綠波思縦鱗陳王蔚文藻憂生慕仙真江淹摹别狀遨遊窮八垠哲士希昭曠愚者溘埃塵恩往若遺藳寵來類積薪請従不材壽長守非病貧悼亡友周詩二首昔我求友生周郎早投分藻掇攄𤣥思雄談發孤憤壁立常晏如崖檢若乖性落魄懷英風晤言毎祛吝嵗中従薄遊時復惠芳訊謝秩始歸田延益擬開逕詎意雲靡依忽隨露先盡登座揮素琴廵簷度哀磬遺令視約終裂書寄遐殯陶令棄官日徴君寢瘵時巨卿宵夢愕元伯晨訃馳申緘五情塞撫膺雙涕垂既捐韓康肆復捲嚴平帷㝠數豈無驗良藥寧自醫夙昔重季諾感激平原知雖乏儋石蓄能薄千金施游魂眷仲里託體虞山隈死生交已謝留恨翟門題聞郡檄至簡子約同時㕘外庭一朝謝朝列鎩羽非難馴所驚峻網設逸足睎高驤聊以就羈紲予季廟廊姿為邦茂時哲及朞宣令猷何暮佇來轍承檄懼有愆趨裝悵無悦曾是東山情薄兹西河烈芳嵗若電馳隆休亦飈瞥翹首關路長寸心念將别送陸宜甫歸洞庭烈士睎康衢逸人緬幽壑矯翼鮮寧棲潛鱗有深託陸君箕潁流雅志甘塲藿被褐自行吟持經事耕作别來嵗屢遒念往迹猶邈避亂辭東山韜光翳南郭聿暮促歸心申章敘離索雪積湖上居雲停林間閣挂席廻青陽援琴遲芳酌願保黄髪期無渝素心諾秋夜偶作晩嵗絶外牽懽悰寄所適皓齒發新聲蛾眉矜故色變態逐情生羽商隨意易冶艷詎有央靡曼信無極歌方一再聽行期三五夕淫雨忽東來素輝乍西匿金尊悵屢空玉趾邈難即露砌寒蛩鳴風窻起嘆息送兒北征四首朅余解宦日及爾承歡時開室茂林下灌園清溪湄豈不眷明發胡為逺别離别離情所難况乃去庭闈榮名㑹須早玉體愛無虧夙奉垂堂誡聊以贈臨岐岐路邈山川行行感疇昔束髪升華階策足踐文石多士㕘嘉招入朝懷盛飾思作凌霄翰忽為衝飈激従事踰三紀歸來徒四壁逢人惠問稀無嗟不相悉少乏理人術辭邑願遺榮仰荷王明眷移署厠儒英崇文闢東序延胄昉西京禮樂千載㑹冠蓋四門并鴻都掌故在鳳闕覩新成惟有青緗業庶可紹家聲家慶辭南陔江程引西渡稍聞長淮流遙見廣陵樹従親三入都皆子舊諳路抗志慕逺遊焉得勞内顧别筵謝蘭芳歸舟理金素曾是桑榆年牽情日云暮謁伍相祠按志城西南三十里胥山上有胥王廟漢以來咸秩祀宋元嘉中始徙城内後屢新之廟貌猶冕服九章襲王封之舊云志士謝明哲胥君懷謇忠覆郢既云烈强吳亦稱雄逞怨匪報徳交亂豈圖功貫矢麾使却脱劒閔途窮鞭平良已酷陷嚭竟奚恫載革浮江上抉目窺城東踟蹰顧𤣥寢惻愴歴朱宫冠旒緬生貌服衮乖吾衷一聞歌小海流思託回風題歙蘇氏四賢樓四賢者何漢關内侯武唐許國公頲宋㕘知政事易簡歙州守壽也武以烈節顯壽以循良稱頲與易簡並擅文苑咸宜秩祀胡久忽諸兹幾世孫明太學生蘇若川追念爾祖建樓以妥靈卜地於𢎞曠為樓壯麗勝甲歙中嘗遊於余門請題以識若蘇生者可謂昭徳揚芬而四賢者亦可以不死矣倬彼司寇裔誕自昆吾封桓桓起代郡奕奕遷武功子卿奉漢使亮節匈奴中龍庭歸皓首麟閣展芳容許公際時昌遂為唐主佐摛藻埓張燕陳謨贊機務皇宋舉㕘知承明奏辭賦厥𦙍守歙州斯民覃慈慕曾是懷土思何如眷仁里歙既䝉守恩蘇乃家於此述徳發幽潛登禋昭令美拓地構崇基飛甍列疏綺綺樓一何峻迥接巖雲浮玉几挹羣岫蘿軒俯雙流佳氣靄日夕靈貺惠春秋子孫引勿替復始宜公侯玉几山名臘月十五翫月荅子約圓景攬兎升馳光感駒隙西園將宻親南樓遲嘉客生無百年期能幾三五夕㫖酒盈樽罍髙堂間琴瑟請誦唐風詩胡為坐拘迫棣華眷季方摛藻凌希逸往晤迹易陳來悰㑹難逆再滿清夜輝寧知芳嵗隔夏至病遣倐感青陽徂俄値朱明屆有渰散朝霖輕寒凝暮靄如何芳菲日猶是凄其態情闌花鳥餘興遶雲林外未悟衞生因徒寢謝家瘵搔首倦簪裹循腰緩衣帶風河易招損塵網難祛礙𤣥思誰與宣勞歌示茲慨酬劉侍御見訊李生嗟大雅魏主惜通才王風邈已矣斯人安在哉劉郎挺國秀束髪晞天階彯纓隱柱下攬轡歴南臺姱行末俗詆恩寵中道乖游梁倦棲翼入洛傷羈懷遂解東都綬聊翦北山萊却掃百慮捐流覽羣言該縱盼躡霞壑抗跡凌囂埃春往童冠集夜坐樽罍開趙瑟既以越秦箏一何哀棣華慙二俊藻詠䝉雙裁世苦隆暑煩惠然清風來比聲麗金艧炫目皆瓊瑰申章詎成報抽思屢遲廻幸値賞心晤無使榮名隳題王元美離薋園傲吏緬開徑隠侯始卜郊翔圃従藝術抱甕至終朝荷鍤帶緗帙流觀詠楚騷充庭緝蕭艾偃戸翳蓬蒿薋菉一何穢毋俾溷申椒芟藴不及根滋蔓將盈條弱齡砥姱行束髪就嘉招紉佩躋蘭省袨服立熙朝君子節彌亮小人道自消搴芳命良友抒藻振長謠答盧式王風寖失古頽波蕩自今李生陳大雅劉子抱文心弱余振鴻藻高義抗詞林歸田守𤣥黙閉闗謝沉吟江左鬱華彦嵗暮得盧諶騄驥思長奮良樂此相尋申章粲如玉感贈重兼金徒然奉清奏何由酬賞音張仲讀書吳山輟養辭南陔駕言邁西郭問子將何之避喧謝羈縛堂閭豈不懷雲林諒有託風叩支闗清月鑒董帷薄披帙就長明靜夜靈花落羊亡屏意筌猿定啟心籥幽谷聞鳥鳴澄湖眺魚樂霞綺雜煙絲桃柳互紛灼時枉塘上篇日積丘中作焉得奮羽翰因君適寥廓高樓一何峻贈劉侍御高樓一何峻迢迢峻而都百尺懸飛陛八窻列交疏璇題像刻鳳遊極類翔烏信兹蓬萊境曠哉仙人居夙齡茂文藻委志諷詩書臺端既肅軌河内亦承符解纓謝神武稅駕凌清虛炎曦戒末垂涼飈被廣除徵聲理絲竹張燕集簪裾嘉賓傾四座豐膳出中厨靈妃逓楚舞雙童揚吳歈容成獻瓊醴長房啟玉壺一飲粲顔色再飲葆令軀願言享黄髪榮名千載俱寄題宗室芙蓉園忘憂楊柳館逍遙芙蓉園粲粲朱華冐田田綠葉繁日涉宛成趣朅來殊避喧心將隠淪逸蹟謝帝子尊瑤琴既以御緗帙亦間翻采賦等梁孝敦詩従楚元美人隔千里幽芳誰為搴輕舟越江渚欲往執孤鴛無媒焉所託有懷何由宣申章聊代訊寤歌在弗諼皇甫司勲集卷八
