body:
  text: 皇甫司勳集卷十九明皇甫汸撰五言律詩嶽東伯遊天台歸贈平生山水興聊作越鄉遊海嶠千盤路江城九月秋雲中訪精舍花裏下輕舟何事懷婚嫁經年獨滯留歲暮園亭對菊寄子約弟不緣歸卧久那復歲將陰䇿足嗟行路驚翰屢繞林鴈來吳地少雪到薊門深獨有荒臺菊能關池草心將入魯奉柬諸兄故國人初返長林意頗同念離驚歲暮從宦愧途窮楚水寒潮外江城細雨中愁看佩刀去遙向海沂東子安初製巾服履贈之何事平原服翻同楚客衣將從東洛隱寧羡尚方歸雲卧輕偏適山居懶不違因聲報王貢情已昔年非紫霄峯莊道士房仙館夕陽際吳宫荒草餘路迷花發後雲白鶴來初醉客壺中酒謀生柱下書坐深寒月在歸駕欲凌虛月下念别答子安歲暮寥天月清輝亦未闌關山無限思尊酒暫為歡乍缺潮聲落驚飛鵲影寒江程雖易隔莫謂不同看大石答子安祖筵臨水後征馬到山時非自耽遊賞其誰奈别離雲封泉徑杳霜染石苔滋莫道空門樹攀來不係思滸墅逢嶽東伯出山相送煙水維舟處偏傷首路神却憐乘雪興來送渡江人落葉催年盡寒尊遣夜頻知君入山後相憶在風塵贈茅丹徒晉室皇畿宰風流絶見君鳴絃宓生化飾吏子遊文山色齋中入潮聲政裏聞江干漂泊羽猶得接鸞羣淮陰至日過江芳草地晏歲小山遊莊叟身同瓠張融宅是舟空山聞葉下寒水見氷流莫謂窮愁日他鄉祗益愁江上曉發霽曉臨江渡微茫寒霧多無由辨深樹祗自見滄波岸覺帆前是山知磬裏過平生壯遊地今往奈愁何送子安之太倉明發辭林卧遐心眷海東荒城春雨外孤棹暮潮中歲月重來異雲山舊眺同如逢垂釣者一為訪任公寄王維楨地曹並是銜新命俱來守舊京時違空往迹事在每關情草緑長千里江清建業城寄君須自愛己矣負平生四思詩余山居寡悰偶思白下之遊因賦四詩靈谷寺與子安兄施蔡二子嘗同遊昔日同嘉侣靈山訪梵宗雨餘頽寢畫泉遞暝溪鐘迷路隨羣鹿歸途出萬松遙知草堂月别後笑周顒燕子磯羣公于此餞别子安入越祖帳都門道離筵江館時花飛知孟夏燕起計歸期良友同飈散韶年與電馳滄波流恨處東望幾愁思牛首山徐公子招遊公子招歡地牛山勝事存心期惠逺社迹感孟嘗門竹院留宵榻花巖駐午軒臨溪一相送今日獨誰言天界寺半峯上人禪誦處城南多古寺爭得道林居馬過談經後烏來施食餘人天長示滅花月幾淪虛飛錫何時晤東山欲致書送王良醫之武岡白髮微官在滄江别路長看星趨翼軫問水過沅湘採藥身千里聞猿淚幾行惟應鴻寶訣猶得事淮王哭子安兄四首拙宦空牽世沉憂易損年攀荆餘敝宅讓果薦靈筵物化成千古人亡隔九淵平生佩刀在感贈獨潸然昔侍尚書省同趨建禮門一朝隨往化何日更飛翻淚盡堪流血情來詎返魂君苖徒毁筆那復覩平原同枝憐四鳥析羽在兹辰埋玉開前兆探鐶驗後身奠芻南國士留樹越鄉人無復池塘夢空餘芳草春生年同過隙何悟早藏舟喪事門人給遺文使者求山川俱感涕花月總關愁尚説烏衣勝傷心不忍遊張公洞二首兹山靈氣在復以至人傳石壁晴飛雨松門晝鎖煙萬形疑海市一線引壺天為問蒼苔迹青騾去幾年羽客還丹地花丘閲世殊危梁欵漢鑿疊石類秦驅披霧看衣濕攀巖藉䇿扶不知斜日在燃燭送歸途玉泉亭怪石隨崖豁靈泉出澗幽灌園雙甕在挂壁一瓢留氣積金扉影涼生玉樹秋塵纓猶未謝延佇愧清流謁周孝侯墓地是先朝賜橋猶異代存枯枝交隴樹流水到祠門落日瞻遺像英風想逝魂蹉跎余亦晚愁向陸生論董太史過吳門見訪豫告賦間居多情訪敝廬交因忘世減禮覺候門踈酒伴芳林下琴心苕水餘還邛寧久滯明主待相如陪宴董太史于徐少宰碧山故居北闕高軒下東山别墅開焚魚人已謝羅雀客能來花竹荒新徑琴尊儼舊臺從知徐董輩同是漢廷才伯兄季弟往虎丘山莊為仲氏卜葬地青山舊别業兹地欲藏舟罷旦荒臺在辭春暗水流開阡異京兆託體共林丘總識溪橋路傷哉可重遊病中答子約弟覽毗曇之作生年何自苦棲病每經時高院聞蟬早幽窗度日遲僧彌諳妙典法護愧玄思欲遣迷方纍因君問藥師寄答華子濳學士自余辭漢省君亦解文園鴈信猶能達魚焚可重言風塵江上淚花月夢中魂不及秦淮水西流向國門人日訪過叟獻歲逢人日攜羣訪客居葺茅依舊徑灌藥引新渠簾下君平易帷中叔夜書春風何意早一奉坐談餘徐公子徙宅秦淮寄贈榛隱移新宅桑情託舊溪水聲喧戶近山色入簷低地僻心從逺觀幽物自齊思君夢中路猶識五陵西送子約弟訪董太史于苕溪因懷殊勝寺舊遊越國青山外吳江芳草前夜帆看獨往春水悵悠然過寺迷初地逢橋記昔年還聞倒屣處應得蔡雍憐題長干主人壁歲月幾相謝江山重此行青雲違壯志白首歎交情埋姓非張祿投人似馬卿空令同舍賤爭席在都城託宿報恩寺平野新秋入長干舊寺存青蓮非世界緑竹是山門塔火看生滅鐘聲悟靜喧迷方欲有問慙對逺公言寄故園兄弟旅迹原無定塵躬且未寧心將齊塞馬夢屢到原鴒世事吳宫草年華楚水萍從來堪灑淚郭外是新亭安隱寺人天即此路花雨見空臺剎盡南朝建經多西土來碑荒殘蘚合僧定野棠開了悟身如幻何須訪劫灰寶光寺四山棲梵處一徑杳然深歲久惟看樹臺荒半宿禽逺江橫落日寒殿下秋隂獨坐觀冥理寧知靜者心訪孫孝子永夀兼問養生為訪幽棲宅因過孝里門支離如有託塞兌已無言掃榻依松寢安橋接笋垣惟餘枯樹下日夜義烏喧崇明寺至日答舍弟僧臘逢長至征途感故陰茒峯帶郭近花井入溪深睎世無靈氣違時減道心徒煩訪丹藥何日變黃金長干寺除夕客歲因僧臘人天感物華翻經迷貝葉頌酒愧椒花裘敝長千里心飛故國涯隨緣聊住世豈是樂無家雨積雨縈情懶長雲引望迷蓋停千嶂外絲散五湖西戲藻看魚動還林羡鳥棲朝來理輕棹將欲訪花溪秋日偶成無那文園病秋來獨未蘇江風驚木落簷日惜陰徂拙宦同門限勞生學戶樞憤憂何以託惟是著濳夫送沈二遊越中提琴謝氛俗抗策訪名山世事興亡後秋心詞賦間石潭沿月弄天目倚雲攀别有觀濤興枚生定未還過長兄寓所寄憶客路嗟相失鄉雲限幾重蘿軒虛夜月竹院換春風淨理同因果浮生任轉蓬題書遲玄度勞憶在支公除夕異鄉逢嵗盡一倍旅愁增車從來三署衣香過五陵春晴傳法鼓夜色引慈燈誰識朝元侣禪棲學老僧禹量席上追憶牛首之遊坐憶雙峯賞神驚五載還林猶青嶂外路即白雲間舊客皆凋喪佳期可重攀空餘風景在感泣似牛山早春德恩寺福地回春早名山俯勝多水邊疑見性塵外可除魔徑仄緣蘿入林深礙竹過從知功德逺無量是恩波惠應寺胡秀才讀書處支公禪誦處却有董生帷地僻聞鐘逺林荒下鳥遲持經殘雪映閉戶白雲垂辛苦精儒行還應靜者知酬周公瑕七夕見贈京國俱流寓禪堂獨病棲徒懷七襄詠猶戀六塵迷金鎖秋聲颯銀河夜色低不堪搖落意脈脈鳳城西昔訪雲谷于天界兹復會于三藏寺何顒貪佛日惠逺説經年是果西林徙非離初地禪一燈銷永夜萬籟淨諸天自惜迷途晚猶思出世緣章祠部見訪落落題門後悠悠行路難非君念傾蓋誰此問南冠秋水同禪寂浮雲任達觀驚飛雙樹下幸有一枝安柬黃生志淳作賦渾遊洛持書似謁秦長干連大道淮水是通津月下花愁客霜前鴈報人為君題贈婦惟有素衣塵贈張子棨相見但云晚知君意氣同道能窺一馬文不尚雕蟲定水忘言外迷方獨醒中清齋聞磬後時復想高風觀堂祕閣何年化餘基尚可尋辨灰應悟劫投石不知心挂衲惟枯樹聽經有舊禽那堪荒草處曽是布黃金送王子亮卿真州訪蔣憲使歲暮三山路江通一水津舟寒初載雪榻暗舊生塵靜夜聞潮慣荒城落葉頻懸知蔣詡宅開徑遲幽人余叔二人歲方再稔相繼辭代逺承凶問泣賦此篇兩年悲骨肉奄忽委荒丘共盡臺空夜先零樹已秋山經薤草宿人罷竹林遊獨惜平原淚多因歎逝流余將之白下而黃子言往浙中賦别探會重遊越干秦再入都花天散雲雨萍迹限江湖牛渚心千里虹橋酒一壺無言馬首異同是阮生途木末亭送談二秀才還吳驅馬憐同役乘舟念獨歸孤亭一眺望千里思翻飛螢火車生帳秋聲樂子機坐來雙樹下那得繫殘暉答子約弟七夕見懷天上歡逢夕人間重别時忽聞牛女詠并入鶺鴒詩悟辱因超忍牽情未遣思乘杯倘有驗一水乞歸期過顧司寇息園華屋生年異平泉死日荒懷人嗟逝水立馬弔斜陽後進推師表先朝寄典章猶聞江左士揮淚説長康訪徐公子新居病起慰欵追昔作第宅逢新徙琴書儼舊存鍾山遙入户淮水正當門隱几枚乘發窮途阮籍樽誰憐衆賔客今日散平原同盛二過永福寺偶然同素侣來此訪緇流古寺鳴鐘處空山落木秋迹隨青嶂滅心共白雲留祗隔秦淮水寧知是沃洲贈汪子嘗從空同遊梁者也卜宅近仙源晴沙别有村花時遊洛水雪後訪梁園買笑黃金盡耽詩白髮繁李膺門下客歎息幾人存虎丘經司直兄墓昔是青山路今成白馬泉松塵餘涕後樽酒若生前過客瞻新表鄰僧守舊田祗嗟春草宿非復夢池年同年薑禮曹攜酒見過愧我逃禪日煩君載酒情感時驚落葉復故語班荆龍鮓登竒饌鸞笙度梵聲醉來瞻化塔猶記舊題名吳純叔解官初還投贈二首張邴意何如還山喜遂初相邀具尊俎更得耦琴書花下聊爭席林中任借車幽懷寧用問為謝楚江魚世網已能辭雲山從所思那知投劾日正及閲耕時海近羣鷗下庭間百草滋看君無愠色猶自恨歸遲歸田賦百草滋榮哭隱君陳善二首楓江西郭路來哭竹林人繐帳空凄雨靈床但黯塵交疏誰把臂妻老獨傷神詎是於陵後猶嗟仲子貧嗜酒同劉伯沉江異屈平祗疑中聖去那解汨羅情蔓草榮虛室行楸偃敝城最能明易理何苦不謀生題不菴贈長兄本期行附翼何事早歸驂失路能齊北棲枝已戀南三同古來惑七異昔人堪羡此聊書座因之遂揭菴蕉上月鏡彩看初滿墻陰稍覺稀飄香桂子異拂翠栁條非班女秋迎扇秦王夜卷衣音書欲有寄題處鑒清輝聞子約有荆州之役傳爾銜新命令余緬舊思猿清啼楚夜草緑弔湘時匭入周官貢香分漢吏司江山遲文藻行擬二騷詞詠美人花燭次韻含羞辭栁戶承寵侍蘭床玉以經磨潤花因乍折香住歌雲動綵戀舞月留光夏夜誰云促春心自許長荆州六詠送子約苞匭通周貢輶軒問楚程巉崖天外斷積水霧中明澗道懸蘿密衙齋對竹清君行非習險心計在持平右荆門山雷送江流駛雲回石勢重那知百折處别是一提封估客魚間市鄉書鴈外峯遙心若漢水無夜不朝宗右鎮流砥峽勢環如月清光挂碧巒猿應啼淚易蟾似照離難江漢明河影關山楚塞寒誰云千里共曾是兩鄉看右明月峽七澤疏雲夢三湘滙洞庭路隨芳草緑窗入逺峯青神館朝蒸霧仙槎夜犯星懸知賜田者詞賦擬騷經右雲亭澤舊井荒城外清流定幾年名應同讓水澤許並寒泉雀乳桐陰覆禽來機事捐使君將比德一飲輒投錢右廉泉井南楚風流地名賢昔寓居水花猶泛墨臺草尚留書難字逢能識遺編校未疏委懷從灑翰公事日常餘右洗墨池贈陳鳴野二首謝客杜門久因君掃榻頻金裝遊俠後縞帶結交新倚馬知才子籠鵝愧主人若非驚座語何自識陳遵吳市新逢面嵇山舊隱名思玄題賦就觀舞學書成門有高陽侣家多燕趙聲更憐仲子意辭爵一何輕題淮上周將軍園亭二首風景駐淮東將軍别業雄小山初卜隱大樹不言功架上披緗帙床頭挂角弓那知金谷夢猶繞玉關中東陵不好武西第自堪娛香氣多成桂芳陰半是榆散軍聊踘蹴宴客每投壺莫學藍田卧雲中待亞夫皇甫司勳集卷十九
