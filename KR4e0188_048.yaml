body:
  text: 皇甫司勳集卷四十八明皇甫汸撰書牘擬詣大司徒論止王氏書王子維禎將領浙關之役其友皇甫汸請為止之乃論於大司徒曰僕聞姬公吐哺以愛士興勞魯國忘年以奬才流譽蓋卓躒不羣當蒙異常之顧人倫品藻必廣器使之途矧中散間有不堪長卿或非所好豈可以小授槩試俾在外無奇哉竊見本曹員外郎王廷幹性繕淵頴質鄰殆庶與越郡蔡汝楠並以弱齡漸翼鴻逵雙曜麗采馳聲藝苑雖終賈復作嚴路再生蔑以加焉使相府推轂銓宰甄才優以文史之職厠諸華清之地必能矕揚雍盛贊述休烈昭多士之以寧表東南之有美既乃蛾眉見嫉於衆女鸚鵡貽戚於初筵誰之過與王子承嘉出守閩州卧理移佐良牧赤城坐嘯固知通方飾吏非知效一官者矣稍謝郡牒晉復郎署宜入掌書記坐均邦賦曾未浹月遽聞遣以關譏之役委以榷算之務意者謂其心計默運皎節可亮將簡任而享成去齊而燕重哉恐違不堪之情致無竒之慨傷器使之義纍品藻之明無以嗣哲姬公方容魯國耳今夫崑山之玉明月之珠必為之飾翡翠之笥薰桂椒之櫝不適治理之用而充左右之玩者無害其為寶也騕裊駃騠必畜之中廄馴之路寢不使騖駕於道邑騁足於千里者無害其為駿也願公不俟瓜代亟還部檄推寶賂之愛察駿馬之志以縻國士是僕舉燭於明公非為王子束藴也與督學楊公宜論高氏書僕聞之世有不能已之情而後有不得已之言是故仁人之門不拒乎浚恆之求干命之請者將以廣先容之路達幽隱之情耳僕自幼偕舍弟濓師事郡學生高賢開導啓迪極其勤倍生我者父造我者高也欲報之德未逢其適此僕日夕之私心也矧此鄉之人從遊其門者蔚然雲集並為時髦不徒如僕兄弟而己夫何數年以來身困於終窶業弛於殷憂聰明不逮華殖漸落謂非命何昨者扶疾就試頭眩心悸不知綴辭明鏡一照莫能掩其形穢果以劣等失廪要亦懲創而激勵之公之至教賢之大幸也夫復奚諉哉然而為賢悲者白首窮經積以數十年下帷之苦甫及充貢之期一旦見奪辟望秋之禾加以憔悴不燃之灰益用撲滅有稿死而已向隅莫狀行道心惻在僕惡能已於情耶輒敢以其幽隱迫切鳴於公側公其體虞廷在寬之旨法孔門與進之意限以日月容其覆試以圖後新揚末光於頽暮保故物於窮途實曲成之大賚再造之湛恩也且俾為弟子者少有以報其師於萬一顧不為義舉哉豈特高氏鐫感而僕之所以銘德者亦不淺矣報黃守任君輒書日月易流别來忽復經年緬懷良晤益用增勞逺承記存且推及先人頒之奠饋辭物並腆感恧交集銘鐫盛德何時可忘三覆惠諭知聶子量移于畿內郭丞反服於東山季君被逐於讒言張友愆役於匠作回思張組黃泥之坂泛舟赤壁之浦人有去留事成今昔佳會不常豈虛語乎公念及此我心憮然所賴慈母在郡良吏為邦才稱撥煩治尚行簡黃民嚮化流兹頌聲雖吳楚相望江漢云逺亦喜聞而樂道者也來寵方隆惟時自愛與王稚欽書緬昔神交終成良覿幸甚徂年若電别日為秋滔滔江漢我勞如何不肖承先人之痛抱痾苫寢抆涕帷堂無因奉咫尺之書申綢繆之意執事諒之而已曩乞雄文為先人壽乃今已矣一念及此五內盡裂夫喜與戚異感而同情者也弔與慶殊方而合愛者也僕之私心欲煩改撰誄詞以竟前請以遂鄙旨雖非稱千金於終宴亦將銘九原而不朽也裁書惝恍不知所言答侯孟學書春間承芳訊足感記存無何乃聞有萋斐之戚語云皎皎者易汙豈不信哉此在高明固不足為纍而亦不必深辨也安以俟之久將自定蓋無愆何恤詩人之雅談先張後脫易理之明諭也敢露丹欵公謂何如令子逺來辱捐教惠感感窺野鶴而知不羣覩龍駒而識千里極為故人欣慰也但匆匆西發不能延致彌日徒抱悵耳炎暑方隆慎夏自愛不宣與徐公子書緬昔奉使南都得接杯酒之歡奉歌詠之教幸甚然雲雨既散山川間之自是蘭心遂成萍迹謝公嘗謂風流得意之事邇來都盡因思待月移席之句宛然在夢契濶數年此樂豈可復得哉執事省同此情也居憂抱痾有懷莫致頃承玉體康勝為慰雕撰盈箱不惜貽示萬萬秋晨蕭瑟西向無任馳戀答司馬張公時徹書頃王子百榖還辱損華緘藻集端拜展誦光彩炫室不啻奇琛異寶何自而降也且謙沖假叩奬誘過情非所敢承緬昔枉芳訊於清源挹光塵於都下彈指三紀餘矣公方周歷臺省而僕乃播遷州郡飛伏乖迹音驛罕通然勳猷逺劭猶或相聞至篇翰流傳間亦快覩蓋公玄悟夙超匠心獨契正修辭者之所私淑而談藝者之所折衷也既而暫解本兵聊反初服娛情於山水殫志於鉛槧著作日富造詣日工矣郎君過吳獲瞻玉樹恍對瓊枝惠及數帙幸窺一班兹蒙全示因得廣覽知文以班馬為凖而吞吐六代成一家言詩以李杜為宗而綜括三唐亦成一家言是謂集大而非具體兼美而非偏伎也夫文不難於鋪敘纍結而難於波瀾光焰詩不貴於旨綴綺靡而貴於興寄才情公如雲蒸霞鬱變幻百端河決川流一瀉千里波瀾渙而光焰長興寄深而才情贍斯旨焉無盡而味之有餘也諸家之評亦略相似歐與楊顧欲探之六經及於濟世無乃宋人然以此銓藝失之固矣是耶非耶公自得之僕免官還山杜門却掃亦思畢其小乘附諸大方而橫遭兵子之變纍世所藏祕書攘取一空平生所撰稿本散逸殆半監司非但不能理其寃又從而抵其釁抱憤棲病齒髮頓改學植益荒良用悒懊近兒輩稍稍芟輯無足為高明獻也夫吳越相距匪遙每思泛姚江探禹穴踰四明以訪茂嶼諸勝倘山靈有知人願果遂懷嵇公而命駕御元禮以登龍良晤有期書不宣備與大司馬李公遂書前嵗橫遭兵子之侮奉書左右冀念疇昔因求振援自後抱憤嬰疾一切以身外置之竟不能報殽雪會興言痛惋追憶辱公物色朝堂之上晤言省署之間氣奪夏給舍之門談傾張山人之座少年英發可復得乎當時道術之交文藝之友豈特零落殆盡抑且化為異物者過半矣恭惟簡命方隆垂聲籍甚出參機務入秉鈞軸文武兼優功言並立誠二京所獨推乃百僚之罕匹者也倘假餘光之燭庶慰未溺之灰無任馳悚與董侍郎份書緬昔公在詹署適貴鄉范憲長補官之便曾附尺牘以展候私既又公在銓曹適令壻徐子入試之便曾賦鄙言以代芳訊皆未蒙垂報則棄如遺迹敢復嗣音乎山居數載杜門寡營専事述作猶不免於負俗之纍長兄奄逝季弟中徂終鮮之嗟孑焉靡恃兵子構釁家遭破碎慘毒何可言悉今之監司以此覃其威稜著其風裁示嚇於飢鳶奮勇於死虎恐蒙叟所竊笑而卞生不為也世路榛蕪人情丘壑黮暗極矣謂天高地厚局蹐莫容即林密山深棲止焉託憂標疹積齒弊髮凋每寄慨於清流申懷於諦觀者也公夙挺宏俊之才茂閲華要之品扈聖台衮嫓美阿衡羣望所屬亦暫回翔與時俯仰知闔闢異施龍蛇互用非淺衷狹度者所能庶幾也謹因信使聊布欵誠外新刻請教此技無足資身徒生業障覽畢揮去之蕭序戒寒玉體加攝以俟召命幸甚與耿督學書緬惟憲節臨吳獲奉光儀良慰欽佇嗣蒙推廪以授之粲頒厯以示之朔遂使炊晨飽德占嵗知祥徒戢于衷未遑裁謝以憲府禁嚴尺牘罔通耳追念承竄貴郡少年不識忌諱負才使氣未免視上若發蒙操下如束濕以今思昔更欲貫石沒羽難矣水火豈可復蹈哉此時乃不及接君為恨倘聞仁義之説相忘道術之交仰藉針規猥加砥礪庶或立於無過之地而今晚矣君天粹夙成人倫朗鑒學宗宣聖教闡諸儒校藝燕間宏開别館片言足以折衷一動可以為法如僕衰年病體偃息長林莫叩門屏自甘茅塞寄之慨歎而已與唐子書頃奉書得報於白仲子所發緘申誦喜慨交集蓋鳯毛驥足乃知謝公不死荀令猶存也僕念昔與令先君舉則同年趨則同志以道術相砥以文藝相推是為儷金雘而投膠漆者也至榮遺北關而望繫東山晚因幕府之薦卒就弓旌之招使猿鶴興悲松蘿斂色由是規敵塞上襄夷越中謂可收桑榆而垂竹帛矣何悟九原有牛山之嗟一朝成翟門之數詎忍言哉承惠使集二册前此曾一再覩矣正擬與足下商𣙜之然會晤無由宣吐莫遂中心藏之又非筆札所能具達也夫條陳諸疏雖充國之策西羌伏波之圖南徼曷以過之若夫倚鞍草奏橫槊賦詩雖造次占屬亦極嘉麗間有一二如間情之病淵明池鴈之纍子建即未芟棄奚足掩瑜其上宰相及司空書竊有惑焉宰相書如云臨行時奉尊教所傳言王總督者已一一致之又云王總督相去已逺容更託人轉達尊教司空書云向會思質已道尊意矣昨承教示容更轉達也又云思質處亦以尊意寄示之矣夫人臣義無私交奉使出疆便宜從事自我専之雖君命有所不受何得以宰相之意致總督乎况總督者即令先君所勘失事人也其是與非當獨斷於心其功與罪可反覆於手宰相豈應有意示之而勘官又豈應唯唯奉之夫宰相當國或有帷幄之籌密勿之議所言公宜公言之若以天子之怒激發總督令其省愆改過為總督良善矣如漏泄省中何殆非忠也至司空者彼何人哉不過挾君父之戚恐嚇臣下欲其重賂以逞己私耳設使思質幸而免於大辟天下將謂相府先有所要乃曲庇之令先君所與知也既而思質不免於棄市天下將謂相府不滿所求遂中傷之令先君所共釀也是未死之前將受傳言之殃既死之後懼貽追論之釁使王氏藉此以為口實起而理其先人之寃雖百口何以為令先君白哉亟宜削之可也恃通家至誼敢布衷悃惟足下裁之與孫生書頃聞意外之變良以為駭即使果實亦奚足纍雖愛莫能助然戚本相關未嘗不懸諸心耳貴邑乃山水勝地今為爵服要區望塵附焰者必奔走之似非幽人所宜置足也坐是先公之奠芻未將周君之墓草徒宿並付之倚歎而已答子浚兄書弟汸頓首奉覆華陽兄前頃者猥蒙官謗再奪郎署歸來却掃獲奉友于幸甚幸甚然安仁雖甘心於宦拙而敬通終不能釋憤於見詆也省念纍月疾病淹旬偃卧精廬忽投華帙伏枕展玩往迹可想幽悰具存愴然悲生霍然病已蓋詩之為教緣情託興其感人深逺乃至是哉吾兄以宏大之才充以博極之學故其為詩也兼綜諸體之妙而不能稱之以一長盡臻名家之奧而不能擬之以一子此二陸辭藻獨秀於平原三謝聲華莫先於康樂者也美哉富哉允乎可以傳矣來命方嚴有疑不諱拘曲之見豈曰誠然如樂府雄深可刪者十罕其一古選雅贍歌行縱逸可刪者十罕其二五言近體之典麗絶句之清婉可刪者十罕其三差弱者其七言近體乎至強年以後則又進之矣考之於前知記室之早悟驗之於後覺少陵之益工者也再觀強前之集中多宴會遊賞之篇艾前之集半為贈别寄懷之什日邁月征嵗其往矣水流嶽峙迹其乖矣吾輩池草之情周郎隙駒之歎掩卷三覆涕下無從嗟乎弟也少覃玄思長耽羣藝雖有懷縣之詩兩都之作適越之吟浮湘之詠倥偬於訟牒跋涉於山川簡篇寂寥辭旨蕪穢矣才愧不逮齒愧無聞視吾伯氏大有徑庭不重感於斯耶關西晚暮未足為恨若夫聫璧之奬非所敢承侍御之責亦烏能任之哉僣為治點聊備採旃秉燭有良晤臨楮無多談重陽日某再拜獄中與蔡子木僕惟奉職無狀至關木索被榜箠受辱自貽伊戚夫復何言所恨負刓明訓點汚清流執事者不為遐棄顧乃枉玉趾欵圜扉綢繆永歎勤宣慰唁雖尼父之矜冶長郭令之憐孟博何以加諸敢不仰藉末光燭兹局影浸淫餘澤潤此涸鮮苟義氣相激淑問奚疑是固鎩翼者之隱憂變色者之過計也邇承執事祗役楚邦發揚郢調爛若藻繢藏之珍笥願視副本俾三覆詩旨庶幾書授夫撫缶而聆白雪豈異戴盆而覩青天者哉待罪法曹輒裁簡謁曷勝惶恧答王青州僕自滇中詔報免官遐荒險阻朱明遞節觸炎蒙瘴委頓還山杜門棲痾絶交當路日覽衛生之經談灌植之務因念仕之進退猶晝夜寒暑勢有必至自恆情視之便咄咄以為異事達人觀之若解懸釋負曾何芥於胸中耶逺損教貺良感記存往事無勞具陳矣省諭亦未為知僕之深何者老氏有云生我名者殺我身而足下以修名見屬又云知我者希則我貴而足下以後世相期豈僕之所敢受哉所示傳贊占綴甚古子長子政流也誦之歎服新詩漫往鮑照句纍江淹才謝今日之謂矣覽竟直須棄去升沉敻隔已矣元美勉樹令猷以愛景光與錢侍御頃入郡城竊聞亡友周以言仙迹令人悵惋彌日繼之悲恨固知周君平生遺脫塵纍抗睨凡流奄忽委化終成靈異良足紀矣因各賦詩願垂和章且云期以樓居要之圓月幸就乩案代致悃誠儻惠然肯來延佇倐駕冀奉冥晤髣佛儀容皆文成之力耳夫虞丘雖閟魂氣則無不之也况神遊揮斥剎那九埏奚憚百里內乎寄沈僉憲兄以雄才雅望秉憲西陲輯綏逺人當有稽首削袵蒙化者焉若夫蒼梧形勝巡遊展眺勾漏丹砂來鍊服食斯亦足以發藻繢而固金石矣豈必近地乃為快哉與釋雲谷一别幾逾十春遙緒葛藤何可解脫僕免官東還頗愜微尚因憶法侣棲迹名山體中無恙頃得大林參承下席朗詮遐躅復見今時獨傷鄙夫負愧明紹耳夫昔遺民思肇音寄徒壅安石招遁晤言興感何當捐此塵纍相從泉壑仰挹津瀾庶不渝夙心也敬賦短詩書之素扇無足溷懷袖間少垂慧照幸甚答張氏僕山中之棄吏也與足下交乏半面誼感同心忽枉千里之使馳八行之書示以名園嘉藻命僕亦賦因思季倫金谷之什必屬和於潘仁摩詰輞川之篇亦嗣響於裴迪古來盛事復見於今矧兹桂樹叢生足占雅致奚必蓬蒿蔓翳始稱幽棲哉雖未目擊其勝而已神遊其境矣隨題賦篇對使占覆皇甫司勳集卷四十八
