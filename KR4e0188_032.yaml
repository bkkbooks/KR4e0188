body:
  text: 皇甫司勳集卷三十二明皇甫汸撰七言絶句塞上曲三首山城落日照居庸抗嶺回巒紫翠重十月邊關塵不起萬年陵寢霧常封居庸關復有黃花高插天烽火不動龍庭煙豈為王公曾設險亦知將士會憂邊黃花鎮峨嵋山塞倚雲霄健馬彎弓意氣驕夜半忽聞驚客汗軍中應識有嫖姚峨嵋塞郊上暖行經旬病臥寒翻劇忽漫郊行暖太舒豈謂陽和猶擇地容光不照子雲居寄王定州秋日遙思春别君花飛不見鴈來羣風流刺史渾無事坐對浮圖弄彩雲閨怨二首妾自當年逺嫁君相隨萬里莫離分那能割斷東南水化作同飛西北雲别時圓月照江天不見人歸見月圓那因得並清光轉夜渡梅花到爾邊五花殿在邢州寺僧云先為塔後傾圮餘趾作殿形五角故曰五花云浮圖曾記當年建七殿盤空標彩霞金輪豈合為傾圮寶殿空餘散五花再宴徐公子第花前月影搖雙闕樓上香塵淨六街公子金盤留客醉夜深寶馬過秦淮晚經西湖玉殿空山啼暮鴉錦帆秋水悵蒹葭自是西湖好風月無人道有洛陽花江南曲南國新聲妙入神臨岐一曲可憐人為向四時歌子夜也應白雪和陽春雨霽過江六月江門雨乍回孤帆帶雨晚微開潮聲半逐雷聲去山氣全銜雲氣來月下聞琵琶笙簫各賦一首朱絃斜抱月明中翠袖輕調半逐風一曲關山無限恨相思猶自到離宫月映霜華夜最清鳯簫吹出斷腸聲却憐楚客浮湘意不似蕭郎弄玉情月落吳宫夜欲分笙歌一曲不堪聞凡心也解非仙骨漫説乘鸞向彩雲鄱陽湖三首長湖落日起悲風想像旌旗在眼中自惜空流賈生涕即今誰數亞夫功君王愛弟本難圖夜半樓船直渡湖金谷翻寃墜樓婦銅山虛聚鑄錢徒書生曾未解談戎帝子相招意氣雄不見飛舞來闕下猶聞染翰在舟中寄蔡子木越山高並吳山接漢水流兼江水長聞道衡陽有飛鴈將詩遙為達中郎梅子鋪題壁月明清露下荒臺木落空山更可哀夜壑常留金碗在春風曾識翠華來羲之墨沼芳沼清泉不斷流右軍遺墨宛然留何時得暇來臨帖為寫經文道士收陸羽泉茶蓮宫幽處涌清泉茶竈年深冷緑煙香供尚存龍藏裏試嘗何似虎丘前再過安國寺古寺蘇君昔每臨焚香端坐念何深笑余經嵗才重至臺榭荒涼秪茂林留别定惠院僧一自齊安逺寄家不曾來賞海棠花髙軒落日聊孤坐猶記山僧夜送茶留别赤壁山僧赤壁磯頭月可哀山僧常笑使君來秣陵城外清秋夜悵望江雲隔楚臺寄故園兄弟春風茂苑棠花發夜月湘江鴈影回康樂題詩勞夢寐平原羇宦不歸來寒夜曲四首和子安兄風吹芳樹已凋殘却放清暉入畫闌莫道金閨常自暖夜深翻似玉門寒淡煙和月出霜林落盡寒花只素隂别有蘭缸凝彩焰鏡臺斜倚照冰心繡户深沉半掩門玉忩愁對月黃昏間垂翠帳何曾寐熏盡金籠總不溫年隨流水去傷神催入風光一度新何事蛾眉顰不展王顔無伴怕逢春寄吳醫隱殊勝寺二首聞爾禪房結隱居齋心終日對真如常明萬葉青蓮火為照忩前五色書宛轉金河接上池祗園亦有杏花枝門前自施迷方藥何用長安市裏知吳鄉除夜歌三首蘭燭流光照綺筵椒盤傾酒度華年漢庭白首何曾調莫怪揚雄學草玄久宦空嗟江海身故園今見嵗華新吳宮栁色寒煙裏不及長安易作春荏苒流年去不回夜深鐘鼓莫相催金樽放飲香醪盡但遣春光醉裏來吳江夜泊有感日洛吳江霜氣清越鄉姻樹眼中明虛傳八月乘槎去不似當年奉使情江上停舟繫水楊伴人鷗鳥自成行驚心一夕遙千里不獨秋深恨漏長十四夜雪後對月瓊枝斜挂玉輪秋積素承暉淨不流誰憐寂寞惟僵臥猶自更深一倚樓冬日聞懋上人入西山寄贈支遁西行欲買山乘杯一去幾時還禪心不係湖雲似却戀晴峰縹眇間雪後書懷西風吹雪滿柴閭坐對寒雲意泊如自笑曾為穿履客長安愁説待公車病腹承子約弟以導引方見示經笥深慚邊氏腹文園空臥子雲身祕方為謝傳鴻苑端坐寧辭學鳥申臘月十五夜待月雪意含雲夜不分桂華搖落在氤氳羅帷嵗晚無須鑒獨有關山最憶君冬月沉輪空夜闌綺忩華燭自凝寒春來依舊清光滿只恐催人不耐看聞蟬衛水東馳疾似雲水邊沙桞帶斜曛最是蟬聲不堪聽西來况是客中聞施子持册索書近體喜綴二首漢庭儒術有施讐終嵗談經了不休把手青門何以贈但言筆札欲相留肺病無能藝頗耽不辭留滯在周南新聲近代多爭長怪向人間説沈三對月答子浚兄見懷諸弟之作南北何如漢二京迢迢吳越兩鄉情謝家樓上清秋月分作關山幾處明挽張秉道以入覲客死洪州聞説朝天事已非滕王閣畔淚沾衣空江寂寞秋蓴冷張翰何由更憶歸子安席上漫賦失路那堪事逺行離筵愁殺起新聲琵琶總是江州淚羌笛都為隴水情病中聞己兒遊張公洞占寄名山探盡賦難成臥病江淹減筆精見説靈光將屬草童心亦自有高情病中與賜兒骰子占戲枕上煩心每自驚祛除不盡苦還生呼兒六博聊相遣瓜葛須知莫浪爭東禪寺題張琴師故居遺民昔日寄東林彈指韶年去復今借問虎溪明月夜幾多流水在琴心古意二首承恩憐故亦憐新落葉隨風笑此身陌上相逢厮養婦宮中曾是舊才人銅臺遺令不堪悲玉座猶憐歌舞時怪得無情王處仲一朝開閣散蛾眉題董太史卷後闔閭城外初傾蓋苕霅溪前逺泛舲題詩何日能相訪消息應傳董五經中秋懷舊三首懷乙酉年也玉街芳樹奈清秋明月高懸十二樓猶記江淹題賦手夜深操筆對淮流子浚兄有淮清秋月賦寶馬垂鞭過狹斜金尊不惜醉琵琶五陵信是多年少敦賞何能及謝家斗城風物最堪憐一擲流光二十年嵇阮同遊無半在可禁吹笛落花前子安兄與陳徐二子皆已物化矣丙午生日漫賦二首華省歸來嵗復臨金丹未就二毛侵低眉漫憶從前事幾許當杯得快心生朝不樂亦云癡把酒持螯醉一時王微也解名相纍抗世安須吏部為叨史謡二首金距雄冠喚德禽區區哺卵亦何心瑶盤一薦傾人市郭外應愁斷曉音中官玉食四方來酸笋香螺雜豹胎駐馬一餐猶未饜錦盤明旦候門開淫史謡二首穿針少女貌如花驄馬過時面半遮何緣得赴秦樓約試著青衣典絳紗為婦築樓行臺每夜更男子衣混執燈者入暫收寶髻與羅裙結束吳兒兩不分夜夜臺中陪御史朝朝門外候將軍導之出入者指揮張建節也春夢二月十五夜玉貌雙傾識未真羅幃一夕偶相親襄王覺後渾如幻樂廣生前了是因詠贈髮二首寶髻斜安墮馬粧偷將鸞剪試分香纏君玉腕勞相憶底是春心如許長鴉鬢雙盤似楚雲聊將一縷贈夫君枕邊絲斷情猶繫鏡裏香銷恨豈聞春日許應亨比部見訪因憶應元夔府時有內子之戚二首臥病江鄉世事非門前車馬客來稀相逢不解蒙莊笑猶悼芳容淚滿衣建節當年入漢京離筵子夜總新聲扁州再接清河使一曲那傳白帝城長兄新買珠燈試宴二首的皪明珠綴綵絲芬蒀華焰引金枝爭言南海流光夜絶勝西園讓月時為歡詎惜散黃金訝向鮫人購逺琛但遣履綦承夜色不緣纓組照春心舅氏黃汝成悉出所藏祕畫視余嗟賞久之因賦三首寶軸流傳嵗代深購時不惜散黃金長康好畫應成癖玄晏耽書亦苦淫海內名山未盡遊渭陽圖畫總能收座間一夕窮千里却笑張衡遣四愁管落雙枝並入神手調花露染來真寄語桓家須愛取莫將寒具誤留賓子約弟過余書齋值余臥病對桃花賦詩而去作此奉解羞將明艷媚芳辰閉户桃花浪作春獨立遲回君莫訝此中多是解迷人别彥先舅江上花飛三月時暮雲孤棹欲何之不堪相送韓甥意猶是微吟顔逺詩艷珠明艷今時第一流新承恩寵石家樓舞腰徑寸朝朝減啼淚雙行夜夜愁聞報三首太乙祠前禮玉清爐姻燈火徹霄明賜錦裁為朝斗服宫詞按出步虛聲玉輦離宫駐未回金吾夜報柏梁災可憐粉黛成灰燼錯指長門是化臺朝遷玉座已生塵夜隔紗羅獨黯神可是少君慿幻術望中猶得見夫人送汪子之錫江桃花落盡草萋萋歸去汪倫路不迷天際孤帆誰與伴祇隨明月下梁溪覽報二絶沙塞飛書達漢京甘泉烽火徹宵明停鑾莫向馮唐問頗牧何由得再生當時丞相稍嫌尊詎是君王亦少恩收骸那見東園器泣血空思上蔡門梁溪詞三首舞似前溪歌似秦綺羅秋夜不勝春可憐明月能留客却笑桃花解誤人黃金賣賦買歌聞千載餘名一夕醺恨殺玉顔逢洛水幾慿香夢到巫雲少陵初過四娘家香氣氤氲月色斜别後青樓何處是門前記取滿溪花王使君養晦郊居一鹿隨之遊因寄池上揮毫久不聞避人獨與鹿為羣乘車欲向空山去何似王喬駕白雲過叟瓶蓮二頭玉露蒹葭秋已深晚芳猶自媚幽林何如仙子臨湘水朱袖雙垂弱不禁贈楚湘王生楚客乘舟秋入吳貂裘龍劒一身孤相逢解説齊安事雪滿堂隂尚有無昔在乙酉嵗余遊二泉書院留題於壁邵文莊公誦而愛之即次答見寄自公下世逮今兩更酉矣再過錫山悵然賦此己酉九月二十三日也二十年前少小時仲宣曾受蔡雍知松山寂寞泉臺冷猶向東陵訪舊詩梁溪行樂詞二首花滿梁溪月滿樓客鄉兩度醉清秋百年行樂爭餘幾一夕想思可奈愁曲按新腔詎似前粧成雅態更堪憐羅幃判醉從今夜翠帶留題是隔年進酒詞芳情慣向歌前結鬱抱偏從醉後開何事酒乾銜不放杯香暗送口脂來贈金醫少年學道出長桑閉户時窺五色方漢武甘泉初鑄鼎好將靈藥獻君王以獨草一笏蘭芷筆二枝贈别盛二獨草新傳越國煙雙蘭並結中山兔此日臨岐特贈君他時為寫離思賦贈桂軒相者心厭塵喧隱桂叢猶將物色閲三公長安總是攀花者多少榮枯在眼中七夕二首畫郎面面圖金粟化塔層層現玉毫舍利忩中看宿劫栴檀林外聽江濤鵲橋宛映金河上鷲嶺遙連銀漢回從思妙諦多慙拙為問天孫乞巧來釋𢎞伎自關中遊蜀山太華峰前西别秦錦江持鉢度餘春經冬不散峨嵋雪一夕輕消面壁人句曲崇明寺寓眺四首義和三十六禪林處處香臺悉布金嵗久荒涼無半在祗餘危閣鎖秋隂千佛寺化城東望接崙峰九曲西流滙上容洞口欲尋茅氏訣丹書猶説石函封妙雲院七級蓮花插上清靈光夜夜玉毫生重簷綴鐸聲和梵不為風吹亦自鳴四周塔寶藏宏開自晉年金河常見法輪旋五千貝葉靈文盡持得殘經不忍傳藏經殿題寺僧唐馬騕裊曾空冀北羣燕臺買駿久無聞長鳴且就支公櫪非是聽經勝䇿勳過北川橋舊寓客舍依然禁篽西女墻淮月古青溪春風為笑堂前燕門外何曾識馬蹄普照寺聽天曉禪師講解少林飛錫渡江來説法城南有舊臺貝葉時時松下展靈花夜夜雨中開永興寺散步帝城西覔古叢林萬木寒垂六月隂庭下間花齋後偈門前空水定時心贈徐公子追悼其姪禹量綺紈公子擁青衫身在朱堂慕碧巖竹林為問風誰嗣猶自傷心説阮咸贈資上人白塔山前慧樹叢紺樓初化影堂空老僧相見諳吳語夜就繩床問洽公贈慶上人早年銷迹在空門寺數南朝此最尊莫以無為成淨業好將焚誦答明恩贈漁苕叟聞君家住舊苕溪春水桃花路欲迷總為南枝懷越鳥此身猶在秣陵西送故友程水部之子下第往毗陵謁唐太史乞志二首落落雞羣見爾時河山猶邈故人思叔敖死後空囊在亷吏年來詎可為鳯毛今日喜逢君裘敝長安路忍分最是中郎知有道西行一為訪碑文安平元夕對閩客作邑少絃歌惟戍鼓村無姻火只漁燈吳趨綵艷閩珠燦一樣思歸兩未能御堤栁御堤新栁碧毿毿裊霧垂煙總不堪借問道傍車馬客幾多離思在江南寓京感事五首亡命當年為報讐自矜驍勇驀邊州持刀白日橫行市縣令低眉不敢收圍城髙築備遼西夫壻蒙徴事鼓􅤯誰向月明啼玉筯斷腸知是杞梁妻紅顔薄命古來聞萬里辭鄉雁失羣不見黃金歸蔡琰祗留青塜從昭君海陵儲粟號常盈一夕咸陽烽火驚聞道催逋朝遣使幾多民命在春耕甲第西衢曜日新沙堤東巷已銷塵門前行馬依然在問姓多非舊主人送僧之楚千里雲隨一錫孤楚山深處是荆巫湘江秋盡多蘭芷笑採幽芳當折蘆謝王子惠蓮房金房出水訝分甘玉沼清秋露半含雲樹幾重迷魏北蓮歌一曲想江南訪許子工部舊寮一别都城過十霜相看俱是水曹郎到門不敢驅車騎羅雀應慚見子將謝惠涼巾誰製雲巾蟬翼輕况逢新沐晚涼生北忩髙枕承嘉惠東省彈冠異昔情謝王比部惠珠枕雙蟠綵鳯結明珠角枕從來粲不如夢魂恍度鮫人室願借餘光照寶書戲調李子喪內三首君家賢內友人知自是蘭芳不待時莫訝潘生頭白盡祗緣新草悼亡辭月冷粧臺翠冷鈿花銷紅粉栁銷煙陸機總謂多文藻可復揮毫示彥先遺挂凝塵尚黯香洞房深鎖夜何長解愁莫漫頻傾酒猶恐卿卿恨太常馮公嶺觀道傍花愛而賦之馮嶺秋高鎖白雲四山晴樹挂清氛花開五色多竒品不植名園便莫聞春江雪泛柬陳廣文春日江頭雪作花片帆乘雪下東嘉雲深不辨袁安宅獨擁寒衾到日斜芝田憶殷近夫當年仙令下車時燕坐鳴琴有所思不知葉縣丹成後尚見河陽花滿枝張銀臺避兵湖上三首青海揚波白日低玉山雲樹已全迷少陵避亂花溪裏却指湖東作瀼西黃巾夜逐馬鞍東華屋朝隨一創空但使有橋容博望不將無宅笑張融婁關兵後市成墟何似咸陽烽火餘不見問奇門外客啼鴉知是草玄居寇至雜詩四首長兄命豫同作將軍喪馬懊無顔奮臂宵馳敵壘間何似賈生行劫去獨騎南部紫驑還厮卒李阿旺拔戟先驅獲必雙日高腥血染婁江齊師三百稱驍勇氣奪吳兒欲樹降義勇關夀江邊結網為求魚誰道漁人亦獻俘要取銀牌將換酒凱聲乘醉入吳歈漁人顧五年少輕生不畏擒笑談紿虜未輸心朝來匹馬危城外提首轅門索賜金狼兵王五將入滇折蘭贈吳二純叔海上塵吹阻盍簮宣遊曾共楚江潭贈蘭何似攀楊柳佩取芳心報日南題楓香驛亭子秋入楓林霜葉零勞勞吳楚此孤亭階前湖水環雙碧檻外廬山送逺青臨江驛中秋驛路臨江接漢隂洞庭秋氣轉蕭森吳關一望三千里為借清光寄逺心華容湘江西下見華容路訪桃源尚幾重巴水漲時迷蜀道楚雲深處是巫峰馬鞍嶺石磴千盤上馬鞍始知鳥道未為難此身已作圖南翼猶指雲霄向北看苕溪邑鐘鼓洞有伯安題石石傍空山聲暗傳雲和清響落鈞天洞門一自題詩後常見停車叩水邊沅江霜落丹楓吹白蘋沅湘十月暖於春間將棋子敲燈夜可念江千待渡人寄憶江東烽火已難知亂後那堪更别離總有鄉書傳驛使開緘不省是何時盤江詞三首白澗流殘青嶂開雞公嶺帶夕陽來更聞江水盤千曲何似愁腸日九回攢峰夾岸若雲稠下有飛泉一線流春草深時多瘴厲行文駐馬不堪愁松風萬壑引盤渦聞唱公無此渡河漢將西征遺壘在至今啼血染滄波過定西嶺寄憶包侍御節兄弟逢時早䇿勳人言柱下有機雲清宵為問華亭鶴瘴嶺驄還幾度聞仙羊山廣通李令告豫縣西有山望其雲起如驅羣羊山下有礦殆金銀氣也昔聞浮雲變蒼狗兹傳靈氣成青羊安得坐逢勾漏令間煮丹砂白日長捨資驛有楊太史垂栁篇書於壁因寄垂栁年年陌上春題詩不見倚樓人萍蹤恨殺巴江逺望入峨眉翠轉顰安寧乃楊太史客居處樂人多按其詞被之管絃曹植疑神賦奈何徐陵新體麗情多爭如供奉清平調翻入南中子夜歌發滇口占嵇生慢與世相違金馬關前欲拂衣自笑此身猶社燕一逢春色便南飛嶽陽道中積雨千樹松衫結曉隂征夫前路畏泥深慣是楚天能作雨却憐吳客坐傷心黃梅聞張令先已入省仙鳬謁帝楚江歸芳草洲連赤壁磯遙對雙峰懷玉樹琴聲寂寂落花稀潛山道中五日客行仲夏逢佳節地近東吳即故鄉思欲避兵猶寇亂蓬心那解醉蒲觴皇甫司勳集卷三十二
