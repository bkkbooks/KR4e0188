  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4e0188_WYG_005-1a, image: WYG1275/WYG1275-0540a.png}
body:
  text: 皇甫司勳集卷五明皇甫汸撰五言古詩春夜遊西園同諸兄弟作佳節值瑤燈清夜遊金谷良友披蘭襟懿親儷芳躅經過敞榭邊徙倚寒塘曲遵渚雖近尋玩峯生遐矚軒冕幸暫違簿領謝羈束迹非三徑荒情是一丘足鏡裏髮始華尊中酒初緑及時不為歡坐遣春光促奉答子安兄江郭改故隂家園藹新霽柔條始發林芳草漸紆砌潘居信為間揚亭况重閉曰余忝明時與子承嘉惠分省各有愆佐郡慙所蒞暫就北山招轉愜東田稅情忘桃李言迹豈匏瓜繫感遇興長謠來章緬幽契春日遊西山作吳鄉信云美山水饒嘉麗疊巘表參差層巒隱虧蔽時惟二月芳雨散千門霽蕙畹蕩雲滋蘭臯屏氛翳獨攜丘中琴言鼓江上枻結友遵巖阿尋僧指林際仰看衆鳥翔俯悅鯈魚逝物理相因依余蹤且留滯夏日來鳳亭小集各賦首夏猶芳月終宴就薰風泛觴蘭水上置座竹林中飛花代舞似鳴鳥當歌同笑將愁暫破醉遣纍俱空更待西園景留賞北山叢寄懷王道思三首姱行每招愆榮名乃為纍弱冠懷夙齡登廟成華器寧知洛陽才祗取漢庭忌願因天際歸及此河干伺忽散遊梁客來作過吳人朝發胥江汭夕濟蠡湖津還山一何迅行路多苦辛臨水欲相送停雲庶可因本乏希世姿翻為逢時誤良友豈不懷遄征詎遑顧日暮勞所思凌風未成晤將從夢寐求緬邈山川路陸士衡墓平原秉秀質吳趨蔚清芬邁德自軒裔夙齡非世羣圭璋既特達華萼復輝紛運謝金陵氣銘晞石室勳砥節在繩祖奉義乃從軍寧知懷慷慨從兹嬰垢氛旗掩朝歌月劒起夜臺雲李廣忌為將揚雄耻綴文鹿苑成單露狐丘迷曠藝吁嗟千載鶴何處一來聞晉書機始臨戎而牙旗折意甚惡之鹿苑機敗軍處秋夜把酒對月宋生陳九辨陸機歌百年悵兹清秋日聊使幽懷宣矯矯歸雲鴈嘒嘒含風蟬摧芳委朝露俄景流夕川鱗運有代謝蕣榮無常妍始知行樂貴何用居情牽長夜思秉燭新月正登筵金尊泛緑醑寶瑟縆朱絃商歌當棗下楚舞出花前餘名焉足藉達生乃為賢仲秋之月諸弟燕私風月雖佳雲雨或間五首奉義遊京邑數載違親宴迢迢明月光照我越江漢何如故鄉夜及此清秋玩鏡彩攬未盈璧景委才半桂樹敷丹英華萼紛相煥雖謝西園悰庶附南枝翰十三夜良辰信具美清夜永為歡明月已幾望華彩流雲端廣庭置芳座高會列盤餐但云杯行緩不惜露下寒情來感今易迹往戀昔難一聞關山曲猶似别長安十四夜敦賞每卜夜行樂聊及時秉燭且不寐待月豈云罷鱗鱗玉葉薄皎皎金波遲高臺臨窈窕回塘生漣漪載歌蟋蟀唱復詠鶺鴒詩清輝一以鑒素心同所期十五夜嘉月有餘照歡娛無限情寵弟載旨酒要我坐華楹蓂齊莢復委桂滿輪乍傾忽忽愁霖至瀏瀏悲風鳴圓缺遞相運明晦焉足驚太康靖往訓知止崇令名十六夜肅肅斂朝雲娟娟收夕霧江上珠始來天際鏡方露列宿齊掩縟凝霜共呈素嘉肴尚堪薦美酒猶足具良友且無歸劇飲酬兹遇所願揚末光何辭照遲暮十七夜秋宵酬子安兄作清夜遊家園眷言懷丘壑素月升圓靈千里共寥廓始出東南樓俄頃西北郭華燭滅蘭堂金波蕩羅幕雖過二八時光彩紛綽約商歌正流響魯酒亦未薄人生貴適意胡為坐羈縛結髮從至今朱顔悵非昨冶服豈常玩榮名焉足託良會聊具陳麗藻復間作穆如揚清風粲若敷春萼申章忝惠連何以獻康樂柬吳吏部純叔冉冉清秋末戚戚幽懷始借問所懷誰翩翩佳公子從告返家園薄言戀桑梓豈乏睎世符緬契齊物旨嬰情匪軒服委志在文史馳翰揚英芬敷藻爛成綺為道日方損修能時見忌屢偃東郭扉果愜南山屺酒德參浮萍琴心間流水回飈謝囂塵何能渝令美秋日往梅林莊居疏公守舊業班生慕常廬薄遊千里外一出十載餘偶與密親邇惄焉懷所居東林扉尚偃北郭徑始除青山藹盈户緑水湛通渠流盼悉成往眷言思遂初將從古人學乞歸事耕畬顧驚年迹乖坐使情興紆奉答子安兄嵗暮見貽在昔參英寮俱承明主顧被服紛妍姿彯纓儷芳步悲哉遊子情徒以潛郎故一為衝飈激遂使佳期誤入魏悵無竒浮湘眷有慕揚旌指敝廬千里同歸路再聞蟋蟀唱兩見蒹葭露耀靈本易傾馳運豈難度端居懷苦心苦心誰與晤但感時不然何嗟嵗云暮冬日往虞山作故鄉誰不懷名山矧余慕一為塵迹牽遂濶賞心晤偶值芳嵗闌遙泛滄洲趣澄江帶餘霞丹壑收殘霧嚴霜委野草寒飈振臯樹指迷尋舊蹤流盼成新寓魚樂愧淵沈鴻冥羡雲騖歸來徒是今履往悵非素贈范子在昔紀高士遐哉舉逸民始知弓旌代乃有巖壑人范子秉兹尚非病自云貧結廬靈山曲垂竿胥水濱緒年習道論遊方狎隱淪披裘忽過夏采藥已載春雨漂庭下麥風落甑中塵為頌幽貞吉庶宣皇化淳皇甫司勳集卷五
