body:
  text: 皇甫司勳集卷四十二明皇甫汸撰序宴送送家兄赴浙詩序余兄仲氏建節越鄉戒舟吳渚慕山水之標奇悵土風之非逺浩然行矣曰余兄弟同氣四人咸以上次之資希英賢之烈守中才之訓恢世及之猷方其密山同徑竹林共室晨亡羊於挾策夜聚螢而披翰孰不懷鴻鵠之舉為燕雀所咍哉蓋具邇蓬蒿之間而志馳雲霄之表矣逮夫兩兩振翼各各司鳴余與仲氏早承休顧載忝嘉招驂騑服於兩都聫纓緌於三署志何協也至於釁啓權璫讒張貝錦竄瑕丘以俟罪浮湘江而發憤迹何均也是得則攬暉霞矯擬之於二龍失則戢羽泥潛方之於雙鴈遇則達適之疇表周楨之隆違則褒融之輩流漢家之痛殆相關焉一旦稍稍敘遷為天子之憲臣樹東南之偉績羌又莫知余之所之矣伯兮褐玉以賁園季也奏金而登廟一門之子四方其人求為曩昔同徑之棲共室之聚可易得乎嗟夫窮達者時也屈信者命也聚散者數也欣戚者情也情有所感則命在所安數有所值則時在所委復奚心哉康樂耽遊赴修畛而含楚平原于邁臨清觴以興言念此仳離鬱爾敦賞若其敷政以拙守才以愚規諭之義良友詳矣聊賦短律敬書末簡遊牛首山詩引蓋聞鳯京之郊牛山攸峙奠朱方之嘉麗表赤縣之仙靈環以名巖之勝帶以巨江之險神臯邇接梵宇𢎞開梁朝於此布金宋代因之薦璧凡在官旅靡不登尋幽壑紛車馬之塗淨域藹衣冠之地閼逢紀嵗太皡司辰中山王孫徐子禹量言攜漢署之英命締祗園之賞入夏再申淹旬未遂六月三日乘暇如盟始經展眺則煙霞暢來晚之情卒踐窮探則魚鳥盡忘歸之物舉觴而凌昵景操管而屬玄篇王謝名流每棲禪於支遁應徐秀輩亦騁藝於陳思彼各有以也乃炎暑都捐清虛共適設非尚書期省侯吏呼關則六塵絶常戀之牽一丘有終焉之志豈特披襟彌日下榻信宿而已哉維時比部謝紘以抱痾辭笻侯子一元以訟牒妨駕家兄子安先以擢憲入越同遊者余與施子平叔蔡子子木東南賔主三四其人彈指而去來成果淪迹而暌合為因則又倡豫者之所以興懷和汝者之所以寄慨也詩若干首書諸簡册藏之經函春日談園宴賞牡丹詩序昔有怡山談公尚德賁園逸情開徑綺構結於雲外清泉流於鏡中伐緑竹於渭川移丹花於洛汭靈果參差嘉樹蔥蒨實隱居之特勝别業之最雄也方其樽爼錯陳賔從駢集酣歌纍月宴樂彌旬草色交於茵帟鸞聲間於絲管一何歡也逮其朝露忽先夜川長往繐帳既塵履綦罷御新畦靃靡不復芳舊燕徊翔莫能去又何悲也乃若館甥歎逝座客懷春尋故迹而命駕引麗曯於初筵曲池未平高臺猶在九原不作聞笛起山陽之哀萬嵗何知彈琴下雍門之泣嗟乎生死者物之所必至也盛衰者事之所固有也聚散者勢之所恆然也欣戚者情之所易生也自達人觀之浮世等於逆旅馳光同於過隙少壯不樂嵗月幾何乃知縱酒非荒秉燭有以也各賦五言傳諸二子遊仙詩引吳俗以四月十又四日相傳為神仙降辰是日也乃有玄都朗建丹府𢎞開金鑰啓望仙之宫華燈焰禮神之館九靈教闡則葆樂齊鳴雙童唱導則芝香並引吉士靚女肅肅戾止黥首稚齒各各齋心袨服照耀於池中列騎繽紛於洞外步虛肯來謂是吹笙之侣乘風不返詎非駕鶴之羣遘髯客而將從遇巨人而思即嗟乎白髮難變懟瓊蕊之何徴朱顔易頽悵石髓之莫識天下有可以引年者無有哉有可以治身者無有哉聊揚斯旨用廣諸人送董侍御使竣還朝詩序嘉靖四十有五載肅皇帝恭默思道壽考作人甫周于甲將倦于勤惟時法令滋章科網稍密俗漸以敝政寖以棘惟是南服師旅之後飢饉荐災凡厥職司苛以無名之徴擾以非時之役民不堪命久矣乃更懾以虎冠憺以鷹擊奈之何不胥而為姦訟獄繁而盜賊起也侍御史洛陽董公堯封宿挺霜稜籍聞風采簡命南巡照臨我土其始下車也捐無益之費罷不急之徭清詭受之田警怙勢之族嚴墨吏之刺峻惰遊之誅勞來安集與民休息民若更生焉越嵗隆慶改元嗣皇帝即位際中興之運履鋭治之朝渙寬大之詔崇節儉之風公仰奉德音導迎淑氣銷兵裁餉平賦在宥農夫棲畝紅女還機室家寧止囹圄遂空蕩邪剗蠧與民更始俗乃維新焉識治者僉謂向也若時之冬陽氣潛藏公行冬令綏之而不蹙今也若時之春陽氣發泄公行春令煦之而不傷蓋聞御史之職専務端軌貞度以肅百官以厲萬民公乃順天慘舒與時消息不獨憲紀是飭而調燮之寄可司以佐聖天子化裁之治矣賢哉真御史哉吳民謡曰前有溫公後有董公並起河內福我江東溫公者前侍御如璋亦洛産也按吳著清海之績迄今倭夷不敢東窺於吳溫之力也余從鄉大夫之後嘗作頌以紀其事勒石海堧永慕不忘公之駐節也蠢迹遐竄鯨波不揚先聲奪其氣而寢其謀也民賴以安堵厥德惟均奚必俟其來而襄之以斬獲為功哉今上方以外裔為中國患軫邊疆之憂聽鼓鼙而砥鋒鍔稽周宣薄伐之猷奮漢文仁者之勇引頗牧於禁庭咨制馭之長策側席元老止輦至言所以垂綃衣舞干戚審黃石存苞桑者念亦深矣公行將有訏謀祕計入告我后于內余等雖逖矣東土之民願聞其梗槩拭目以覩太平尚亦有利哉驪駒輟響驄馬北轅杞心徒遙芻言莫禆因賦臺端行一首以申别緒云爾送大司寇漁石唐公豫告還山詩序下官不佞墜迹昭憲移禁司刑猥聞公以母老上疏聖天子特嘉閔焉詔報曰可乃頒傳瑞撰吉啓行道路咨嗟搢紳歌頌顧非明王之盛治孝子之美談哉厯觀載記大臣之去政類皆請老引年乞骸歸骨是故留侯哲矣而毋匪逮存潘令懌矣而仕或未顯若夫身踐台階手持法衡乃望倚門而思邁勑回馭以言還豈不光昭往牒於休來乘者哉舞章服於萊家陳鍾釜於陶饌以寧慈度以介丕祉風枝不驚叢萱斯茂公行其榮已非直勇退於急流冥飛於遐曠也下官方為戮幽户抱痛圜扉異廣漢之利見悵祁奚之遄歸聊賦五言用申千里云爾皇甫司勳集卷四十二
