body:
  text: 皇甫司勳集巻四十一明皇甫汸撰序自集禪棲集序嘗謂虞卿著論誕自窮愁屈子賦騷由於放逐故文王拘而演周易宣父厄而作春秋考諸聖哲葢同斯㫖詳之馬走豈或云誣矧詩本縁情情悒鬱則其辭婉以柔歌以言志志憤懣則其音慷以激是故嵇生揆景猶愬繁弦雍周撫膺遂流哀響詩可以興可以怨不在兹乎余綺嵗明經冠齡結綬常厠下大夫之列參多士之末光然性惟遌俗識罕通方一改官再承譴一不拜職徙者三而已善乎潘生之言此誠拙者之騐也丙午之嵗承太夫人諱儼然在苫塊中而監察以隂憾苛抵其罪坐是免官明年丁未上書闕庭敕下撫臺移之京兆余羇紲都亭客居長干寺之精舍夫鍾儀晝繫自同楚囚李廣夜行見呵灞尉時哉勢乎既而勘者兩造具研聴者三覆未報清流投濁竟成孟博之寃白首相新莫鑒鄒陽之枉乃使奔走道途淹留嵗月昔䝉莊願處才不才間則余亦可以罪非罪自遣矣斯地也高帝由此肇都文皇於兹建刹凈域經始於赤烏化塔更新於白馬布金恧麗多寳慙工余乃銷跡緇塵息心慧梵客有許雷時方同病僧多林逺可與晤言若夫貫華寫葉之書四韋三乘之典無不流觀染著宿障之根因果㝠報之業靡不殫究出煩惱於累刼超忍辱於空筌其暇日也登高臺以延眺訪故宫之遺蹟運革於三分鼎遷於六代吕周英烈託壠樹以西靡王謝高風隨江流而東逝夫得䘮異途其虚無泡幻也既如彼榮悴共域其倐忽燼滅也又如此則於蟬脱一官懸解萬物余復何有哉涒灘春謝作噩秋殷蒹葭落而淮水清霞霏収而鍾山紫頽光迅於駒隙禪定辟之猿調兼以哀深庾信涕甚楊朱抒情宣志篇詠間作占授行者書之又若貸更生於薪旦庻存禮樂返中郎於鉗赭尚寄典型此殆非余之心也或曰西子以蛾眉取嫉曷不為之毁容越人以神手殱生胡不為之輟伎嗟乎南山種豆顧非引慝之辭空梁燕泥詎是招愆之牘世設以此吹虀則詩可以削草矣去來三稔在寺凡十又三月前後得詩若干首題曰禪棲藏之含部三州集序三州集者紀宦跡也今上嘉靖改元嵗在戊戌余為司虞氏閲視京畿時武定郭侯鄖慿寵作威日益驕横詔典大匠作隂操部權奪取賈人金以億計歸於私槖余為發摘之又嘗請毁張掖民居名通山陵實益已第余曰此殆欲直取武庫耶持議不可侯銜之誣以慢㫖置為理官於是有黄州之役嵗在乙巳余為南省司勳氏時當考吏太宰張公潤耄無能為専任郎官罔論賢不肖黜其所素嫉而留其所易與以快已私余起而力諍之言官希附詆以侵職謫為州倅于是有澶州之役亡何太宰為甌寧李公廉才察滯稍遷郡佐于是有栝州之役嗟乎坎軻屢遭未嘗損其烈節訟牒旁午不少輟其篇章黄葢楚疆屈賈放逐之區也諒而見疑忠而被謗憂心辟摽故多怨誹之辭澶葢魏境蒙莊寄傲之地也虚憍疾視猶有鬬心故多忿激之辭括蒼越稱嘉麗康樂娛遊之所經也時余安常委順若將終身焉既和且平故多暢達之辭當是時倦宦而并減文情避人而間出累句亦足以興慨矣緬自弱冠起家解褐登仕躬際聖明孰不欲出入禁闥優游以致卿貳然才滋衆嫉命與時違退而立言豈余素志乎謝憲以來偶檢制作散逸過半舊雕禪棲寓楚還山江行新語諸板悉毁於謝兵之手三稿篋中幸爾無恙兒輩請授梓人以應好事者之求嗟乎余政乏何武之思徒離沛郡詩慙謝朓之詠奚重宣城若夫白雲赤壁山色猶存湘水淇流江聲無改一展巻之餘而嵗月徂征風塵奔走王事鞅掌物情變幻宛在目中至今心悸黄甫朞月澶僅半載括三改嵗其乆速咸數也昔人愴陳跡于俛仰喻過客于光隂聊以識吾適耳詩云乎哉長子楙嘗攜之黄州令校黄詩次琳攜之澶州令校澶詩季榖攜之栝州令校栝詩勒為四巻題曰三州云南中集序余既刻三州集成季子榖出所藏南中稿跽而請于余曰甲寅之嵗大人垂五十之年從萬里之役時羽書傳警驛路戒嚴一旦捐墳墓棄鄉閭間由京口渡長江發真州越潛及濟經齊安故郡眺江夏厯武昌登岳陽泛洞庭遵武陵訪桃源遡沅湘臻貴竹走夜郎始達滇中其域也星分參井地界梁益表以太華匯以昆明金馬碧鷄為之闗嵩雺笮箐為之隘東連八部西控百蠻羅甸稱雄㸃蒼標勝雖逖土遐陬而山川秀麗風俗侈靡稽漢班固西南夷傳覽近代楊太史月節歌詞有埒美於中原者小子何幸為大人所將以遊見夫㸑僰異形椎辮殊狀至若孔雀山雞朱鸚翠鳥莫匪珍禽山茶木蓮蟬花龍草悉皆瑶卉大人慿軾以抒思褰帷而摛藻於焉述徂征之跡宣羇旅之悰冩憤懣之懐申古昔之慨鬱志於風雲緬情於嵗月是編也可無傳乎小子徒踰童烏悟𤣥之齡未叨伯魚聞詩之訓今稍長矣余聞之憮然曰畏險猶驅冒榮不止此殆仰跕鳶思欵段時也惡用存之且余耄矣軒冕長辭無復四方之志婚嫁甫畢未遑五嶽之遊汝能奮志嚮往他日獲霑一命再履兹境若韋康纘服於荆南周撫嗣聲於寧益俾父老見之扶杖嗟歎曰是曩某使君之子也不既寵幸乎苟能修吾之業如佺期追詠於巫峽文考屬草於靈光又不獨顯揚而已小子朂之遂登梓事并系蕪言漢儒經學編名序皇甫子曰六經之作也彰於道矣孔沒徒䘮戰國從衡言者紛然殽亂焉至秦患之乃肆燔滅經投燼而道亡矣漢興改秦之敗求遺収脱諸儒輩出専門竝興漢儒之於經也各習其師研精殫思以之為終身事業故咸致實用訖於宣元其風篤焉逮唐尚文辭競功汎濫馳聲華藻乖離經義而唐無儒哉噫漢為經術術已去道逺矣獨其治専學切心得身踐契聖人窮經之説苟以文辭而已不其陋哉今之治經者傅㑹成文則既不能窮之矧致用耶予之感於漢儒也無從類其經以系之名以論其世焉爾六子説經序皇甫子曰道散於天地而載於書謂之文文以載道謂之經六經作而天地之道闡矣天下之文肇矣六經之外非無書也而曰諸子諸子之説於道誣宣聖之後非無文也而曰百家百家之説於道荒天下始無文已無文斯無道已老莊荀列揚王世謂之六子六子為諸子冠而其書具存世之談文者下六經舍百家則曰有六子云六子者惟其誕於道故詭於文而苛議以騰於經陋宣聖於不足為何見於經何測於道而比比援以濟其議哉迺始易之乾元終春秋之獲麟俱有説不知其説果益於經符於道否也惡用集諸編為説經噫六子者不知吾道而猶不能忘吾經則其臆説雖鑿甚且叛焉而其所以私附於聖人者意亦微矣揚與王尤其擬聖而習經者然則諸子支離鮮不援經自飾奚矧百家編之使綴文之士知文之不可忘經顧不可忘道匪直其辭而已也宋儒曰循其言皆可入道則或偶幾焉未敢質此為盡然也懐慰編題辭司虞氏曰戊戌之秋余以觸忤權貴置為黄州理官夫絳灌詆而賈生遷許史懟而子政免自古有然矣惟時相君憐其亡罪僚友悵其逺行或踟蹰祖讌或慷慨興歌夫黄楚疆也故辭多激楚之音哀而不傷怨誹而不亂其達騷經之㫖而存小雅之風者乎顔季贈語臨岐之誼也蘇李申章去國之情也發情止義此言有重於金玉而諷有篤於韋弦者矣湘流造託將承嘉而逺跡清風如頌聊永懐以慰心兹役之謂也編之題曰懐慰云擬古樂府小序古樂府擬者多矣如訾茄礞室孫魚呼豨之類皆未達其義而强附其辭何異譯言越裳而釋字梵竺耶濟南李子謂如胡寛營新豐士女老㓜相攜路首各知其家犬羊鷄䳱放於通塗亦識其故以為善擬余謂義苟未達即蜾臝速類叔敖復生終為螟蛉優孟耳魏武帝使繆襲造鼓吹十二曲以象四時改漢朱鷺為楚之平思悲翁為滎陽艾如張為獲吕布上之囘為克官渡翁離為舊邦戰城南為定武功巫山高為屠栁城上陵為平荆南將進酒為平闗中有所思為應帝期芳樹為邕熙上邪為太和師其意而不襲其辭此善擬者也吳韋昭亦造十二始炎精缺終𤣥化晉傅𤣥所造始靈之祥終釣竿則廣為二十二後若和鑾以詠朱鷺翦刻以諷如張悵雲雨於巫山愴嵗時於芳樹但取本題殊乖厥㫖矣詩固伊爾文亦有然如典引嗣軌於美新解嘲濫觴乎釋誨古人研思藻綴之妙也上方入繼大統時值中興制禮作樂恢文耀武徳隆堯舜烈邁高成臣汸濫起制科備員郎署躬逢雍盛目覩儀典宜登歌什宣述游揚遂忘其謭劣擬造十二曲覽者勿哂邯鄲之步愈趨愈失也皇甫司勲集巻四十一
