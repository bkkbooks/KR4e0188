body:
  text: 皇甫司勲集卷二十四明皇甫汸撰五言排律與學仙者談𤣥因諷以詩秦王訪方士漢武學神仙安車來海上蜚觀架雲邊寳鼎藏靈藥金箱出異編日曽陪寢殿時或幸甘泉髙掌朝承露祥光夜亘天從官數遺獻中使每傳宣巨跡逢難就輕舟去不還徒然聞望氣詎可得延年閒居簡子安兄自我謝繁郡同君旋敝廬草芳知嵗改花落見春餘江漢遊来倦雲山病未除門違長者轍驛枉故人書旅跡從漂梗微材類散樗還邛未有賦徒媿卧相如簡吳子二首余昔與吳子純叔獻䇿遊燕同作登臺之俊分符仕趙俱為失路之人坐論詩書出驂輿馬心乎愛矣情豈忘焉迺星流嵗月雨散山川長卿還邛以何言賈誼浮湘而再召悵然懐往率爾成篇尚期子以嗣音庶起予之寄慨少年干聖主同日忝嘉招走馬平津道看花御水橋屢移華省步頻散紫宸朝詎識山川險何嗟嵗月遥臨淮因桂住入楚似蓬飄帝鄉倘可夢天路許相邀憶昔邯鄲郡同君作吏情花疑在潘縣月似對宣城郭負恒山逺門流滏水清風塵一以謝年跡兩相驚舄向雲中舉琴從天外鳴惟餘趙兒女歌裏報瑶聲九日吳山登眺作昔數登髙節今當故國臺遊龍孟生去戲馬宋公來信美吳山曲標竒茂苑隈揚帆泛清淺張組歴崔嵬潭影涵空潔巖霏雜翠迴凌飈知氣肅踐露覺年催旅跡鴻初至蓬心菊始開誰能對舞袖猶自惜行杯訪朱子謙諫議不遇舊日雲霄侣他鄉嵗月深轉蓬驚去住鍛羽悵飛沉不覩春風面空餘流水心言乘木蘭舫来就玉山岑避客高懸榻逢人媿盍簮徒令歸興盡一謝掃芳林過何山懐梁二何髙士同諸兄弟作招隠推名嶽棲靈儼故丘人奄隨露盡居尚有雲浮月寂臺難旦松深寺易秋入林懐二鳯遵渚媿雙鷗嵇夜杯應化徐君劍若留還疑采薇路䰟魄一来遊濟上代柬寄李伯華十四韻當時翟公客爭似李膺門博涉稱該覽髙談析衆論奕從王粲覆碑就禰衡温文藻平原在人倫有道存見知因筆札交契託琴尊宵館頻分榻春城每駐軒相期薄膠漆何止儷璵璠嵗月嗟留滯風塵阻奮翻孔融歸魯國賈誼起湘源旅跡徒飄梗憂心欲樹萱山川邈良晤雲雨斷離䰟鴻鴈三秋盡蒹葭一水繁驅馳疲道路蕭散慕田園祇恐幽芳歇思君未敢言南征道中書情二十韻伊昔干明主相期附俊臣㑹逢興禮樂詔許奏天人要路方晞足靈臺果致身官嫌楚尹仕業守魯儒貧詎意違時好從兹被世屯懐芳嗟靡託投璧忌無因葉縣鳬將晩河陽樹易春省中疲執㦸都下欲埋輪章甫空逰越貂裘已敝秦醒狂丞相笑長揖列侯嗔受辱先關木圖功後徙薪恩私蒙日月旅竄困風塵賈誼才猶逺虞翻枉未伸太行非險道漢水是迷津寵失朱顔盡交移白首新沈冥頌酒徳詼調論錢神倦鳥惟垂翼枯魚或縱鱗自能存北叟何必讓西賔秋氣看蕭瑟征途事苦辛平生寸衷在末俗向誰陳𤣥武湖供事三首澄湖一濬後千古見流長映帶羣峯秀沿洄十里蒼蓬瀛信有地雲水自為鄉魚鑰傳中使星槎倚夕郎幕間存往蹟鏡裏駐年芳延眺非闗戀兹遊詎可常周王宏策府漢祖重民圖開館收秦日為樓託晉湖輶軒萬國至負版四方趨户口今全盛山川代不殊地鄰東觀密水遶北門紆何幸披𤣥覽從兹仰聖謨别島藏丹構中州匯錦陂臺猶習武處苑即樂遊時光禄陳詩罷鄼侯舊典垂仙源看似練睿牓奉如絲覆檻多山靄交牕悉樹枝懸知皇業逺應共水無涯送王兵曹使楚一尊吳苑酒千里楚雲鄉漢使新乗傳周官舊職方遥天廬嶽隠春水洞湖長嶺外聞猿泣衡中見鴈翔荒祠猶傍竹廢宅幾垂楊弔古情難極探竒興不忘停舟驚草緑解佩贈蘭芳祇為耽辭賦知君滯郢陽代柬因令弟參軍寄訊楊太史何事投荒乆猶聞賜召遲伏波窮瘴癘定逺老戎麾卉服居將染𤓰期嵗屢移鄉心魑魅誚客涙杜鵑知跡學龍蛇隠恩懐犬馬私清明望京洛晦日眺昆池賦擬還卭後書成去趙時因聲傳棣萼結想眷瓊枝錦里家連郭蒼山路斷岐無由行載酒一問子雲竒諸比部大父出亡不知所終詩以哀之何處求梅福將誰畫蔡邕遼陽迷返鶴函谷逝猶龍市上人應識花間客詎逢死生同委蛻汗漫異行蹤歌些招難及興悲涕易從惟餘述祖徳懐筆夢形容被彈樂子初遭謗雲卿始被彈諒無曽母察寧免鄭人看積口銷金易傷心辯玉難傾危迷後誡倚伏昧前端自不干丞相何曽拜美官傳經翻取累辭邑豈懐安騎省淹三徙鴒原慨獨歎感時空嵗月行路屢波瀾是木聊容散非氷亦可寒蹐躬憐地厚矯首望天寛域内窮悲阮河陽拙謝潘從兹避機事永託𡨕飛翰春日從叔招遊上方共倦風塵役俱懐山水遊郊容争媚日湖景獨澄秋細草横塘路輕帆茂苑舟松深遥辨寺花密屢經丘禪定聞春鳥機忘見瞑鷗省腰知病起延歩惜芳留信有林中逸何須物外求多慚小阮醉猶得預清流贈曽地師早年精地術終嵗客江門辨壤因知脉窮河遂識源珠丘虞塜秘金盌漢陵存訪古遊曽遍通幽業自尊邦君迎射覆弟子竊書翻豈是亡牛者空思墜馬言題古沙贈汪氏自得滄洲趣應知投隠心鷗羣朝復暮鴻跡古還今聚散因風易盈虛損日深仙源隔水見迷路倚花尋觀化同河上忘機類漢隂從來謝塵垢惟是託淵沈過朱義民里衛兹懐國計卜式上邊輸表里施丹㦸題門賜寵符淳風未凋謝華屋漸榛蕪就食無羣犬巢林有一烏徒令下馬客感事問田夫孫生芹談數學童時聞學易到處有賢名北海聊相訪中郎定早迎人稱盲子夏自笑隠君平𤣥理知犧性占書著鳥情囊應百錢足座可一言傾戰勝能齊物何煩問此生登泰山虞后巡宗日秦王幸岳年金輿曽此駐玉檢竟無傳眺日臨滄海慿虚挹紫煙官松垂御幄女井幻香泉晴書寒飛雪隂崖下引天神君迷七二塵界𣺌三千巨跡臺中見空音畤外宣馬遷文已就願奏聖明前月潭寺瘴嶺鬱風煙迢遥路八千羅施稱鬼國兜率見人天幽洞穿雲際危樓架水邊澄鮮因悟寂照朗自通圓有客嗟行役逢僧叩業縁皈心無别㫖委順即安禪贈周如斗侍御聖世宜無外夷方乍有征臺端簡良史江左寄巡行每念臨軒顧彌興攬轡情封章成妙算優詔許監兵課罪風霆迅酬功日月明田租䝉半賜閭井若更生取笠猶殉法鳴絃悉勵精留君同寇借生子擬周名隼撃魚龍避驄遊士女迎帝將虚右席誰復倚長城膽落因彈劾幾先絶請盟為鐫秦望石一頌海波平聞劉子威還自洛陽奉簡别記殷秋日歸當聿暮時枚生遊似倦陶令去嫌遲試問山川勝聊陳風土宜銅臺經故寢金谷展荒祠潘縣猶花發梁園但黍離鬢先凋作素衣盡化為緇余抱傷弓恨君遭按劒疑因聲附張邴乆宦欲何為寄嚴相公為問東山傅閒情近若何漢京紅日逺台嶺白雲多高枕臨泉石懸車在澗阿嵗遺中使出日給縣官過朝請辭雞唱賔從㫁雀羅散金無隠賜取酒似酬歌却老身逾健調元體自和平津門下望章水隔煙波題錢氏懸罄室長卿嘗壁立仲蔚亦蓬居今日錢郎舍清風每晏如貧同懸罄後隠似挂瓢餘誤㸃屏間筆閒翻案上書客喧門結駟婦歎釡生魚但謝千鍾餽何須儋石儲贈胡開府五十早見成功日仍開介夀年平津將拜閣充國尚留邊海外傳聲教朝中佇凱旋蘧齡躋半百田客擁三千有美堪垂後無非可悟前樂懸金石賜侍從綺羅妍令月逢青女佳期㑹列仙萸房重薦酒桃核並登筵戲馬餘風嗣椎牛宴享偏吳山頌維嶽越水詠如川鴻烈誰能紀微才懼莫宣清宵望南極應喜麗台躔徐母秦夫人五十笄字賢聲渥褵歸禮數崇鳴雞戒寢似卜鳯兆占同瑟徹夫君日機存母氏風承歡百嵗半抱恨一生中書㫁因山宰香銷為令公惟餘蘭早秀長得倚萱叢七言排律附寄題似樓贈房考李時言建溪百折徑千重上有精廬敞碧峰盡訝樓臺開翡翠多言閣道倚芙蓉城名平臨島嶼偏宜月俯瞰煙霏半在松仙客好居時獨往大夫能賦幾相從靜中名理虚為指物外行藏幻是蹤舊日李膺門下士閩雲南望憶登龍皇甫司勲集巻二十四
