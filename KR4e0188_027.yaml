body:
  text: 皇甫司勳集卷二十七明皇甫汸撰七言律詩豫被論屏居侯子舜昭撰懷慰賦見寄奉答世路風波不可聞還山直欲避人羣素書逺謝雙魚贈藻賦新傳九辨文響振蕭齋聊擲地思飛台嶽會凌雲明珠寄語須珍重按劍相投恐未分念别再賦征車欲戒且停鞍把酒今翻别更難雙鬢豈堪承再竄一麾猶自戀微官江楓落後淮城暮沙雁飛時楚塞寒遙憶吳門何處是定因白馬向南看燈宴聞雨因懷子安同子浚子約作金樽髙宴競芳辰玉律韶年應早春火樹不須重待月雨聲翻似為留人看來白髮皆非故按出清歌總是新花萼滿堂饒勝事一枝先露獨傷神周以言黃聖長過余問疾一丘棲病每經旬二仲相過惜暮春羅雀不知東郭騎逢人初著北山巾枝生肘上看非纍花落藩間悟是因且覆清尊判盡醉何曽靈藥駐芳辰吳子仁舟泛遣興湖上扁舟興不違春深何惜醉芳菲寒生細雨花間濕節近輕煙柳畔稀散騎十年空未調羣鷗一夕已忘飛溪邊漁父休相問楚客歸來欲製衣周以言黃聖長過我先人城南故居賦詩見示悵然答此疏公别業倚荒城三徑蕭條蔓草生薛邑臺池今日淚平泉花石舊時盟齋中歲序看駒隙門外春風換鳥聲不是求羊同過客題詩那得更傷情春暮索居棲息無能出世塵青山何處可藏身還期向子招禽慶為報支公待許詢靜對鶯花思舊事忽驚風雨送殘春朝來閉户多相戲猶自含毫擬答賔從子約弟借河上公道德經注披味柱下金經祕五千瑶函一謝棣華傳言從關令初成帙道自河公久棄筌誦後香煙移座右望中靈氣靄簷前亦知無欲能觀妙舌強何曽解悟玄文太史逰義興歸贈早厭承明出漢京却耽山水寄高情藍輿行處門人從竹徑穿來郡守驚春盡玉潭乘雨泛日長丹洞眺雲生間逢道士書經罷何似籠鵝别會城追昔家居兄弟多燕會觴歌之樂特盛者如眺飛素於寒朝玩流光於清夜雪月二編華萼競美矣比承慈戚兼值仲徂無復歡悰聊申慨咏時丁未秋日細雨吹寒入草堂蕭蕭落葉間鳴螿遊情病後知因減嘉會年來信不常東郭雪殘惟有卧西園月在總堪傷爭酬麗藻誰能賦空使詞林泣謝莊上夏左相昔參多士謁平津東閣開時奉後塵門下憐才曽倒屣車中容醉偶汙茵謝公久係蒼生望裴相猶懷緑野春聞道金城圖未上且須持議在和親麗春宫人詞次韻漢宫初進美人歌一日春暉到綺羅漫向玉階啼粉淚試開金篋理粧螺從登豹輦銜恩甚特賜鸞箋命藻多總是相如能獻賦文園歸後奈君何又麗春宫人詞掖庭諸伴盡承私猶是長門奉帚時夜月羅幃空自照春風玉輦不教隨畫圖舊掩明君貌團扇新傳班女詞爭得蛾眉無解妒一開金屋寵全移别慶上人仗劍噫歌出帝京楚江東去是吾城僧中淨理諳應久物外浮名本自輕阮籍易傾窮處淚惠休難遣别時情殷勤記取臨溪意正及長干芳草生戊申除夕帝京明旦憶朝天客舍曽開守歲筵一謝鵷鸞非道路空將犬馬愧韶年鐘聲逼曙傳花外燈影分宵落酒前擬向東皋理春事張平今已賦歸田子約弟校書東閣君從都水入讐書何似更生在石渠筆札尚方初賜後綈緗中祕總頒餘高才自合隨金馬博物還應辨魯魚長日遲回勞汗簡藝香攜得滿簪裾劉向以都水使者校書石渠閣郡守金城見訪時方治水自憐漢省為郎久一謝雲霄託薜蘿散帙林中惟有卧高軒門外枉相過西臺攬轡清風在南郡承麾惠政多早晚白公隄已就佇聽民唱兩岐歌韓司徒贈詩過奬鄙集次韻奉謝萬事無心付寂觀一燈遙夜坐忘寒調卑豈合陽春和形穢空將玉樹看木落冶城回客夢鐘鳴香積倚僧餐因公欲訪君平卜可是人間蜀道難夏至日對雨簡子約弟麥風吹雨夜蕭騷詩興朝來似省曹占日正逢南陸候朝天應想北宸勞祠臨泰畤陳琮璧路出汾陰駐羽旄莫以淹留虛從事後車題賦待枚皋茅山道中寄徐公子聞其抱病林開白石隱仙房路指青門接帝鄉六代總為分鼎地十年空作尚書郎源迷桃水聊相訪會憶蘭亭耿不忘聞道徵君初養疾將從海客寄丹方寄王維禎户曹扶病尋真宿羽壇塵蹤那識是秦官山中瑶草傳情易天上瓊枝會面難華省久淹猶執戟明時須愛但加餐應徐零落元瑜逝莫以風流憶建安謂亡兄及蔡子輩江上寄程祭酒絳帷何處馬融庭建業城西淮柳青名重兩都看作賦教分六館羡談經漫因玉樹思今雨共説金門隱歲星為問芙蓉池上客可知江畔有飄萍報恩寺浮圖明光九級盡琉璃為答玄功詎惜資地是赤烏開教後基同白馬賜名時鷲峯直與諸天接鳳闕翻從下界窺登罷欲書多寶事奈言江總善題碑金陵懷舊平生蹤迹半京畿别去秦淮歲屢違道上投珠多按劍市中擊築幾沾衣寺尋白社僧猶在宅訪青溪客已非莫學隴西逢醉尉夜深愁向灞亭歸天界寺訪半峰上人聞已入楚松關靜閉座凝塵童子花間笑候賔挂却袈裟看有相持來如意贈無因昭丘直指彌天路湘水遙通慧海津衡嶽若逢飛錫後不知留偈與何人普德寺古寺城南訪六朝高臺一望幾蕭條門前黃葉催年暮林外青山覺路遙塔影常圓沙苑月鐘聲靜帶楚江潮老僧宴坐耽禪定送客何曽過虎橋溧陽旅興小邑寒深歲復催此身如寄未能回主家負郭塵喧逺客坐看山爽氣來瀨水舊為亡楚地吳雲今是望鄉臺欲知暮髮俱凋盡為説朝心總不開題史考功池亭地即謝公堰名園十畝與城鄰日夕風煙逐眺新山擁翠屏開作畫水從金谷瀉成春憑軒不斷啼花鳥閉户應逢看竹人見説玄暉池尚在知君前是謝家身先春一日金壇道中窮途明日已逢春殘夜題書報密親吹笛曽為行市客解衣聊作刺船人蒼蒼樹色雲連郭寂寂江聲月滿津不是才華應取忌肯令王粲在風塵歲暮客居獻王水部少年未與俗相親慷慨猶為國士身阮籍能留青眼盼鄒生長歎白頭新客中歲序空催鬢天上陽和易作春一自誤遭懷璧罪逢君應是泣珠人早春寄子約弟舊京東望已春歸禁苑城邊藹曙暉名在郎曹皆是纍酒酣身世兩相違還邛有賦推司馬入洛無心愧陸機淮柳青時江水濶知君將欲理朝衣送王户曹擢九江守甘泉獻賦早知名才子為郎在兩京闕下承符初出守郡中森戟已相迎空庭廬嶽晴雲色燕坐潯陽江水聲試覔古來循吏傳幾人年少寄專城贈盛秀才避喧因就辟支禪江左玄風屬少年數借慈燈揮藻賦更從積雪照韋編潮生靜夜灘聲轉月上空林塔影懸愧我間來尋白社逢君却在虎溪邊赴丹陽廣福寺與弟言别寺在練湖傳為日光佛靈異而建上有陸羽第十一茶泉名玉乳云古寺碑題西晉年澄湖如練倚窗前寒雲自覆金光殿荒草猶埋玉乳泉楓葉染霜秋後色雨花和梵夜中禪亦知閲水同觀世不奈潮聲送客船寄贈吳純叔藩使督祀太和玄宫勝地迥塵寰先帝崇祠敕楚山仙吏拜從香案後衙齋寄在玉清間瑶篇久祕逢誰識桂樹叢生好自攀更道襄陽風日近乘間一醉習池還將之南都别親舊因寄寺僧秣陵城外長干寺潮落滄江一水涯客路欲隨南國雁離筵先就故山花因辭宦轍慵奔走數過空門感歲華朝省莫容鄉曲賤此身端合住僧家送伯氏赴試北上騕裊長嘶趁北風黃金臺在古燕中池塘草色春前思禁苑花枝醉裏叢馬援才成時未晚公孫䇿就路應通送君自愧𡨕飛雁却笑當年誤入籠贈萬開府看君被服似儒生不獨能文慣論兵三十擁麾當外閫一朝開府在西京雅歌樹下留賔醉清嘯樓中料敵平更道深山尋羽士功成應有赤松情贈宗二伯昭早聞名姓著江東却恨相逢白首中樓護不妨遊五貴阮瞻曾亦辟三公代人屬草辭偏慣分吏占書意盡通春水片帆心萬里看君猶欲破長風簡陸儀部自甘寂寞解朝裾何似承明厭直廬謝病早歸年不待避喧真與世常疏筆留藩溷因題賦墨變池塘為學書參佐廨西芳草遍時聞人訪士衡居新昌吕生見訪吕安命駕輕千里來訪吳門何所聞揮翰久應稱內史請纓猶自慕終軍朝探禹穴因懷古夕泛娥江解辨文衰病無能空倒屣欲將書籍盡投君夏日過文太史問疾長日因居訪碧山清風如造竹林間門前不斷軒車駐庭下新滋帶草間著作久探金匱祕陸沈曽是玉堂還從來妙説能除疾可引枚乘一解顔寄談尹看君白晢美修髯早歲明經起孝廉卜築近郊同沈約上書辭邑似陶潛梁溪夜靜惟髙枕惠嶺朝來正在簷幾欲懷人招隱去尚慙為吏未能兼皇甫司勳集卷二十七
