body:
  text: 皇甫司勳集卷四明皇甫汸撰五言古詩送楊子祐知興國尋役謝皇畿遄征辭帝闕朱明垂方隆修景迎未歇晨旌抗欲徂午馬哮不發且覆天末觴暫緩星前轍攄情諒子衷執手信我說丕休䝉嘉運利用賔時哲彈冠捐族閭緤組躋朝列𤣥士守深湛謁帝生激烈稽首金馬榮澡身玉壺潔平江波濤興昊穹垢氣結一麾竟出守三命聊所竊行行邁楚荆漭漭遵吳浙斾指衡服雲帆掛湘干月遐想百代雄浩嘆一時沒願葆幽谷姿毋俾蘭芳滅炯介投處言慷慨起長别袂連汗並揮心與飈俱熱洞庭秋水清擊子中流楫甘泉先生宴别席上賦三首天王肇郊儀宗伯不皇暇隆禮樂殷周躋世登虞夏忽半冬簷規爰返春曹駕進我青襟士坐之綘帳下無譁啓初筵有藇振餘斚豈徒良宴㑹眷此逺行者奉義各于邁黷歡亦聊且顧愴留滯身側想寅恭化愚也蓬樞士少嗜綴文辭柔翰弄綃縠懿矩躡塤篪旁覽周秦典三復齊梁詩榮華既已隱喫詬竟何施乃慕夫子學毋俾後辰迷授我合一編啓我深湛思循循兩言誘卓哉百世師呼寐成然覺道腴良在兹晤言聊一室尋役頓千里緬違梁木仰况謝蓬麻起擊筑興長謠臨觴熱雙耳匪嗟行路難實感年華駛樹勳幸及時息學恐虛此無由慰孔說何以徵孟喜金雘戒遐心瓊枝葆令美作頌幾永懷敢告同門子春日書抱柬當道諸君子二首鱗次嵗方獻駘蕩化攸同凍樹荷靈曜潛穎熙朝融乘木政且平升階澤斯豐奉三超神理吹萬等𤣥功既漸八埏外復被九垠中泰來有疇祉時往無再逢牽世詎嬰網司晨猶在籠效知匪患位處才俾休躬誰謂一羽弱揚之戾層空懼貽搶榆笑願託扶搖風璿璣斡回運寶厯啓東節載陽薄曾暉改隂謝凝結條風衍遐圻飛澤振窮穴昔感百卉腓今覩羣芳悅皇仁美無遺物化滋未歇恫豫秉國楨利賓晞朝列命邑奚獨愆訴閽良自拙天高赤墀塗雲暗黃金闕區區誰見知怛怛難具說所藉揚末光終然照孱劣送袁永之戍越晨風戒商序竚立野蕭條念兹帝京别軌路修且遙遙遙子何之將豫情內勞在昔䝉嘉運與子儕王僚愧非通時哲而俾世網遭人事若浮雲聚散仍一朝子勤越鄉戍豫掌畿輔徭行當慎舟楫平江有波濤吳越古戰場故鬼日夜號子其感興廢毋用徒忉忉出京鄭張王三子觴豫祠亭作四首良時不易遇散吏竟難容稽首辭帝闕出自都門東都門倐萬里雲霧迷九重眷兹同心友結駟逺相從從豫感行邁置酒賢哲宫旭日麗臯薄回飈振林坰蘭芷猶未歇葹菉亦已茸淚為岐路滋志兼物化恫臨流復徙倚聊以寫情衷憐君昔抱疴甘此武夷臥寧期時網牽復枉金門步命駕輕千里傾蓋在一顧並非希世姿遂與驚年暮天道邈難謀人事艱多忤緬然異得喪已矣各去住聚既同朝雲散亦等晨霧幸有盈尊酒綢繆抒情愫行豫身實遼願子心相故謂鄭憲昔與君交者乃自吳趨見一朝越江潯千里返燕甸謁帝承明廬伊豫䝉嘉薦已傾金雘心復接瓊枝面憂或枉惠勞樂亦同酣宴投分踰三載恩愛兩無變寧期謝朝寺重與異鄉縣臨觴心若焚把袂淚如霰努力崇令德毋謂名可賤謂張詩義心輕逺别相送勞密親密親等肉骨倐若商與參置酒臨河梁飲馬越城闉城闉睇黃屋樓觀杳清旻崇高望弗及疏逺難為陳桑梓懷故墟軒冕絆我身嵗月復行役山川多苦辛凜秋換物色首路愴風塵淚下不可揮日暮沾人巾謂王俞過武城謁言子祠作遡風枉輕帆戴星理扁櫂超忽之武城有蕩瞻魯道古邑一何卑令猷久彌劭絃歌謝清響精華契深造曰余厠文儒耽寂違時好剖符辭帝京腰章宰名趙諒乏操刀資懼貽製錦誚經過緬遐躅神對宣幽抱言采江上蘩薦此廟中貌誰謂殊千載可以同高調經始浩歌亭希世無妍姿守道有睽愆上書謝巖邑移署賁文園多士日在門聖猷邈相宣夙心亦云巳時好良不然再麾宰畿甸驅役赴漳川昔感𤣥隂徂今睇朱明旋亭宇粲崇構桃李紛廣阡偃息寡民務迂拙聊自便密邇被王化幸與樂豐年河陽匪殊調單父庶兹絃秋日詠懷緬昔承嘉惠來斯嵗方朞虛薄宰民社周爰歷皇圻簿牒苦相迫化理猶未綏幽亭有遐託晏坐俾心夷惟時值蕭序孤英被芳畦窗岫列紫峯滏水夾緑池陶生稱達士王令乃仙姿飛舄謝當路反服歸東菑自中山别陳子良㑹之無極作閉户理案牘尊酒日殷勤出郊覽物色桃李花繽紛游子感行役因君念離羣况起嚶鳴鳥悵然不可聞回首中山道傷心隔暮雲登挂劒臺臺在張秋東有徐君墓草似劒形能治心疾云徐君美初覯季子意方敦上國游才返斯人痛不存脫劒帶嘉樹揮淚向髙原舊手無由贈馳目遂為愆寸心良自許千金寧足論徒聞化靈草憂來欲代萱胥江汛月旋舸登城歸詠江寒湛澄徹華月輝相鮮乘流載尊爼瀉影發樓船翠巘合杳靄蘭臯帶長煙萬艘雜燈火千門紛管絃飛蓋攬崇堞輟棹回前川曾經故宫裏為照荒臺邊情非烏棲夜跡是鹿游年登髙與臨水行樂併悽然黃州郡齊作少年不知諱攄衷懷謇諤在宥䝉至仁承嘉譴猶薄員外置為理齊中但掩閣輟藻事刑書懸蒲代敲朴株染得自明逮者盡釋縛雖乏廣漢神庶幾仲由諾兩聞春鳥鳴再見秋英落笑悟孺子歌間從漁父謔采蘭貽所思無媒將焉託投賦弔湘纍長揖返丘壑皇甫司勳集卷四
