body:
  text: 皇甫司勲集卷十八明皇甫汸撰五言律詩登北固晩眺林壑卧已乆江門望始遥諸天横落日五月度凉飈焦樹當忩綴金雲接檻飄離心何處逹東逝有歸潮舟中對月書情不識别家乆但看明月暉闗山一以鑒驛路逺相違影落吳雲盡凉生楚樹㣲天邊有烏鵲思與共南飛張秋哭李植卿因寄伯華零落悲良友天涯重哭君家臨榖城道門閉劍臺雲一散登龍客誰知國士羣徒聞孔北海曾有薦衡文初入京子牟懐魏闕張敞戀都門竄逐一何乆交游半不存雲山到如夢桃李對無言誰識傷弓者明珠欲報恩補官南都述懐北闕承嘉命南邦事逺遊舊京鄉夢路新水客程秋得䘮心同馬行藏跡似鷗一官聊避世何處不堪留同年燕㑹作四海論交客同時獻賦羣相逢悵疇昔留賞醉斜曛蘭契應難合萍蹤最易分南飛嗟弱羽何以附青雲過祐民觀二首仙家閒白日邀我坐青谿花下逢調鹿林中問養鷄秋聲聞地籟𤣥覽出天倪何事勞形役年年使路迷商山紫芝路榖縣赤松期自媿無媒客將從有道師隨煙遊曠瀁乘月弄參差未得雄飛去何如但守雌天津訪王在叔要地煩開府征途幾泊船濤因枚叔至月就庾公圎清嘯樓中發仁風海外宣懽承樽爼上聴子細籌邊積善寺訪唐侍御謫居羅含厭官舍摩詰愛禪林空水澄秋處滄洲寄興深封章違攬轡交契在鳴琴要識窮通理惟餘寂滅心懐楚中舊僚張子時遷東昌尉牢落同為郡翻飛最憶君離尊郢門雪歸馬漢城雲道路情難極星霜嵗易分心如洞庭葉秋晩只紛紛東昌道中九日客路登髙處荒臺引望遥鴈聞淮海盡花見魯門飄市酒無遺贈村居但採樵離魂歸未得應待楚人招騎省騎省慙三入鶯花過十春心徒懐許靖鬢已似安仁香草思公子明珠報美人那堪秋水上猶此隔迷津贈髙郵守陳光哲王祥佩刀日謝眺下車辰坐見望舒改行歌沂海春淹留倚淮樹遲暮對江蘋宣室多祠事猶憐未召人道中寄憶四首陸子冝俯良友一相失殊方誰見求湖雲歸去夜壇月别来秋夢裏青山路吟邊芳草洲何由遲歡晤天外是南樓周子以言從宦非吾願歸心奈爾何闗河秋鴈少驛路暮雲多懐壑空騰笑棲林獨寤歌向来遊賞地芳草詎堪過黄子淳甫以我淹留歎思君棄置情朱絃齊俗忌白璧楚人輕澤國楓初落江天鴈獨鳴將祛勞與吝何日見黄生衲子大林嵗晩東林樹淮南落木同齋虚𤣥度月江倚恵連風塵刼看為累榮名悟是空歸期殊未得持此報休公雨登金山客渡臨滄渚廻橈訪碧岑暮潮風外落寒樹雨中深巖色殊隂霽江流共古今慿髙展遐眺猶得緩歸心送故友之子陳生入京長安羇宦地送爾逺行遊沙路雲迎馬寒闗雪滿裘消魂新别感把臂故情留萬里贏糧意無因少婦憂初至南都訪蔡比部東土風流地西京故事存重聫畫省騎来醉斗城尊嵗逐滄江盡心將落葉繁未能辭世網猶傍舊青門嵗首過清凉寺陳時避暑處地共乘春入臺經避暑過離宫開梵宇曲沼出洹河斜日啼鴉遍寒煙蔓草多滄江西嶺外含思矚廻波病屬徐公子攜具過訪端居抱憂疾自媿損春心絶客来相問勞君獨見尋酒肴逢好事山水待知音為駐王孫駕門前芳草深元夕熊子叔抑過集時謫常州竄後相逢地􅄼知在舊京旅顔燈下改心事酒中傾沙栁非吳苑江花是晉城夫君懐古意一為駐行旌吳子充留宿靈谷寺共是攀遊地俄看去住心分途松徑暝下榻草堂深雨送靈花氣泉流廣樂音一燈誰與晤知爾對支林送陳敬輿知廣州横金初出守剖竹勝為郎楚水看鄉盡炎雲度嶺長翠禽疑異雀椰樹即甘棠南海逢亷吏知無一物將送陳子知杭州東省含香吏南邦佩印臣離心冶城月别路武林春碧水移蘭舸青山擁畫輪岳王遺寢在拜手薦江蘋送曹子出守彰徳風流漢京兆之子見徽音剖竹當名郡辭蘭出上林淮陽資卧理漳水寄離心何處堪懐古銅臺芳草深同半峰和尚訪釋雲谷法侣逢羅什㝠心契逺公持經自葱外結宇共林中石壁初經面溪泉近始通坐来花落後何物解論空觀音閣同比部諸君餞别家兄躋險因慈閣慿虚託化城江山一以眺雲樹總含情鐘外潮聲盡尊前花雨輕廻波去無限應是旅愁生燕子磯荅蔡子木同用雲字何處堪張組江心一為君岸廻淮望樹帆帯楚来雲浮跡滄波逝同心芳草芬臨流無惜醉此地易離羣登燕磯後仍過清江道院荅蔡子别有青谿勝廻探思不窮鳥鳴殘雨歇帆落暮潮通闗路逢桃徑江花引桂叢還聞歌水調流響步虛中武備㕔詠弓餞子安隨處是離筵戎亭征馬翩那知四方志猶黯一尊前候吏先驅弩儒臣始佩弦緘愁對新月寒鴈落江天子安館中言别遲蔡子不至今夕西堂燕明朝南浦人雨滋將别涙花黯欲離神燭下停杯乆門前嘶馬頻所期殊未至含意獨誰申送家兄赴浙三首岐路易為情那兼骨肉行同兹戀南樹忽是餞西京碧水通吳苑青山帯越城無因鄉國近遂使别離輕東南山水地謝客去相安霞氣忩中岫濤聲郭外灘風因越絶訪法向吕刑看况是多文藻誰云飾吏難託跡似孤雲含悲一送君良時共羇宦中道獨離羣花萼隨萍轉驪駒逐鴈分定知臨海夜詩報恵連聞聞王維禎移官民部傳爾天台日移官地省時拂琴停水調掃榻及花期越嶠眈康樂吳都遲左思無言相見喜懐舊恐興悲夏日登牛首山徐公子席上賦二首愛客謝王孫相邀欵法門林間皆幻境花裏即迷源萬壑江流轉雙峯雲氣繁寄言河朔興兹夕在祗洹出郭紆京覽尋山隔世縁鴈垂珠戸塔龍起石巖泉法雨穿花外慈隂憩樹前寧知禪寂處曾是聖游年晩造祖堂山别島通幽徑叢林隠法堂逢僧龍樹後攜客虎溪旁帆影帯江盡鐘聲過嶺長從知探賞累一遣坐来忘宿幽棲寺贈海天上人投跡空山夜皈心此問禪錫飛辭嶽後杯棄渡江年花落仙巖近松深凈榻懸融師雙樹下見爾一燈傳曉至獻花巖斷壑牛山轉層巖鹿苑通天花僧供裏江鳥梵音中禪坐彯香氣𤣥言悟色空晨扉初地在回戀意無窮山中贈蔡子木華省非常翫青山聊對君心將守空寂跡許謝塵氛竹磵晴鳴雨松闗晝偃雲倘逢名嶽去禽向得同羣柬約遊不至諸君共有看山約重違入社時去縁俱是染来果未除思叢桂招難及停雲望屢馳還將塵外意一笑省中期宿祖堂寄子安兄洛並機雲入山違求典尋散花迷棣萼聴鳥悵鴒心吳越人天渺齊梁嵗月深西堂何處夢遥夜寄東林秋日思牛首諸山因寄海天上人坐憶空山路青林去不遥齋闗閉秋雨寒磬落江潮雅自依龍藏慿誰問虎橋塵心報支遁何日晤言消秋日懐王維禎京國嵗華晩江城風雨秋疎聲兼葉度寒色帯雲流薄宦潘生省懐人謝監樓如何潮落盡猶未下仙舟柬王職方北闕辭榮宦南邦戀薄遊月臨騎省夜霜冷鳯臺秋幙下時揮檄帷中數進籌平生憂國意感激一登樓聞王維禎赴都寓居天界寺一謝天台郡還来入帝京如何逢下榻猶自隔重城客路聞鐘意空門駐馬情逺公應與晤静裏話平生九月十日同薛考功蔡比部王戸曹游東園作二首西京從宦侣一過五侯家門閉聊看竹林深自落花池通淮水曲亭帯冶城斜坐得忘歸趣何因戀物華别業青門側幽居紫禁鄰臺餘九日讌林駐四時春聴鳥閒情適看花逸興新㑹宜容傲吏長作灌園人瀬源阡二首平生懐隠徳奄忽委容儀壑記藏舟後齋經撤瑟時芻聞徐孺奠碑見蔡邕辭贈秩兼名里哀榮并在斯别有棲靈處應多歎逝情門猶表東海世已謝南榮飛憶烏隨塜廻看馬戀城悲心何以託日夜壠泉鳴洋門阡二首孟氏推賢母梁家得令妻人疑隨去鳯誰為語鳴鷄晞露逢蒿唱驚雷遶樹啼蒼梧雖未從還見墓田西慈景隨朝露芳流引夕源幽㝠從子貴生死是君恩鏡惜鸞臺掩衣憐翟茀存清河遺寵謝今日在洋門四首為少司㓂郭公題挽顧公子二首束髪多推望臨尸詎可言空牀素琴在遺篋舊經存奄速曾占鵩扶揺未化鯤因公俱抱痛忍自學東門勞生歸是息委化夀非材未果山公識翻同鯉也災螢飛無散帙麥盡有空臺歎惜靈光賦將誰屬草來留省早春奉懐諸兄弟三首故園君卧處帷裏閲年芳㣲雨髙城霽寒氷春水長黄鸝啼漢署白馬見吳鄉幾許勞相憶書来問景光君行知嵗隔已是别離深獨作留秦客凄其動越吟雲天連海嶠雪路暗山隂日暮臨湖望誰傳芳草心江門身自寄雲路爾方招馬齒隨愁長鴒心積望遥花間趨左掖栁外候東朝為説淮隄上風光異洛橋早春奉柬王駕部時聞上書乞歸未得耽寂懐摩詰辭榮學右軍鄉心隨梗泛春思藉蘭薫巴水初消雪巫山尚掩雲漢家頻遣祀留待碧鷄文早春雪後同諸君集孔比部寓殘雪春城外寒雲客館中㑹多新嵗感交與故情同夜色疑梁入湖流似剡通由来北海座尊酒未言空送蔡法曹考績北上四首何事移官後嗟君獨未遷才髙獻最日秩滿拜真年客路吳闗外鄉心越水前帝城能自入無藉子公先帳飲臨南浦驪歌動北轅如何聊執手已自黯銷魂問樹知温室看花認省門向来同侍從枚朔幾人存同作周南滯還嗟此路分棄符闗吏識持法國人聞天際長江日江邊建業雲莫令明主見猶恨不如君無言騎省少忽訝鬢初斑世事忘江上朝儀想殿間鶯啼新嵗月栁暗舊闗山相府知名乆中郎定不還喜王子至自浙中追餞蔡子聚散非常跡憂歡可具陳忽聞剡水棹来送秣陵人尺素鄉中信鶯花客裏春從今張敏夢無夜不迷津寄廖鳴吾學士一自辭供奉慿誰問卜居朝園藝槿後夕浦采蘭初宋玉工題賦任安待報書莫將憔悴色空對楚江漁寄馮守解章辭劇郡初服返長林五馬一相别雙魚杳復沉晴州芳草合幽谷白雲深祗羨機心息年年入漢隂送鄭水部擢楚臬便道覲母蘭省為郎乆荆藩拜憲初憑將舊經術自可飾刑書問俗從江漢寧親過里閭須知陶母意莫獻武昌魚徐公子見訪對月有作憐余杜門日眷爾駐車情世事杯中盡浮名物外輕女墻淮月上客坐楚雲生為語髙林鵲相依且莫驚四美亭詩為大司成程舜敷作四首傍舍通幽逕為園愜近尋花間餘講席墻際藹儒林後乘參多士前賢契夙心無言戀芳樹桃李自成隂地為崇文辟齋因講徳開草深知秘殿松杪見靈臺暎戸羣峰入環橋一水廻但能留問字不假酒肴来炎夏相過地清幽絶世氛人從金馬至客向綘帷分璧水忩中月鷄山檻外雲定多觀物趣何止坐論文周家重雝館漢室儼陪京清曠多新苑繁華總舊城山疑瞻岱意臺即舞雩情别有羣英樂非闗勝美并宿𤣥真觀暫謝直城中因棲羽士宫秋聲上苑别芳樹小山同𤣥覽何能遣幽思或未通祗餘懸解意可以息㣲躬茅山道中猶是皇畿内迢迢赤縣分勞生空害道薄命豈闗文源水渾迷路深山迥隔雲金丹如可就留此問茅君泊丹陽日暮丹陽郭維舟旅思違蟬隨江栁報螢帯野煙飛練水乗秋滿吳闗入望㣲寧知垂翼鳥猶畏弋人機為許氏贈妾許東谷索詩貽其細君余初未許因思二陸藻繢為彦先以贈婦小庾風流因永豐而詠内自是貴主芳筵每歌麗曲太妃禁地猶製清平矧細君者蘭姿絶代蕙質驚人雅眈藝文妙解音律緑珠秀媛慣承寵於石卿紫玉名姬堪締縁於韓重不有賦其彼美何以傳之来淑乎窈窕一佳人鉛華世絶倫花因解語艷山入畫眉顰寳髻隨時廣羅衣逐態新坐令幽谷裏無夜不生春皇甫司勲集巻十八
