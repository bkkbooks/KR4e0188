body:
  text: 皇甫司勲集卷三十六明皇甫汸撰序集陳約之集序嘉靖庚子余友陳子約之以憲職督學於梁即捐館淇上歸櫬越中時太史唐子應德以上書失指免官祠郎熊子叔抑以奉職忤意承譴二子者不逺數千里漬絮酒以入甬望繐帳以出涕撫藐孤於素室搜遺草於名山而後相與别去余方倚廬未果從邁嘗移之詩而悲焉亡何唐子刪定其述造若干巻乃就荆令某登梓而以序屬余申之曰昔先士安假寵於太沖子獨無意哉余不能辭叙曰夫聖王耀德志士殉名是以神龍驤首幽雲景蒸寒蟬發聲凉颷始洌當其生利見之辰適司鳴之㑹履好文之朝遇同時之主凡含經之生綴辭之士孰非摛菁掞藻以緯國華者嵗在己丑天子覃側席之慕相君有開閤之風乃緤組講藝彯纓味道契協塤篪言都蘭􅉅彬彬乎號為得人而海内嚮風矣枚朔丘馬迭晉於漢庭陳劉應徐同升於魏室坐論豈足多乎是時也侍讌登歌則家追大雅從游第頌則户起新聲一字之工聞奇而傾耳片言之巧覩縟而躍心紙價騰踴於都門簫譜浸淫於禁掖若陳子者方齡於終童比才於賈生雕章綺合藻思羅開顧英跱一時尤藝苑之選也然而好惡易更盛衰頻復不逮之隙構見忌之釁成斯長沙之役往而金馬不容於陸沉矣陳子於是稍戢鋒頴卒就繩檢猶且寄興於山川發憤於嵗月周爰於馳驅宣情於羇旅述造益工豈曰在外無奇哉流盼之間不十餘年而向之契協塤篪者邈為參商言郁蘭􅉅者折為萍梗子竟長逝化為異物良晤愴跡於南皮零落傷心於北海蓋為此矣今考誦其遺編早鑄四傑晩鎔二張遒軫於平原晞駕於康樂麗於游燕充於入洛雋永於浮湘備於吳越甌閩間展可傳以不朽異乎湮没無稱者矣奈何湛思棼於吏牒迅翮摧於嶮路雄才頓於促景榮名乖於中夀使鳯池未禠曜靈假年究其所底寜止是乎此運命之奥蕭劉所以互論而董史所以同悲也唐子諒余之言哉因占為序并系詩於末簡殷給事集選序魯國殷給事集二巻李子植卿寄我於曲梁一曰瀛洲一曰芝田皆其領邑時撰綴也陳氏叙曰殷子之作奚啻倍是而火於任城兹殆其燼餘耳余山居寡營頗耽羣藝遂選其近古者彚分之都為一集以竢好事者梓而傳焉昔人謂州縣之職徒勞人耳詎不然哉蓋政務絲棼法網荼密兼之牒訴倥偬嬰其懷塵容磬折違其好抉擿苛骩易啓其釁闗白清覆不盡其才而觀察以此優劣銓衡因之上下故馳競巧宦者䝉采㧞恬澹止遌者嘗坎􅇄矣殷子出處之槩畧具自傳七齡誦書挺童烏之秀弱冠登朝懷賈誼之泣移病東歸有潘岳閒居之情觀道泰岱為史公好竒之遊應召中起有孟博清世之志初蒞靖江日坐孤山以眺溟海再拜青田屢憩洞門以探靈秘雅慕叔子峴首之風喜談葛公勾漏之事矣時羣盗竊發齊民愁苦方且鳴絃以覃化揮翰而清嘯旣而定交太初投分密友則又北海屣履於鄭𤣥南州下榻於仲舉者也殷子之致為皆犯俗禁而坦然不疑興禮樂宮室縁飾儒術所在稱治去輒見思可不謂文吏兼長耶覽夢漁之說而悟陽晝之喻誦朱愷之獄而感鵠亭之寃是皆彰彰足傳者豈徒言辭乎惜乎年不踰於中壽位不躋於千石功不銘於盛時業未見其所止稍遷給事遂乃遺世狥名縱軀委化此獻吉所以咨嗟於張子公濟所以悼慟於常生也造物忌才諒哉同悲矣少華山人詩選序司馬氏少華許公刻其集既成馳一介之使發咫尺之書逺自秦中授余吳下甲緘披帙爛然滿目雖河叟眩視於獲珠魏文駭觀於捧玦無以過也重以周稱之辭况以三都之事屬余選輯而為之序昔子建好人譏彈士衡自為不逮公之撝謙千載同揆然瞽無與彩假累其明蒙實懼焉辟之於山自拳石介丘以至崔嵬峻極不可殫究者山之全也然而姬傳所載若金闕玉臺雲峰崖館天台日觀特標其異測之於海自㳙流礨空以至洪濤迴洑不可窮狀者水之全也然而酈經所紀若蓬瀛渤澥滄溟碧津歸墟尾閭鯷壑鮫室特著其靈是故至寶必希用多為拙闡諸人文誰曰不然今夫綴辭之士必性識黙成才情天縱斯臻其妙公産西京神臯奥區實鍾厥秀猶申甫誕祥頌彼嵩嶽淵雲掞藻歌此岷峨也遂早踐玉堂之署盡發石室之藏㝠搜墳索泛閱局檢時則升車寄慨人為避馬造門問字容羡登龍辭鋒與之遊談武庫資其博物至若縁情寄興恒得於山川之助公則踰淮探㑹采菁華於言偃之里浮湘懷郢繹騷辯於屈宋之邦臨燕趙以悲歌望榆闗而清嘯故其為文也氣逸奔馬思鬱凌雲艶若霞綺纎如霧縠響合英韶意新葩粲其為集也賦麗以則詩浚而婉短律凄清長篇瓌壯序紀渾贍碑銘典雅賛頌彬蔚牋啓朗鬯他若抗䟽條奏讜言盈牘别布傳焉集前為宦遊後為歸田外為陵下遼海凡若干巻共若干首體必兼善調匪偏長玩誦再三莫可芟棄乃掇其詩之極精者名曰詩選與全集並行文畧翦其應酬諸篇而已斯地也先漢隆盛羣英臻附以公尚論參美在兹矣吳趨值持斧之時先君䝉傾蓋之日余方典謁獲奉光儀試宰畿内再厠下屬感忘年於交知思効德以末伎竊嘗恠夫任昉之序王編但侈官猷蕭統之題陶集徒彰士節不能述匠心之源究作者之槩故余具論如左至於秉憲以端軌貞教以𢎞範東山暫臥而望繫蒼生北門再召而威憺驕敵則有竹帛所書秘在國史靡得而私馬公當訟牒填委猶含毫沉思羽檄交馳而揮翰罔輟蓋以年壽有盡令名無窮金石可銷斯業不朽云爾夢澤集序夢澤集者齊安王君之作也君名廷陳字稚欽號夢澤子因以名集云父南墩公濟孝廟時登壬戌進士為吏部郎生君頴慧絶倫髫齡即能綴文殆由性靈非假師授黃童世謂無雙倚相時稱能讀咸楚産也君實似之吏部公愛之甚常云王氏千里駒復見此子矣甫冠舉於鄉越丁丑試春官俱為禮經第一廷對擢髙第選為庶吉士與東浙汪子應軫江子暉闗中馬子汝驥許子宗魯任丘鄺子灝大梁林子時曹子嘉西蜀余子承勛楚顔子木曁君並摛藻掞天敷華緯國得人之盛彬彬首是科矣江子為文鈎𤣥獵秘雜以古人竒字指既閎眇語復聱牙令讀者謬根眩霓至莫能句隱口汗顔而罷王君毎有所造輒大呌以眎人曰有能增損一字者願以千金為賭恐吕覽金卒莫可得也又好為譏評由是人多陽服而隂憾之矣嵗餘解館拜為吏科給事中值毅皇帝將南狩在廷羣臣咸諫止之章奏日盈於公車不獨言責也王子乃激聚詣闕下上書宰相熊峯石公典司館教危言沮之曰倘禍叵測老夫力莫汝庇也旦賦烏母謡大署玉堂之壁語侵石公公為大慙其縱誕多此類先是忌者以館中譏評語浸淫聞於政府政府銜之書上果諷吏部出補州郡吏竟得裕州夫脂韋磬折不習其容訟牒填委又非所好至則治尚嚴棘不畏強禦法行貴戚有鷹擊之風謁御史不為少貶廼晞附權勢文構釁稔遂使鍾儀繫冠於楚囚鄒陽按劍於梁嶽悲乎今上嗣位湛恩汪濊虛納曲貸諸子稍稍晉復君獨絓網擯棄顔子嬰禍尤烈至使患同黨禁而榮異彚征去均淵墜而進乖薪積世共惜之自後一紀而余忝己丑進士識崑崙山人於都門山人者張詩也雅善諸子間與余道夢澤事因聞其詳余亦濫有時名諸子引與締交未嘗不延頸想見王君也况負才使氣亦與同病尋以觸忤權貴頼天子寛頌謫為黃州理官是役也不以左遷為恨而以得繼蘇長公為榮不以赤壁為樂而以得見夢澤子為幸下車亡何乃乘雪造其廬時君足跡乆不入公府余置自外貟居由别館君亦不惜造余乍奉半面驩若平生接以杯酒申以贈章辭載集中夫王氏業紹青箱官聮朱紱為楚世家君又令其子曁弟若姪從余游嗟乎君胡白首於衆而傾蓋於余余亦胡為在衆欲殺而在君獨憐也顔子雖清揚未覯而芳訊亦數相聞矣君屏居幾二十載釋戀於爵服娛志於琴書覃思古人專精作者屢勤剡薦恥赴弓招觀其上顧中丞陳監察書若嵇康之絶山宰及寄余懋昭舒國裳二劄即楊惲之報㑹宗其節槩可想見矣君方斂英戢銳撝謙履坦不以才華傲物而以道術誘人使早年砥行能然可優游以取卿相然未能宣耿介發孤憤如晩嵗所底也固知書成於去趙賦就於還邛人爵榮名豈有旣乎終不以彼易此矣夫楚多材之邦而辭賦之藪也屈原見詆於上官宋玉䝉詬於登徒禰衡被害於曹瞞然其志則爭光於日月而其言則等敝於霄壤矣君亦奚媿哉是集也樂府古詩潘陸齊軌下擬隂何五七言律沈杜比肩㕘之盧駱文效左氏國語而兼騁班馬書類東京尺牘而雄視崔蔡足以不朽矣凡詩賦十一巻文六巻共十七巻成一家言舊刻於家塾季弟廷瞻刻於淮陽姪同道又刻於吳中而吳板益精矣五岳黄山人集序山人諱省曾字勉之黃氏季子也苖裔汝南葉繁江左武德由提戈䟽爵奉議以射䇿發科乃知易學起乎將軍刑書𨽻於司法矣倬彼先考維我舅氏繈積旣饒贏貽悉滿山人㓜在紈袴雅尚墳典毎歎曰昔謂黃童無雙今安知有二哉遂散金罄槖購緗充架覃精藝藻鬱志儒林糟粕城旦之書寤寐竹帛之業一經口誦允為心極旁通柱下流覽埤官左史尚其能讀東方詎云足用子政謝其博極中郎慙乎該綜於是文恪公鑒以偉器新建伯期以千里喬司馬申倒屣之接霍少宰垂推轂之奬漁石唐公造次晤語即敦乆要空同李氏未奉半面先投書謁遞斯而下鴻公鉅卿咸以交知山人為榮否則為憾詳見自傳事多不載山人雖跡晦丘中而聲馳海表矣乃與仲氏晞軌二俊並駕一時師資友于商𣙜公是力追古則盡滌時趨忌者詆為别立門户而不悟失之逕庭矣既而仲氏以明易舉南畿第一山人屢黜乃棄去更治詩亦擢置第一循例計偕登臺展駿都人欽遲朝列虛左噫歌累月觀止而返然薄翫軒冕耽情山水欲長遊名岳託慕向生因號五岳山人嵗在戊戌謝南宮之招締西湖之賞與豫陽田子窮探厯覽更唱迭和賦詩成帙增價藝苑視攀龍鱗稅若蟬翼士益以此賢之至夫使者行部守令下車莫不藉其人倫訪以政事雖名在諸生而禮隆上客舌妙談鋒腹韞經笥嚮如應叩泄若縣河聽者膝前靡不心醉自是問字之樽日陳於座上在浚之旄雲爛於户外山人肺病倦遊𤣥思甘寂繹我貴之㫖達名親之累不為家省鬻書自給深居却掃專意述造乃叙頌高士以寄志焉迨夫晩嵗絶戀區中結友方外馬遷習道於黃子許詢參梵於支林故其詩往往娛康樂之清暉屏淵明之喧􅅽緬景純之仙遊契摩詰之禪理兼以苞蓄既富探汲不竭譬𤣥黃雜組而縟彩炫目金石疊奏而英韶盈耳璠璵並儷而世覯其寶椒蘭俱燻而人挹其芳思劇沉幽語罕仍襲凡象外難摹之景必鑄以新範雖目前塵𤨏之態亦縁以華辭宿構非工食時為敏仐品味全集賦頌凖乎騷經詩歌本之古選興寄備乎開元序說參之二京碑誄酌之六代語苑祖乎充衡連珠合於平原客問擬於韓傳玉畧覈於河上典録昉諸越裳是故鏡理者取為蓍龜博物者資為武庫儲說者竄為累繩綴辭者采為筌餌又以才猷經世數值違時故鳴不以平言由孤憤年才半百奄隕大命詎不痛哉黄集總為百巻部以十千手自銓勒藏之篋中厥嗣姬水授𤣥霄諸童烏屬草方於文考捐彼負郭夀此遺編嗟乎雕論足傳知徐生之不朽鳯毛早秀慨荀令之猶存余與山人有中表之戚號為相知故序次不誣云爾徐廸功外集後序徐氏廸功集六巻為君手自定正空同李子刻於豫章或曰李子稍芟損之其說出於少谷鄭子自今觀之徐集獨綜菁英莫可瑕纇非其佳穢自得去取過嚴乎家兄山居搜逸稿於元子伯虬乃歎曰丹以素掩華蘭以薰奪氣顧變態不窮豈形質夐絶者哉遂選而刻之題曰外集勒為二巻昔人謂長門上林殆非一家之言洛神池鴈便成二體之作若夫窺苦心於初構究條理於終篇推廣厥致無害並存矧操龍泉以議割持夜光而論照卽千載端拜曠若神對孰謂後世無相知定吾文者耶嘗考論𢎞德之間李何諸子追述大雅取裁風人一時藝林作者響臻同好景附咸足馳騁海内而徐君亦獨歩江左矣然而意見枘鑿造詣堂室恥凌好勝詆訶生焉君兼尚𤣥虛守寂寞禄位不顯聲稱亦微毛嬙雖艶不悅於凡鳥陽春誠麗寡和於巴人李子未化之談家兄知難之歎可合而觀矣仐或未辯音節罕閑興寄剽綴靡辭詭於風雅俗方貴耳羣起吠聲辟爝火之焰其能爭光於日月乎此君山知𤣥經之必傳中郎抱論衡而秘玩者也詩之品藻二序詳焉余故不多評云何翰林集序何君元朗嘗撰綴詩文累萬言輯成名曰何翰林集繫之官也學憲莫君序而傳之間以眎司勲氏余為嗟賞乆之蓋君自綺嵗從經師遊即厭棄時義耽嗜古文博綜九流研味四始兼抱濟物思効一官試諸生間輙㧞異等竟以數奇蹶於取第惜哉宰相察其才强之起家拜南京翰林孔目地既清華職復閒㪚俾克覃志著作賢哉相君賈生不為不遇矣先是吾鄉文徴仲氏亦以推擇待詔金馬門後十餘年而蔡九逵氏繼為南孔目嫺於文辭日與上公鉅卿交聲聞籍甚世傳南館集云後二十餘年而何君繼之二君德學頗相埒蔡性迂立遌風流醖籍何殆過之夫陪都者古所謂秣陵建業也表以鍾阜環以大江地稱壯麗俗號繁華君雅好山水故樂居之毎自解曰令我守茂陵之園索長安之米亦足陸沉乎然非所好卒上書自免設勞以訟牒屈以手版當不俟六百滿而邴生行三徑荒而陶令去矣何君亦古之勇退者哉君雖謝秩猶眷戀石城將營别業及桑梓盪於海波柘林殘於烽火遂懷避兵之圖益堅卜居之志杜甫草堂開於潭水羅含精舍寄之江陵加以談若懸河識同藻鑒或咨訪政治或詮析名理君為揚㩁古今指陳堅白車騎填門履綦沓座南國人倫更逢有道西京遺事復見憑虛其暇日也狎梵侣以𤣥探結勝流而觴咏毎一篇出匪但藝苑翕推而閭巷逓誦鳯館咏昌齡之句雞林售居易之篇曷讓焉君又妙解音律晩畜聲伎樽罍傾於北海絲竹理於後堂躬自倚歌尤長顧曲江左餘風不在兹乎昔相如不與公卿託疾倦遊陳思恥事翰墨上疏求試誦君館中言懷乞休得請諸詩可以槩見至與王左輔趙中丞二書使秉麾當局勲烈亦豈少哉由是知寄興非逺而鞶帨其辭持論不洪而枝葉其說以此言詩與文失之千里矣莫君深於藝者為君文法劉向馬遷詩本蘇李而近體出髙岑間評覈良確矣仲氏叔皮由進士為郎聮纓南署亦拙宦工文方之求㸃云夫華亭自機雲而下往往有兄弟齊名者二包長謝兩范嗣興靈淑誕祥信不爽哉徐文敏公集序昔余先子中憲公嘗謂汸曰我明制科遇丑輒得文士乙丑吾鄉翰林徐公其選也汝嘗從公遊又為公所取士亦由己丑擢第將弗圖紹厥美與汝其朂之夫文闗氣運詎虛語哉契革羲繩葛天已飛浩唱音流媧管叢雲遂掞幽詞監二代以郁周參列國而芬楚詞人間出騷客嗣興炎漢肇基六十餘年延至文景海内乂安化臻刑厝武帝方嚮儒術招賢良徴文學之士以公孫𢎞為宰相擢嚴助為中大夫由是買臣夀王枚朔膠終等並列左右覩子虛為異時見主父而嗟晩開東觀延賢之閣置金馬著作之庭唐虞邈矣文不在兹乎明興髙皇帝薄唐宋之緒陋前元之習息馬論道投戈講藝百五十年孝皇垂拱於前毅帝衹台於後治號時雍比隆文景長沙李文正公挺儒流之宗秉人倫之鑒奬誘後進軼軌平津時李員外何舍人又抵掌而談秦漢奮力以挽風騷乙丑䇿士顧文康榜也公與㑹稽董公玘分宜嚴公嵩鄴郡崔公銑雲間陸公深南海湛公若水並在翰林出人禁闥郎署之間則有給事殷雲霄倉曹鄭善夫廸功徐禎卿咸逞雕篆之伎締筆札之交非秦漢之書屏目不視非魏晉之音絶口不談當是時毅帝雖耀武而兼好文六龍北狩八駿南廵之囘之曲度紫塞以遥聞橫汾之辭望翠華而逓奏雄材大畧殆非漢武之匹也公之婦翁為文恪王公參衡亞相合璧長沙乃接芳論於外庭授詩法于甥館所造益𢎞深焉若夫元光發憤以上書建安摛藻于中論東海綴玉臺之詠瑕丘輯珠英之篇遡其淵源實由苖裔公與李何特相友善朝夕揚𣙜往復譏彈毎有撰述輒為嘉賓矣世宗臨御崇儒重道稽古禮文將柄用公羣望攸歸帝心簡在貳秩宗則寅清亮績佐銓筦則允哲端揆與㑹稽均職齊名擬之董賈焉余覽唐子應德叙中峯集曰𢎞治以前未嘗言秦漢而能盡其才近守繩墨而不離乎法葢病乎世之决裂以為體餖飣以為辭公之文庶幾類此而詩則方駕李何翼響廸功矣或謂館閣之作踈於昉古而巧於狥今不知視草宣麻訓誥之體典則攸宜綸綍之音潤温斯稱差與外制判耳踰一紀而為丁丑舒芬榜也時則江子暉顔子木王子廷陳許子宗魯彬彬盛矣又一紀而為己丑羅洪先榜也時則唐子順之陳子束任子瀚熊子過李子開先不能悉數而余光誦先君之言竊附諸子之末幸矣前之為癸後之為辛推之恒驗否者氣運消息盈虛也夫士閱三榜才僅若人皆首華金歩鳴玉負璽丹地揮翰紫宸宮唱商和霞蔚雲敷朝露溘先晨星零落所不朽者託之斯言悲哉凢古今詩合序記碑銘頌賛傳說雜著及經筵講章總若干首勒為幾巻題曰徐文敏公集云公卒踰三年仲子𤣥成赴闕上書而祭葬錫再上而贈典隆謚䕃備踰十五年季子𤣥素請於監司而祠宇考又踰年搜採遺闕刋校訛謬彚次之屬余為序以梓而文集成嗟乎龍門罷御媿任昉之非才鳯池有毛慨公業之不死云爾皇甫司勲集巻三十六
