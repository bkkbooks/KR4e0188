body:
  text: 皇甫司勲集巻五十七明皇甫汸撰家誌狀畧壙銘水部君墓誌銘皇甫水部君者名濓字子約一字道隆中憲公第四子也母黄氏恭人方姙時夢疇昔老人授以玉戒指一枚上負以鼎翼日語於中憲公公曰鼎男象而玉至寳也指者止也汝殆産子必貴自此將不復舉矣後卒如騐云吾家子姓裔出微仲至宋戴公子充石字皇父始以字為氏宋亡徙安定朝那漢唐而下最盛勲業若規嵩隠徳若𤣥晏文藻若湜與冉曾詳載諸史宋室南遷扈從來蘇居長洲孔聖里遂為吳人大其族者一善公高王父也諱通生信贈禮部郎王大父也生録即中憲公云官儀曹時子約生於宦邸沉頴莊恪不為嬉戲玩弄夐異凡兒中憲公出守果州纔四齡鄉人有賈蜀者延余兄弟中憲公諾之其寓湫隘室中僅容三人子約置前席乃稱腹痛辭去歸愬於黄恭人曰兒雖㓜獨非果州侯子耶何得慢我鄉人聞之匍匐請謝執不復見其毅如此若夫臨果不取俟其自得聞伎獨止習誦如初泰瞻㓜操子約有焉公既謝守歸課兒曹日嚴余兄弟互相摩砥子約外無華炫而中深湛學尤専精焉且有大志戊子試於邑郡院皆首選充郡學增廣生甲午舉於鄉時中憲公四子並起科第吳中以為榮先聘亷憲顧公棠女而顧無子業許出贅子約往婚畢乃謝曰大丈夫豈賴婦翁産哉况二親在堂安可缺侍乎遂攜其妻歸後十餘年顧亦産子人多賢而韙之庚子承中憲公諱與伯氏沖仲氏涍暨余居帷中讀禮暇輒揚𣙜藝文譏評詩法子約業益進甲辰試南宫第二賜進士拜繕部主事非其好也越嵗居黄恭人憂時仲氏卒余構讒為御史所窘子約與伯氏急難之所為賦三鳥也詩載集中戊申起家太宰聞公淵知其賢將授本曹同鄉忌之仍拜水部鞅鞅弗豫俾典薪厰賈人每偽增其數以罔國利子約杖而按其罪不知其女司空文公明妾也令妾泣譖公所翼日莅部召子約切責之子約抗言曰公掌國政乃嬖於寵而聴賈人冒侵國財不為發姦摘伏顧欲奪屬下守法吏乎即無司空城旦書如君上何公歛容以謝而心銜之於是乎有荆州之役矣至則算無羡緍商人便之先視𣙜者為同鄉顧子聞䘮不奔多収賈人稅以充私槖子約發其賕以千計乃誣子約不畏簡書眷戀桑梓愆彼𤓰期嵗當察吏考功郎又嘗所忌者議欲黜之少宰建寧李公黙譁於衆曰吾知水部清介士也世擅才名安得枉措以壞銓體僅調河南藩司理官子約聞之即日就道遵故郢眺章華浮沅湘泛洞庭為文以弔屈賈遡黄州登赤壁踟蹰賦詩興慨焉以余舊竄地也其莅河南也諸司疑獄賴以平反兹地也何李餘風在焉故多談藝之士樂與之遊藩王好事擁篲置醴以招延之即枚叟遊梁陸生入洛聲籍甚焉居亡何稍遷興化倅監司交奬輸以金幣並却不受緘投司中上官病其矯而性有莫可奪者當是時施㓂起於洛中倭夷熾於江左頗懸故國之憂其莅閩也攝郡篆嚴戢豪右謝絶請託庭若無人同鄉劉君鳯以侍御謫推又同年也日與探歴山川寄情觴咏造仙遊以流連望武夷而倚歎雖簿書填委特坐嘯可辦耳壬子乙夘兩典二省塲屋試文半出其手所拔皆才俊人服其藻鑒云丙辰代守入覲歸即投劾不赴郡監司督之堅辭以謝開府胡公宗憲擬以治軍薦督醝鄢公懋卿擬以遺賢舉皆移書謝之何異嵇康之絶山公耶越嵗子乘卒又二嵗顧安人亦卒安人有令徳乘㓜最孝嘗刲股以療母疾者也並有傳别載夫以子安子約之文不得為第一父子並起工官兄弟皆承譴不顯豈文章憎達殆運命司之矣丁辰荼酷居嘗鞅鞅弗豫頗有憂生之嗟素沉静寡慾所至脱畧勢利自稱方外物色異人好覽鴻寳玉笈之書求囘金服食之法足跡不入城府戒閽者勿妄通賔貴人亦罕至者署門掃軌不以為慊曰昔人友麋鹿而侣魚鳥衲子羽流可與晤言奚取斯輩汚我門徑哉臺門餽遺並卻不受持衛生之誡不欲勞心苦思遂少撰述惟詩篇每興到占屬不為應酬日臨晉人帖間圖花竹水石並臻佳絶少學琴於雲間張氏盡得其法而晩更精悟追契襄牙每鼓一二行蕭然自適曰此足玩世遺榮矣辛酉子采生日㺯以娛始得舒其眉宇耳嘉靖甲子秋忽患痢不治而卒九月卄九日也生正徳戊辰十月初八日年五十有七悲哉病未革召子安中子樞託以理家卒之後乙丑秋采患疹余多方迎醫百計營救之竟夭俾子約無嗣天道有知無知耶余召樞至再三而堅不就乃立子浚季子棻為之子余與樞負子約於幽㝠中矣工曹視𣙜者往往操贏致裕鮮一二清白者吳人以此疑子約而不知死之後殯殮暨䘮𦵏之具贍自余也妻顧氏敕封安人子二長乘吳縣學生娶陶氏呉江貢士陶鋭女皆先卒次采㓜未聘亦卒女三長適王侍御孫奎宿次適劉汀州守孫位皆充諸生玉窘而劉天咸數也一㓜側袁出字張憲副意孫嘉壽云所著有道徳經解校輯𤣥晏高士傳中憲藩府政令以昭先業余收其遺草選為水部集二十巻行於世此謂不朽視彼不肖子焉有焉亡哉銘曰邴原恬祿而仕則邅鄧攸邁徳而嗣弗延䝉莊繕性胡不緩年屈生憤世乃叩昊天詵樂淨域璞亦疑仙喻斯燭滅若彼薪傳五龍夾水一蛇啓阡於兹委蜕神安之焉徒收茂草永絶嵇絃華陽長公行狀余兄華陽公之既卒也兄子槃率其諸弟來言襄事乃泣而拜且屬余狀其行將乞銘於文苑乃再拜相對而泣葢余兄弟四人仲先公卒季後余生謂余知公稍詳也嗟嗟余忍狀余兄哉援筆每撫膺流涕輒復罷棄者數月矣然懼夫踈者匪溢而乖實或缺而弗彰是誰之咎哉是誰之咎哉公諱沖字子浚中憲公之元子也曾大父諱通為一善公大父諱信贈奉直大夫禮部員外郎是為韋菴公父諱録仕終順慶守進階中憲大夫是為近峯公母黄氏封恭人皇甫出宋戴公子充石之後以字為氏歴漢隋唐間通侯本枝著稱安定丞相苖裔徙自茂陵宋室不競提刑從遷遂為吳人累葉不仕隠于酒庫今城東孔聖里余故家也一善公積徳砥行昌裕後之猷韋菴公敦詩𢎞文振昭先之業然發科起家則自中憲始也恭人來嬪三載嘗夢老人負鼎貽之而有姙果生沖厥後每誕子咸夢是翁授之鼎而鼎各殊制卒為䜟云誕之辰有白鶴旋舞於庭及生挺姿秀朗秉性淵哲知非凡兒中憲公登丙辰進士居京師公甫七齡奉母夫人攝家事殊有條至應對賔客裁答書問諳若成人母夫人將之外家特乆以故多渭陽之情束髪就傅稍習句讀即了大義殆天縱匪由師得也隨遊輦下觀宫闕之麗思踐其階見軒冕之華謂可代而致也年二七御史視學南畿召試大奇之取入郡學充弟子員參多士比於鄉先君讓之曰玉未琢而示之璞胡躁也少長發悲歌於燕市慕遺風於魯墟懐英烈於荆楚探勝蹟於巴蜀爰記三峽以闡山川之秘焉始謂仲宣為宿構疑子建於倩人矣兼之甚口好劇談宿學為折角莫能難又好騎射校輒多中出武兒右凡挾丸擊毬音樂博奕之戲罔不精通焉先君在郡校諸生雜置其中公占五經題悉成文先君驚嘆曰余幾為山公汝業臻此可失時耶乃令攜弟司直公歸就比亡何先君以讒免憤然嘆曰漢緹縈一弱女耳猶能鳴父之寃矧男子乎乃草疏凡千言其畧曰臣父為良二千石多治行方藍鄢盜起破郡邑如破竹所過民無噍類果州獨全設使果陷陛下安所望蜀耶乃不䝉增秩越級之賞而聴受金縱盜之誣何以勸雲中守哉先君聞之移書使人邀諸途曰余恥為折腰吏乆欲投劾去矧在危城中獲生還幸矣特恨不早乃為孺子所詆尚奚言哉然疏業已上陸太宰銜之寢不報事載近峯年譜先君閒居公開逕葺園奉之以娛而代為家省慶展俱存情耽既翕日與諸弟商𣙜易義於世業堂由是海内知有皇甫易矣先達王文恪公吳文端公大器之與仲氏謁喬司馬於白下一時名公如燕泉何司空東橋顧司㓂引為忘年交不啻二陸入洛江東士為減價也途經茅山登皇甫谷飄飄然有塵外之想乃號華陽山人屢試於鄉不効而余乙酉先舉先君嘆曰汝才豈在季下奈何以家事溷汝汝第謝去余雖耄猶堪自理也戊子果與仲氏並膺薦而聲稱籍甚屢試春官不第二親先後背養諸弟或羇宦有恨不及見者其斂不踰制䘮不違禮祭不失時皆公身獨任之余輩同其哀毁而已生子如公安用多男為哉公平生慷慨持大節能周人之急友人陳與言卒䘏其子螽収所遺金操而為之出息以贍至長倍還之螽賴以資外姻有湯翁者病既革而子在襁褓中召公囑曰以此累君君不負陳生忍負余哉從兄源貧無依請於母夫人處之别第割墓田給之使公而遇則占郈成之宅舉晏嬰之火者豈其少乎舉族無少長凡紛爭構厲藉公片言而解其信義服人多此類雖仲弓家範彦方鄉行曷過焉公處晜弟甚雝穆而訓子姪頗嚴峻故余兄弟終父母身不求離析諸姪憚公踰於所生父也渭崖霍公龍湖張公毎放春榜訝曰何無皇甫生間題長安主人壁廖學士程編修見之嘆曰主司良失人甲辰再試春官時主考為西蜀張公潮取優巻十餘公在其中而張卒於鎻院竟遺不録其家兒持之出以示人公歎曰此謂非命耶庚戌歸悔其再誤因號不菴叟而揭銘座右杜門著書湛思味道若將終身焉先是移書諸弟曰予髫侍先大夫官京師獲聞李何邊徐之論後與孫方二山人傾葢吳門發機破昩何必同人哉乃遡風雅之源究作者之意删輯所為詞賦詩歌四十巻序記傳志雜文二十巻總曰華陽集而編目先行武宗即位政法凌遲撰緒言及申法車駕南征撰已庚小志覩靖難録撰壬午刑賞志思廣左氏摘奇撰纂言今上繼統崇尚文徳撰周易大傳疏余領曲周恐不習為吏撰政凖大同之變撰幾策㓜好談兵撰兵統輯經子要語諸史法行撰左測右測晩年聞見日益撰因子因記邊兵犯闕京邑騷動撰靖邊經海㓂突起當事無策撰枕戈雜言世系攸邈閔其凋紊撰家譜凡七十餘巻數十萬言而北遊遊虞還山倦遊諸集别行於世云大較窮愁孤憤摭騷擬𤣥詞麗指眇使人不能加也公授室最早年二八范氏已嬪生男輒不育僅存一女年踰四旬歲在壬辰將北試范曰妾聞燕趙多宜男者君往盍圖之及落第娶嚴周二家子以歸並皆産子向非丘嫂有容幾乏兄嗣由是徳范而愛其女甚於子也長槃娶陳氏嚴出次梁娶王氏周出俱吳縣學生又次棻聘魏氏同槃出檠聘唐氏則同梁出也嫡女適太學生馬元芳孫夢麟梁子也亦竟夭悲哉槃梁各生女一人公自庚戌之後不欲更試丙辰或勸之曰先大夫肇跡之年也天運其將復始乎乃强一行再蹶而歸鞅鞅弗豫適余解臬歸自南中而子約弟亦棄郡牒不赴相與慰勞陳説平生緬良㑹於冬宵追懽悰於秋燕丁巳忽寢瘵賴刀圭延息而公嘗學星數於姜憲副多推騐曰古稱七十者稀余殆不能躋耶越明年春杪偶灌園覺腹痛如厠足委頓不支疾作竟卒卒之日嫂問家事第曰汝好為之諸子泣而問者公以手指所枕書示之曰無忘此業足矣公有書癖雖囊無餘金而架滿萬軸也余與季弟泣不能視公乃舉手作别即合眼下生矣時嘉靖戊午三月丁丑也距生𢎞治庚戌正月乙丑年六十有九竟如公言嗚呼痛哉猗歟皇甫世炳於文非獨以功名顯明興奉直抱藝藻始萌芽中憲含章起而緯國然繼志述徳若子長之𢎞先業其在公矣博綜羣籍覃涉百家上自墳索韜鈐下逮圖䜟璣厯方輿所載禆官所紀靡不研討訪古由之折衷知今足以應叩早􅈺詞賦今篇中或更生不能該子雲未之識者其為書也守韋菴之法而運筆超妙兼晉宋之體而意到逼真然十上春官不獲一第亦命矣夫而娖娖冠玉者乃紆朱横金烹鮮策肥詡千里中朝葢棺夕腐蛆矣公以翰墨垂聲世之重公隆於卿相之位豈以彼易此哉稽昔微仲遜跡於殷士安高蹈於晉世有逸人之風焉即仕者亦往往拓落不求華顯云公尤恬於勢利未嘗修刺候門曵裾令室所居户絶履綦庭滋帶草晏如也諸弟休沐屏騎以謁公固不為意其所養葢閎深矣𤨏才不文至哀無飾聊述其槩如此所冀妙辭攄之黄絹懿行勒於鴻碑不既幸乎贈安人沈氏行畧沈氏仲子者余妻也父炤為吳嘉定人炤之先有刺江都者遂起自江都郡及徙吳迺富埒吳中家於東江以故俗謂半江沈云在昔周文王子曰􅅨季封於沈因氏焉此殆其苖裔與純皇帝時有若鞠軒公瞿夫人者並以孝聞所司上其事詔下旌之江之東遂表為雙孝里俗亦謂雙孝沈不復半江云自是彬彬為禮讓族矣鞠軒有子曰友松友松故多男子而炤最長毅皇帝時以進士起家拜行人選為刑科給事中余父順慶公方在儀曹數相往來交驩闔太君者仲子母也給舍差池外宦終不克膺封典云與余母黄夫人通問遺聚燕好也仲子生而婉嫕母氏見輒目之意有所詣而闔太君亦每奇余謂非凡兒即在齠齔乃竟許婚矣居亡何給舍以奉使忤閹瑾矯詔繫獄將死之罪弗讐當以减論得免官歸方是時勘官悉先闗白有不承㫖苛法即首領不保免官幸耳葢瑾亷知給舍素饒於財蓄珍寳玩器累千求之不滿其意忿構厥獄也亡何余父出守順慶給舍亦復得稍稍叙遷為郴州刺史道之相去數千餘里展親告䖍之禮契闊不修亦竟數年也既而余父謝政家居給舍擢憲廣臬單騎之官令太君將其子還江東男女時及父召煤灼徃請婚太君允之禮應逆女顧安所得舟侍御關西許宗魯刷巻按蘇過存余父乃見余而語之故侍御笑曰汝能效吕氏為莊公議耶余曰唯唯因命二題夜中屬草旦日獻之侍御喜曰此過秦類也去宋文逺矣即以所乘巨艦給傳命官往䕶婚事亦異典云由是仲子歸於我正徳辛巳首夏也時里閈譁以為仲子百輛之將盈篋之貲至則簪珥不再雙羅綺不重襲豈力不能辦非仲子好也廟見告成黄夫人懼宦家子習於驕恣不閑婦儀故為抑之仲子能降能眕事姑愈恭黄夫人始喜謂三郎果得嘉婦即諸姑伯姊姻戚皆賢之如母氏云也仲子性温而介能以禮自防往來閨闥間非女侍先後之弗行也逮下肅而有容至細過輒容納之不甚譙讓羣下且畏且感則又輒謂阿母賢也余葢不能無喜矣被服縞素不炫麗盡飾有荆布風其事余甚恪每與言輒侃侃若詔余者自是雖燕䁥亦交相敬罔敢䙝呼為益友即古人餉饁舉案乃今不誣也性好讀書知大義夜每佐余親筆研有疑輙質之與之辨説輒解悟也余或倦學輒以紃組相砥余自是非夜分不寢而仲子亦畧能文辭矣匠心獨巧非由師授而裁花剪鳥若天産機生靡不肖焉時余學琴於金叟從屏後屬耳即手按之悉成音其頴慧多此類余褊心觸事忿發如火莫遏喻以少安毋躁恐傷和氣殆余之韋弦也嘉靖壬午太君卒仲子聞訃以姑在哭之不敢出聲然五内盡裂矣是嵗余試學院選充郡校弟子員不獲就比仲子若弗豫然夢其母謂曰郎君行當富貴懼汝不及見奈何為彼戚戚也驚寤越嵗其父亦解憲歸太君朞而祥矣為舉襄事弟灼亦由進士為侍御史羣從十有二人婚媾俱世家紈袴子弟咸來會𦵏互矜門閥余獨儒服為揖讓容給舍試論經義條答如響莫能難晨且遷柩例有告文詢諸壻黙無敢應者余援筆立就侍御君不能加㸃諸少年咸有媿色仲子曰妾母知君展能擇壻也太君既𦵏而其長女亦卒仲子夢輒見二靈岑岑然若將招之偕也遂心悸察其色赭而愕若弗寧處也一日嘔血忽數升下下即目眩不瞚體寒股交戰脉欲殊也已而蘇即心愈悸周詩謂病在骨髓名曰勞瘵得之憂鬱氣衰而血不足也即遇鴻術探禁方投以萬金良藥僅可强息再朞耳矧庸庸醫者刀圭之末幾其一飲即愈不亦難乎事在乙酉夏五也是秋余舉於鄉殫嵗將計偕北征仲子亡恙也明年落第歸仲子病稍侵已居益鞅鞅弗豫余母慰之曰而郎少幸先兩兄舉即不第何望之深也仲子曰嗟嗟君姑郎君方篤學勵行為海内文人何有於一第顧時耳時至即反覆掌矣妾所懼者先期委溝壑不與同富貴也言畢横涕承睫下沾膺也余母亦為欷吁乆之叱曰汝真病䆿胡言之亟也又明年丁亥五月卄一日仲子果病革死矣生於𢎞治壬戌五月二十七日死之年纔二十有六其妻余則甫七稔也竟先夭死乃後余果登進士富貴未可知胡竟不同享也謂非命哉謂非命哉死之日猶了了不瞶問所安尚折而知也諸所蓄及所貸與人咸籍記之曰毋溷後人即殯殮瘞藏之具咸眎之意如其意即頷之曰足矣毋俾踰禮為也乃又招諸姑伯姊姻戚與訣人每數言言盡衷也辟適千里者贏糧飭徒車馬在門張組把袂踟蹰不行情等耳此固長往不歸不尤痛甚哉以故無大小踈戚泣之盡哀目且瞑又瞋而視之曰幸母死我於男子之手合掌誦佛良乆氣絶泣者聲愈悲賢哉仲子生有懿行死葢徵之矣遂殯殮一如仲子指云翌日蘇守胡公纉宗贈之含躬弔於室君子以為禮死幾十年而後𦵏可謂愆期矣余葢宦遊不克歸也丙申之秋奉使南還始請于順慶公黄夫人議襄事問於五行家曰可堪輿家曰吉乃以十二月十有六日𦵏於上方山之陽至是始即逺也上方山者去城西南十餘里羣峯襟抱湖水環遶白楊蕭蕭𤣥廬攸竄咸謂得嘉兆也而先曾考之靈棲焉先是皇嗣誕生京朝官咸叨錫命之寵仲子葢贈安人矣遂以安人禮𦵏聊以慰幽魂也無出談安人二子應已應賜並齠齔裹以衰絰蒲伏帷堂中悲哉皇甫子曰余讀古詩歌至悼亡篇未嘗不廢書而嘆也曰嗟乎文固生於情哉夫婦人之大倫也方其縞綦來歸琴瑟在御孰不願相偕老矣迺或中道潛翳窈窕足哀匪色是私䝉莊放情非經也余𦵏余妻余顧安得不悲以思譔行畧以竢顯者銘焉談安人行畧今上改元之六年丁亥夏五余妻沈氏仲子卒考中憲公暨妣黄恭人日夕憂勞思得淑女堪以繼沈者乃遍召諸媒媪與圖多言談氏孟子徳容者父長公名祥字惟善世居雙林里紵縞為業四方賔賈輻輳其門吳中機杼無慮數百家而文之奇巧色之蒨麗罕踰談者凡韜筒裂幅出自長公者不更檢閲而輸金售之長公亦以信義交人初無貳價遂操贏倍息矣由是子弟多服紈饌玉而連騎者長公獨悃愊為醇謹訥於言而敦於事矣語具文待詔誌中生三男子二女子相者獨指孟子法當貴餘或夭或貧而長公業亦將中替後卒驗云孟子者生而幽閒貞静有段媪者熟走其家為請婚焉王子祿之余乙酉同年也居與長公前後相比雅識長公為奬成焉故孟子字於我明年己丑余第進士除嵊令不拜改授國子博士辛卯中憲公備簮珥衣幣郡邑為具舟楫監司假給符傳長公導之如京師余逆於國門之外卜吉受室焉一日謂余曰妾幸為君配嘗見君之客矣多位尊而齒宿者每忘年隆禮於君即聴君談皆唯唯頷之君雖無意上人而同輩觀之必生忌謗釁將作矣曷自貶損卑之無甚高論也尋果奉詔調外職乃拜曲周令將之莅官中道與長公别而還吳曲周固畿内小邑也余往視若不足理日恒閒暇每夜誦而晏起孟子示雞鳴之警余哂曰古人以卧治為賢星起宵勞何如彈琴鎻印也癸巳長子楙生越甲午余以三載秩滿拜為水曹郎將之東歸展覲舅姑始修廟見之儀母恭人慮其不習為婦而先為主母身且貴或驕也故為摧抑之而孟子執婦道益恭當此時仲兄涍在儀曹伯兄沖將季弟濓計偕北上中憲公忽病痺余獨為延醫視療賴周生萬金良藥得少差而余衣不解帶食不甘味者三越月孟子於秘室䖍禱侍者寖淫聞於母恭人歎曰詎意新婦能如故婦使沈氏更生無以加此矣乙未將之京師越丙申次子琳生余奉使將之還吳是嵗也以皇子生覃恩得與沈氏並封安人云丁酉春始圖沈襄事或曰𦵏死安人獨不為生安人諱乎請少避之曰余繼沈後余之子即沈之孤也惡用避諸乃就服舍為楙琳製衰絰教以哭泣躃踊之節中憲公益賢而韙之是嵗仍將之京師越戊戌余遷虞部員外郎巡視畿道執法忤武定侯郭勛詔獄聴都官侯令弟郭勩具酒肴甚豐腆悉置銀器中饋之客舍安人曰夫君奉職無狀獲譴於大將軍妾代請主臣敢辱賜餉於囚倘賴寵靈不即填牢户叩首謝門下有日也煩使者收器幸無遺誤以重妾罪也亡何余得貸左遷出獄乃謝郭勩而竟不一造侯第益憤恨云是嵗將之便道歸省拜堂下謝不能保身以為父母僇乃將之黄州置自員外居於别署楚俗好誣多嚚訟諸司疑獄悉以屬余暴于庭下者日以百數片言質成而罷安人謂余曰君之聴訟妾嘗從壁後察之似稱明允然神深發摘喜溢哀矜殆非尚徳化道也余自後多平反者矣越庚子稍遷南京比部郎將之歸而中憲公卒佐余在疚罔愆於儀焉癸夘季子榖生是嵗余免䘮赴闕補南水部仲氏補南比部將之陪都越甲辰仲擢浙憲余調司勲郎季以㑹試第二登進士伯氏張讌為母夫人上壽吳中以為榮乙巳兩京考吏薛氏忌才指仲要改宫僚例應補外余鞅鞅弗豫安人曰君湛憂深念非為兄故乎對子字父古猶恥之友其弟而去其兄此非不足君所乎宜力諍之力不能當引去毋使並罹其網也余起而發其私於太宰張公言官竟以侵職論劾仍左遷而薛氏亦敗矣是嵗女順生而黄恭人尋背養余抱病倚廬安人哀毁踰於前䘮時御史王言以私憾掇細人之諜窘余甚亟或曰少避其鋒安人曰王侍御雖酷號蒼鷹豈能以殺人罪妄抵曾參耶召君不過欲庭辱之耳身在苫塊即避安有無母之國倘捕逮晜弟他日何面目見宗族鄉黨乎余乃就縛事果得解母既𦵏誓不復出而安人勸之曰向隠忍將赴功名之㑹一雪此言也君其趣治行奚疑哉余乃如京師時尚寳白君恱病卒馳使者緘書諭安人亟為納婦安人身任之婚禮不勞而成云余倅開州甫六月稍遷處州丞將之莅官孫熾生安人得報大喜余奉憲檄供事棘闈臨别安人曰聞昔己酉郡守亦入塲屋而門下士無一舉者君名雅重諸司行當多植桃李為兹邦美談也是秋舉者四人而他邑拔者凡九人云余自省還郡守方君業當入覲而余攝篆事安人方患病庭中榴樹無風而摧廨外狐忽鳴壁間火恒焰溝中水沸而有聲也延醫診治靡效誤投何生藥血潰而卒悲哉是為嘉靖壬子十二月十有六日也生正徳甲戌五月十有一日年纔四十耳胡促也既含且斂遷柩於城東天寧寺楙來奔攜弟琳扶之歸吳治帷堂以延弔客禮也余始之郡首入縉雲宿於公署安人夢一婦曰乆待爾胡來之遲也目恍覩其形心竊惡之及卒治木者曰疇昔王公俸者亦蘇人而夫人死於此亦小人治其木也始悟向所見者王君妻耳鬼神之事信乎非誣矣而壽夭殆亦有數莫可假哉子男三長即楙娶白氏尚寳君恱之女太保尚書公孫也次琳娶沈氏吏目君知剛女中丞公孫也次榖娶徐氏詹事君元成女少宰文敏公孫也亦卒繼李氏太學君元紹女宗伯文安公孫也一女順適宋生延昊孫男五熾塋爕俱楙生兆畿榖生琳女京字㓜未惜乎安人不及見云時倭夷之變墳墓慮有發掘之患俗多停棺俟寧者余解憲還壬戌十二月十六日始卜吉於寳積山之陽開穴通隧并沈安人並𦵏云李夢暘曰妻亡而後知吾妻也諒哉若談安人者可謂益友矣安人物化而吾生不辰屢構釁稔寧復有能為余籌畫屢中者哉余故識其大者若性資柔婉而操則堅持恩貸妾媵然罔敢犯其威者已無長物而一芥不妄取於人大事為爭執之細事曲為承順終身無反目之辭心厭繁縟被服輕素性好潔雖故衣敝履瀚之無垢也訓子嚴厲使少假之年三子豈皆以貲成名哉余媿吾妻矣先是束帛修謁徵銘於姊壻方伯顧君夢圭未及屬草而先卒闡幽發潛以俟來哲悲夫皇甫司勲集巻五十七
