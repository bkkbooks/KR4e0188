body:
  text: 皇甫司勳集巻十四明皇甫汸撰七言歌行丁巳上元後二日吳純叔見訪留讌劇歡賦將進酒屬余占和聊以嗣響皇帝垂衣越三紀璇衡迴春履端始羽檄初停瀚海東旄頭乍落吳宫裏三五才過明月期燈懸九華光陸離延陵季子玉堂彦高乗駟馬黄金羈羅雀來尋𤣥晏宅卜晝苦短繼之夕趙琴且莫彈秦缶亦暫息聴爾持觴歌進酒主人起前為客夀憶昔召對天人書同時謁帝承明廬弱冠自矜齊賈誼揮毫衆擬似相如眼中卿相可立取海内賢豪無足數豈知世事有波瀾白首空嗟行路難襆被東歸偃荒徑仰天西笑當長安君不見蘭膏易銷圓景缺春光㡬何芳草歇㑹須快意恣遊盤寧復低眉受羈紲閉闗頌酒託沉冥經月雖酣勝却醒封侯未就填幽户辟榖誰能謝漢庭隣湖君向明時學為圃不獨操嬴稱善賈魚鳥相忘但一丘江山信美非吾土分畦揷槿引清渠燕坐應憐抱甕餘開尊自喜烹葵薦堆几聊看種樹書古來知有蒙莊叟漆園似接芳隣後花時欲訪隠人居春水桃源迷渡口贈章憲副之楚滇池特秀五華山曽記南征萬里還江入嶍峨天作塹地經笮箐石為闗肯惮風塵違壯志每談瘴癘一摧顔當時六詔多賢守聲名無出臨安右郡中夷落半雕題部下􅈎氓盡稽首君本甘泉奏賦才早從畫省擁麾來髙臥夜聞桴鼓息燕坐朝看畫㦸開漢家佐理重循吏遐徼迴翔占利器伏波慷慨讋百蠻潁川超忽登三事今移憲節武昌西鸚鵡洲前芳草萋為傳崔顥題黄鶴絶勝王褒訪碧鷄上夀歌憲使安子静者余同榜友也今歳壬戌六旬始週七月初度方期稱賀季氏上舍君貽書徴詩為贈能敦愛矣遂擬古上壽歌一章奏諸樂府登之夀域云今皇纂厯稱元后坐令一世躋仁夀滿朝上公多耄年在野逸人半皤首寶籙家聞東海謠金樽户獻南山酒君侯誕自惠陽神遙同崧嶽擬生申百年甲子纔週日七月清秋初度辰燕開河朔全消暑社結香山迥絶塵簮緌履綦四座合管絃絲竹兩階陳炰鼈胹熊盤饌玉沉瓜剥棗案羅珍攬衣更起前為祝盡道君侯備五福不見闕下東方生但招海上安期屬衆賔就位余致詞憶昔與君年少時運逢文教興𢎞館詔對賢良踐赤墀仙班喜接彈冠盛郎署何嫌執㦸疲英雄奮翼幸遭際卿相策足可超致祗知忠藎早垂勲豈料才華翻取忌三命争看獬豸尊萬里同為碧鷄使人生行樂歸去來富貴榮名安在哉借問衝星朝待漏何如邀月夜銜杯韋氏遺經堪嗣業姜家大被况追陪兄酬弟勸自年年爾賞余敦池草前既醉欲賡松柏詠多情為賦棣華篇五臺行贈陸儀曹昔辛亥之歳余謫澶州時陸子光祖令濬任子環令滑迄今辛酉十年矣陸以太夫人憂居偶過吳門見訪命余作歌因賦駐馬且勿辭問君何所之開樽永今夕傾蓋憶當時忘年北海非文舉為政東阿似子奇官遷典禮朝趨省職守文園夜侍祠君方用世睎時哲我已還山謝朝列覽鬢不覺二毛侵彈指那禁十年别君家門閥人盡聞况復兄弟邁機雲棲迹人間世游心物外羣山向五臺開嶽色水從三晉引河汾昔時尚有任安在揮麈談兵氣慷慨敢犯風波屢阽危寧知歳月不相待一朝功就身已亡空留廟寢闔閭鄉陣望海營猶立幟碑存峴首但霑裳男兒及時䇿足據要路如君髙才豈同瓠㑹須施澤濟蒼生安事呼雷守墟墓何顒貪佛宦情迂五峰深處謁文殊鴻濛相見曽無語象罔歸來自得珠河間二僧善笙管之伎寄居虎丘獲聞妙響子約贈詩余遂同賦山中面壁不知年江上乘杯共渡禪學得吹笙并弄管隨時乞食了塵縁雙吹行過吳門市一聞清響驚人耳急節繁絃不敢彈短簫長笛何能起單鳴散落雨花頻合奏菩提别放春只疑給苑為邊塞却道祗洹是洛濵生公石上千人坐慣愛新聲盡忘卧支籥希音豈易通般遮瑞梵應難和由來絶伎世無倫誰當識曲聴其真不逢妙解陳思輩幾作尋常捧鉢人進酒詞君不見北海尊罍夜不空能令千載懷英風又不見東山聲妓日攜徃曾是當年稱雅尚落魄余思同古人折腰非願乞閒身清流奈取庸流笑傲吏翻遭俗吏嗔當筵漉酒巾嫌濕隔箔傳歌衣畏貧酒酣耳熱起擊缶富貴須時果何有呼盧一擲輕千金滅燭兩歡過五斗紅顔成寵亦成妬白首相新詎相故莫作梁園苦上書安用長門要買賦舊事寥寥空美談眼前齪齪更誰堪若但低眉死牖下徒然生長在江南送陸尚寳之京昔日大廷召對策獨草萬言吐胸臆相君手捧頻歎嗟天子親披動顏色御墨題名置上第賜秩䝉恩官建禮秋風憶食故鄉蓴乞歸恥給長安米十年不調笑為儒一嵗超遷拜大夫朝持符璽趨雙闕夜整衣冠别五湖隋隄栁暗落花稀淮浦潮生舟似飛誰將筆硯先燒却可使才華讓陸機太行道贈汪子之并州君不見太行之阻當重闗孟門中豁不可攀虯峰千仞跨海外鳥道百折盤雲間神功尚識五丁力穆幸猶聞八駿還巉巉兹地危哉艱古來行者摧心顏子獨何為昧垂堂仗劒驅車走太行非因捧檄快毛義何莫迴馭從王陽吁嗟乎人情丘壑未云險世事風波在轉眼李陵臺上望鄉處襄子橋邊感恩去丈夫棄繻歸有期安用牽衣苦留住吳趨行吳趨自昔稱嘉麗畫棟雕楹傾甲第陳粟流衍充海陵雜賄筒韜溢㕓肆兩塘游舫載笙歌十里娼樓結羅綺津亭偃鼓晝不鳴城門弛鑰夜無閉刺繡非闗䘏緯憂呼盧豈解談兵事共道繁華景運開寧知氛祲遞為災矛鋋突入長洲苑烽火燎起姑蘇臺擊鐘連騎十萬户一夕化作咸陽灰青眸没虜塜安在白骨横野江吞哀命將出師聞受脤可憐名隳身亦殞桓桓司馬功最髙鳥盡弓藏翻構釁吁嗟徃事勿重陳徙者稍復困稍振島夷舉酒相慶飲眼輕中國為無人旃䝉夏五旄頭現御史臺中傳羽箭風帆習險乗波濤霜簡宣威疾雷電材官騶發躬秉麾甲士先登汗交練我軍遇冦屯三沙背水列陣聊一戰提壺挈簞争餉師農不易耕市不變夷奴倒戈遂折北斬首千級日未昃血染鯨鯢海水腥氣闞彪虎郊雲黑飛書奏凱獻明堂天子為進萬年觴金繒大賚頒内府竹帛垂聲紀太常司勳作頌鐫貞石豐碑峩峩海壖立父老覽之皆感泣舉頭但見長安日欲徃叩閽控天子借君持斧坐鎮此功成麟閣圖爾形御史封侯自温始送吳尚朴北上拜官黄河氷開栁青色翩翩意氣辭鄉國𤣥成業本傳父經靈運才堪述祖徳男兒㑹須致身早鳴珂走馬長安道彈冠憶昔多故人聴履今存幾元老莫因門第恥言勳知有山公能薦君捧檄喜趨東省拜題書先報北堂聞送李太僕還朝余聞國君之富在數馬露臺雲錦何為者昔從周穆起長鳴今逢伯樂因増價龍駒驃騎滿天閑苜蓿初肥漢使還誰向王猷聊借問莫須拄笏看西山梁園行送范學憲移官河藩昔日梁王最好文别館多招作賦羣授簡花時進枚叟含毫雪夜台鄒君竹下從遊聊戲水栁邊抽思總凌雲一旦榮名安在哉後來特數鄴中才魏陵西望空陳迹漳水東流可重迴使君本出文正裔繩祖常懷憂世志慷慨欲勒燕然勳深湛豈尚雕蟲技武林桃李半在門㑹稽竹箭皆搜致移藩遙指伊澗瀍停驂訪我吳趨市閉闗棲病謝通賔伏枕題詩贈逺人君不見菟園銅雀盡蕭條藻繢雄圖共寂寥相如倦作遊梁客定自銜恩入漢朝子約庭中賞紫牡丹作進酒歌悼張子人逢花下偏宜酒况復名花世罕有魏公園中擅品竒貴妃宫内傳名久此種云自洛陽來江左移將不易開纎纎映日新粧麗裊裊臨風舞袖迴珍重祗憐傾國色沈淪肯惜少年才密友看花記昔時張仲當筵亦太癡一曲强簮花調笑百杯猶訴酒行遲但見芳菲花不改空思鷄黍人何在春風解道有時還朝露寧知莫相待可因白髮恥看花若箇朱顔得駐霞兄弟謝庭多樂事世人徒數季倫家長干行送陸儀曹重補南署長千里金鋪夾蘭戺陵樹蒼蒼控石城淮流湜湜通江水卄年髙臥東山廬一朝更踏西京市馬上耽遊期不顧緩轡㣲吟日將暮都人觀者語道傍白頭何自始為郎莫恨漢家今用少須看止輦拜馮唐送阮將軍北上阮侯才氣何翩翩少年志欲圖凌烟屏居一自藍田後緑沈久卧蒼苔前祗知屈宋工題賦翻笑孫吳用兵誤種𤓰聊傍東陵門射虎忘却南山路君不見老驥雖伏櫪長懷千里途李陵不歸豈國士魏尚復起誠丈夫我有美酒傾玉壺飲君願奮千金軀功名㑹可收桑榆皇甫司勳集巻十四
