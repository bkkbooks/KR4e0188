body:
  text: 皇甫司勲集卷六明皇甫汸撰五言古詩初發京口少年慕攀鱗千里輕徒步媿非登廟姿亦謬臨軒顧朝躋赤墀塗夕騁青門路寧知世網嬰遂為儒冠誤昨浮湘江還願守箕山臥不勝戰者勞心蹟兩乖忤解纜指廣陵眷戀未能渡興歌矚流波庶幾照情素贈黄子先皇甫氏也因避地隠姓云范雎入秦庭梅福遊吳市隠姓干相君逃名類仙吏客逢江夏生自謂西州裔叔運遭崩亂逺迹甘留滯家本秦川人身従越鄉寄披霧清明朝利見飛龍位論難登石渠烟煴吐經笥述徳誕吾宗濟美光遹世並載發江都方舟涉淮泗聊宣敦賞情一慰羇離思桃源遇風追子安兄舟不及干禄非夙心行役苦相迫仗策隨平原揚舲共羇客空水閲桃花深山眺桐栢終風暴且來奔湍溯方逆臨津引不前天際孤帆隔馳情東望時何異西陵夕停橈既無悰對酒亦未懌眷眷勞歌興戚戚煩憂積張水部招登戊己山兼覽徐武功所撰河功碑劉向莅都水張騫窮河源哲人播嘉績上善廻狂奔土阜等峛崺延眺曠周爰魯連蕩遺軌䝉山隠華軒化因子竒著信以季札敦武功吾鄉彦烈烈豐碑存辛勤宣防事慷慨昬墊言之子守畫一何異雙璵璠往蹟隨清沚興情寄綠尊天界寺贈半峰上人顧省紛俗嬰尋山愜幽趣秋水淨金河寒雲翳珠樹了㸔花落時莫辨鳥還處休公别來詩江生擬將賦雨過高座寺積雨黯花丘緣雲入香界修策振林間疎鐘落峰外康樂誦阿含陳思演清唄欲除常戀牽惟是逃虛快奉謝王司馭惠方與君闕下逢恍記壺中别高駕凌雲煙芳姿若氷雪狂走衆方驚心醉自相悦安知問馬言獨守養鷄説金丹何日成瑤章終嵗掇倘承清燕餘無輕鴻寶訣雪日寄王户曹湖上官舍初雪度江城殘雲來省閣覽物嗟嵗殫懷人悵居索擇木本同棲傾枝猶異託維舟安可從開尊自成酌同蔡中郎過王員外宅懷子安兄委巷駐高車清溪夾幽宅細雨急逝年凝燈照寒夕依同南樹情飛異西陵迹為假雲中翰一寄天台客往視城南别業夙齡不事産落魄懷英風抗志雲霄外絶戀蓬蒿中避世豈在逺漢庭聊見容未識山川險安知途路窮兩自違京輦久欲返臨邛疏公有遺業精舍開牆東命策值蕭序覽物感情悰逕宻多陳莽林荒非故叢昔往候門稚今歸成塞翁鳴蜩若騰笑馴麏儼相従搏飛乏高翼何為苦微躬吾廬倘可適稅駕幸來同奉和子安春日軒中讀丹經之作徵君抱沈瘵平子起憂端測化芳春日歎逝清河瀾同心開寶帙託慕在金丹將従餐霞侣共舉乗雲翰寓言不可究𤣥理何能殫探崖石髓祕采嶽玉芝殘朝嗟秪用老暮笑且為歡綠尊命高酌朱絃被雅彈但遣物累盡豈辭人益難頽齡勿謂促達生庶自寛余棲病經年刀圭未效季弟示我以沙門之偈伯兄廣我以大道之篇伏枕奉酬并用逐瘧云爾本懷蒲柳姿兼落風塵穽顧影蛇屢驚㸔心猿靡定憂生苦多戚好道晩彌甚浮淮喪其珠還藥未有鏡晨誦披雙𤣥夕覽流三乗親親敦友于各各惠嘉訊空詮寄深藻妙理發高詠因君念處才無令伐真性子約北歸對酒奉答三載遊京輦一朝旋故疆豈不眷華省惻愴在帷堂未習舟塗險安知軌路長宵征無淹泊晨發懷不遑辭燕獻芳嵗踰楚變青陽入門問家難奚止庭逕荒置酒相慰勞臨食増慨慷已謝子輿樂徒緬孝標傷諒乏緩齡藥胡取駐顔漿風河有至誠雲壑且髙翔四月仙誕日友人昆弟集我蕭齋琴酒間作有倡斯和桃核訪初辰蓬山竚靈跡命駕紛行游披帷猶屏息敦余値二難結客枉三益雨館靄餘清雲軒坐生白丘琴發雅彈鄰酒瀉芳液泠然御鯤響恍若驂鸞翼吾意眷山水何事餌金石方達無生㫖安知有生懌端午邀過叟以視藥不至天中紀令辰塵外遲嘉客將同嵇阮悰未枉求羊跡側聞採三秀獨坐煉五石犬䕶青泥函蛾飛白雲室丹𤣥豈易成髓凝何由食不如持美酒酣飲恣所適緬余遺綵繒期君報金粒送沈二仲文游浙中因寄田叔禾昔與田叔别乃自漢東都英髦値嘉運睎翼荷天衢軒纓無榮戀竹帛有良圖𤣥疲子雲草書削路生蒲撝旃辭京輦紆駕領藩符響臻傾四座焱散各一隅冉冉流嵗月騂騂奉馳驅時違事已異蹟舛情復殊冶容嫉衆女姱行嗤淺夫敬通方見抵仲翔亦被誣杜門著越絶倚市歌吳趨願因晨風想共保朝露軀之子羨黄鵠西飛訪白駒氣合雙神劔光儷兩明珠雄談秋水至藻思春葩敷虹霓遲心賞山水焉足娛申緘緬契濶撫已媿槍榆秋日寺眺西錫混緇流南冠類囚客昨戾青陽徂今來素秋迫炎序俄戒涼華滋互凋實前因感六迷後果證三惑欲消塵世牽聊晦空山蹟夙夜緬畏行明朝露方白盛二仲交示廣志賦因贈江左本多竒盛生稱獨秀速化有性靈棲𤣥謝塵垢披帙十行俱擁衾萬言就揖手青門東醉心在良覯廣志擬雕蟲纎書臻古籀情同呼霓餘興是凌雲後媿匪辨璧姿相邀出金奏雨懷盛二時在清聽齋中支齋營八關陶情緬三逕嗟我求羊徒悵此琴尊興室邇心獨遐城嚴蹟難并巵言誰與談籥理自相證細雨忽戒寒輕霏坐生暝天風廻海潮秋聲送清聽璇上人院菊灼彼東籬花眷兹西土見青蓮同淨姿金粟等明蒨色普象王供香堪鹿女薦何異休公枝一令鮑生羨榮悴各有因開落互相禪我本解宦人歸情胡能遣鮑明逺集有休上人贈菊云玳枝兮金英皇甫司勲集卷六
