body:
  text: 皇甫司勲集卷二十二明皇甫汸撰五言律詩送蔡中丞之大梁二首聞君歌赴洛暫此駐熊軒昔羨年方少今看位已尊叢臺連魏寢戚邸半梁園不是夷門客何由慰贈言臺端勞簡命河内佇宣風置坐同周處名亭次召公鄭饑行盡給梁獄到應空可是工詩者誰云宦並窮寄柬王一元美二首一掬燕城淚聞君返故鄉草間逢鹿擾松際有烏翔宦憶中郎省辭當七子場名成身見累渾欲棄青箱聞爾閒居日悲来賦未成候門無雜弔西坐有餘情淮水流難涸虞丘樹易驚上書恩不貸感江謝緹縈余有二鶴忽失其一林伯寅得之慨然見還賦此以謝一謝乘軒寵棲田意頗同雄飛忽沖漢孤響但悲風翫目慙支遁𡨕心託塞翁非君仗髙義誰念楚人弓孫生讀書道院兼示新詩因答挟䇿青谿上垂帷晝不開雨忘流麥去霞記種桃来變幻雲仙宅荒凉偽主䑓興公奮嘉藻何異詠天台送祖叟隨姚太史遊京為重一言諾因輕千里心青門贈栁色白首念桑隂旅跡蠅同附鄉書鴈莫沉平生抱琴徳行矣恵知音乆雨政虎聞由昔民魚驗自今五湖成大浸累月示恒隂避世甘淪棄全身但陸沉何能上封事徒為賦愁霖景王之藩恭述二首帝胄宜承序賢王遂啓封珪分勞睿眷笙别愴慈容地接荆衡勝人多宋景從行看江漢水何處不朝宗綺嵗占淵識冠年仰令儀邑鄰豐起處路即代来時桂樹新開逕芙蓉舊作池寧知飛蓋賞别有望陵思送文司教北上當宁崇儒教持經謁聖君伏生猶未老揚子最能文帳已同南郡書堪逼右軍還憐竹林後見爾出雞羣至後徐子見過户外乆羅雀山中来故人歸田嗟失稔避世笑同塵榻解南州夜尊浮北海春相看嵗云暮坐惜物華新送項生入京為問西陵客何時發永嘉路隨天外鴈舟泛雪中花帝典虞堪並皇圖漢未加行瞻天祿閣載筆振瑶華春日訪大林和尚投跡入空境看心媿此身綰巾䝉示結執鏡為宣因石壁初消雪筠闗乆滅塵坐来花落盡猶自不知春黄氏中表邀余兄弟展其先塋嵗乆川原改春深雨露思亂杉迷故道荒草沒殘碑往化成千古榮名自一時寧知渭陽水流恨大夫池經石湖登治平僧舍野興臨湖上春光到寺中曲房巖際掩幽徑竹間通閲水知流止看花悟色空同遊數王謝曽為訪支公四黄子賦詩送釋印受戒之武林屬余奉同幻跡無安著禪心任去留杯從一夕渡律向五時修上竺多精舍西陵近沃洲題詩羡諸謝惜别為湯休四月十四日仙家無甲子吳俗紀生辰首夏蓬山㑹終宵脯棗陳蓂猶未滿莢月已漸成輪不見懸壺客何由覔異人齒歎齒録非余望形衰祇自傷未須論舌在詎是為唇亡守黙渾無語歡歌漸有妨閨中罕靈藥何得似張蒼雨省家園梅雨淹時乆桑隂拂夏長乍窺黄鳥换斷掃緑苔荒幻跡非園客齊心似藥王朝来觀物後失養悟嵇康悼懋上人一自過春院鶯花悵别離寧知入定後忽是下生時懐草人間帖支銘座右辭總諳無盡理那遣有情悲汪子每書来言還齊雲未果賦此寄之聞有歸與興如何乆滯淫白雲遥引目芳草自知心客鬢風霜改生涯嵗月深移文謝猿鶴早晩北山岑感事三首同子約作寵易移宸眷言難悟聖聰幸逢止輦日真見引裾風開閣人何在題門客已空徒聞賜歸傳詎比餞疏公長夜猶酣飲平明已見收鷹鸇懐雅志魑魅幸生投勢殆氷消日恩疎葉向秋成功自有序不去笑穰侯妨賢應取咎履滿竟成災書上批鱗切辭陳䑛犢哀瘴煙䝉萬里風采動三臺獨惜平津館他時但草莱題徐氏雲林草堂選勝辭金谷探幽慕輞川近郊聊可卜初地不離禪風景原塵外雲山即眼前徐陵多藻思来草玉臺編張幼于廬墓哀壑甘孜守荒庭罷鯉趨涕禽還自擾淚樹已全枯孝里人題未安車使到無寥寥松際月弔影夜空徂答陳司教仲舉多推望吾門早有聲一氊從薄宦六籍引諸生芳訊銜蘆達新詩掞藻成春風隔相與遥憶詠歸情天池舊寺不盡青山路行来豈畏深花間惜春暮雲際愜幽尋峭石迴巒秀長松夹陛隂金河流梵䖏非復屬支林春日虎丘遇何子江上昔歸去山中今始逢花天重㑹面萍水舊行蹤幽意闗春鳥禪心報午鐘閒来貪禮佛更喜得何顒原明菴猶厭東林擾重開西土幽山光分慧照溪水合慈流塔影過松院鐘聲下竹樓從兹竟禪理爰浄更何求悼黄得之早共聞江夏今誰謁漢京未攄三䇿對曽草萬言成考諡由賢媛留喪遲友生頽齡奚恨促不死是榮名示内弟沈子沈約郊居興今来吳市中移家因亂日懐土復春風坦腹牀何在齊眉案已空慿將雍門慨一為寄江東黄清甫之洞庭訪徐紹卿湖上乗春棹山中問隠居病閒行藥後興減落花餘客舍停雲乆僧忩鑒月虚向来誰把臂應歎故交疎悼汪子二首尚記看花别俄隨落葉傾計疑千里夢交愴百年情鄉國無重返泉臺豈再明張堪妻子在誰為託朱生懐歸曽未得委化竟何言城罷燕人泣江迷楚客魂繐帷非故榻絮酒異歡樽肯惜黄金盡惟餘詩草存寄莫憲使不覩魚中素寧知隔嵗情一官聊自免萬事若無營髪為辭劉白書因去趙成思君對煙草江上喚愁生送吳子北上顔訓家聲逺韋經世業存鳯毛新沐寵豹尾舊承恩視草供題翰攀花戀别樽秋風南鴈起書為報青門送静公受戒還蜀遊吳兼適越了自得塵觀劍閣千盤險瞿塘五月寒隨縁朝乞市說法夜登壇西去乘杯别何曽蜀道難吳純叔挽詞二首京兆新泉路延陵舊世家經廬聞訴笛登壠起悲笳素業空遺草浮榮若夢華同時裘馬客涙盡曲江花年少推江左才髙妬洛陽向晨星落落歎逝水茫茫座為亡琴冷苔因斷履荒楚魂招不返誰與擅詞場寄張幼于廬所舊卜徵君冡新題孝子鄉入林逢鹿死遶樹見烏翔坐處無青草攀時但白楊知君廢莪乆揮涕不成章九日書懐卧病謝塵事堂隂感迅商懶成中散慢醒學次公狂菊向籬堪采松依徑乆荒不知吹帽客何䖏醉重陽贈汪元蠡自虎丘攜茶香歸歙盧郎今更見荀令古来聞茶向僧齋乞香從佛供分聊将白雲思静對緑忩熏多少囊金者還家獨媿君仲冬對月數宴答子約冬煖因恒霽宵逰及望舒弓形雲際引桂魄露中疎棲戀鷦鷯後思深蟋蟀餘清光能幾度再滿嵗將除送王子之太學謁帝速征輪知君乆席珍才華追大雅文體起先秦列館槐隂晝圜橋藻水春聖朝方養士莫作上書人夜登靈巖青山行處近白社到来稀城化途猶是臺傾殿已非香泉流壑冷花雨入林微何事烏棲盡僧船載月歸始登𤣥墓鄧尉開山乆輪王結宇深湖光同練水梅樹即珠林客興乘春霽僧齋過午隂望中枝勿剪無礙是禪心悼張聚之二首憲也初非病桑乎竟是災梁空聞燕語門掩見花開繐帳春風冷藜燈夜雨哀從今斷雞黍那復故人来居然花月在良友竟無存易下齊山泣難招湘水魂蓬蒿仍舊舍松柏已新原扶醉因埋骨空思聽婦言子約患臂奉訊靜攝應無恙塵勞暫有虧才非類擁腫徳或似支離燕坐停琴後朝霖罷灌時向來觀化意翻訝肘生枝送張幼于之南都應比老至惜離羣時来此送君三山吳地盡一水楚江分率敏工題賦衡思善屬文猶懐壯夫恥直欲樹竒勲答徐紹卿見懐二首停雲遥引望良晤近何疎以我丘中想開君湖上書花飛人别後木落鴈来初祗為懐徐孺長令夜榻虚芳嵗無淹晷空山忽報秋時危平子歎日暮美人愁尺素勞相憶雲蹤莫可求清輝惟共月猶自遲南樓送清甫逰京師少年輕逺别相送欲牽衣記室文章似平原肝膽非草芳過楚歇花落渡淮稀更有帷堂恨霜時定憶歸秋日王舍人邀逰支硎山同陸儀曹同舟叨二客飛蓋此追隨峭石攅雲際疎林著雨時山秋登更爽寺寂坐相宜何處堪禪悟寒泉獨在斯哀弟子約四首兩度悲兄淚今為痛弟流棣華翻委露池草竟成秋襁内孤兒泣帷中少婦愁獨持遺草去恐有茂陵求一官聊自免萬事若無營琴綜逍遥罷書詮道徳成惠連嗟令弟法護媿難兄何悟桃園賞重来異死生稀世才難合憂時病易侵形全應驗玉藥誤為投金捫雀生前逕啼狐死後林却憐遺令日指季獨傷心賔館綦方絶靈筵繐忽張臨池留翰在撫座惜琴亡花晝歡娛盡燈宵涕淚長猶言何水部詩思滿江鄉季弟子約棄官東歸杜門却掃日延方士研味道家之㫖流覽衛生之經綜琴書以自娛或翰墨之間作宜其享黄髪而躋上夀也豈意今秋食鮮疾作伏床第者七旬捐賔客於一旦廣陵絶響𤣥草徒存吁嗟悲矣藐兹遺孤艱以投我悲悼又安可勝痛耶爰賦四詩哀心感者其辭悽以怨但韻之而不能文之情也因似良友密親請各賦之歌以永哀聊以泄吾思爾凡知子約者必不能忘情抑烏能忘言哉送王維楨還涇陽二首王君與余為藝苑之交忝通家之誼彈冠仕路二紀彌殷謝秩還山十年成濶雖音驛數聞而光塵難即每懐良覿千里馳情乙丑春正上元節後忽駕扁舟蹈積雪衰絰而来以志銘見屬乃知厥考青山公辭養乆矣相對於悒留欵浃旬晤言申旦是又悲中之一喜也明將别去聊賦二詩遍眎諸友凡在同盟無忘占贈云爾蕭齋避客䖏解榻遲君時稍覺形容改將無夢寐疑酬心誰把劍攬涕獨題碑辭乏中郎妙空慙有道知宦跡一朝謝離心十載還旻天孝子恨風雪旅人顔夜壑青山裏春帆越水間王裒枯樹在歸憶㡬迴攀二月十三日與楊中丞王舍人陸儀郎姚茂宰集吳氏園亭恒隂方浃月寂寞過花辰不造河陽館安知别有春池臺尚存故畦徑稍更新同是嵇公客當杯獨愴神雨後靈澱寺觀梅寺乃梁時古刹有銀杏二株嵗乆合抱矣梁代叢林敞齊闗澱水賒觀梅乗雨霽問樹識年華佛供移香淨僧忩影月斜夜深鐘梵起飄處即靈花妙華菴登樓望太湖野寺人天外危樓烟雨中三山慿檻接一水挂帆通浪跡俱成幻浮生併悟空壯遊渾已倦徒自愧長風虎丘如公房追憶子約重探支遁室曽記惠連来草色迷春夢松聲起夜哀居然隨物化何自驗輪迴獨惜題名處殘碑半覆苔天池遇劉侍御張文學留宿僧房余先返棹獨往因春興相逢盡宿縁散花初地雨施食午時煙山月分歸照龕鐙就卧懸無言去與住諦想不離禪贈陳子修道天池塵累何能遣空門忽遇君皈心㕘繡佛戴髪誦靈文唄落漁山月禪棲鷲嶺雲誰憐叔𤣥婦書去未相聞徐翰撰遊齊雲歸因贈蓬闕雲中嶽花源洞口春幽探歴山水𤣥覽出風塵太史逰何壯興公賦更新寧知香案吏今是玉堂賔春日同諸君虎丘餞别蔡司空分得可中亭地選香臺勝亭開劍水春月華懸一鏡海氣儼重輪圓缺看成幻升沉悟是因帝京千里共遥夜悵音塵奉送再賦向来逰宦侣試問㡬人存暫駐東林駕因㩦南浦尊臨溪攀栁細遶塔落花繁訝得休公怨誰能不黯䰟顧姊挽詞二首化俗推慈範宜家著令猷行齊淑女伴才比丈夫流白日開新兆蒼梧從故丘曾聞入朝語悟主在無求褕翟生前寵金蠶死後藏絮風猶擬雪薤露已晞陽骨化同埋玉䰟銷詎返香淚来開故篋留取彦先章訪顧朗生不遇為訪山居勝門前一水分寧知牽世網未果謝人羣滿徑翳秋草虛忩閒白雲非闗乘雪興了恨未逢君題鍾山送幼于之白下夜壑鍾山裏千秋劍舄存烟霞餘王氣霜露是深恩鼎定周王業冠逰漢主䰟相如從此去投賦謁文園又賦雨花臺多少南朝寺長干覺路分天花飛晝雨江樹隔重雲禮塔鐙難滅臨臺日易曛莫因逢淨侣開社欲留君燈夕答徐子讌賞宵堪永流芳嵗復還驪光疑泛海鼇火若浮山月滿金枝上花生綺綴間無嗟成白首既醉總朱顔新建徐文敏公祠季子見招展謁各賦經始南城地恩開東海祠公車收啓事像寢儼容儀蔓草成書帶桃花即絳帷將非過庭日猶幸得聞詩重建雲隠菴寳刹將傾日琳宫再構年佛餘迦葉地僧乏道林錢遶塔徴前果沉灰悟宿緣願言功徳就来問廢興禪贈汪子世事勿復説與君聊自寛感時蕭序改行路太行難明月流杯暢清風拂劍寒并州何處是且當故鄉看送朗公講解還越月溪施錢修塔開教逢鳩什談經得馬鳴坐中窺有相言下了無生法雨和香氣天花落梵聲歸時多寳就刊石為垂名贈張二守飾吏更兼文關西迥不羣課登三輔最名向兩州聞慷慨心傾日飛騰足致雲古来歌政樂今復見張君送劉守備兵維揚為邦有令名開府向江城鯨海無傳警狼山佇偃兵歌同五袴美贈比一錢清獨惜隋隄栁春來綰别情朱生將子遊太學世濟由三事家傳自一經帝京初受館客舍尚趨庭槐晝春飛雨花天夜聚星能令同學羨太宰舊儀型四周寺訪吳山人徒步起江東干時義氣雄倚鞍聊作賦投筆未銘功客嵗長途雪禪宵静院風征西旌節盡門下泣何窮贈異僧如金幻術傳僧吒神光顯佛圖阽危猶引足冒險似忘軀木末同猿挂簷間學鳥趨佇看多寳就㑹有百靈扶黄清甫自京恵訊兼示新詩寄答聞爾淹京國將書達故園式微聊永歎長憶只空言落木兼鄉淚飛花共旅䰟可能懐筆札更向五侯門立春日同劉侍御集張幼于赤城山房荏苒驚時序遲迴戀物華隔宵林帶雨拂曙海呈霞隠跡原南郭辭流屬大家陽春何事早先遣筆生花次劉守𤣥妙觀作吏治聊乗暇仙源此暫過風光延眺迥雲物寄情多徑密全遮桂谿深半繞蘿陽春何意早先入郢中歌讀劉侯至日𤣥妙觀之作因贈緱嶺郡城隅縁谿路稍迂自公移後乘攬勝駐前驅氣動吹灰管靈探禮斗符興来聞夢得留詠在𤣥都答章憲使得罪因明主䝉恩念逐臣猿啼嶺表夜花發日南春共就青山卧俱逢白髪新裁詩渾欲報往事不堪陳范㕘岳嘯園讌集寄賦二首開閣懐先業為園慕隠居官遷四岳後情戀一丘餘野鶴隨人鳥江鱸饌客魚由来聞嘯父玩世欲凌虚沈約要題賦王筠㑹賞心徒然聞勝槩何自奉追尋振䇿東臯逺開尊北海深祇應孫阮輩林木響清音皇甫司勲集巻二十二
