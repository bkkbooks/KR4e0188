body:
  text: 皇甫司勲集巻十七明皇甫汸撰五言律詩憂居張叟攜琴過訪謝客卧山林煩君逺見尋年華驚㑹靣雲海結交心流水夜方靜迅商秋已深霑襟自有淚無俟更聞琴早春野步奉荅子安蘭臯廻淑氣蕙圃攬晴芳鮮雲藹戸牖春水生池塘新望盈新抱流思逐流光徒忻陪玉趾終媿報瑶章訪終南穆山人隠居雌守出人間㝠棲不可攀噏日慿晞髪餐霞許駐顔檢方因閉戸采秀遂登山借問壺中秘丹砂定幾還春霽和子安東墅春雲歛西巖霽景賖因風疑拂栁着雨似催花潭皎銜㣲月江酣帯落霞陶芳非仗酒何以度年華集子約園亭看梅幽徑此新除荒亭自可居開忩散花竹列坐藹琴書夕景移蒼岫春流引緑渠梅花未忍折揮軫待游魚春雨金谷寒難破瑶臺雨易滋籠花纎似霧着栁亂成絲香氣㣲霑徑泉聲暗落池定愁今夜月不遣鑒羅帷花朝虞廷殷仲月吳苑表芳晨故事聊成俗風光半入春無言桃李色一倍栁條新但恐繁華歇何辭竹葉頻春日徃吳山塵跡一相謝閒情從此多雲山時自徃春水日堪過問谷迷桃李尋谿遶薜蘿東林倘可借投老亦如何遊穹窿諸山楊栁緑初齊桃花紅滿溪風光亂山裏雲日太湖西何藻非魚戲無林不鳥啼逢津須解問莫遣路相迷晩泊虎山橋獨宿山中夜還憐湖上春桃花霞似浪楊栁霧疑塵寺秘禪棲寂橋廻禊水新明朝觴泛處是否在天津探歴北峰諸山春色駐深山年芳十里間松林隨意入花塢恣情攀定水空思住迷雲不記還物華何以眷幽興自相闗雨齋偶成幽壑生春色空庭帶雨聲閉門誰與晤獨坐自為情入洛書難上還卭賦易成無令悲日暮猶欲俟河清三月十五夜月南國催春暮西園候月遊似珠沉曲浦如鏡掛層樓影逐桃花落香兼桂子浮芳輝併可翫詎是减清秋病中承諸兄弟問訊奉荅二首子浚花月坐傷春蓬心屬病身閒来看鶴舞静裏學熊伸采藥懐三秀逃虚媿六塵猶聞枉芳訊何以報情親子約藥石未相安春芳忽復闌銷魂驚别易却老覔方難曲是宜琴弄顔非鏡懶看一承華萼詠眉宇坐来寛病中子浚兄招賞牡丹花徑許相攀繁芳逼座間為君扶病骨来此破愁顔適性寧非逹忘機即是閒醇醪未可謝判飲送春還奉訊子安聞爾巖棲處乘雲且弄霞緑勻臨檻竹紅减過墻花觀妙從無欲全生出有涯因聲寄同病何日遇丹砂憶遊虎山寺自識溪橋路常懐釋道林水流精舍曲門閉洞湖隂日向芙蓉度春從楊栁深未消遊後興還似欲相尋芙蓉測日見髙僧傳新霽澤國偏宜雨山齋復喜晴雲依飛葢散日吐半規明蘿逕何嫌宻花溪稍覺平還知滄海上今夜月初生子安自常熟歸道虞山之勝因贈雅興尋丹壑幽探歴翠㣲觀泉鍳水徳攀石落巖暉靈梵將塵逺仙源與世違自驚南郭卧言訪北山歸夏日遊中峰寺二首向子懐名嶽孫生慕福庭何時將陟逺兹地廼探靈寒落巖前瀑晴披嶂外屏非因塵是染誰識累為㝠牽世將奚適眈山聊近尋千林夏木秀一徑晩雲深給苑時游鹿香牀或戲禽言思辭苦熱来此息慈隂贈王使君健之子東南美人稱廊廟姿早膺多士選遂承明主私珥筆趨仙室彯纓入禁墀長卿常侍從摛藻奉如絲秋原晩眺和子安林壑本余情歸来趣自生空山迎氣肅槭木帶雲輕坐惜流芳歇行驚旅鴈鳴還聞歌嵗暮聊以寄秋聲吳溪夜泛湖山西郭外一徃一為情日夕看佳氣雲霞不斷生野烟隨徑合漁火隔溪明渡口迎歸處猶能認棹聲謝子約弟恵菊嘉恵分秋色芳心共嵗闌纎英承露潔疎蕋帶雲寒對酒浮金易興謡報玉難秪應芝室裏長作棣華看子安兄入虞山因寄問水乗源去看山入畫遊披衣巖霧積飛葢洞雲流塵鞅從兹謝㝠筌不外求瑶壇有嘉樹莫作桂叢留虞山遇陸一宜俯吳二子新同泛因登絶頂作共愜山中想俱来水上逢尋溪迷萬轉攀壑隠千重雲氣流巖竹泉聲落磵松窮探不惜暝還陟最髙峰詠虞山倒影今夜看山色翻從一水中溪嵐乗月吐巖翠合雲空波淨明葭菼沙寒落鴈鴻臨杯挹仙檜星影亂芳叢夕讌孫氏園亭金谷猶良夜花源即徃時承君開别館道客向前池歌散雲輕駐杯長月暗移莫持無限興留作去来思送吳進士辭縣就教三衢媿我眈山卧憐君辭邑過共看雙舄舉無奈一氊何旅跡薊門逺離懐漳水多從来化蜀者豈是讓絃歌冬夜對月聞敵退木落但疎林蕭然月色深無愁蟾兎缺祗惜嵗華侵霜露流寒影闗山戀故隂漢家新罷戰萬里照歸心熊叔抑同唐應徳入四明弔陳約之憮然作詩二首憐君提寳劍東去覔徐君可惜看花伴翻同落葉分涙傾鄞海月心斷剡溪雲篋内收遺草傳来不可聞已作浮湘去因為弔屈行風霜萬里客生死一交情白馬夢中路青松涕外城逢人問勞苦何得不言名冬日晴眺江國開晴乆風煙逐望匀寒隂漸改故陽氣欲乗新犬馬驚余齒龍蛇任此身悠然北忩下何意得先春早春寄台州王維禎不見天台吏題書問赤城時為花過眼春入鳥闗情雅興看霞起離憂向水生為邦年最少莫惜宦無成寄唐應徳南國逢新嵗東山懐故人棄官如脫屣輕世學垂綸象外能齊物尊中却累身不知芳草色何似茂陵春寄王稚卿一自楚鄉别再逢吳苑春風塵愁作吏江漢逺懐人驛路梅花發祠堂栁色新將從漁父問湘水隔迷津早春雪後看雨雪消逢雨至并是弄春情潤物知何處隨風散滿城園林無積素山壑有餘清見說花溪裏朝来新水生雪後山行寒雲春不散積雪曉来迷山氣涵湖影風光近鳥啼杖藜行郭外鼓棹入塘西日暮歸何事逢人媿剡溪山行值雨茂苑多春雨花源信水鄉端居移物候靜悟得年芳山合松雲亂湖消蕙雪長思為拙者政耕牧向河陽十九日雨夜子約巻燈重晏良夜應難再歡悰詎有央一燈憐棣萼終宴眷蘭芳細雨頻吹座輕寒半入觴自驚時已過何惜借餘光上方山樓春眺翠竹圍香閣金沙引覺途春光臨檻發塵事入門無雲氣常飛雨山形半折湖衆巖廻合處天外接浮圖塘上夜泊與吳子新停舟對親暱把酒話平生花鳥非春事湖山即旅情寒煙下漁火流水出鐘聲年跡驚心裏能亡念合并春雨書齋細雨来春色髙雲起夕寒閉門閒有卧牽世若無懽舊業依松菊光風轉蕙蘭委懐聊散帙山海得流觀春日從支山入天平郭外青山路雲深定幾重桃花流一澗竹樹隠千峰塵世遥相隔仙源信可逢春風變芳草何惜駐遊蹤憩白雲泉亭巖穴非無構山茨亦有名行看松色染坐愛石泉清雲去空僧影春来覺鳥情潺湲一此鑒徒自媿塵纓春溪晩興别業懐東墅名山倚北岑川原澄夕霽雲水亂春隂看竹門從閉迷花路轉尋歸心不及鳥隨意向幽林上巳日遊楞伽寺春風祗苑上今日禊堂開駐葢松隂合張帷栁色来閒雲忘宴坐定水送流杯向晩溪橋渡何言洛飲廻過泉上人竹所尋王履吉讀書處素業依香積芳林託化城偶来乗逸興何處不春情載酒鶯花下談經象馬鳴王猷安可見空自竹叢生崑山道中清明芳辰郊外度煙火曉来㣲蘿磴通樵徑花洲出釣磯且因乗月徃更得詠風歸莫戀明時去空慚吏隠非修和觀登彌羅閣竹院開仙閣花源邇郡城齋心坐来白春色眺餘清不遇雲中駕如聞空外笙逃虚自有地何必訪蓬瀛登城西南樓巨麗表兹地登髙懐故都湖山紛若帶樓館綴成圖寫月猶張樂飛花未泊艫從来歌舞處愁殺夜啼烏徐子九見訪得聞廸功遺事昔賢今異物述徳最憐君書著人持去言忘世莫聞空庭吳苑月流寓漢江雲豈學河東婦徒能誦父文聞蔡比部上書改南署寄憶卧病貽同好因書報故人悠然芳草意堪老白雲身金馬西京道瑶華江左春知君方盛飾何以厭緇塵雨夕重悼張子同子安子約作細雨空堂暮孤雲冉冉隂逢誰話山水兹夕痛人琴南國梅花落西原芳草深何須聞楚奏始有淚霑襟初夏積雨春去思何如愁霖伴病居未經芳草歇空數落花餘檐霧難開嶂溪流易合渠杜門誰與晤惟有樂琴書雨過子約齋中聴琴同子安作取適家園近来忘風雨中幽忩荆樹引别館竹林通寂寞身俱是沉㝠意頗同雅琴何以託流水正無窮得張士𢎞書寄憶坐憶襄陽守音書漢口来遥心慿夢逹愁緒與緘開草緑燕公署花飛山簡杯更聞風景日騎馬峴山回夏日遊虎丘投跡期方外名山羨水西坐忘因竹逕歸晩失花谿覆殿炎雲薄移階凈日低深公莫相笑将買一丘棲虎丘過陳可與故隠居有題壁憶爾逃禪日㝠棲託講臺寧知投跡處竟作捨身回泉壑人長閟山房僧獨開空廊留畫壁嵗乆半莓苔欲遊虎山橋值雨不果湖山寄情處心徃跡仍留風雨連兹夕蒹葭生逺秋雲中珠樹見天外石梁浮何日逢僧語隨縁老一丘和子安兄夜坐感秋北戸鳴螿集西堂落葉過自驚秋興發并入夜情多芳草萋零露青溪急逝波此時勞憶處萬里見明河唐子應徳自震澤返棹邀余夜晤吳門煙渚夜来泊泛湖船秋水生衣上巖雲落酒邊逺遊多世憤小隠謝時牽莫問空山葉相逢悲長年靈巖棟宇開靈嶽池臺隠廢宫已看塵刼逺猶想霸圖雄野霽呈秋色濤喧見晩風從知掛帆意遥在五湖東入陽抱山訪朱大理憐君謝朝寺歸守舊林丘芳樹當軒植清泉入戸流焚車長自暇學圃最宜秋却笑題門者何湏羅雀求朱大理邀遊大石振䇿凌霄上留筵拂石開峰懸疑削出崖斷似飛来雲氣晴交雨濤聲晝引雷危梁倘可度扶醉隔溪回贈程子一泛梁溪棹飄飄不係心雲山家尚隔湖海嵗空深叔夜何忘鍜榮期豈廢琴淮南書總秘莫學試黄金訪吳隠君君家湖水上行樹晩成村雲石常垂釣軒車寡候門别来驚白髪話乆費清尊笑我為官傲何如守漆園除服後九日花下荅子安對酒一以適聞君歌慨慷市朝身欲隠林薄意猶長撫已疎成慢逢人醒或狂從知頭白者何自晩為郎錫山訪傳程二隠君並是逃名侣林居各宴然人稱南郭隠自喜北忩眠放棹非乘雪停車似飲泉今朝逢二仲何惜醉花前十月十五夜月清漢月仍滿空山嵗欲闌入林無葉碍映水覺池寒逺道心千里髙樓思萬端誰能三五夜長及盛年看正覺寺訪大林和尚何處堪消世文公可晤言談經傳慧印作禮在祗洹蘿月閒中磬松風定後幡詎辭雙樹下夜乆駐歸軒坐憶坐憶唐人唱還驚嵗載隂寒雲下幽徑落日到荒林遣興劉伶酒宣情叔夜琴湘江歸卧處冉冉亦何心冬日陸宜甫黄聖長見遇翟家杜門處嵗晩益沉淪自貴無知我非闗學避人偶来共言笑宴坐狎情親幾許能相見江城復入春酬子安廹嵗將事行役書情聞君歌赴洛而我歎遊秦一出江湖逺頻驚嵗月新閒雲歸後意芳草客中春不及稽生嬾長辭當路人山行市朝非隠地山水戀吾城霜後楓林改雲邊鴈影明五湖沿泛意三畝卜居情豈學平原宦徒為世網嬰過白鶴觀陳錬師房青谿即此路宛與世相違桂樹叢生處桃花幾度飛雲来石牀凈月到洞門㣲但醉容成醴何須學幻歸至後故國一陽後幽棲三載餘尊前鱗運改鏡裏宦情疎榮逹隨賔戲文章媿子虚河陽惟有拙豈敢歎閒居杜二挽詞學道慕長生將留不死名奄隨朝露變愁見夜臺成闗令收遺草園公罷采榮猶言尸解去臨穴覺棺輕子安新構虎丘山莊題贈河陽新别業松徑宛然存流水才周舍青山正在門彈琴忘物累拄杖聴禽言豈必長安道棲遲可避喧湖上雪後長湖延眺處掛席隠情遥洞口雲常結崖隂雪未消身慚從宦侣跡喜混漁樵别後春蘿月山阿易寂寥東郭山莊為訪東臯上荒蕪素業存引湖供灌溉葺竹遶籬垣望嵗逢春及移舟到夜昏歸田倘可遂輸稅奉明恩嵗除前一日過竹堂寺塵世徂年易空門駐日閒看銘支遁座味品釋龍闗淑氣諸天外流芳雙樹間未能除累劫回首媿春還病中聞子約過修和觀坐憶仙源裏春風爾獨尋桃花别後路芳草到時心迎杖聞山犬驚帆見野禽養生如可問念我病方侵贈金氏賣卜吳門市餘錢作酒資身同日者隠年忽老誰知簾下經探秘蓍中語入㣲多慚大夫後從子欲稽疑内弟談氏園亭飲餞昔共懽遊地今成惜别筵闗河尊酒外京國日華邊拙宦非吾願榮名秪自牽含情對花鳥去住易經年二月十四日金子以余將北征攜酒言别懐徃賦詩江郭攜尊酒花天贈逺行琴宜謝邛邑裘媿入秦京蹔寄西園賞終多南浦情離懐何以喻絃管厲清聲天池山泉上飲眺勝地探難極深山到是縁沉灰迷故劫空水寄流泉坐石情宜竹看峰影入蓮杯乾還更酌不醉為澄鮮覺海寺晩登石壁絶頂荒臺布金處殘宇在雲峰徑以檀欒入丘因窈窕逢桃花春磵酒蘿月慧門鐘歸路無愁失樵人許客從清明日再過上方寺留别山僧蘭若諸天外桃花二月深攜尊初就竹饋食正聞禽落景銜空水寒煙淨法林休公方怨别媿我去何心重過天平寺尋僧不遇空山重到處雙樹隔年芬飛錫遊方去餘香坐自焚忩通鄰寺塔巖落别峰雲何物堪留晤清泉竟日聞郡守王公廷招遊大雲菴同用春字謝守屏紛務韋公訪淨因石門紆畫㦸雲逕擁朱輪伐木聴鶯罷銜花愛鹿馴從兹雙樹下掃榻待行春同友人徐紹卿集黄淳甫棲霞館言别偶偕東海士来欵北山居霞館重分榻江門欲戒車情勞具鷄黍坐喜弄琴書别思何由遣清風奉穆如和徐子過秪園廢寺有感伊昔東林近曾逢白社開秪今茂草處猶是散花臺鳥罷聴經至人無講徳来寧知慈苑内亦起雍門哀皇甫司勲集巻十七
