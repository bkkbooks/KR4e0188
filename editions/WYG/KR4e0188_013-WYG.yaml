body:
  text: 皇甫司勲集巻十三明皇甫汸撰七言古詩十七首憶昔行寄徐公子憶昔金陵髙㑹時東南玉樹滿留司淮水橋邊看飲馬石城門外待張帷白日隂霾不常好衝颷激霧移蒼昊自信蛾眉肯讓人誰知豺口横當道黜陟徒聞吏部尊模稜頗笑尚書耄六七豪貴皆無恙二三賢雋翻凋喪張翰歸來減宦情謂張衮顧榮死後嗟人望謂顧璘此時意氣不能平慷慨先懷襆被情北海羞稱男子軰西州寧避黨人名一朝聚散胡容易眼前得失須臾事酣飲莫問黄公壚悲歌猶記荆卿市從來勢利不相和輸心安用結交多牛首山中空歳月燕磯石上幾風波寄語翩翩魏公子侯生别去奈愁何金陵還客歌贈周以言有客近自金陵還唁余特造竹林間别日無多江上夢秋風忽改鏡中顔彈鋏悲歌横義氣班荆坐語都門事翻覆人情谿壑同榮枯世態晨昏異悠悠誰復為憐才落落何須久懷刺君不見昔時江左重名流一朝燼滅隨荒丘徒令户外容雙㦸安用車前引八騶青溪遥接烏衣口舊宅垂楊幾存否陳遵那顧尚書期阮籍惟耽步兵酒白首猶逢梁國人傾心詎信平原友歸去何如謝世牽六闗不入最稱賢莫將一掬羊曇淚灑向西州岐路邊河湟行傷曾公銑也君不見髙帝興師净朔方我文親亦御戎行徴兵盡選三河少校士争收六郡良萬騎旌旂紛蔽日千羣組練凛凝霜驃騎積弩號將軍耀武宣威志立勲陣前殺氣驕難近幄内竒謀秘莫聞一朝受脤出蕭闗百戰長驅事馬鞍雪晦隂山乗夜襲天横北斗向南看按轡俄傳勞細栁飛書已報下臯蘭君王神武由天錫都䕶材雄總無敵長戈大劔耀星芒晝仆旌旗夜奪壁鑿空開域路應賖置亭列障遂踰沙博望從來能許國嫖姚自誓不言家奏凱班師截海外共賀黄圖亘地界銘功刋石紀龍飛解甲韜弓羅虎拜此時髙㑹坐明堂登歌獻夀樂無疆越􅸋探輸陳異物巴俞角抵盡來王世變堪嗟己巳間白登愁覩翠華還不聞更上金城畧但教常閉玉門闗王者之寶在土地辛苦成功可輕棄先皇遺却平城憂謀臣徒守珠崖議百年慷慨有書生每過湟中氣不平非求燕頷封侯易翻思馬革裹尸輕不識忌諱爾何戇可憐身死名俱喪朱生肯訟伏波寃魏文猶寢中山謗只今邊徼有烟塵寄言韓相好和親縱使分麾思命將不知投筆竟何人石河將軍歌蜀人王户部詢乃翁將軍書劍學俱成百戰長驅亦慣經羽角時時持候月旄頭夜夜起看星曾宣威武驚巴檄欲樹功名向北庭一朝解甲承平後萬事投壺飲美酒但教開逕撫孤松誰復行營勞細栁道家多忌古來知隴西難封數本竒為問藍田屏居日何如錦里賦歸時石河遥通古城北少陵草堂猶自識舊説雄稱白馬間今來翻卧青羊側郎君文藻子淵流耻居紈袴漢廷遊丹鳳俄傳貤寵詔貂蟬還見出兠鍪銜恩正值古稀年稱觴獻夀石河邉河水長流石長在無須辟穀訪神仙時錢謡丁戊間吳中好行腐錢乃采民謡而諷之先王通貨興民利遂令圜法相更制周室曽聞九府開漢京盡是三官𨽻小大品隨壯㓜差輕重權蒹子母倍從兹鼓鑄何代無五銖半兩肉好殊不言改撰堪稱馬却道能飛始號鳬我明稽古誇周漢上林徃徃繦朽貫銅山禁弛盗詎亡殽雜愈多法滋玩爾來民風日偷薄罔市吳趨行濫惡形如榆莢僅有文堵中綖環已無郭三五持來乃當一百可僅寸萬盈索博徒争取擲地殘鬻夫手汙因風落生可使治神可通赤仄竒文空罷閣官視民姦聴之便但遣黄金入私槖纎巧輕剽時共珍木彊厚重將焉託君不見珠玉沉埋瓦礫全鏌鎁為鈍鉛刀銛申椒乆謝充幃後蟠木翻容萬乗先古來棄置人同此何訝區區物亦然還硯歌為長兄賦長公甲誕歳逢酉嘉賔四座稱觴後周郎手持一片石殷勤為獻千金夀玉質温瑩眼復明霞彩爛燿鏗然聲主人拜受比瓊玩置之几案烟霏生科斗古籀鐫虬形色絲妙句如盤銘客從逺方羅雀至呼兒取出題鳳字寶硯凋磨多苦辛銀杯羽化須臾事主方懊怏客不歡黑卿寂寞穎人棄神物豈無呵䕶靈依然得自吳趨市君不見明珠合浦有時還楚弓知在郢門間由來喪焉何須問且更籠鵝一解顔秋日周山人見訪醉酒歌自余還北山惟堪卧南牖掃軌何須長者通著書已擬潛夫就門題貴賤感交情不逢親舊話平生秋水聞君艤舟楫荒園一為款柴荆此夕凉風度虚幌少焉㣲月湛華楹開顔命醇酒潤耳發哀筝人世難并易别離試從今日憶當時座上應劉成異物林中稽阮邈幽期末路㝠鴻翻折羽臨風華萼詎同枝清尊夜飲如辭醉明鏡朝來視鬢絲昔時行贈王亮卿下第之松江謁劉侯昔時邂逅長安道下馬通名何草草今來㑹晤闔城傍把劍語故俱茫茫問君何來西出秦拂君衣上洛陽塵顔凋但使友人識金盡徒令妻嫂嗔君不見吳王宫闕荒蕪乆世事何如飲醇酒新月正照鹿臺花離心欲贈華亭栁男兒快意須目前安用餘名潤身後蒲鞭為郡有劉君驄馬風流迴不羣江上鱸魚逢正美客中鶴唳更堪聞莫嗟失路無知己行見張華薦陸雲出門行君不見李生出門仰天笑㐲劍直走長安道又不見蘇季還家人盡輕敝裘再入咸陽城丈夫義氣横雲海跼促寧為轅下態白璧凋磨美益光黄金百鍊精還在身若藩羊觸未安心同塞馬達能觀人情谿壑非云險世路風塵本自難魏尚朝聞起代門夕看持節擁朱軒解道聖明能使過須知感激為銜恩俠客行席上贈呉子臘月金陵有俠客雪中訪我長干陌雙樹初彫惠逺林六花正覆袁安宅杯酒相逢總夙縁江山轉盼空陳跡聞君明發廣陵遊淮水孤帆重倚樓二十四橋何處是思心隨夢到揚州壯歌行君不見男兒生年二十好任俠落魄何曽問家業暫從喪舍給吹簫肯向侯門坐彈鋏相逢寒士解金裝悲歌同醉酒壚傍上蔡總為牽犬地平津俱是鬭鷄場一朝折節誦詩書三冬已足五車餘落筆言詞妙天下㧞劒義氣薄雲衢歳中超致大夫位才髙奈取公卿忌報主寧須顧一身使我但不登三事世情翻覆有波瀾﨑嶇蜀道未云難讒言興處憎蠅口峻法持來笑豸冠誤染凝脂身遂枉徒抱憂心誰為諒摺溺猶可干秦君髠鉗却是中郎將自古成功四序遷詎知倚伏有時旋仲文枯樹非全死長孺寒灰亦復燃可憐禍福逓相因堪嗟貧賤不相親安用先銜灞陵尉祇應長謝翟門人酬孫子貽古鏡歌美人貽我古明鏡月可擬形氷擬瑩拜受何如懷璧歸相盼豈異投珠贈面拭銀華若發型背錯雕文恍難認蟲蟠蚓結秀色斑博物云自開元間繩窮緘啓四座朗整冠省帶愁人顔少年被服多冶艶盛飾入朝觀者羡蛾眉詎知衆女嫉纎腰翻承後宫譴世途黮黯不堪陳魑魅縱横晝向人却詆林宗虛秉鑒争言柱下只同塵從此年華顦顇盡經月忘沐耻榮進映玉都非裴楷容素毛漸改潘仁鬢君不見徐卿持節邁湘潯李生一鏡價千金嘉惠慷慨情猶古短歌流傳稱至今媿我㣲才響誰嗣荷君末光良自欽世交紛紛總如面何以報之惟此心觀拜月舞詞金尊酒半銀燭低玉容娉婷始勝笄樂府翻成拜新月當筵試為舞前溪麗從洛浦逢應駭嫣使陽城笑定迷纎腰乍動衣聊整巫女行雲暗窺影垂手却立身稍斜西子臨江照浣紗香袖輕迴若飛雪石樓欲墜蘭芳折紫毺滿地塵詎揚華簪四座纓俱絶同時女伴争學舞綽約妍姿誰獨數束素曽令餓楚宫裙皺偏能驕漢主蓮花旋處婉龍游目馳鳬藻夜淹留若教嫁作盧家婦快意今生莫解愁虎丘贈别朱督學之閩米君衡先兄同年五鹿談經謂絶羣一朝折角有朱雲紲組儀曹咨典禮承符閩越佇敷文路出汀漳百川㑹水從星漢九溪分遥辭燕闕過江來暫駐吳門訪鹿臺祇樹秋紆使君節慈燈夜引故人杯昔君召對承明殿平原曽亦參嘉薦班荆舊事那可論宿草交情今始見人生塵跡本無常一嬰世網更堪傷試問前因并後果何言雌伏與雄翔君不見生公説法超𤣥晤石壁猶聞鬼神䕶况是章縫洙泗徒坐使絃歌遍儒素又不見吳國干將十户珍靈池千載淬猶新為向洪爐探劍術何似菁莪廣鑄人貴竹道中贈别汪光禄尚寧憶昔走馬長安道與君看花並年少别來歳月那可留老至風波已難料君銜新詔謁明光余始驅車入瘴鄉曽記碧鷄揮手處願為黄鵠共髙翔黙遊園歌贈李侍御漢武雄圖歌㡳定西京得人號全盛蕭朱結綬羡同升王貢彈冠許相慶建安才子數應徐陳阮同時託後車清秋飛蓋追隨夜良燕哀筝潤耳餘我明中興逢聖主海内賢豪盡羅取尚書門下期不來宰相閣東延始聚共知舊事已更新誰謂今人莫如古李君文藻玉堂才晩乗驄馬入蘭臺忽看西狩從遊日正值南閩奉使回止輦故鄉宸眷久召君立拜荆門守後宫慣是妬蛾眉滿朝况易傾蠅口拂衣一朝辭楚關思君萬里望蒼山可憐素髪俱凋盡且喜清揚得再攀柱下園居守淵黙邀我開尊坐泉石屈指交遊半不存灰心勳業都堪釋媿我蓬飄空歳年㣲官瓠落尚風烟因君欲謁多羅偈出却人間煩惱縁雙劒歌題贈應二中丞弟也相者云再獲寶劒則貴矣果連得之建安才子稱二應干將鏌耶雙發硎一朝操割登天府萬里揮鋒靖炎土季也韜精意氣雄自同飛景處囊中每夜拂霓看北斗有時彈鋏向秋風憶昨工書謁金馬裘敝歸來客東野道逢異士笑且驚知君豈是悠悠者古來神物遇亦鮮龍光再合猶堪羡函谷終符唐舉言豐城却訝張華辨即今邊徼有妖氛好提三尺立奇勳贈語王郎須感激功成為報吕生聞皇甫司勳集巻十三
