body:
  text: 皇甫司勳集巻四十四明皇甫汸撰序贈送送盧法曹楩考績序少谷盧子木伯守南刑曹三年矣報政於太宰太宰考上上御史臺覆如太宰考行將獻於天子之廷按彞典推鞫得情處㫁平允為法官之最盧子何以能善其職哉夫刑匪推鞫之艱而其弊有二焉若夫豪右作慝雄張京邑踰軌奸憲怙勢以逞請寄漏脱主者誰何法斯撓矣専事苛轢巧文附㑹窮抵横入不能貸恩於無知原情於株染刑斯濫矣盧子明威所繩靡不摧勒寛恤所濟咸獲矜理發摘以宣雖巨猾必致簡孚為治則赤子更生不濫不撓推刑之中盧子其庻幾乎然藴藉有素施行不匱固非倔起於刀筆偶合於科條也方盧子解褐鴻漸即上書鳯鳴慨憤王章指斥時宰一時風動朝端想聞海内既而出知劇邑將謂盧子不習為吏急絃棼絲寖以壯敗至則純務以徳蒸蒸保艾流其頌聲推盧子之致為葢質兼文武道協幾宜荼網施於茹柔金矢得於噬腊二弊之去不有本哉使盧子操議辟之權履懲違之任必能信三尺之法殫畫象之化矣輶車陳於周道帳飲列於都門凡少同里閈長厠官寮者響然來臻邈爾言别僉曰深哉子之知盧子乎請書諸篇以贈其行送繕部葉君擢守思州序葉子以繕部大夫出守思州居怏怏自謂左遷殊不欲往或曰兹域本西南夷徼古昔叛服難常羇縻不絶者也至我明興耀徳於逺始嚮化内屬編氓置吏郡縣其地冠裳其民然蠻獠雜處號稱難理急張為輯束濕待馴非大夫所宜矧大夫方上書謝病反服遐引顧䟦涉於山川倥偬於簿牒秪自苦耳請無行也余曰不然葢聞志不避逺事不辭難臣之職也是故奉黠羌之役而晞功聞朝歌之命而砥節彼何人哉嘗誦覽循吏傳如河南守吳公蜀守文翁之屬皆謹身率先居以亷平不至於嚴而民從化至江都相董仲舒内史公孫𢎞兒寛類皆儒者通於世務明習文法以儒術縁飾吏事大夫鼓篋海校弟子彬彬興於禮讓鳴絃邵武吏治蒸蒸臻於保艾即其已試之蹟優為之騐非所謂儒術亷平者耶何有於思州哉苟謂鬼方殊俗神理異用椎結狡筭乏烹鮮之資蒲鞭孚惠匪格苖之器斯徼外絶永思之碑敵中無甘棠之樹矣仕貴行道不貴擇官政在因民不在易地稽爾先公剛正不撓威愛兼著倅揚牧滇所在以治理聞大夫能遹紹先志光昭令猷父子以明經起家致位良乎典據印紱使殫化兹土流聲奕世雖西京之頌兩蕭東兖之歌二鄭何以加諸大夫迺怳然心動霍然病已星言夙駕而旌指䍧牱矣送陳子年法曹擢守荆州序秦時置郡建國之意微矣漢世更守利民之任𢎞焉故剖竹頒符必簡在庭之彦臨軒命葢恒咨列宿之英使才謝撥煩術乖飾治殆不輕授也矧荆州者星分翼軫山表岷巫銅梁石户為之關雲夢熊湘為之澤釋曰荆警也有道後服無道先强常警備之也苞曰荆强也陽盛物堅其氣急悍也由是言之地有必爭之險匪烹鮮之所能綏民無馴習之素豈示韋之所能格兼以羽毛齒革之貢不乏王匭栝栢箘簬之利悉殫楚材土寔塗泥居隣魚鼈所以輸水衡供匠作者緩之病國急之疲民思奏罷嵗獻坐致年豐其道何由哉南省秋官大夫陳君子年温儀玉潤姱行蘭芬始以宏詞發科俄因淑問為吏疑獄片言而决宿訟兩讓而歸方山公藻鑒之辰正王濬夢刀之日爰就華司拜為荆牧雙旌揚於冶渚单車指乎郢門過李息以興嗟訪任棠而博喻今夫增積而累成者非章華之臺乎異委而朝宗者非江漢之流乎興雨而霈澤者非息壤之靈乎宣暢而殊託者非土囊之風乎考基廣之由溯歸墟之跡審屯膏之吝騐吹萬之神嗣芳躅於度侯晞惠聲於羊叔治可同道政思過半矣備預不虞上無弛綱憍悍難馭下無佚轡敦愷悌之化樹循良之績在此行也使或蜀郡來暮嬰以桑梓之情楚國顯游感於藜藿之事則小雅無北山之役閒居多拙者之政矣竊為大夫不取也往哉朂哉朂哉往哉送刑曹周大夫臣守臨洮序夫雍州之域古昔建都之地周以龍興秦以虎視漢基肇於三成唐業由之全盛既稱天府亦曰神臯故開道列郡隆本强榦天下莫先焉迨入我明創置雄藩以控邊陲逖矣西土稍背京輦其阨塞防禦固在也殊俗累譯非减於曩時也柔服有方則回面請吏同於内臣制馭失策則負力慿凌易於鷙黠邊郡化理得人惟艱此文帝所以𢎞貸於雲中世祖所以申情於河内者也邇者敵數為患犯我疆埸羽檄夜馳烽火晝焰雖旬格無虞而嵗亦憊矣於是天子覃念謀臣獻畫博采揚廷之薦旁求在野之遺凡撫率之臣司守之吏必簡之利器寄以長城南刑曹大夫周君爰有臨洮之命焉君繕性冲和兼資文武刺州茂循良之績持法炳明允之聲通達國體閑習邊務雖足跡未陟於西傾而志馳伊吾之北即其素所藴畜於治理何有哉且兹郡也自彼氐𦍑厥居隴右表以崆峒之岨帶以恒渭之流緜以𤓰凉之衍跨以枹榆之固延瞰地脈則痛䝉氏之勳極眺臯蘭則思嫖姚之戰考跡屯田則知充國之畧展祠新野則永鄧生之慕明信要結則亮霍諝之衷矧兹氓也咸雍熙之産非復勁悍之俗保艾功半治效倍臻使白鳥之祥歌於塞上甘棠之愛植於邊廷在此行也是故剖竹之任非劣於受脤勒銘之勳不華於高葢矣他日臨洮報政晉諸臺閫優之節鉞耀之珪組藉天子之寵靈漸逺人以聲教熟曉山川周知兵食運籌屢中宣機如響玉門扄弛琛賂軨積當宁寖北顧之憂銓司受上賞之鑒大夫其朂之哉祖讌既陳羣公斯集酌以㫖酒投之贈言送參知周君子籲入賀序嘉靖三十有五載秋八月十日維天誕聖之辰内凡列職之司外暨奉朔之國叩明庭而獻萬壽者以億計時參知大夫周君寔祗役焉滇南去京師道里特逺改嵗發春捧函夙駕揚旌指途賔僚張組以稱榮大夫登車而色喜夫士由起家而立乎本朝孰不欲際風雲之嘉㑹依日月之末光哉至攝官承乏展宷錯事中外靡得而均焉稽古漢唐嘗簡廷臣出補郡國守相領州刺史逮内員缺選諸所表以次用之有嵗中超遷至公卿者今制稍稍懸隔而重輕係之矣是故子牟懐魏闕之思長孺有禁闥之戀張敞謂在外無奇或藉子公之力再入國門始無憾焉抑其勢也季札來聘觀樂詩而歎美史公留滯不與從事而寄慨又其情也今夫朝于京師大較有三慶賀入覲考績而已兹行也天子坐明堂開閶闔受𤣥貺介休祉金石在縣玉帛輸賮葆羽旄頭文衣繡尾備物以昭之百官視燎而入句臚而升斯時也素商應節凉飈滌氣乃與徳讓之賔重譯之使攀龍飛而利見聫虎拜以悦穆子孫緜慶川嶽貢符中外禔福此亦禮文之偉觀而冠裳之茂典也珊瑚瑶璫之琛陳於内庭肉角犀象之獸馴於外囿咸自滇徃也天子有懌非子大夫奉職惟寅宣威遐裔曷克臻此哉於是延訪政治之得失周知民間之疾苦臨軒咨岳宸眷篤焉侍臣僉曰兹非疇昔掌虞衡平水土者乎奉金馬之使擅子淵之藻者乎非敷教於蜀振文翁之化詰兵于薊上籌邊之畧者乎邇者底綏滇夷銘赤崖之石澄蒼洱之波者又非其人乎多所踐更屢著勞績秉銓者將議陟崇階大夫乃載拜隕越承嘉式讌于是乎采閟宫之詩効華封之祝而繼之以諷颺言曰夜郎脩阻疲於驛篚工乏良巧困於鼓鑄戎菽易腐無資於積貯卉服流徙不恒於土着異物難得非所以安逺夷情忽慌策在於善馭願少加聖心焉天子萬年南徼永賴亶其休哉若夫烽火通於長洲之苑麋鹿瞰於姑蘇之臺豈不懐歸畏此簡書大夫之謂也余與大夫兩世同舉於鄉者再録於春官者一相知最深諸君乃曰可以贈周大夫行者其皇甫子之言乎遂書無讓送憲使范君侍養東歸序觀察使范君之箴肇拜兹命也以滇徼特逺不遑將母意不欲行檄禁切峻太夫人趣之迺强就道按滇亡何倭奴益横海上傳警吳越之間華屋銷於烈焰原田鞠為茂草冶容沉於汨羅嬰兒釁於鋒鍔農夫釋耒紅女休織暴骨之野想魂而祭遷徙之族十室而九此亦孽醜之巨祲而含靈之劇痛也於是三楚之堅甲百粤之精卒山東之亡命淮泗之輕剽聞調飈發應募雲集棲於㑹稽者一旦成市而我師屢䘐坐受罷困矣東南縉紳大夫游宦一方者相顧憂愕太夫人塊然在圍城中使君鞅鞅歎息曰向者䝉犯瘴霧逡巡䍧牱之途思迴征馭於峻阪奉板輿以閒居恨不早決今方寸亂矣負愧徐生迺上書陳情其畧曰臣自束髮幸際聖明賜之進士服官行人祗役遘閔慈父見背母氏獨存迨執㦸東曹剖符兩郡二十餘載未嘗違親而仕臣母口霑祿養身披翟紱恩寵踰分正委身報徳之秋也但年迫西夕不勝扶侍仲季既壯家貧出贅並乆離膝有妻在幃共視常膳安能責以排難禦侮哉身嬰衰疾耳怵金鼓倘先朝露抱恨終天乞將臣放歸獲奉餘息不勝銜結頓首頓首主臣主臣謹緘題驛聞未及進御而使君飄然行矣僚友曰未有報命恐傷大義且外臣例無予告奈何投劾自免乎使君曰此固余之心也或曰太夫人雖在耄耋起居無恙聖天子萬壽之期君應入賀願少須臾以俟便道歸省不兩得乎使君笑曰吾聞明王不奪倚廬之情孝子不避矯車之罪矧我履孝治之朝遇仁覆之主乎若執贄脩慶而駕言展親不可為孝先私家之急而後公朝之典不可為忠失忠與孝不可為臣子進退狼狽恥不為也范君可謂明於制義而勇於亮節者矣君少挺頴淑妙簡異才方軌終賈雅屬文藻兼長飾吏甫壯専城盛著聲稱内教檢迪良多也君亦揣知其才足以適用不終濩落為此舉者殆畜晩績於熙漢伸短景於報劉耳夫士方晞翼雲衢策足津路若蕭朱結綬王貢彈冠以赴功名之㑹亦曩昔汲引㧞茹之騐也至於季鷹起蓴鱸之思而顧榮為之執手增慨虞丘興風木之戚而孔門弟子明發辭歸人情不大相逺此非異致而同感者哉羣公置酒昆明之池折栁金馬之亭賦陟岵咏循陔相與咨嗟别去皇甫子曰賢哉母夫人乎有子益彰之矣皇甫司勳集巻四十四
