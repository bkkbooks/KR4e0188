body:
  text: 皇甫司勳集巻三十三明皇甫汸撰七言絶句奉和子約夏日郊居五首炎日遥從瘴嶺還新開幽徑竹林間南中六月渾無暑猶記衙齋對雪山用世無能恰似樗坐驚啼鳥落花餘邊生僻性惟耽臥縱使臨池亦懶書坐倚桐隂岸角巾誰堪裹服起迎賔杜門却笑曹顔逺何事因踈恨故人三畝芳園帶草堂一行作吏乆荒涼烏衣樂事多清夜莫向春池夢别長夢鹿初醒日上遲戲禽偏愛午隂時隠侯新製郊居賦不遇王筠未解知新秋月讌三絶句端居自愛小庭閒皓月流光照酒間試向南枝看宿鳥莫將離思遶闗山常年月向客中明今夕人歸倍有情底恨烽塵吹海戍笙歌銷却館娃聲謝家華蕚聚應難月滿西園似舊看昏夜尚思遊秉燭誰教見月不為歡十八夜兒楙治酒邀諸父待月始隂仍霽清夜歡逰忽作隂少時斜月復開林倩教絲竹陶餘興莫惜兒曹解此心送朱揮使提兵備禦牙旗遥指海東雲夜半潮隨刁斗聞充國來邊多勝算不教幕下乆從軍夜過張子不值偶隨明月過君家幽徑無人自落花書帙亂抛青玉案尚餘螢火掛忩紗次子約答賔閉戸無營懶自宜逃名漸覺少人知相逢陌上休相問二陸今非入洛時柬子約二首古來齊物賤彭殤余浪長悲十二郎不奈春風如解恨夜深飛雨助凄凉東吾達命愛都捐最是憂心易損年頭白逢春能幾許且收雙淚向花前題扇歩從洛水凌波夜偶向巫山行雨時趙氏入宮爭見􅀈喬家傾國兩相宜題梅贈僧說法臺前凝素暉香霑貝葉冷侵衣老僧面壁渾無語落盡梅花當雪花長兄齋中嘗畜白鸚鵡一隻亡後歸之於人哀賦二首客到花間問主人隔簾先聽語聲頻今來却作烏衣燕飛向東家别哢春塵生忩畔緑隂稀不見籠中舞雪衣何似義烏能戀主寒枝棲盡尚來飛閏七夕病中作花燭人間卜夜難香車天上結重歡嗟余抱病移單枕非愛雙星欲臥看題扇吳苑總為嘉麗地春風况是艷陽時鶯花十里橫塘路載酒移舟到處宜黑將軍被放漢將功成謗易生藍田歸去不勝情青天一片淮南月猶照當時細桞營送朱生戍滇行盡黔中萬疊山昆明特秀五華間漫過銅柱思鄉泣㑹見金雞放赦還題燕緑裊輕絲巷栁斜朱顔依舊映桃花雙雙慣向春風舞愛得宫腰似趙家題蘭二首月映湘潭弄蕋初清香先自襲衣裾紛紛桃李爭妍夜一種幽情總不如小玉盈盈不事粧青樓夜夜舞霓裳欲君記取同心語解佩臨風贈早芳北山羡君棲隱出人羣獨向山齋臥白雲自是松杉堪寄傲不須猿鶴為移文次韻送張允清遊武當二首歸臥東山聊引年始知傲吏已成仙乘槎若遇浮丘子定好相攜躡紫烟看君已過古稀年猶欲名山訪列仙可是向平婚嫁畢不愁岐路有風煙課小侍習舞二首小髻盤鴉二七年新教垂手舞當筵夜來何事羅裙皺祇恐凌雲化作仙初着霓裳怯尚羞纎腰婀娜不勝柔鶯花容易催春老莫道盧家忘却愁元夕燈下觀舞二首華燈攜自日南來火樹蘭枝夜夜開氤氲翠䄂燈前舉一片輕雲落楚臺萬斛璣絲巧織成銀花㸃㸃弄春情玉容翻向光中立何似仙姝隔水晶戲柬子約燈市才收春漸饒柳情梅態不勝嬌相攜早辦東山屐何用持經坐寂寥題沈周八景圖瑶臺高起闔城西下瞰胥濤烟草萋歌舞盡隨麋鹿㪚月明惟有夜烏啼右姑蘇臺靈巖深鎻舊離宫香井琴臺輦路通池上花饒西子醉屧聲時嚮畫廊東右靈巖山萬笏山頭一逕分半通祠宇半連墳可憐僧舍成灰刼落盡泉聲見白雲右天平山太湖風浪晝冥冥烟樹微茫接洞庭船到中秋徐蕩槳湖中漾出兩山青右太湖一開茂苑古城隅百里鶯花入畫圖為問海陵何處是寒鴉飛盡但平蕪右長洲花吳王宮遶百花洲十里香隨脂水流芳杜盡凋惟鳥雀飛來飛去候龍舟右百花洲章郎種樹似劉郎片片開成錦水鄉一自尋源迷去所不知春色在河陽右桃花塢橋横古渡帶平沙楓落寒山日影斜舟女莫言估客樂鐘聲將夢到天涯右楓橋為僧題畫誰道空門無世縁畫圖猶自向人傳詩成何限清秋興恰似休公怨别年贈董少姬年才二七美朱顔家住青樓大道間曾記少時行樂處不堪清夢到巫山再贈董少姬玉貌蘭心笑口嫣未盈三五小嬋娟雙成只合仙遊去故向人間畱可憐過董氏不到青樓三紀年章臺栁色半銷烟今來非是江州夜對却琵琶亦黯然朱將軍第夏讌二首海上軍書乆不通閒抛鎻甲掛凋弓誰知河朔追凉處却在營門細栁中筵開西第午風輕玉映氷山四座清暑氣翻成秋氣肅蓮歌按出凱歌聲題花圖贈王郡守徐少府二首洛陽盡說花如錦蜀郡曾聞錦作潭一自分符來出守年年春色在江南茂苑晴洲遶鹿臺芳菲應待錦帆來不須更置催花使一奉仁風萬樹開二月二日子約席上翫雪同詠二首今年逢閏訝春遲積霰凝暉似臘時楊栁何因飛早絮梅花渾已拂殘枝飛花綴户總瑶芳東素纎腰映舞行最是多情何水部故教羅綺喚春光春寒歌二首揺落寜知三月時未逢禁火亦寒炊梅翻六出花成雪栁濕千條雨作絲剪就春羅未試衣花間無計覓芳菲鳯樓絶似龍沙夜征戍何須更憶歸雨過秦姪賞玉蘭愛汝庭蘭萬玉開年年一度看花來莫愁風雨消輕粉暗送幽香入酒杯題畫寄栗二宣甫少年折取杏花枝曾共元方走馬時回首長安春色裏因君一為寄相思閏午今年閏月兩端陽共對橊花再舉觴百嵗幾迴能遇此不妨頻繫五絲長勸舞詞石家選舞按新聲不惜黃金教始成莫恠楚宫多瘦損纖腰能得幾時輕捲燈詞火市燈街乆寂寥幾家銀燭慶元宵纔過三五収華焰可信韶光疾似颷子浚庭中玉蘭盛開感賦香銷玉樹更生春不見當年種玉人莫道有情非草木半垂未展似傷神何内翰招讌獲聞聲伎之盛作三絶句房中樂自舊京傳促柱輕調慢拂絃曲罷周郎􅄼得顧但聞餘響繞燈前紅粧喚出夜畱歡翠䄂因霑細雨寒為謝喬家無惡客不妨歌舞教人看二月鶯花樂事新更憐羅綺坐生春當杯入手休辭飲祗恐夫君怒美人雨餘早起蘭花乍開幽亭可玩遂以一枝貽弟子約枉詩見投兼報此作灌園為憶閉闗人靜裏無營動亦真折取蘭枝當華萼佩時須悟贈時因吳文部園中觀鞦韆四絶句綵架朱絲盪碧空翩翩雙蝶逐花叢祗知神女能行雨不道仙姬㑹御風乍起花間漸出墻只愁人逺但聞香嬌容願倩風為力故製湘裙特許長𦂳約雲鬟恐髻偏雙鈎玉笋蹴金蓮平明芳徑休輕掃畱取人來覓翠鈿女伴年齊二六餘爭先跽巧氣凌虛箇中飛燕身能慣百遍看來總不如贈别董少姬花月長承座上歡闗山忽作曲中彈楚雲一㪚陽臺冷始悟佳人再得難虎丘餞别解道禪機色是空猶將别怨惱休公當筵一掬傷心淚灑向天花併作紅虎丘感别分岐昔上說經臺愁鎻寒雲鬱未開祗樹翻同湘漢竹淚痕畱處不堪來送子仁弟遊茅山二首天外三峰翳白雲人間何處訪茅君容江二月多春水落盡桃花路始分洞口松杉蔽隱居玉宸宫闕接清虛相逢道士應須問茂政年來好寄書宫詞禁城柳色藹春暉江上龍舟去若飛典笥預開金鎻待君王初進五時衣花朝歎二月春深煖未迴花時猶未見花開宸遊唐后渾嫌晩恠得傳教内使催玉疊梅子約園中新值玲瓏萬玉琢成花獨掩羣芳色倍華可是天邊瓊樹種乍移江左水郎家戲簡吳純叔長夏園林寂更深思君何事减春心月明閒却秋千影懊恨墻頭但緑隂題新紅春色纔堪擁座中小喬曾亦恨春風臨粧若使羅郎見定折桃花賦比紅重贈董少姬二首玉人重喜醉花前璧月流光夜可憐何事花飛人别去却因圓缺悟塵縁舊日啼紅尚清衣可禁沾袂淚重揮江流亦恐愁難浣願逐寒潮一度歸山中觀梅二首四山祗樹總成梅十里幽香䕶法臺試向鄧林投杖去何如給苑看花來乘興觀梅蕭寺間揚州何用逺遊還老僧花下聊趺坐面壁渾疑對雪山花下贈妓折取梅花贈麗人壽陽更覺晩粧新分明羣玉山頭見人面花枝一様春寄贈趙姬二首爭言飛燕是前身曾記昭陽第一人祗恨塵縁猶未盡却隨紅粉度芳春少小名推作狀頭舞腰掌上不禁柔年來通藉金閨者未必才華勝女流除夕雪二首嵗暮江城春已過寒雲猶作六花多長安憶得朝元騎幸借餘光送玉珂漏聲隨霰聽來稀漸覺青陽歛素暉何事東風渾未起柳花無頼訝先飛題竹贈妓分明弄影碧參差學得江南舊製詞敲㫁玉釵聲似恨粉痕畱取未乾時送王公子之白下二首爾抱青箱寓舊京五陵結客總肥輕鄉心却逐秦淮水猶自東流向闔城相門有子降王門詎訝當年齊偶尊憶得鳯凰臺上月渭陽深處照黃昏公子有姊歸于中山因流寓云豫章詞四首送范于中之江藩滿堂絲竹且停聲試聽闗山送客情王勃舊傳滕閣賦陸機新擬豫章行秋半湖隄柳未踈鶯花稍减别來初朱輪擁處頻教駐㑹有門人託後車當時盛事數徐陳千載餘風尚未湮君到洪都須下榻好於清夜遲幽人衙齋吏㪚晝長闗坐對薇花見鳥還雨後捲簾來爽氣幾多詩思在西山題桃源圖試問桃花幾度新武陵深處舊迷津也知聖世非秦日移向東都别作春題陸氏資隠田巻賣卜城南今幾年囊中猶自少餘餞何如宋玉惟題賦乞得君王雲夣田題張仲梅花時居母喪萬玉參差㸃作花渾疑雲色映衣麻思君莫道詩全廢聊倚東風詠白華二鸚鵡詩長兄得白鸚鵡一枚鴞身鴿尾有冠如纓而色黃志曰鸚䳇也客自南海歸者持紅鸚鵡一枚體差小而趐緑翠羽並奇産焉昔宋顔延之賦白謝莊賦赤恨未能兼也余欲操筆侈辭方抱禰生之誡然終不能嘿嘿也為占二絶付司鳥者歌之云爾慧性能言氷雪姿玉階曾亦侍光儀年來翠䄂爭承寵詎是霓裳進舞時身向炎方萬里歸衆賓誰不訝朱衣漢庭白首為郎者猶未銜恩得借緋還扇詞惋矣汪生悽哉吳媛締蘭心於偕老奄蕙質之先零密友興哀悼亡成賦慷慨命管託團扇之幽情出入懷䄂攄巻衣之餘慼暫捐班篋幸獲楚弓嗟乎玉洞埋骨非去珠之可還香謝返魂豈遺簮之故在物則偶爾人其奈何憶昔春華溘露時曾將麗曲寫憂思蛾眉不及齊紈素一㪚人間無見期皇甫司勳集巻三十三
