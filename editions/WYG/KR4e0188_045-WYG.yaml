body:
  text: 皇甫司勳集巻四十五明皇甫汸撰序贈送贈郡守温公景葵擢憲山東序自秦剖國為郡罷侯置守而郡之務最繁守之職始重矣畫野履封囿民出政聘享賓際禬脤之具於是乎備慶賞予奪刑誅之權咸得自操居則九筵之堂施黄以表觀出則設熊建隼朱其兩幡以辯威符則握虎佩則左魚秩則二千石以示寵異焉漢每親見質問而後拜唐必臨軒册授錫衣物乃遣苟非其人豈所以惇吏民之本哉我明稽古凡擢守必簡在庭之俊通習吏事及佐郡嘗有成効者諸省皆然而畿内尤慎葢股肱之地上無藩臬之統其責益専兩畿之間吾蘇尤慎葢財賦充衍征求日溢訟獄叢興株染莫竟簿書殷積吏縁為奸艎艘闐噎疲於郊勞號稱難理銓曹乆圖其人雲中温公以御史持法有聲因就闕下拜為真定守尋改蒞蘇時倭夷内㓂烽火累年閶闔之市玉石為燼海陵之倉粟匱不支姑蘇之臺麋鹿來遊長洲之苑荆棘延蔓瘡痍凋瘵艱倍疇昔公甫下車布寛大之政誓精一之約蠲法外之徭省弗經之費汰冗食之夫與民休息民若更生焉㓂亦憺怗威徳不復敢犯吾境農業稍安革心嚮化流其頌聲越嵗再朞適考長吏公以治行卓異擢山東按察副使備兵霸上吳之人恨得公之晩而胡奪公之速也勑命有嚴軺車將戒屬邑安令請余言為贈余之知公此特其大較也令語余曰夫郡以領縣縣以隸郡雖總攝専司之不同然政理則有相通者小子之治吳始則惴惴焉紛若治絲觀法於公則裕若游刅繼則倀倀焉難於噬腊承式於公則易若烹鮮葢宣示教令皆邑之龜鑑也誨迪掩覆皆令之帡幪也公不欲一邑之敝貽全郡之愆用意亦厚矣兹行吾屬失其所庇殆有甚於吏民之思者焉余聞而竊歎曰三山公世所謂盛徳長者非其人乎率其屬相與為君子不獨自成其良守而已昔陳寵申考城之材王彬亮武康之節何以加諸兹秉憲外臺不過推其風紀之餘公代産也兵家之務又其諳曉建長策勒鴻勲反覆掌耳余媿不文聊述令之感以泄民之私云爾又贈温侯序代郡三山温公之蒞蘇也嵗三更始適四方長吏入覲之期蘇以防海奏止太宰按牒綜覈功最治行罔有良於蘇者乃以山東按察副使䟽公名上請報下曰可公遷秩遂行吳邑學官姜君性夏君汝壽率其弟子員謁予言以贈乃曰性聞筦子曰倉廪實而後知禮節衣食足而後知榮辱吳雖文獻之邦富饒之區豪傑俊偉之士徃往自振而起無待而興兹軍旅之後烽火之餘功或荒於蕩析志將弛於淪胥司鐸者乃執區區規條期㑹之常佔畢訊言之末望其率履而嚮化亦難矣我三山公之下車也㓂不窺境而咸安其居農不釋耒而咸復其業催科不擾而咸勤其事徭役不濫而咸端其趨生養既遂禮節可循咸知就榮以去辱由是士䝉徳教之休而師享功倍之逸然又戒紛華之習勵亷静之風黜浮豔之辭惇孝悌之行而吳彬彬多醇雅之士矣且引接師儒寛和有容小有過差未嘗加詆而下皆樂共其職焉嗟乎公誠所謂良守矣余嘗延覽先漢之隆文翁與龔遂召信臣俱列於循吏而脩起學宫舉察博士獨稱蜀郡黄覇與張敞趙廣漢同以治郡有聲而力行教化興於孝悌獨稱潁川今之移易東土嫓美西京奚讓於二君哉夫嚴威峻法可以讋吏而非所以崇儒小惠曲恩可以要民而不足以得士由江夏二子之言考驗諸生之意是豈私情所感哉矧鄉校議政之所其政孚斯其言公也公行矣山東乃齊魯之墟絃歌之地覇又密邇京輦漸被聖化尤深將坐鎮而敦詩書談笑以臨樽爼天子思封疆之臣授斧鉞之寄不乆召公矣奉贈王守擢憲開府常鎮序昔賢每戀禁闥因薄淮陽之行稍厭承明竟就㑹稽之位若謂吏職徒勞在外無竒斯過矣陽曲王公甫弱冠即㧞起諸生間擢進士上第冝展宷郎署侍從帝廷特以通姻茂藩例不得留京輦備宿衛一麾守鄧民社是司再命佐畿股肱攸寄由是剖符隴右而政尚循良移檄吳中而才堪理劇方是時公年同散騎腰佩左魚人皆榮之然所在治行號稱長者不獨精敏英㫁而已吾蘇當兵火之餘凋敝不支至則誡絲以棼御轡以佚一切平易與民休息民若更生焉三載滿秩四方入覲之期公以水潦荐飢留不果行太宰考長吏最按部牒覈臺章無踰蘇者遂拜為觀察副使列職楚臬備禦京口自夫乆任之法不可行司銓者徃徃由近叙遷使疆壤相接其習俗易知風聲所感化理亦易孚也公未及行而晉陵潤州之民已辴然相慶曰曩聞興起學宫誘奬儒流甄雅藻藝優於作人者其公乎今將親迪其教矣曩聞循省阡陌勸課農桑平徭薄税使民充給者其公乎今將親被其澤矣又聞之减餽貽杜請謁捐出納之羡絶奇巧之玩其公乎今將敦我醇樸矣又嘗聞之發姦摘伏挫趫摧黠翦除兇剽民賴寧戢非公乎今將回靣嚮化而屏跡矣彼二郡者財賦嵗計不當乎海陵之一舟車填集不敵乎閶闔之半諍詞獄案不叢於荆棘之庭市儈交貿不侈於筒綺之肆褰帷而蒞負弩以驅勑憲貞度有餘刅焉向身為良二千石兹以六條察吏所屬二千石而下取公所嘗試之法而恪遵之不盡為良吏乎葢守親而使尊徳刑慘舒之謂矣蘇之民號泣遮道公車不得前余乃揖父老而喻之曰汝葢慕公興水利乎丹陽荆溪之間皆上游也行將修復渠堰灑洩以時溉浸所及猶足桑麻汝也又徳公能賑貸乎永豐新安之區多沃腴之田其鉅室素善積貯行將發藏通糶猶足粒食汝也抑又念公能弭盗以保又乎江洋之濵㓂宄所由出沒也耀兵振武憺讋威信無敢東窺者鎖鑰既嚴枹鼓輟響猶足扞蔽汝也公身雖去此而徳則尚存舊澤未斬而新惠可蔇奚必淹黄覇於累年借㓂恂以卒嵗汝等始快於心哉衆心稍解公車遄發余舉觴言曰金焦北固之勝爭雄於大石靈巖玉潭罨畫之源滙秀於蠡湖胥水公於政暇登高長嘯臨流遐緬能忘吾蘇乎詩云升彼虚矣以望楚矣又云有懐於衛靡日不思此之謂也贈憲使熊公桴擢雲南叅政序武昌熊公者夙挺楚材早耀荆璞起庚戌制科授太倉刺史甫及下車治行稱最雖王祥康沂龔遂襄渤不能過也亡何倭夷内奰變生倐忽勢漸猖獗民不知兵卒非服習乏不虞之備罕先事之圖所犯州邑有不望風而靡淪胥以亡者幾希公乃履矢石之危蹈波濤之險宣力効勞扞艱敵愾㓂始蕩平民稍休息厥功懋焉幕府奏記清廟聖天子按軍書覈臺剡晉貳蘇郡尋拜按察僉事飭兵東土亡何又拜副使在職如初自任公去後若取而代焉公之居東兵無折北海上有二天之謡矣官厯四遷嵗踰一紀前此銓司超授未有如公之速而民之霑惠亦未有如公之乆者也壬戌之秋晉參雲南藩政衆咸以逺致惜而公亦若弗豫然者余乃進而喻之曰自古建官分職無内外無遐邇惟其人然重内而輕外耽邇而憚逺此則人之私情也明王哲后懸爵差祿以待臣下者豈徒循資守格滿真叙遷而已哉將兾其𢎞功廣業以裨化理惟才是簡匪良不登臣下遭遇盛時亦豈徒閲崇品據要津晞寵徼利而已哉將欲策勲樹績以垂休聲故忠不避逺義不辭難者也滇雖越在徼外罙阻荒裔而漸被聖化憺奉威徳財賦贍於巴蜀文教臻於齊魯今之滇非昔之滇矣王尊驅駕於邛坂虞詡沿牒於朝歌卒之南蠻歸附西羌震讋前史以為美談余滇之故吏也嘗䟦涉山箐䝉犯瘴露其土風習俗葢大較覩記之矣使控馭有方如馬之閑羈縻不絶如獸之馴鑒覆轍於元江軫厝薪於赤石凡僰㸑之種當削袵解辮回面革心包匭庭充賔毳軫積司藩者足以上報天子揚懐柔之化闡即叙之猷矣由是考蹟故道通博望之域殷薦碧鷄秩子淵之祀延眺銅柱緬伏波之勲周視營壘思武侯之烈昆明沉刼侈漢武之雄圖南詔遺墟憫唐末之不競雖萬里而邈不快心於扶揺之遊哉夫㑹有適逢事有不可知者方公初授太倉孰不以為近而易之而變生不測竟就功名之㑹迨移滇藩孰不以為逺而難之而望既素孚坐享鎮定之逸由是晉陟台司入侍禁闥輟北山獨賢之感展虞廷厯試之餘以佐聖天子垂拱之治相得益彰身名俱榮矣公乃辴然笑曰今日何幸獲聞滇事於吾子曠若指南乎遂杖節登車而之南中奉賀開府胡公宗憲加宫保進位左司馬序世聞宣聖之言於衛靈之對遂以爼豆軍旅岐為二塗縉紳之士不習韜鈐介胄之夫罕閑禮器為吉甫備文武之才孔明兼將相之任豈非通方適用者哉今績溪胡公足以當之公始以殿中侍御史奉命東巡既而受脤専征開府兩浙控馭三吳亡何島夷即序海若底寧東南之氓若更生焉而當宁亦且紓顧於我土矣屢奏膚功頻膺嘉錫庚申獻春聖天子覽羽書開麟閣課功酬爵采元老之咨俞太宰之請擢公為左司馬左中丞加太子太保其督撫並如故不獨分閫之寄益隆而台階之漸預兆矣葢司馬者夏官也厥職出統六師行九伐耀武宣力以揚威徳者也太保者宫官也厥職坐而論道經邦光弼寅亮以𢎞治化者也列六曹以參軍謀躋三公而賛幾務一旦建牙樹纛秉鉞持斧繡衣霜簡豸冠鶴飾黄金懸肘白玉横腰此亦位極人臣而功葢天下者矣詔䕃厥子澤及後人報功之典不既渥乎五載之間五遷其官時共榮之吳父老竊歎以為難而又訝以為速不知循資擬授考績拜真乃銓筦之常格至超次閲級出自簡在懋官懋賞以待非常之勳者不可以例論也自古豪傑之士藉其君之寵靈奮於功名之㑹得効其尺寸以取卿相之位在立談之間明主弓矢之藏鐘鼓之設貺自中心亦將一朝以饗下豈徼福而上豈濫恩者哉數公之勳若杭城克敵桐鄉解圍平湖受降舟山納欵并仙居乍浦定海龕山皂林口清風嶺諸㨗大戰六七小戰數十皆身先士卒故士卒咸殊死戰無不一當百者詳載於世寳録中何勇也夫䝉荆棘之危蹈濤波之險入不測之淵履萬死之地而公曾不以為勞質王酋之弟於帳下數徐黨之罪於席間稍或不逞白刅倳其胷矣而公曾不以為慮越距績溪近在數百里内曾不得一過其門夫人病且死曾不得一臨尸而哭㫁懐土之思割肌膚之愛視其身輕如鴻毛赴國家之急如水火何忠也此奚暇及爵服之翫為寵利謀哉璽書謂忠勇可嘉聖上知公葢深矣昔裴晉公亦起自監察厯節度為平章與公所遭正相似而江南之平無忝淮西他日天子坐明堂告清廟錫之茅土誓以山河豈在晉公下哉長洲令栁子東伯召父老諭之曰爾等忘昔倭夷之患耶當其犯疆圉攻城邑焚爾田廬奪爾金帛繫爾子弟䘐爾妻孥酷烈甚矣姑蘇之臺幾於填塹長洲之苑幾為茂草迨今民復其居士安其業耕不釋耒行不弛擔層軒飛陛不燼於炎灰樓船畫舫不絶於觴泛絃歌方響無輟於清夜海陵紅粟轉輸於天府筒綺雜賄充溢於㕓市閶闔之間土風嘉麗無减於疇昔孰非公所賜耶凡我下吏荷末光之燭獲免於罪愆又非公所庇耶然非聖天子英武獨㫁知人善任使公亦莫能竟成也爾百姓其毋忘胡公尚毋忘皇上哉栁子先令慈谿有小過曲貸之今移長洲又數奬拂之思頌休美以余與公兩世同年雅辱文藝之知請余為序葢差級於雲中奮翼於澠上是以徳公如此則凡幕下絶纓盗馬以圖報者可類推云送郡守劉公溱擢憲淮揚序我明稽古建官上昉唐虞下采秦漢内而部院府寺外而藩臬郡縣以至諸司庻職皆有定員若夫未備而設或以冗而裁則各度地因時靡可執而泥焉自敵窺京輦倭擾疆場凡衝圻孔道要害之處阨塞難制者僉謀既同設官分布重則撫臣次則憲使無慮數十員而通泰為最署籍於越開府維揚斯境也東運淮海西控長江密邇陪京接壤中都高帝肇基葢郟鄏之地而桑梓之墟也湯沐攸隸園陵在焉厥責尤重每難其人若豐城李君武進唐君一以英偉經略一以儒雅坐鎮後稍寧謐乃罷撫臣特置憲使權埒中丞矣今嵗丙寅之秋憲使員缺銓曹以吾蘇守劉公之良上請報可簡帝心從民望也夫兩京十三省列郡百五十餘而吾蘇為最葢吳之巨麗民殷物阜財賦甲於天下素稱繁劇自倭夷流毒水旱荐災老弱轉徙之民未盡歸農剽輕亡賴之徒横行於市風俗寖偷姦宄竊發株逮之獄蝟興詆訐之訟叢積脂荼愈酷黥墨日報束濕急張而去治益逺矣銓曹患之乃察治行素孚化理有效者斯為簡授若代郡温君㧞自真定陽曲王君㧞自鳯翔今劉君則自鳯陽來也下車之始専務徳教與民休息朞月之間政平訟理吳有潁蜀之風焉南陽仁恕雍丘禮讓昭先令美公世濟之是以聞代之日吳民罔不咨嗟慨歎恨奪我仁君失其慈母一胡亟也司勲氏曰汝等小人知慕君侯之良思欲借㓂者乃狥私恩而忘大義者也朝廷用賢為天下計豈一方得而専之由楚豐沛盡越㑹稽皆揚域也荆川有言浙福兩臺本非為盗而祗以禦夷鄖贛二閫無與于夷而専以弭盗通泰兼之狼福並峙海冦咽喉徐宿交㑹鹽徒窟穴公受韜鈐而司鎖鑰耀兵詰戎宣威徼寵式遏於上游鯨海盜息而島夷不敢犯其鋒聲聞雞犬風及馬牛潤州以南可高枕矣公雖在揚而保障三吳豈特河潤九里哉是謂在齊而燕重矣葢公以洛陽之才獻策發科一命而為大夫者稱六安兹維揚之選由吾蘇績也吾蘇之選由鳯陽績也鳯陽之選由六安始也足跡不離於股肱之地而功名顯於畿輔之間薦剡盈於公車他日晉閲上卿出入禁闥佐天子撫四夷綏萬邦將不由維揚之績舉而措之乎今觀吾蘇烽火戢矣雨暘時矣教化行而頌聲作矣吳山嘉勝暇日登遊間摛藻詠雀啄空庭香凝燕寢樂天應物風流更見余以雕伎謬垂華奬兹行鄉士大夫猥以贈言見屬余方䝉垢於鑠金公特掩瑕以存璧雖祁奚不伐無徳於色而谷永圖報豈解於心又曷敢辭祖帳既陳征軺遄邁夫滄波江上代酌水於一錢明月橋邊帳吹笳於千里鄉士大夫不忘維揚君侯亦豈能忘吾蘇哉贈郡侯蔡公國熙入覲序隆慶戊辰乃皇上改元紀厯之次實履元朝㑹之始也内而畿甸外而藩臬郡邑小大之吏咸以職入覲太宰綜核功叙辨論官材以上於天子賢不肖既判殿最有差而黜陟行焉是旦也衣冠玉帛之華旌旄鐘鼓之設臚傳鷄唱之儀解辮削袵之賔懽呼拜舞於文陛赤墀者濟濟蹌蹌昉古特盛亦臣子之所利見而幸遇者也時吾郡守蔡公業當行公廣平人也由户曹郎以賢稱簡命出守甫朞月多異政吳將移風而易俗焉鄉之大夫士於公行也思數而告於執政以達於聖聰惟恐美未克彰而善或上壅也颺言曰吳自言偃以文學列於孔氏之科發其精華之藴後世遂多摛繢掞藻之英公啓以性命道徳之談而士端其趨矣吳自揚州上錯海陵流衍賦號殷贍師旅之後田卒汙萊公為省耕勸課濬渠興利而農務其業矣吳民素機巧善雕鏤纂組為竒伎恠器公屏玩好捐無益之具而工反其樸矣吳閶闔通都雜賄韜積交貿射利公為稽市戒吏無私取而商操其贏矣吳自専諸擊刺多魁岸任俠六博使酒公嚴遊閒之禁而民變其習矣吳自光僚骨肉相戕後多䦧墻之獄公為閉閣謝過而民有兩棄其田者矣吳造樓船飛颿棹歌方響多山遊水嬉無間冬夏公嚴其禁而民志無蕩矣吳自館娃之餘尚有招揺倚市者公至歛跡矣吳好讕詞誣詆公察其奸而嚚訟不得售矣燕饗品物有制而革奢為儉矣危冠侈袂放逐之而服衷矣毁淫祠徹妄祀而左道息矣公豈徒為循吏即古愷悌君子寛大長者曷加焉夫朝㑹之典天子令陳詩考禮罔非觀民風俗也孰有出於吳郡者乎昔漢宣中興考覈吏治常曰庻民所以安其田里而無歎息愁恨之聲者政平訟理也與我共此者其惟良二千石乎皇上雖非起于側陋之比而在潛邸特乆知民疾苦同而求吏治之切均也當時為吏者如文翁修起學宫除孝弟力田從學官諸生明經飭行者與俱黄覇力行教化而後誅罰務在成就全安之罔非為民計也孰有良於蔡侯者乎課列郡之最公為第一守矣我明自孝武以來耳目之所覩記如天水胡公嘗飾以文治矣然未及彰善也吉水聶公嘗惇以禮教矣然未盡癉惡也西蜀王公嘗坐鎮雅俗矣然未遑飭政也公能兼之稽吳守之良公為第一人矣舊凡守令入覲先期數月飭徒馭戒資裝擾於閭肆民不堪命公单車遄發宿無舂糧清哉侯矣吳父老譁然歎曰使子大夫之言聞于執政達于聖聰天子乃曰有臣如此宜在公卿輔弼之列出入禁闥召對清燕恐奪侯之速而民失其望也天子增秩賜爵如漢法晉職參岳借㓂復留如永康徐公故事庻乆道化成政和俗美吳其躋於至徳之世人人負逹節之槩乎大夫士乃更起舉觴酌侯而祝之父老遮道稽首侯麾之乃得行司勳氏退而書其言為贈贈郡尉吳君維京召為南都比部郎序安吉吳君由禮曹謫倅太倉甫數月擢為蘇郡尉又數月召為南比部郎駸駸嚮用云司勳氏曰嘗讀太史公撰次世家始尚門閥而侈世及吳自泰伯肇基延陵亮節代多顯者比部父叔聫登甲第入則同躋禁闥出則並典文衡鳴珂都里列㦸鄉閭越言世家莫出吳右者再傳而有中丞為之兄禮曹為之弟追匹濟美愈熾而昌然天道惡盈物理憎盛兼之蛾眉以入宫見嫉蠅口以立朝興讒于是乎有承嘉竢罪者矣前古謫官置之員外署以散曹若賈生之相淮王長卿之守園令唐宋以降貶地於江州雷州帶階以司馬司户又若團練齊安提舉洞霄縻以廪祿而不勞以簿書俾蓄才養望優游以需晉復胡待之厚也今時則不然既奪京朝必補州邑束以吏局親以民事將厯試於先大授於後古今成材是或一道也君為州郡吏不以為不屑而優為之凡錢榖法比之繁簿書期㑹之𤨏皆勵精從事所在咸底績治行為天下第一復見吳公矣我明建官上稽周制下昉唐典六曹分職春官掌邦禮以和邦國秋官掌邦禁以刑邦國各率其屬爰有司存葢禮以防民越則紏之以刑取象四時春生秋殺之義也先帝臨御稽古禮文明禋秩祀釐郊丘考廟室紛紛制作晩年彌篤時為春官之屬惟寅惟清殫心夙夜采儀叔孫凖圖公玉斟酌損益文質協中允諧厥職焉今上纉服在宥好生泣辜釋逮時為秋官之屬惟明惟良専用輕典多所平反三輔無文致之獄聖朝有刑厝之風亦諧厥職焉夫謫官䝉召每由南署者以事簡地閒猶夫唐宋意也鍾山原廟何異茂陵崇臺蜚觀洞霄宛在回視州郡清俗迥判而勞逸適均矣至則覽大江之麗興詠於靈運弔六代之跡寄慨於周郎探南朝諸刹𢎞寂於范縝訪西都遺事掞藻於左思才既充而望益起由是陟司㓂簡宗伯非厯試而大授之驗乎余與中丞公雅有文藝之好兹役也取道過家翕孺一堂幸以斯言質之皇甫司勲集巻四十五
