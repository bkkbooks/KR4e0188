body:
  text: 皇甫司勳集巻十五明皇甫汸撰五言律詩結客過吉祥寺落日帝城隈摩霄梵宇開黄金留福地白玉接僊臺共有㕘禪意能無並馬來坐令虚室裏㑹見吉祥回偶懐虞山之逰因柬張比部寰我昔虞山泛登臨暮景斜雨迷當岸栁風度隔巖花奈此淹京邑傷哉厯歲華張騫髙興在早晩待星槎送郟薦和同年奉使山東為劉閣老營葬新裁緑袍使遥捧紫書行北闕方同侍東山感獨征詩書瞻孔邑旌節啟王程耆徳思元老𤣥廬在速成鴻臚主人索詩因綴贈篇鳯闕芳年步鴻臚舊藉傳觀臣誰是主卜地爾為賢榻借朱明過杯停素節旋相逢即相識傾葢故人憐闗西壯逰贈張子名振唐藩裔英傳漢尉流北風辭薊曉西月向闗秋浩嘯提金錯長驅控玉騮龍庭期報主麟閣佇封侯送陸給事燦謫都勻驛國論何年定鄉心此夕揺鴈飛天畔驛龍隠日南橋謫宦恩非薄君夷路詎遥誰憐梁傳淚曾灑漢文朝過張士𢎞登樓苒苒過佳節蕭蕭屬暮秋媿題王粲賦空上庾公樓黄菊杯仍把青天月欲留共君懐土夢終夜繞長洲瑞雪識喜臺雲書乍歇澤雪禱還來蕭苪薰猶焰瓊瑶花已開禮同郊外卜歌待郢中催穡事先春望嵩呼振地回蠶室成蠶館開周典鸞輿扈漢儀棘牆春窈窕桑沼畫漣漪蠒獻夫人日衣明上帝時娥媌御王母玉珮降瑶池雪中攜酒訪胡子限韻作同張山人乗雪縁尋子春寒晩不嚴片雲徐出岫斜日半窺檐辭漢君恩切浮湘吏隠兼别懐聊仗酒花下惜頻添懐程惟光大興隆寺之子棲蘭若飄飄塵外仙自應甘沈病誰解守揚𤣥雨過金蓮浄風迴玉樹偏有懐頻落日無暇訪諸天棘寺燕居退食依西省間庭坐轉深一天流麥雨斜日散槐隂每抱文園病難忘故國心自非干禄學實恐負朝簪九日柬張子醇早就淵明里年年九日杯竹深聊自徑花發復誰臺避世隂陽逼懐人木葉哀餐英應不老但遣白衣來望皇陵作皋路千官入山庭一徑斜先皇曾卜宅禋祀已年華玉椀留常在金英掩獨賖暝來凝望處松柏有煙霞歲暮與何通政棟忽憶秦川彦因懐水部何銀臺宵秉燭金闕曉鳴珂物態春應逼年華暗已過觀梅詩興在誰和郢中歌夏日訪髙子業大慈仁寺因登毘盧閣福地標崇閣仙郎習静樓只疑人世外渾傍帝城西雲漢身俱上河山眼共迷不知𤣥晤久斜日在招提領邑入舟作一自違鄉邑三年復此舟乍登傷夙昔欲濟且淹留雨浪晴還捲風帆暝不收無勞悲去國但遣得安流雨夜邀唐兵曹滏河舟泛同冦廣平滏流春滚滚與子暮乗槎解纜生風雨停杯感歲華河陽聊種樹上苑憶看花他日相思淚題書寄省鴉懐胡長沙長安飛雪夜載酒送君行見鴈愁無那聴猿淚實傾楚雲頻入夢湘水逺含情日暮江頭望何時召賈生十六日賞菊浩歌亭已謝登髙節仍追九日筵花開當月下鴈起是霜前物色聊尊酒鄉心隔歳年過時吾更采遲暮爾何憐秋日之真定謁許中丞淒涼仍逆旅奔走亦王臣花發寧辭縣蓬飄數問津經春違燕子當晝憶鷄人北闕休回首停舟易損神七日恒山道中天上仍今夕人間奈别何晩雲迷晉趙秋水漲滹沱舊事流光轉勞生岐路多星辰看不没耿耿向銀河以公事至廣平訪同年冦子不遇顧司冦嘗令兹邑昔棲仙令地今訪故人來忽見彈琴處真同製錦才縣花憐自把尊酒好誰開他日萊公竹相思到魏臺冬日宿彌陀寺覽沙河令方豪題壁有感古殿諸天近空門半月懸佛身金作粟燈火玉生蓮潘岳當年詠王維此地禪㣲吟重懐往愁絶不成眠春日奉懐諸兄弟因各成篇子浚自忝皇畿宰􅄼銷故國思夢違龍卧處書斷鴈來時涕淚慙青鬢飛騰望白眉為傳芳草色應滿謝家池子安恭承東省拜悵望北辰遥香寢分宵直花天散早朝吏情春更逸詩興日應饒空有雙鳬舄無因渡玉橋子約相思南望盡問訊北來稀潘縣花仍發吳門燕幾飛談經伯氏被獻壽老親聞知爾鴒原上春風自詠歸送廣平令冦同年應召時尊翁方拜司馬先後北上漢庭今有召茂宰被弓旌飛舄辭花縣鳴珂上玉京人悲父母去余祖友生行獨憶河陽樹能含别後情再送嚴君司馬貴仙令覆鳬新自忝彈冠客相看結綬人庭趨萊服曉朝接筍班春萬里天門逺何由借冦恂十四夜吳子至自邑忽聞吳季子繫馬縣門前記别纔經夏相逢似隔年思親雙白髮羇宦一青氊為問中秋月誰令遲汝圓中秋馬上度中秋娟娟照客愁光涵金鏡出色傍玉珂流病骨思靈藥羇棲嘆敝裘闗山無限意悵望隴西頭中山登塔縹緲中山塔今登絶頂歸凴虚凌佛界攬勝俯皇畿梵樂雲流響天花雨迸飛暝來風氣入灑灑逼人衣得仲兄書兼示暮春寄故鄉兄弟之作悵然成篇江南一回首極北重懐君奈此雲山繫徒然花鳥紛省中鴉易曙夫外鴈難羣寄我思歸引憂來不可聞過楚王店謁羽祠虞姬配焉葢世雄圖歇千秋遺像存雲屯原此地日暮已荒村龍戰曾無敵天亡未可論獨憐丈夫恨空傍美人魂渡衛問水知臻衛揚帆此渡河清秋常細雨落日更滄波言采芙蓉佩情忘鷗鳥過江干有舟楫歸興獨如何留侯墓在喉音寺道傍古寺臨郊外殘碑倚道周赤松人已化青塜世仍留觀迹俱成幻銘功本棄侯還疑灞陵上魂去奉冠遊東昌寄包理官節雪載東昌道停舟重憶君地猶齊望蹟城是魯連勳年少能為政風流妙屬文郡齋開岱嶽終日對氤氳縣齋席上别張山人燕趙憐羇旅河陽媿宦㳺客懐俱滚滚别思各悠悠縞帶應須贈金裝不可留行期雙劍合天際五雲流東隠篇吳子家於韭溪之上自西徂東遂棄其先人之廬乃卜居焉因謂東隠君云避地新郊外移家故水濱晴窗先見曙虛館易生春叢桂青山卧扶桑碧海隣登臯一舒嘯浩曠得吾真再贈投隠何勞卜逰方即是棲幸開青帝谷因渡野人溪竹逕情同逸花源問不迷那堪一水曲猶遣寸心西吳子新館讌别竹下開親讌花前倒客觴酒憐春夜促淚與别情長鷁首浮江路鶯聲遶帝鄉新詞休唱盡渾欲斷人腸同陳給事林尚寳逰毘陵胡舍人園並是仙舟下因成金谷逰亭開一水曲山隠百花幽繁圃春常駐晴尊雨更留那知龍卧意猶繞鳯池頭親友道余至京口擬登金山餞别值雨不果雲將孤島翳雨阻一江分竟日嵐猶濕終宵汐迸聞逰心飛浩𣺌望眼入氤氲莫恨登臨晩晴時是别君泊維揚地是南來域江分北望賖空餘前代宇不放昔年花物色圖丹壁春風想翠華誰憐歌舞處日暮有啼鴉阻舟彭城再赴髙地官雲龍山宴蘭渚淹仙棹蓮宫接梵筵江山曽用武人世合逃禪縁是三生得逰應兩度還詠歸無待月虚寂扈彌天哀鄺太史子元别我燕臺上思君湘水邊那知歸卧病忽爾復經年常建違行藥揚雄罷草𤣥碧山應不逺立馬淚澘然皇甫司勲集巻十五
