body:
  text: 皇甫司勳集巻五十五明皇甫汸撰誌銘徐文敏公繼室淑人郁氏墓誌銘徐文敏公亞配卒是為誥封淑人郁氏也日月有期遺命孫履貞治襄事諸孤為乞銘狀即公從弟繗所撰述也系曰淑人彌留時呼𤣥英𤣥素泣且訣曰吾疾殆不起即不起慰我於地下其在墓銘乎銘在文不在官爵文工則傳傳則死且不朽官爵以眩盲俗耳奚能益地下人哉夫淑人之言誠善矣媿余小子何敢當乃一再讓𤣥素堅請之嗟乎余少從文敏公遊又為公所舉士也晩通婚媾嘗於門下竊聞淑人之賢分安敢辭稽昔任彦昇以記室而表婦順於劉碑舒元輿以左司而闡母懿於陶版文果在官爵否乎迴環展誦華而美典而徵尚何以加焉謹掇拾為之銘按郁氏之先有諱貢者當周末時嘗相魯傳至青州刺史泰𤣥始見郡乘徙江左著籍於吳遂為吳人居吳趨孔道西接金閶甲第鱗次高閌駢坒郁特雄埒其間國初嚴鈔法與時轉化因致饒裕父鼐挾貲遊維揚間任俠樂交諸少年逰揚其名至今江淮言郁長公若四豪云淑人生而幽閒莊恪里中好靚粧奇服輕袿侈袂翔龍墮馬淑人屏不欲御恥與衆女伍也父母察其相後必貴為擇佳壻踰笄未字易謂愆期之志非有待於君子乎時文敏公適喪元配王氏遍召諸媒媪以詢僉曰無踰郁氏者公詰之曰汝不聞王淑人乎大傅文恪公長女婉嫕才淑閫徳無雙殆難以為匹諸媪哂曰公何得以相門輒少白屋女也由是委禽授幣如初婚儀迨吉于歸公喜曰向老媪言展不誣矣時文敏由史館進秩學士主試南畿淑人相之如京當今上登極之初銳情經術延訪儒流日御文華緝熙聖學公儀矩端偉音吐洪亮每陳説古帝王治道天子改容聴焉淑人警雞鳴於昩旦誡燕暱於小星曰慎毋以閨房怠朝省也亡何公陟少宰攝選事進退百官天下想聞其風采未及三載以聖眷覃恩褒封逮室淑人始膺褕翟之寵拜泥鸞之錫矣公題其堂曰介福令門人袁袠等賦詩以頌盛美焉時皇后方開坤寧聴隂教詔諸命婦修朝謁之儀既又達蠶室列繭館率諸命婦就郊躬桑淑人例得珠纓霞帔旅班行與從事曳文履於椒塗陪雕輦於蘭錡實成周之異數而先漢之稀覯也乍舉竟寖談者至今以為榮及公以簡命日隆漸閲台衮執政嫌於逼已隂諷憸人就闕下上書媒孽公釁將中傷之禍發叵測公憤懣不知計之所出淑人曉之曰公第以正自持即勘者召問具以情對天子聖哲必不惑於讒説已而詔下果得貸僅免公官雖伯宗聴戒於妻許允受對於婦曷過焉及歸鄉里公鞅鞅弗豫思行樂適志淑人勸曰公才望為上所知今執政且去位聞從左右常侍數數問公安知無使者即家召公令舍人趨治行奈何效楊子㓜自放乎里中莫不賢智其言先是作嬪於室二姑在堂奉事以禮二姑相慶曰孝哉新婦何减王家女耶撫諸子一如已生諸子歎曰慈哉母氏即王妣在無以加此矣御僕媵每有恩凡蒼頭婢子皆曰賢哉主母王夫人殆未嘗死也若夫承廟祀執姑䘮佐夫君畢婚媾潔酒漿享賔客勤勞二十餘年福備履綏願違偕老文敏奄忽益𢎞内範兼綜外政諸子小有缺失召於庭下切責之汝不能光昭徐卿令徳獨不恐㸃王太傅家聲乎其嚴憚若此嵗時降誕子婦捧觴逓起上壽以未亡之故為悽然覆觴而罷自是子婦罔敢言家慶者平生善自調頤强食無恙乙丑之春偶疾作綿歴至冬竟不救藥而卒是為嘉靖四十四年十有二月二日也生𢎞治某年月日甲子一週復六矣亦中壽匪促也子五人長𤣥度太學生娶吳氏先文敏卒次𤣥成廕詹事府主簿俱王淑人出𤣥英判臨清州事次𤣥素𤣥佐俱太學生女一人先卒孫男九人履貞者𤣥成子也出後𤣥度屬當承重因董襄事云允元允徳允恭敬中允治玉柱允若並㓜孫女九人一適太學生皇甫榖者余季子也宫詹君從都下聞訃驚惋殞地痛哭曰曩余本不欲行母命强之竟令抱恨終天矣不逺數千里徒步來奔槁容柴瘠室人不識也當王淑人卒時尚在孩提淑人為撫之令徳感人若此宜其為文苑名臣之配屢叨恩渥上罇禁臠日給於中厨黄金綵繒嵗頒於内帑身共享之子孫振振昌大厥後富貴殊未艾也天之報施淑人亦單厚哉𤣥成等卜以丙寅某月日遷柩於靈巖山之賜塋合文敏公兆𦵏焉哀榮亦備矣是宜銘周姜翊祚趙媛昌宗覽古遺絢炳訓于彤肅肅文敏刑家自躬王謝郁升如璧獲雙淑人來嬪徽音克嗣靖恭職思周旋從事諭夫于道迪子以義壼譽夙欽曰惟賢智雖有茵鼎莫永慈年匪無膏沐豈駐􅄔顔叢蘐萎露拱木萋烟爰昭世美佑啓宫詹鬱鬱靈巖帝錫之冢生既䝉恩死亦銜寵昉彼湘君蒼梧是從潛徳休光刋銘示頌明重慶守陳公孫安人墓誌銘嘉靖癸亥之夏重慶守陳公諫卒安人孫氏一慟幾隕然猶强息以育諸孤遂構疾至隆慶戊辰春亦卒葢生固非安人志也日月有時孤琦璟等將圖襄事而從兄瓉時為太常卿移書往徵其狀來乞銘展誦其言葢歎河睢絶響晨牝貽詬徽音莫嗣惟妬是聞至𦙍不遑恤而宗弗克紹者悲哉於是乎有感於安人之賢也太常於世廟時為給事上書指斥時政著蹇諤風其言多憤世之辭類如此按狀安人姓孫氏父鶴亭公某母湯氏海虞鉅族也安人生而婉嫕稱閨房之秀重慶公自㓜頴脱為鄉校之英考比部公復亷知孫氏女而鶴亭公亦雅聞陳氏子申之以媒妁遂締婚焉比部公時佐嶺南歸與妣徐安人為子授宗廟見禮成喜曰所謂佳兒佳婦此奚忝耶翁姑繼卒相夫執䘮紀務協於禮敬事吕恭人隆娣姒之儀吕恭人者瓉母也二姑並㓜撫之及笄為治裝以歸二姑徳安人猶母矣初安人因公未産子蚤夜遑遑為置側室乃生女安人亦自娠女則又求宜子者納之乃告於公癸夘果生二子安人子之不啻已出公心始懌奮於功名遂以甲午舉于鄉丙午遊南雍安人從之金陵庚戌舉進士拜比部安人從之京師三載奏績安人膺封典奉勅命有樛木下逮之辭匪諛也丙辰領恤刑於閩便道攜安人歸冠翟帔霞流珠綴珩宗黨榮之未及行乃有重慶之命則又從之蜀中公聴外政安人持内範甚嚴固扄鑰絶餽獻凡蜀産之珍屏去一無所好公治理以循良稱安人相之也乃以憸人構釁再朞而罷事具公誌迨反初服槖無贏金安人脱簪珥以佐饘􅋳享賔客為公卜夜之娛察其鞅鞅弗豫則又諭以南榮之誡廣以北叟之言敬通解宦左顧孺人樊姬進賢實昌楚𦙍忻戚葢同之也庚申季子生安人則大喜曰無官有子曷輕重哉然公竟以失意隕身功名之㑹有不能忘情者矣安人日夕持季子泣而苫卧柩側素病癖至是益痼忽一夕聞舍中火起驚走而蹶無俟反風實由神䕶竟弗救藥悲哉隆慶戊辰正月十六日也生為正徳己巳十一月二日享年五十有九後夫死甫五易朔耳子三人長琦邑庠生仲璟太學生季珤女六人適馮者安人出也終安人不廢寧省無匱母遺如子道云由是子孫振振玉樹之産虞猶徳星之聚頴也安人能知大計矣琦等卜以己巳十一月十五日遷柩於虞山邵家灣祖塋啓重慶公兆合葬焉禮也昔子厚誌叔妣陸夫人具列柔儀罔諱爵齒太常倣之無遺絢無溢辭述而銘之允宜稽昔稗官著妬記馮荀之家幾覆嗣惟孫休休有令美先君之思朂任只鳯毛翩翩河東擬攬暉發潛鳴陽起孰謂安人而無子虞山之灣兆重啓從夫于邁妥幽里千秋萬嵗應不死沈太安人墓誌銘憲使沈君應魁居母氏程太安人憂日月有時乃衰絰徒跣届司勳氏之廬蒲伏稽顙悲號涕泣持狀請銘其墓余亦為欷歔乆之發緘申紙狀即太安人從弟鄉進士大亷辭也事覈而言徵情攄而懿闡有足采者按狀安人姓程氏雲樓公鉞之仲子也母王氏裔出伊洛兩夫子後宋徳不競於越是遷始占籍姑熟數傳至高王父兵曹可菴公式正統間以死勒國家無長物而清白是貽雲樓公昭先令徳率迪尤謹教子姓世其業大經舉鄉薦授昌樂縣令大亷相繼頴脱駿發他日昌程者此子已仲子㓜秉淑姿夙閑女誡授以孝經列傳了悟大義稱閨秀焉及笄重慶守葵軒沈公海季子似葵公虞䘮其配張安人召媒媪圖嗣張者媪嘖嘖賢程氏云非此莫能追嫓張者以張孝謹有徽音也因委貺焉雲樓公曰重慶之女先已拜吾宗廟今以吾女往奉公祀非潘楊世睦乎由是仲子歸於我至則相夫以恪撫遺孤以恩綜理家政惟密御僮僕婢媵惟嚴嵗時薦享惟禋羞賔客饌饋惟腆似葵公遂亡内顧憂専擇外傅以訓諸子彬彬為文苑士云晩謁選曹授南京司城指揮三載考績得貤封其先大夫以歸而二子並舉於鄉因解組屏居葺園開徑與昆仲遊式敦友于奄忽捐館安人亦自舉二子矣視之如一凡篋笥所遺庾帑所畜諸子均析罔有所私斗粟尺帛之謡曷由興耶諸子又皆申申訢訢有翕孺之樂母氏令善之化也世廟庚戌應魁舉進士授南京儀部主事將母以行安人享祿養者三年尋進封太安人嘗割已田贍季弟力為解紛排難以慰母心無何擢憲廣臬而長子亦拜陳州守尋改趙州爭相迎養安人以路遥兼遘痰疾並却弗就二子餽獻省問相望於道安人叱曰汝居官守惟修乃職以報於君尚安念母乎頴羮陶鮓雖美非吾所甘也憲使以文學飭吏事赫有令譽竟以直免衆為惜之安人慰之曰汝年尚壯而才器通達召復雲中收功澠上未晩也奚鞅鞅為哉趙州亦不習脂韋棄去相與賦閒居於板輿詠循陔於蘭膳為百年壽奈何昊天不弔朝露溘零悲哉三子哀慟踰於張安人亦慈孝所感也時隆慶戊辰六月四日朔其生𢎞治癸亥十一月十三日年六十有六矣越嵗己巳趙州君等卜以明年正月卄八日遷於寳巖灣之西北合司城之兆而𦵏焉趙州忽茹哀抱疢而卒憲君身獨膺之數也安人雖不躋上壽而享茵鼎之隆被褕翟之華生既榮矣凡五子長應元即趙州守次應魁即廣西僉憲次應麟太學生皆出於張而長於程者也次應賔應龍太學生俱程出皆先安人卒孫男十一孫女九婚嫁皆望族曾孫男女四殆熾而昌矣嗟乎安人撫前子㝡周而所生子並夭此又天之難諶者也憲君薄宦減産歛𦵏之具鬻貸以充可謂孝亷矣司勳氏曰余歴觀古史所載繼母之賢莫踰翟母穆姜者程實以之若事繼母能孝則王祥薛包二子耳沈奚讓焉是宜銘銘曰婦順匪易母善其難愛克致佑妬乃構患惟程秉淑紹張殫義朂爾諸孤不我延嗣天道胡爽人寵則榮洵美二室從遊九京寳隧重開金蠶共閟徳音孔昭芳儀潛翳吳母顧宜人墓誌銘在昔嘉靖癸亥秋七月楚參吳大夫諱子孝一旦捐館其孤朴乞余表其墓不以余之不文謂余與大夫交莫逆能詳其素履也迨今隆慶庚午春二月大夫配顧夫人奄亦捐閤朴復乞余為之銘謂余從大夫所竊聞其聲也嗟乎曾不踰十年而夫人從遊地下朴慟而懟曰胡天奪母氏之速夫人瞑焉猶自恨其徇夫之遲也孝哉賢哉按狀即朴泣血辭也與余所聞恒八九所未聞纔二三耳夫人顧氏為吳著姓曾大父巽大父􅀈諸父餘慶並以辰年擢第起家吳中稱三辰進士者是也父餘祥少為郡學弟子員學行茂著後生稱魯齋先生云配俞氏少保公裔也居近閶闔之臯橋夫妻相敬有伯鸞徳耀之風豈居之移人耶魯齋壯未有子生女温粹淑哲圖為擇佳壻文端公未第時嘗與同席硯而大夫甫五齡即能占對魯齋見而竒之曰此兒長為大器尚惡用他擇乎遂以女許之少長閑習女紅兼誦孝經内則及通諸史大義魯齋抗行雅遊頗有山水之癖不務家省夫人能相其母治生得不匱於給事具魯齋遺書中及歸吳姑薛夫人持隂教嚴肅上能曲盡婦道得其歡心下則善諷其夫克勤於業大夫嘗賦詩美之辭多不載當是時夫人尚未有子念舅姑又止大夫一人每為宗祀之憂因請於薛夫人廣求妾媵遂獲多男之慶視恒情妬媢何如哉延陵人氏罔不賢夫人者又為魯齋公置妾亦舉二子武陵人氏又罔不徳夫人者大夫舉進士拜台州理官時文端公解南太宰歸夫人請留侍養不赴郡舍其事舅暨劉庶姑尤加謹焉間課諸子講解嚴於父師訓諸女諳婦儀大夫由廣平擢南選部夫人貽書諷以虞丘之事報曰此吾夙心屈於家大人未許耳卒上疏乞歸與偕隠凡十餘年始承舅諱執䘮如禮大夫復起儀部稍遷光祿少卿夫人亦不赴京邸代綜家政為子女畢婚姻視適庶並如已出云光祿尋擢湖廣參議階朝列大夫提督太和夫人亦不與之楚臨别第曰仕至横金於腰結紫為綬亦足矣妾聞讐相懐私驕子黷賄豈容君等毅直進用乎大夫卒感悟曾未踰稔乃投劾去吳故世家夫人雖無餉畦視饋之勞而縞素恬澹昔王凝之妻謂有林下風者夫人近之矣昊天不弔殱我良人自是居嘗戚戚弗豫遇元旦長至及生朝令辰子女率孫及甥羅拜稱慶輒謝弗受可謂永思矣丙寅嵗朴以文端公䕃改授南京後府都事圖便養也值世宗晏駕奉表入覲上䟽陳情乞歸守朝列家法殆孝養濟美者矣夫人先以夫貴勅封安人今上登極覃恩都事君奉例欲上䟽請贈典而夫人止之曰汝甫授官未有尺寸之報乃遽徼寵澤乎竟寢亡何背養惜哉彌留之日召都事君暨諸子謂曰汝先子自少負掞藻之才晩抱經世之志其擢第也選入翰苑大學士桂公以其氣俠外補其理郡也屢膺臺薦宜居諫垣太宰汪公以其雄視左遷海門之㓂談笑而弭廣平之變鞅掌而戢辛夘從事浙闈所取士幾二十人咸拔其尤若黄中以飭憲稱沈鍊以極諫死一切不言小子識之朴等泣曰唯唯乃今知大夫怨不為讐徳不望報量益𢎞矣向非夫人曷從紀哉其他推財好施賑族恤里婦人恒事夫人踈節並畧而不書書其大者逺者夫人卒於隆慶四年七月三日生於𢎞治八年四月八日壽七十有六男子五人尚朴即都事君尚儉郡學生尚黙尚遜尚潔俱太學生所娶皆宦家子遜潔先卒女子七人皆適鼎族一嘗刲股起母疾者也孫男十人皆郡學生曾孫男二尚儉而下非夫人出為夫人撫若己子故不析其母氏云朴等卜以是嵗冬某月日奉棺某山之原啟大夫之兆而合𦵏焉司勳氏曰若顧夫人者在文端公為佳婦在少參公為令妻在都事君為賢母三者有一焉世以為難矧能兼之是宜銘銘曰婦于文端觀孝始妻於朝列昌厥裔母於都君迪之義敦善亮節匹烈士閫儀𤨏範惡足擬鸞章象服榮宅里從夫委蛻名不死發潛闡懿詔千禩明勅封太孺人劉母吳氏墓表侍御劉君鳯卜宅撰辰奉母太孺人柩合其考文林公以𦵏瞿太史氏志而銘之附青雲昭彤管孺人可以不死矣侍御猶以懿行𢎞淑宜有表顯於世乃輟哀収涕采絢述𠂻以請于余余家司直兄嘗娶於劉為侍御諸姊而水曹弟又同年也竊聞太孺人壼徳乆矣及覽述辭覈而匪溢乃稽古昔若陶母標塋於蠡上虞妃示冢於湘濵奚必稱夫哉太孺人姓吳氏世以武功爵衛尉徙蘇父宏夙齡嬰瘵未及拜官而卒母管太君二十而寡凛有貞操孺人甫朞鞠之孔瘁稍長教以女紅誦習内則女誡諸書性頴慧聴輒了悟由是益觀古今事前史皆歴歴能道之至論成敗較若指掌丈夫莫踰也年二九作嬪於劉劉為郡著姓中丞而下繩武科第素菴敷者學行稱於鄉門下從遊之士以百數多躋顯官事具郡志子鏜為怡晩公鏜子湘為㕓隠公並善營積家用以饒生子梅即文林公也元配俞卒㕓隠公每以單弱恤𦙍迨吳來歸喜謂潘夫人曰新婦賢而貌具福相且占曰三五而光子孫其昌天將繁我祚乎俾攝家事綜理周密就養惟恪姑享其逸而夫亦得以覃精於藝矣猥遭潘夫人䘮哀毁永慕及㕓隠公奄背泣盡流血目幾失明厥後文林公攜之京師庚午舉於順天丁丑生侍御於京邸時孺人歸劉且一紀矣嘗恨㕓隠公不及見曰嗟嗟胡昔占者之言騐之晩也以産子之艱愛之特甚丙午文林公拜汀州推官以仁恕明允流其頌聲咸孺人勸諭之功及調潯州越在嶺外䝉犯瘴癘公賴無恙又孺人擁䕶之力也亡何文林公解官還減仲之産居嘗鞅鞅孺人為指侍御曰此子在何患終窶乎盡取篋中簪珥毁以充贍畧無愠色而子果登甲辰進士拜中書舍人恭膺錫命人共榮之乃以管太君貞惠未宣旌典尚革獨不豫焉舍人尋拜南監察御史兩奉祗役衣繡晝行吳市中觀者嗟賞圖展禄養而文林公居忽屬疾孺人食不甘味卧不安寢願以身代竟至委化及竣襄事遂屏華謝飾撤甘持淡翻閲梵典研究宗因染著悉遣障礙都捐矣以故侍御謫推汀州移貳潯州曾無忻戚第勉以砥行固志省刑愛民而已雖陶母之卻餽獻雋媪之問平反曷過焉戊午之冬侍御擢廣東僉事方以道逺不遑將毋欲為投効計而太孺人難之先侍御在閩中嘗一過汀父老詢知為故推子也扶杖擁車陳説功徳盡皆泣下侍御為之霑巾焉偶與太孺人燕語及之悲戚致疾又以齋乆傷脾飲藥不救而逝己未二月甲子也嗚呼悲哉向使其子身自之官寧不抱恨終天即奉母氏偕徃卒於塗視闈閣為何如顧不幸哉或謂孝思開先佛理黙相非耶距生𢎞治丙午十二月己亥享年七十有四男一即侍御君娶顧氏孫男思濟女二孫女三皆締婚名閥詳於志中其懿行固有彰彰足表者矣嗚呼學之於人大矣哉世之恒女惟習紃組議酒漿差不失婦順而已若吳之性資婉嫕才哲炳暢動協于禮夫善事親而䖍奉以愉乃成其孝夫素友愛而雍輯無競乃成其讓雖無干外政而從容詆諷夫為循吏慈矜嚴迪朂子令名凡此節槩皆自詩書中來也其達權應變輕財好施慷慨有丈夫之風至若祀先睦族䘏隣逮媵閑家儀軌𤨏秘不載載其顯者大者云爾系曰漆室貞媛婦範未臻肅肅饁畦母訓罔聞斷機遷里徽乏初嬪兼有三善惟吳孺人孰謂男子可不學云虎丘之陽下從夫君業詮慧鏡報感慈輪爰綴彤藻永播清芬皇甫司勳集巻五十五
