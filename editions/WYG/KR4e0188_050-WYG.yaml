body:
  text: 皇甫司勲集巻五十明皇甫汸撰雜著毁舟對束教公子問於通方先生曰聖王制器尚象舟楫興焉吳郡巨麗實為水區𢎞舸連舳巨艦接艫葢自昔紀之矣識治者惡夫崇奢之病禮也華飭之蕩志也嬉遊之妨業也叢飲之釁鬬也冶容之誨淫也議將毁舟示以甲令裁以常模是為反本以敦其俗矯弊以殫其化吳自今其可觀乎先生曰否不然此謂裂衣斷帶之禁而非棄車止擊之神也剖斗折衡之治而非休樹息隂之化也僕聞之善防者循其性不改其故善牧者通其志不拂其情是故障狂而壅之不若䟽源而決流者易也御馬而佚之不若牽牛而豫貫者順也是故先王有因民之政而民宜之有隨俗之化而俗安之舟楫之利其究亦博矣非盡如子所云也用之聚族逆女以洽嘉禮用之送死弔喪以崇厚徳用之祖逺餞近以暢離緒用之登山臨水以宣幽思胡蠧於政而欲毁之哉且疊樓島峙不僭於瓊構之翬飛也錦颿霞舉不夸於雕墻之衣繡也軒之照水不多於緹帷之竟道也終宴之所費不浮於一饗之玉饌也芳辰之輟賞不曠於窮年之游手也采蓮之靚女不荒於倚市之明艷也中流之簫鼓不闐於閭巷之弦管也何舍彼而亟此葢事有緩急物有大小治有先後政有因革今瑤臺無恙而餘皇被災狐鼠當道而鷁首䝉戮里猾怙勢而榜人受禍嚚訟繁興而櫂歌輟響殆非所以召和氣弭怨聲也吳之侈靡鼎貴比肩操贏繼踵乆矣成周風在四方先王不强而同蜉蝣之刺不能齊之以儉沮洳之譏不能挽之以奢使蘭舟桂楫不泛於朝夕之池危冠袨服不覩于長洲之苑雜賄奇貨不鬻於吳趨之肆陳粟紅腐不儲於海陵之倉巨商良賈不通於閶闔之塗而上錯之賦可不登於天府之國庻一切盡廢之乎今夫舟之習於水猶車馬之習於陸也為之飾以珠玉錯以金貝被以繢􅄢藉以簞茀鏤以鈎膺文以輪轅約以鞗革和以鳴鸞非不麗也亦猶屏騎於周行而脱駕於魯道也未見其可也宰民者浸以湛恩潤以鴻澤惟患康衢無鼓腹之夫南畆乏媚我之婦顧戒其樂胥坐而愁鬱止其笑歌起而呻吟曷故焉昔李子入晉見今室惡而故室美新墻痺而舊墻高歎曰民力竭矣吳舟雖麗亦故室舊墻也民實不堪漸自痺惡耳若昔管仲沐枝而塗無愆期之役晏嬰棄車而民罷擊轂之戲致治有本導民有機故曰民可感而興也二子之謂矣哲侯良吏勅躬閉心端軌務實達權挈要在宥去甚斯民將有率履從教改行安節而嚮化者焉毁舟何為哉吳漁父屈子撰漁父篇余擬之加吳以别於楚也嵗㫋䝉赤奮若辜月日長至甫子不擇遜于松陵泛于鶯湖漁父見而問曰子非司勲大夫與何故至於斯少負英氣眇視一世業振古風獨步江東何壮也今乃憂心辟摽形容枯槁何憊也甫子曰昔嘗抗䟽以忤郭武侯舉朝為之動色而今挫於一兵子又嘗持議以詆張太宰三署為之歛容而今窘於一鞫吏謂非命與吾其已矣漁父曰葢聞釁由人構奚天之咎禍自己求伊誰之尤且子生薋菉之鄉而佩薰紉芳趨眩碈之塗而懐瑾握瑜適椎朴之市而掞藻摛繢履突梯之徑而姱節砥行叩吹竽之國而鳴絃挾瑟是自犯不韙也今時所重者勢與財耳使子位高何網之遭仕不善宦䘮其氣焰使子金多何法之加産不及中神罔為通是自失其所恃也夫犯五不韙失三可恃子之不隕於仇讐之手者亦幸矣語畢相與觀於湖上漁父倚舷而笑鼓枻而歌曰流有清兮亦有濁賢如屈兮𦵏於魚腹遡有順兮亦有逆忠如胥兮盛以鴟革水有源兮亦有委智如蠡兮從余逺逝遂去不知所止鷦息解建業域中有𤣥寂公子棲趾長干皈心淨土得北山僧舍之一楹大僅踰斗高不過舫惟慧塔影軒梵鐘響座而已因題曰鷦息葢寓言於䝉莊也乃左圖右史彈琴其中逍遥乎不知榮觀燕處之為帡幪也爾時寥廓大夫過而哂之曰陋哉子之居乎是安足息子哉且子誦法周孔睎績臯䕫不為鯤鵬之遊鴻鵠之舉而乃託志於鷦鷯謝笑於鷃雀僕竊惑焉公子曰吾知息吾躬焉而已容膝之外非吾所覬也南榮戒多老氏取足又曷故哉且吾以昭曠視之不知一枝之為小也吾以蟣塵觀之不知六合之為大也雖有鄧林瑶圃一旦飢鳶擾其上亡猿警其下將恐千仞失據三匝無依豈復有息所哉大夫於是愕然自失曰公子幾於道乎吾方坐此困也乃拜手讃歎而説偈言占占雖小知黠慧羡微禽一枝安足戀屬厭乃其心庇苟非所據胡貴茂與深乘時假全樹矯翼飛上林弛張種種故龍徳良可欽公子聞之乃大歡喜曰吾於用天下也亦復如此公子盛生時泰也大夫者汸也司㓂獄書壁有兔爰爰犯虎之穴虎怒欲噬之驅之豺窟懼甚曰嗟嗟豺虎類也安得不毒我我知其食吾之肉而寢吾之皮無疑矣豺問故知寃於虎也釋之平原喜曰兹平原乃吾門庭矣遇鷹及犬鷹嘴圎犬善顧或擊之或搏之百計困幾不免嗚呼天下之人有同其類而異其心天下之事有幸脱於彼而不可料於此者戒哉慎哉虎武定也豺倪翟二撫君也圓顧二比部郎也悉隠其名云喻歙文有盲於詩者妄意刪之皇甫司勳五嶽黄山人並遺圖倩梓於歙客奮起不視而唾欲毁其板余為止之夫彼既盲於詩則其所取未必是而所去者未必非也使詩不恱於凡耳受嗤於拙目余方以為幸而子乃以為憾耶夫毛嬙西子國色也天下有目者所同美然鳥見之高飛獸見之蹶驟禽獸豈可論於聲音之道哉竊恠夫今之言者謂吳之詩不及關洛齊魯然吳之黄口白丁僅諳三體未窺六義載䞇出疆憑軾而遊於名都學士大夫多延致之與之談必虚左與之唱酬每出其下咸謂少陵不死謫仙復生也顧不可笑乎夫騎卒逞謀而謂良平為非智材官奏㨗而謂衛霍為不神然與否與是猶鄙堯誚舜而陋禹也於妄人又奚難焉皇甫司勲集巻五十
