body:
  text: 皇甫司勳集巻四十七明皇甫汸撰碑版平夷碑葢聞垂綃之代爰有徂涿之師舞干之朝不廢伐苖之典觀兵丹水享士鈞臺雖文徳誕敷偃彼若易而五材並用去此則難矧島夷之為中國患也自古紀之矣漢唐以來道革汙隆勢因叛服靡有常焉宋徳不競鼎祚濳移元徳既衰天下糜沸天啓我明時則高皇帝汛掃風烟肇為戡定文皇帝屢勤鑾輅𢎞致盪平列聖相承制馭一軌賔譯四通皇上嗣統湛恩懐柔四海即序琛賮軼漠玉帛來庭二百年而海内晏然矣蠢兹蠻服日本最大聖祖慮其險阻易憑挾詐難格絶其内欵禁其互市瀕洋環島羅衛布堠而嚴為之防智矣哉自是濤波晝戢闗門夜開亭障弛而不設舳艫敝而不修斯憂兆於忘危釁生於玩㓂者也倭奴乃乘間竊發始則嵗旱荐飢奮臂掠食捄死扶傷而已迨夫假託依附嘯聚實繁桀鷔孔熾遂乃隳城衂邑斬將殺吏侵擾我疆場繫累我黔首農夫釋耒紅女寢機飛棟成墟餘皇為燼刺嬰兒以釁鋒刳孕婦以染鍔葢鯨波之巨浸而蠆毒之劇蠧也階之為梗豪右乾沒貪其奇貨為之贏糧嚮道阨塞漸諳虚實悉覘視我稍輕敢於深入也東南之區財賦攸萃俗號紛華地稱嘉麗一旦烽火照於錢塘之江荆棘蔓於長洲之苑蕭條千里顧不痛哉皇上震怒集羣譏以廣思回北顧於東眷運神謀下明詔剖符秉鉞之臣妙簡而任専閫分麾之將疇咨而遣竭内帑之財調六郡之卒雲臻飈赴棲於會稽然戰輒不支賊無亡矢遺鏃之患而我師坐困矣吳越甌閩兵連於四境壬癸甲乙役疲於累年意者天吳為瘵波臣干紀不然胡酷至此也皇上思欲祀洪瀾昭𤣥貺乃有浙郡趙公文華時在納言日隆睿眷晉秩司空明禋宗委公爰奉如絲直履窮髪指日月以誓辭望山川而增厲審利害於出疆聴便宜以從事既而開庾信之府參竇憲之幕留侯在幄亞夫行營詩書素敦禮樂具在乃倚為長城資之武庫矣于是宣威敵愾殱馘獻俘以報于天子聖心以懌加公宫保以寵異焉前此計眩於狐疑機失於逗縮者公數其罪聖天子飭法以示懸藁之徇差級而俟収榆之效仁義兼覃矣越嵗執徐賊復猖獗窺建業犯淮揚公暫違聴履仍俾受服方叔于征令公再見金陵盤石以為固漕舟塞江而無恙一戰而挫鋒於吕城再舉而摧戈於桃港僵尸乍浦褫魄梁莊當六月之期應七旬之候組甲凝霜旌旄耀日公方按節徐行緩帶談笑惟時總督則少司馬績溪胡公宗憲提督則大中丞桐城阮公鶚西蜀張公景賢澶州史公褒善監察則侍御姚江周公如斗刑臺趙公孔昭滇南邵公惟中僉謀既同諸司百執事而下共命惟恪或者議欲輸幣以誘其降堅壁以俟其老緩追以縱其逸假息以盈其貫公持之曰余藉天子之寵靈二三元老之中覆兵速乃神事需為賊勢在破竹間不容穟矣乃令沛之亡命拔㦸而登齊之驍騎控弦而入楚之椎髻挺刃而馳吳之輕剽煦沫而泳越之勇敢烈炬而焚五道並進長伎畢集筭無遺策刻不踰晷生擒百人斬首千級溺骸汨羅焦骨炳焰以萬計史書大㨗無是過焉而贊成之者則兵曹郭仁也于是飲恨者快心含憤者吐氣歛戚成懽破涕為笑姑蘇之民曰殄瑕滌穢惟司空雲間之民曰室家胥慶復我農晉陵之民曰分茅䟽爵報宜崇潤州之民曰生子名趙恩無窮四郡良守乃率僚佐將采民謡播鐃吹勒鴻休刋貞石謂余與公誼聫榜末屬操鉛槧嗟夫料敵制勝哲也信賞必罰斷也躬冒矢石勇也不以賊遺君父忠也以此衆戰戰奚不克哉若夫懲厝薪於往轍存苞桑於來監公奏凱之日有副封焉銘曰憲周劇秦若稽炎漢中葉惟宣先零構患充國請行金城圖筭矯矯虎臣邦之屏翰曠世濟美司空乃誕蠻夷于襄㓂不可玩渟海既澄幽谷盡竄班師奏膚獻囚在泮天子萬年神武英斷才謝子雲辭莫能賛吳韓襄毅公祠碑代吕中丞作吳有襄毅公祠自余始也余創之宜文之迫於瓜代而去厥後韓生嶐數來請沿牒方嚴搦管輒罷兹撫滇南歸生復申前諾可謂不忘述祖者迺檢舊草綴次之夫滇民亦反側思逞余率止以戡稍執其醜始知成功之艱而益重公之才畧云夫豪傑之士功業建於當時徳澤施於後世進退以禮身名俱榮乃崇爵以尊之厚祿以享之生有殊褒殁有徽諡録其子孫人心猶以為未盡愈乆而思慕之不忘此廟寢之所攸肇像飾之所攸興爼豆之所攸設而禋祀之所不忒也余自弱齡凡忠貞節烈所謂士之豪傑者或史册所紀載或父老所稱述未嘗不延頸拊髀想見其人恨不得與之同時焉逮忝進士授御史為聖天子秉憲之臣尤以激揚旌别為己任及奉命巡按江南持斧肅軌攬轡觀風庻幾遇其人而酬其願焉若都御史襄毅韓公雍者蘇之長洲人也余按兹土三學弟子員以祠事來請因覈厥履公志抱經綸才綜文武弱冠彯纓釋褐被繡即霜憺轂下風動臺端叢案決流宿齒推服諸道奏讞咸公參定尾有公署多䝉報可人畏洛陽年少矣巡按江右逆濠怙勢包藏禍心首削護衛隂奪其氣而寢其謀新建之勳公基之矣由是晉浙于藩宣大之屏功多不載既而五嶺倡亂百粤不靖憲皇帝疇咨簡命公乃受脤専征至則憑籍寵靈布揚威信凡攻守招納調遣防禦暗合荀卿之制間出曲逆之奇每遇敵輒身先士卒士卒咸感激無不一當百者凡猺獞黎獠黄蕭諸裔素號難格計日盪平之斬首數百萬㨗以數千聞思古方叔之翦荆蠻晉公之克淮蔡充國圖筭於金城伏波標勲於銅柱曷過焉事具平蠻録及公家乘中不暇一二談也至若浮槎刳木流馬非神驅羊負芻火牛謝巧設機用諜則籌沙示糧束藁得矢智出其下矣公殆天授非人力所能庻幾也又坦懐闊度所駐壺觴高引刁斗盡弛或横槊賦詩或登樓舒嘯有羊謝之風焉功成身退口不言兵可謂善處功名之間無犯道家之忌者矣而猶以中貴之詆屏居江東溘死牖下不克釋韜鈐而秉鈞軸舍遐徼而司禁闥爵不及嗣悲哉廣南之氓追思徳澤家祀而户享之朝廷報功之典尚缺焉後俞都御史鄧公廷瓉之請敕下立祠梧州至今雨暘水旱疾病災祥禱公祠輒應焉而桑梓之墟安可無祠以棲神妥靈在昔韓忠武范文正皆吳産也咸有専祠課功較徳公實與㕘廟享之舉獨可使貳乎因檄有司卜地而經營之按祭法有功徳於民則祀之典禮經有鄉先生死祭於社之文故祠之在粤尚功以敦報也在吳尚賢以示勸也非徒家廟嵗時伏臘以永孝思而已昔孟軻氏謂夷惠奮乎百世之上百世之下聞者莫不興起諸士子雖不及接膝於廟堂而希躅於里閈他日功名所就有等於公且踰之者使業不顯著澤不覃被有不赧焉而媿於公者乎吾等有事兹土者謁公之祠仰止而景行焉亦將有興起者矣祠在郡學東先為南禪寺址撤下宫之植而新之無費於官無取於民迺闢而門迺筵而堂迺翼而序迺邃而唐迺級而陛迺峻而墉一凖范韓之規而廣袤有差正以簿器酌以儀物舉以春秋可以常遵後之繼者聞多捐貲加葺而愈光焉此秉彞好徳之心敢要以為作俑者之功哉祠成於嘉靖乙巳之夏文成于隆慶丁夘之秋云系曰天挺襄毅嶽降之英濟商作楫植周為楨文醉六籍武閑五兵弱冠肅憲秉鉞専征三苖餘孽弗叙弗庭公徃于夷額叩角崩旂翻作氣鼓譟先聲燎蝟匪疾脱奚神軍中一韓異世齊名梧州報徳象飾猶生桑梓故墟懐賢夙興蕉黄荔丹惟粤之馨橘甘蓴美羞土之羮斷籐刋烈横石勒勳南陽慕亮柬海表寧竦踊稽首式是典刑徐文敏公祠碑徐文敏公祠者祠明吏部左侍郎兼翰林學士徐公也公諱縉字子容吳洞庭西山人也故號崦西建祠者季子太學生𤣥素也祠成謂余少從公游又為南畿所取士雅蒙公知亦能知公也屬撰記之余徃謁祠展象貌如生乃稽首載拜涕泣而歎曰君臣相與功名之際豈不艱哉先太傅文恪王公起自東山有子為擇佳壻得公良善孝廟末登乙丑上第改吉士授編修太傅方在政府而公居翰苑聲稱籍甚毅皇帝時公在史館多所紀録間與北郡李子夢陽大梁何子景明長洲徐子禎卿鄴郡崔子銑定交筆札揚㩁文藝獨以史職自任相業自期矣夫唐虞稽古建官殷周猶未云備迪秦而漢稍稍增置西京所載金馬著作之庭天祿校書之閣蘭臺給札之典栢梁侍從之儀上有右文之君下多掞藻之士遊㕘枚朔詞妙淵雲唐宋始建翰林置學士西京啓之也若𢎞文集賢地切清華承㫖供奉職隣樞要我明益重非由此選不克拜相執政可輕授耶世宗嗣位鋭情經術優禮儒臣公以宫詹主試繩鏡之喻拔必得俊又以少宰攝選銓衡所寄掄無枉材且啓心於講幄喻道於經筵凡治亂興衰邪正得失反覆辯析未嘗陳端而令上自擇兼之偉容儀善宣吐帝為改聴焉由是清燕畫接寵賚日隆相君嫌其偪已也隂嗾憸黨飛文巧詆公遂襆被東歸角巾長徃縱情丘壑委懐琴史若將終身焉厥後操軸既移張弧盡脱數從常侍顧問形求不見賈生何其乆也為召蘇公今安在乎鳯舉之使將駕安蒲狐首之嗟奄成宿草帝為悲悼焉乃復爵任子恩逮於存殁錫𦵏褒諡義備於終始公亦不為不遇矣余慨夫君臣之際寵孰維之怨孰戕之勳業中隳疇則間之身名晩完疇則使之命也何哉乃竟不閲崇品不躋上壽海内共惜之仲子詹事君𤣥成於城西建寢叔子州倅君𤣥英於山中祔廟並致孝享季子狹小舊制爰圖麗規因構赤城隙地奉以専祠上請於巡按御史先為長樂陳公瑞繼為洛陽温公如璋咸曰我聞徐少宰者先朝之良佐兹邦之賢達也觀風者不能舉以示觀奈何溷其後人檄下郡守太原徐公節行縣理將將助之金季子謝無所受惟聴幕掾督察工匠而已地名靈芝里跨芙蓉橋其廣幾畆延袤若干丈為堂三楹肖像其中旁為齋室翼以廊廡前乂亭樹碑凡制誥御祭諸文及題咏詩詞具勒焉伉而為門繚而為垣濬而為池邃而為道庭植松栢梧竹芳隂交覆縁溪桃李荷芰穠艷競敷東接膠宫西隣梵宇羣峯暎帶四水環漪赤城勝境也太傅有祠北望而近昔高步於金馬玉堂之上兹冥棲於花洲茂苑之間靈其並妥矣工僦於嘉靖甲子之春考於隆慶丁夘之冬題其額者按院洛陽董公堯封懸以耀其門者吳邑令福清魏公體明也考之日𤣥成等陳俎豆潔牲牷以告于祠㓜弟太學生𤣥佐冢孫履貞咸與駿奔云銘曰峻推崧嶽吳表洞庭降申挺秀誕徐效靈東矜太傅西詡少宰辟彼中流玉柱雙在早奉鴻私末遭蠅㸃心苟無愆躬遑恤蹇生居華屋死起𤣥堂茁彼芝里似蔓而昌條風獻節灼灼桃李儼在春官門藹多士花源通籞湜湜其清靈兹陟降宛昔登瀛槭木悲秋洞庭葉去客有延陵帶劒在樹子孫千禩勿替引之昭徳揚休請視銘辭重修至徳橋碑吳祀太伯自漢永興始太守麋豹建廟於閶闔門外其徙於内則自梁乾化間錢武肅始也廟臨金閶之溪宋乾道初沈度領郡乃建橋表坊廟曰至徳橋因廟坊因橋云迄我大明歴年兹多橋漸崩圮嘉靖癸亥開士屈真定者募諸檀越圖惟鼎新人鮮樂施事未易集也監察御史閩中陳公命下再借三按吳中駐驄兹地登瞰危梁顧瞻頽寢歎曰至徳若此後何以觀乃不責諸為民之上而諉於遊方之外乎遂檄所司捐贖刑之金刋他山之石盡易而更之徂暑而呀呷興仲冬而厲揭免力不踰時工不愆素基雖因舊無改而制則視昔有加矣然引䌫之堤紛為韜筒之肆虹跨之堰鬱為鱗次之居無復蒼檜翼門緑楊夾岸也由坊而祠將以次修舉焉二千石而下思紀鴻烈請勒豐碑謬以文辭見屬余按祭法有五若太伯者由克讓以敦俗民非假法而施建至徳以肇基國可不勞而定左思侈其巨麗陸生美其協靈非百世宜享者乎若夫仲雍揚波於虞海季札蹈節於延陵貽厥後昆追嗣前軌苟不見徳惟法是聞雖有脂荼之密不能回斗粟之謠鈎距之神罔以格鬩墻之訟故興校易性榮陽無並逮之獄閉閣引慝高陵有兩棄之田乃知化理之本在彼不在此也高風既逖末俗寖偷禮讓之邦嚚頑善詆愿恪之民輕剽好鬬向也襲跡皮冠今乃縱情綺靡始也脱屣千乘終焉變色一簞公軫憂焉故新是橋者將新是民耳俗猶梁也克讓則置諸安好爭則置諸危民猶水也有徳則易以濟無徳則易以溺由是往來兹橋者足將進而惕仰首坊下者澘焉而嗟有躬未遑謁其祠而赧然趨者矣是秉彞之在人心未嘗死而公激發之機入深而感速也粤稽古昔巡狩之典王者所至必陳詩以觀風納賈以觀俗布徳展義修禮秩祀皆所有事而公代天子優為之豈曰輿梁有司之職非務其逺者大者乎為下為民是謂鴻烈為上為徳是謂令猷一舉而二善具宜著之銘公名瑞字孔麟登癸丑進士由科第超拜御史者相繼不乏為閩世家云成化甲辰巡按張公淮嘗新厥廟太史陳公音為之記公同産也先大父祠祭公信為諸生時書其碑曠若有待重感於斯銘曰至徳造吳洪惟太伯宣父有言禮讓為國懐風永歎禋薦靡忒中葉道衰民乃作辟吾君之子鄙王與侯爵服非玩蘩潦是羞仲揚其波季濬其流端委于越比隆岐周肅肅柱下持節來巡六條咸察百墜俱新納民於軌返俗以醇歸報我后洽和神人烈士徇名太上不朽聲聞於前光垂於後昭徳塞違功實云茂竦踊兹梁文石並乆皇甫司勳集巻四十七
