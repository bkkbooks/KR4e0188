body:
  text: 皇甫司勲集卷三明皇甫汸撰五言古詩議獄詩敘曰臣汸始第覿政廷尉右署日取古刑書繹之以究夫君子盡心焉者繹而有所感輒發為詩爰得二十六篇紀之名曰議獄云或曰獄可議乎曰可疇克議之曰士師克議之然則作是詩者奈何夫詩非議夫今之獄也議夫古以諷今焉爾君子謂是詩也與政通矣洪鈞宰𤣥化大塊敷至仁哲王播彝憲顓䝉葆和真淳風無世下明徳有時湮折民紹虞典儆位麗湯刑堯服詎可象姬臬聊具陳斯功匪徒懋休命隆所遵昊天運休命哲王繹𤣥理春生有載陽秋殺無停晷大坊嗟久踰湛恩難獨恃豈不戒棼絲奈此回溢水獄吏苟盈門圄豻遂成市􅫵摭熾章程竒請繁法比明允願時忱遏揚躋世美士師昉自昔建官表惟能周方位司冦秦亦置廷平夏謨紀大理漢景崇令名正監列羣辟勾檢革咸寧御世若御勒佐王詰兹民惟天齊于民含靈在寰宇流矢悲影風忍與金石伍網密或易罹文深翻見舞凝脂已為疎刺爇末云苦奔馬匪善馳我索先自腐天王位正月飭吏布祥刑昭如日星鑒浩若江河行軌迹既夷易辭驗亦平亭執秩遂為諐僕區終自傾玉條有三尺金科無十程懸衡乃國法在鼎非吾民協民本中則折獄尚慈良稽古列嘉師利見休無疆聖化孚九服帝徳光四方頺風距澆季俗吏等尋常衞顗惜懸命博士奏施行臯陶惟邁徳千載揚芬芳末路速多訟民生滋不辰菲屨豈徒象赭衣應勿純誰謂九人髽勝彼一人巾史遷懋文學鬻拳濟忠欽嗟哉方下吏司鳴遂無晨潔身寶琬琰慎俾就煨塵南睢重骨立太甲本思庸孟明豈不念秦穆霸西戎井田與封建赫赫垂鎬豐唐明失懿矩効此肉刑同安得緹縈氏千載鼓芳風應有鷄鳴調垂仁漢牘中従橋犯玉輅入廟竊珍環釋之自守法抗節為平反匪無尚方劍三尺授奚諐張湯視意㫖何啻鸞與鸇矯矯安陵栢異代同勉旃嗣君遘陽九艶妻煽方處商辛慘炮烙曠世繩其武丕丕李唐祚不絶亦如縷火原伊向邇持平藉徐杜區區麟趾格何以飭斯蠱酬知儷白璧聽訟得黄金豈不黷爾賄道邇理可諶古人戒威富象齒能毁身何以讞天子惟有至公心竒衺效嚚訟律案日以繁遂逮見知法復啓告密門大臣不釋滯主者胡守文君子高五聽臚情或見原匪貴發摘神要使民無寃設網本為魚冥冥鴻罹之刑以威小人君子亦嬰徽膏火徒自煎蘭芳有時萎隆隆翻見絶皎皎易成緇䝉莊戒崇潁願處才不才鄒生下梁獄三嘆攄幽辭𤯝災願惟恤泣罪矜不讐迨徳睽明慎凝科肆䖍劉踊貴屨自賤崇朝聞噢休列星爛若數逸軫惜方遒遺亡及三宥孔邇起宗周古人重向隅何以久坐石安得秦庭中而乃無夜泣苦此秋荼繁畏彼夏日赫三刺不及訊兩造未遑繹宣公寶明恕相將止刑辟機辟徇多變畢弋列重圍終朝不及掩誰謂鳥無知前方增擊去後已搶揄飛聞幽良殺草懲纎應棄灰我行石阜中下懸千仞谿豈憚行者苦要俾犯者稀服駑不若驢藝禾在去秕毎毎原田中無使滋蔓起文情及武赦管仲㩁其理君恩自照微偏枯非令美大賂重南金願遇陶朱子偶語䝉極刑妖言著為令殺人如薙草我生謂有命區區鄉校情防川導其性鳶卵無毁傷鳳儀徳斯盛文皇軫民瘼愴念明堂圖遂令五覆奏獄豻有完膚漢庭致刑措縦囚風不殊後方殘刑逞謂鵲安巢乎法令惜滋章刑書違啓明﨑嶇難自列川險本人情哲王允欽恤君子利堅貞盜金匪鄰子時亦致山鳴明條在議故茂典亦原親法行自近始安得庇兹人居方陪華屋出乃列朱輪朝等磐石固暮為屠戮身鴻恩本浩蕩觸徳甘主臣寛身本無仁報怨寧有徳匹婦襲不忘何况武夫力矢勿共戴天安肯同中國先王以民成乃謹調人職書之未可訓推刃豈遑息春秋大九世臥薪甘膽食大夫刑弗上北面聊寵珍一徳豈不麗四維良可敦造室引自裁徒宫非等論盤水無劔辱朝堂有杖寃死灰未及焰獄吏従此尊吁嗟洛陽淚漢文猶寡恩鱗運各有適後天奉𤣥理表正謹三微求端戒五始物肅不可贏道成良自此徹縣日勿舉王者本重死昭昭象魏間安得干其紀春秋㫖數千裁自聖人心善善豈不懷惡惡良獨深欲蓋罪彌彰辭繁法以森誰當折漢獄淑問宣至今皇甫司勲集巻三
