body:
  text: 皇甫司勳集巻三十明皇甫汸撰七言律詩苦熱行西來赤坂途猶阻南望炎州井尚融水戲欲浮三翼舸從遊曾侍九成宮閒揮濁酒臨池上仰視明星起夜中惟有𤣥思除熱惱美人何處惠清風訪史恭甫於銅官山中仙潭如鏡不飛塵花逕深藏洞壑春靈運鑿山因作主鄭莊置驛逺通賔新題殿角懸金額舊倚忩扉化玉人聞道太常方禁酒歩虛聲裏夜朝真王守遊越仙㠶遥指武陵西幕府年來静鼓鼙行縣雙旌勞省歛向山五馬任攀躋湖波已覺秋風颯烽火猶憐芳草萋韋守郡齊多勝事六橋何用羡蘇堤送范進士勞軍還朝早從劒佩接仙班遥捧絲綸出漢闗解槖盡頒兵士賞棄繻爭識使君還鴻飛冀北春前信桂發淮南别後攀兄弟才名誰得似古來二陸自雲間九日邀郡守吳山登高西歴郡峰到上頭諸天下瞰五湖流韋郎治郡多公暇白傅耽山况屬秋黃菊紫萸開勝㑹朱幡皂葢引仙騶古來風景褰帷處非是尋常落帽遊王禄之同年六十予少三嵗而同產八月聊託青山之隱相要白首之期同時謁帝起攀麟早見為郎慶此身介壽喜輸新甲子養生剛遇是庚申右丞覔句多超悟内史攻書已逼真秋入香山堪結社幾迴花下特相親冬日邀蘇若川同黃張二子小集草堂竹徑寒扉掩白雲漫延三益啟斜曛歸來海内空馳譽相見江東好論文酒惜公榮畱獨醒花憐陶令贈餘芬眉山草木今何似猶道彫零半為君至後子約弟招燕作同時辭宦伴閒居却羡連枝鵲繞餘隙裏年華那可駐林間風物已堪書東山絲竹何須廢北海尊罍亦未踈莫訝日長纔一線春光漸喜到吾廬庚申除夕寄兒㮊雨堂燈火夜深時試頌椒花更舉巵陽氣漸迴知嵗改寒隂不㪚為春遲尚生婚嫁猶嬰念平子愁吟未遣思借問長安芳草色遊人何事忘歸期虎丘名山近接闔城西春雨才收水滿溪幾處笙歌成懺悔一林桃桞當菩提池邊試劒看虹起石上談經聽鳥啼莫道空門常習靜麗人無日不攀躋送張㓜于北上東京養士𢎞開館西廨憐君别寓居經析髙談掌故後詩成新體建安餘暫修孔相門前刺定得中郎座上書獨有鄉心千里共淮南秋水報雙魚聞報已報旱雲連薊北更看洪水漲江東天髙未鍳桑林禱河决難成瓠子功周制備荒儲九載漢家聞異䇿三公小臣亦願輸餘稅却奈歸田嵗不豐送范觀察再入滇中逢君造次將何適猶指南雲戒使車萬里盤江重到後五華諸寺舊遊餘跕鳶望處曾題字候鴈來時好寄書若問當年同宦者為言辭賦老相如送王侹北上將為其先公請遺典十年歸與白雲期一棹重來問所之物色定逢闗吏識姓名猶有侍臣知花開可是揚州興木落兼多秋水思若說先朝舊供奉君王應恨不同時無題溪通苕水倩芙蓉路似巫山定幾重按出新聲驚麗曲粧成半額儼花容庾公老興原非淺籍孺柔情未是濃底恨别離翻太促願教魂夢得相依壬戌元日律轉殘年已報春開正倍覺物華新門前楊栁同元亮谷口鶯花待子真容鬢秪應驚馬齒夢魂誰復問雞人古來但願生堯世長守箕山幸此身春雪春寒何自入羅帷雪滿朝園起更遲朱邸從遊衣濕夜公車待詔履穿時休論往事傷心素祗為流年惜鬢絲最是謝家才善擬將同栁絮恨風吹讀梁比部集寄悼人生夢幻千年促惜爾才華六代兼曾是多愁吟宋玉可勝長恨賦江淹故居寂寂門應掩新塚纍纍土乍添不見茂陵求草去名山空自閟遺籖燈夕試舞奉酬何孔目如花檢得舞教成乍遣春宵按曲聲長䄂翻嫌垂手捷短簮猶怯貼腰輕鮫人絲綴千燈艷雲舞屏遮四座傾觀罷麗詞誰獨就箇中何遜最知名水部有詠舞詩五日書懐麥風吹雨晝漫漫信是江城五月寒病起入山思採藥客來開逕强簪冠銷兵何用靈符厭續命須縈臂縷寛篋内舊蒙宫扇賜祗應畱作媫妤看贈何侍御古來崧嶽誕生申西望雲巖信有神暉暎晝逢衣繡客動揺時見避驄人封章滿積臺中草抗志深埋都下輪吳國遺風將欲采對君祗恐不堪陳嚴公解相還豫章追送淞陵作三首古來開閣自平津幾見功成得奉身逸老特蒙優詔賜乞骸何用屢書陳東都飲餞辭供帳南驛乘符速去輪歸到宜春酒應熟㪚金惟欲㑹鄉人明時扈聖廿年餘始得銜恩謝直廬秀水池臺非舊築鈐岡花徑是新除縣家嵗給山公粟門巷高懸薛氏車舟泊吳江秋乍冷野人聊為獻鱸魚今時元相古疑丞宿德朝中乆見稱暫免豈淹安石臥再來應就潞公徴艦陳兵衞遥張幟邑奉郊勞夜舉燈若訪西湖舊遊寺休將玉帶棄山僧春日酬子約喜看春日入新年老大逢時倍自憐綵筆頌椒稱勝事彫盤行菜慶初筵寒堂積雪消難盡踈栁輕烟㪚未全獨有審言詩早就漫將愁思寄春先春日書懐憶昔承恩遊宦時上林春色總相宜歸鴉已遂棲枝戀老驥何因伏櫪悲南國鶯花非壯日東山尊酒是佳期長安紙價今騰否猶是人傳水部詩春杪期子約山遊閉闗棲病百無營春暮惟兼風雨聲抗世祗應稱傲吏少年曾亦喚狂生長辭爵服從吾好靜對鶯花見物情兄弟古來成二隱西山堪作採嶶行答匡南王孫虛左歸來嵗月侵侯嬴猶感結交心洪都客㪚滕王閣白社誰招慧逺林樂善一春頥玉體題詩千里惠瑶音忘憂栁色今何似攀折東風恨不禁送鄭比部文茂還朝余塲中所取士也奉使遥看出漢庭平反今已報無刑寃銷旱海霑靈雨恩到圜扉仰法星雅志自應𢎞逺業少年誰不羡明經春風正好桃花發奈贈離枝楊栁青余遭兵變諸君携具慰勞小集園亭作先人敝宅近成墟别業猶存三畞餘竹下酒餚勞客載花間門徑擬親除但令沉飲深衷見莫遣交情病裏踈臧榖亡羊均是累可須重問士安書癸亥除夕生年六十經除夕獻嵗重逢甲子春臺内昔叨清憲使社中今數白頭人競裁綵勝祈多福早辦椒盤頌五辛陶令還家無長物門前惟見栁條新早春漫興春遲今嵗因逢閏獨往尋春春望餘日午隂崖初㪚雪夜深微雨乍催花星橋已見收燈市山郭頻聞覓酒家自是金閶嘉麗地不縁兵火减繁華寄許仲貽同年冰泮雙魚達帝鄉題書一為問行藏山中嵗月相思乆海上烽烟涕淚長縱酒偶忘隣媪舍看花曾記少年場五陵車馬多豪貴每過城南避子將余昔作恨詩今復作别詩蕩子年來輕逺行河梁那復念閨情月明夜識昭闗戍風急寒流易水聲不見紫驑還玉塞尚聞黃鵠餞金城傷心獨有隋堤栁折盡長條却更生答真陽周紹稷楊太史門人也枉訊兼示所刻楊子行戍稿滇徼辭官老更休河陽試宰仕初優春前剖鯉傳書至天上乘鳬佇舄遊想見儀容勞北海猶聞涕淚灑西州茂陵遺草君收取他日應逢使者求追悼白貞甫索其遺文主客風流數樂天儀曹清暇儼如仙彈冠共記趨朝日撤瑟俄驚歎逝年長吉囊詩空自秘中郎抱論與誰傳他時漢使如相訪衹恐文姫誦未全史子示袁州詩亦賦聞君獨抱感時心說却袁州恨不禁華屋春寒無處燕沙隄日暮只啼禽尚思禍起驂乘晩猶道恩過賜劒深詩報茂陵堪下淚莫將吟入雍門琴劉守遊白嶽時傳婺源之警奉訊山摽白嶽與雲齊江抱新安一水西獨往振衣朝閟闕遥瞻飛盖躡丹梯情憐花鳥春堪賞興發烟霞句每題仙吏暫遊非避世桃源何事使人迷送張給事瀋府冊封還朝手持漢節奉恩輝為展周親出禁闈向夕毎思青𤨏拜乘春遥望赤墀歸小山桂樹畱難住上黨揚花别易飛總有封章焚草盡醴筵休問諫書稀王百榖示余半偈齋詩因荅齋題半偈學維摩榻對蕉隂勝碧蘿已辦焚香耽寂坐無煩載酒問奇過啼殘好鳥春忘却落盡靈花夜若何為訝右丞傳妙句祇縁詩思入禪多送范憲副之魯栝蒼人也余昔治其郡杜門忘却人間世掃徑重迴長者車芳草客程聊信宿白雲官舍近何如觀風東去聞絃誦報政南來待簡書莫道外臺非禁地霜威猶是避驄餘雨中書抱一春風雨落花稠長日園林坐自幽北海以才蒙謗缺東京何事恨清流欲除煩惱空塵刼并悟逍遥是浪遊莫學虞卿頻著作書成猶未解窮愁王元美讀張㓜于紈綺集贈之以詩余亦嗣作阿士題詩自綺年新將珠玉綴成編共言體出西京後更道聲從大厯前池上詠鵝思不假席間賦犬句爭傳同心一見能嗟賞可是王融得我先訪白儀曹夜遊園亭當時移宅過江東早嵗為園象洛中歸謝玉階年不待夢疑金谷路遥通遊看花石存先業坐偶琴書見父風曾是竹林沉飲客夜經壚下憶嵇公無題自昔仙姝誤落塵愁中翻怯靜中因吟成桃葉空畱恨别去楊花可耐春毎過舊遊追以慨慿誰顧曲聽其真寄言宋玉非耽色莫道猶多美婦人九日結客湖山登髙悵無懽悰漫不成詠章憲副以詩惠訊賦此解嘲湖山風景控長洲不减龍山九日秋香梵林中居士社笙歌塘上美人舟自憐白髪身猶健欲詠黃花思未酬羡爾閉門能覔句臥遊𤣥想勝來遊王子往㑹稽展袁相公墓因有此贈平津髙閣已成秋一道寒泉萬木秋秘器盡頒遺寵在樵蘇特禁故恩畱碑題黃絹門人撰草積青箱漢使收非是羊曇行暫誤欲將雙涕洒西州送劉守備兵維揚建牙吹角海門東盡道劉琨節制雄時聽髙談樽爼上夜聞清嘯戍樓中已多遺愛畱棠樹别有幽情倚桂叢咫尺江流纔一水音徽猶得奉餘風莫憲使補官楚臬繼參梁岳奉贈聞道除書下紫宸滄江猿鶴戀征輪共憐潘令閒居乆可訝山公薦啓頻湘浦蘭芳違贈逺河陽花色待行春漢廷典禮須君草詎作梁園授簡人臘月十二日邀顧給舍張太史吳山人張孝亷小集張燈戲曰此隔嵗元宵也山人賦詩余因奉答今冬因閏得春先已覺陽和入舊年銀燭秉將消永夜華燈試取照初筵月乘珠彩宜爭艷雪映瑶暉似闘妍不是高才逢季重南皮勝事與誰傳赤城山房諸子賞雪不赴吳城無處不飛花别有城南眺更賖水遶横塘成素練臺臨茂苑盡瑶華殘暉似逐將軍騎寒影猶棲御史鴉可是梁園辭賦手爭言抱玉已家家宋憲使見訪之閩曾記腰章宰邑年忽看持節下江天種成桃樹畱遺澤折取梅花贈别筵橫海樓船聊自泛悲秋辭賦有人傳閩中為報烽烟息前席行當賜召還皇甫司勳集巻三十
