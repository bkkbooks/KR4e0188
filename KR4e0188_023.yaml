body:
  text: 皇甫司勳集卷二十三明皇甫汸撰五言排律奉和家兄山中喜雪十二韻憶昨天門雪飄颻下紫宸計時方社享協日已郊禋聖主元無逸齋心况有神瑶花不隔夜琪樹自先春畯喜譁馳道官儀儼從臣幸祠卑視漢登禪恥言泰萍澤遊空豫桑林禱獨真叨陪扈蹕列曽奉屬車塵念子俱留滯題詩更絶倫洛中應減價海內實遺珍黃竹賡歌意青霄感慨身遙思文似者譙是薦雄人夏至日天子有事于方丘小臣太學齋居作鳯甸方丘峙龍輿大駕來赤斿承烈日碧殿淨氛埃天上帷城建雲中幔屋開喜瞻周祀典忝竊漢英材暑謝唐文避薰應虞舜催明禋宣室裏徙倚泮宫隈繒燎光仍焰咸池舞更回自非留滯客徒愴失趨陪石崖讀書臺十韻為林中丞作崖為髙人峻林因勝地開徑迷春窈窕臺倚日崔巍傲吏園堪詠愚公谷謾猜齋同一舫建峯並九華回緗帙雲常覆牙籖月故來壁非匡氏隙帳擬馬融裁竒問玄亭字書藏柱史才仲舒帷不卷孟博轡仍催海內饒桃李忩前任草萊無勞重懷土自有柏為臺冬日遊虎丘故國殘冬返名山暇日遊攀蘿尋舊徑倚樹眺新樓洞雪寒能積巖泉淨不流虎將金界湧龍抱劔光浮客向空門散僧開慧室留已堪招白社何必訪丹丘題高行人使琉球卷奉使彤庭上頒封碧海隅天池凌浩渺星漢挂虛無雲日龍宫幻風霆蛟壑呼扶桑標外域嘉樹在方壺綏化遐難極論恩蕩不殊波臣承玉册水伯護金符采秀三山近乘槎萬里孤即思枚氏發因頌禹王圖挽張兵憲父母長夜已難晨千秋痛二人文翁辭化蜀孟母罷遷鄰鏡掩泉臺月氊凋黌舍春藏經空似昔遺挂宛如新蒿唱從兹就莪篇遂不陳高門容駟入孝里見麋馴北闕還堪戀南陔竟莫循餘榮與濳德并可慰霑巾自曲梁移水部初入朝作遄歸仙令舄重謁漢朝儀叨命分華省銜恩踐赤墀河陽三載卧天闕九重思禁漏和鐘盡宫雲與仗移城緣雙鳯轉駕擁六龍隨談樹仍今日栽桃異昔時筍班新劍佩蘭署舊纓緌願並青霄侣常沾湛露私五日集子安館中同賦兄弟有輝光翻飛在帝鄉朝回趨建禮節賞遇端陽花締金門萼鴻聨玉殿行辟兵同繫縷竊命並含香採艾懸郎署分蒲引客觴詩慙稱小謝名忝繼元方晞露湛恩渥披雲藻思揚常兹歡宴會無復夢池塘北郊應制坤紀德維貞乾行禮告成黃琮陳漢畤赤玉應虞衡扈蹕傳中道登禋望太清百花迎鳯輦萬栁駐龍旌日向帷城繞雲從帳殿生薦圭祗貺假端慰睿情營李伯華夜話有述室邇更情親相過不厭頻月憐歡會夕花憶别離春得御叨逢李交遊幾託荀履將鳬在葉書斷鴈來秦露裛仙人掌丹銷勾令神寧知龍劍合復以鳯城鄰蓬愧飄零轉蘭堪把贈新攄章徒欲報含意詎能申詠司中蓮花爾是天泉種來分水署芳春花不競艷秋影自含香葉以凝珠潔條堪攬翠長行歌臨衛浦言采憶吳鄉歡賞從傾蓋幽懷學製裳將無託梅萼同此照何郎送子安家兄遣告皇陵之中都天授我髙皇龍飛自禹方地曽留巨迹雲每識神光宅鎬謀應協懷豐意詎忘遂荒湯沐邑因錮鼎湖藏園縣祠官給泉闈烈考襄枌榆無馬鬛松柏有烏翔遹孝今王嗣恢圖中葉昌監周興禮樂稽古備文章觀德崇新廟棲靈狹舊鄉卜工維日吉遐饋俟風將東省推豫仲南宫曰爾良春鄉遙獻節秋水速征航望氣荆塗上登禋汝泗旁御香陳玉碗量幣發金箱别淚紛鴻鴈來歆陟鳯凰故都行欲賦揚榷思何長衣裳篇皇甫子補吏水曹分署廊禁掌天子衣裳之制凡逺方來貢獻者賜衣一襲臣汸司之黃扉直暇作衣裳篇在笥有衣裳我后受言藏來琛陳大輅獻雉自遐荒遂化文身陋俱承黼領芳懷柔知帝念錫豫見王章學製微才忝裁成聖澤長象宜明敢作被服願無疆秋日過慶陽伯宴樂園作第是承恩賜園因選勝開像崤山並鑿穿渭水縈回鳥接平津散花移籞宿來曲旃疏繡户懸榜跨瑶臺竇氏方通客梁家更愛才綺羅高宴會珠履盡趨陪今日歡猶續當年寵易裁從思漢城隱詎遣雍門哀秋日寄憶子安兼懷子浚子約漢殿祠官遣吳門遊子歸夀觴逢菊酒舞錦當萊衣北闕情猶戀南陔願詎違橋回司馬柱庭偃樂羊機玉季迎歌棣金昆對采薇自慚雞每聽遙阻鴈同飛草夢生春色星占聚夜輝談應及省樹勿與報芳菲秋暮述懷坐使秋華歇行歌思不窮鬒髮看從變緇塵笑屢蒙興來言采社迹往類飄蓬薄祿何須戀微官亦未工時方妬賈誼俗或誚揚雄解佩江堪涉乘查路詎通矢心同喪馬結意向冥鴻用世甘瓠落還山棲桂叢閲馬作驃騎歸天育龍駒服義臺種多窪水産獻或宛城來轡以明珠飾裝將瑞錦裁摐金元逸足噴玉豈凡材弄影盤花曲驕嘶繫栁隈黃池飲初罷御苑獵方回不數周王駿何言衛國騋北羣從此富西域未須開詠清虛殿水簾巧落銀河上輕垂玉檻前瑩將珠比綴湛與露爭懸晴作巫陽雨寒分太液泉詎殊銜鳯日恍似濯龍年影怯防鈎卷聲長雜漏傳夜來承睿盼霑灑濕星筵廣寒宫登眺即遼后洗粧處寶閣凌霄建珠忩映日開月臨疑桂宇露灑即銅臺山悉圖崤入池猶象漢回倚粧花屢發窺舞鳥能來傾國元因色勞民豈但財地隨時運改棟與美人摧殷監良非逺秦宫亦可哀聖朝留故迹皇覽實休哉早春送太常殷簿考績還南都來獻虞廷最歸典漢邦儀玉帛神如在旗常職所司椒花餘别酒楊栁贈離枝新水浮征舸鮮雲拂去帷繁華六朝地全盛兩都時遙想汾隂上猶憐太乙祠彭城鹿失咸陽上龍飛芒碭中天亡猶引恨地險竟成功壯士歌方散哀姬泣未終一朝看蹙項四海罷從戎落日荒臺在浮雲故壘空獨有滄江水流悲日夜東吕梁蓬轉歷徐方萍漂過吕梁奔濤朝浴景流沫夜澄光清濟疏源迥黃河引𣲖長天吳雲際發海若霧中翔縈石神難鑿襟山險易藏乘槎疑上漢捐佩似浮湘未能觀不駭但遣泳相忘永寧寺登木末亭香剎侵丹漢禪亭結翠微芙蓉懸寶塔鳷鵲影金扉祇樹千雲覆靈花萬雨飛緑深全隱馭紅密半遮衣籟引秋聲入鐙傳夜梵歸慿髙覽虛寂真乘在芳菲詠牛女針樓降靈妃帳殿引仙娥待月臨鸞鏡行雲罷鳯梭春心渺無限秋水悵相過廣樂陳銀漢輕車駕玉珂金飈回粉席珠露灑香羅乍至羞開扇將歸怯渡河翻嫌歡晤促詎減别愁多花燭人間夜新知展若何聞道聞道柏梁災君王避寢回金縣朝遂徹玉饌晝仍裁耀德千官警明禋百辟陪南師謨不戰西域詔無開堯覽留茨室文心罷露臺臣騫羞奉使邛竹詎須來送大司馬唐公龍養母還山司冦表陳情君王詔許行言歸拜家慶從此謝台衡後乘遵鴻渚前旌舉鳯城謝安臥東野疏廣餞西京八座夫人寵三遷令母名有懷桑景暮無恙板輿輕偕隱文焉用間居賦早成叢萱當户發新筍傍船迎贈是山公杖貽非頴叔羮夀觴歌白雪扇枕及朱明一奏循陔詠都令鄉思生朝來散孔席余亦返柴荆九日紀勝上李夏二宰相五十韻同王廷幹作御氣肇重陽徴期復際昌百揆藉元老一德頌明良丙魏同興漢臯夔乃佐唐丹心熙帝載黑髮掌皇綱衮職期多補台司表異常入朝榮劍履緯國粲圭璋雅望威邊服嘉謨積廟廊泰階調玉燭玄籥啓金方颯颯輕飈舉霏霏湛露瀼虹文亦已戢龍火遂司藏寒謝庭梧色叢飄苑桂香人間逢九日天上儷三光晉接來樞掖恩酺罷柏梁龍山悵前迹鳯甸眷時芳赤舄辭東觀華筵列北堂言從戲馬路遙指問牛鄉麾協非熊兆幡懸並鹿祥青門遵䆗窱玄圃戾徜徉長樂通侯第平泉隱相莊灌龍回繡浦鳴鴈集瑶塘飛陛連阿閣交疏引洞房章臺堪入畫金谷宛成妝西對燕山曲南鄰潞水傍芙蓉紛冉冉荇蒂藹蒼蒼徑轉疑彭澤園開類辟疆竒葩千品綴珍果四時嘗葉密無援李林深有憩棠靈魚窺豹飾幽鳥避麟裳假日登髙會需雲樂宴張花從青女獻酒訝白衣將寵佩萸房紫英餐菊蕊黃烹葵充寶饌蒸蕙錯瓊粻禹膳傳頻錫堯樽薦未央仙肴飫脭膬雅樂被宫商趙舞超方逸燕歌慨似慷鯤絃泛清瑟鳯吹度朱簧攀石苔侵屐穿雲竹礙璫主前稱萬夀賔起示周行遇井防投轄臨溪憶釣璜紉蘭滋九畹饁稼滌千場鴻渚遊襟敝鵬霄晀思揚寧知升上宰猶爾慕羲皇張組移歌席揮戈遞羽觴沙堤微鑒月煙術淨含霜筌理冥都契機心坐忽忘悲秋感羇客覽物倦潛郎開閣登瀛晚乘槎屬漢長驪駒留既醉蟋蟀戒無荒兹會佳難再斯遊盛必彰誰能序終宴徒自愧雕章詔獄二十句一自嬰時網終宵若觸藩史遷幽請室公冶繫圜門果被儒冠誤從知獄吏尊夢多寧辨蝶淚盡詎聞猿易枉虞翻迹難招宋玉魂徒聞懷楚奏未見理秦寃市逺應投杼天髙奈覆盆含酸對蛛户急難望鴒原良璞捐仍抱明珠盼尚存倘然蒙察識猶可報君恩獄中聞齋居奉柬子安十六句沈憂悵往迹倚禍昧來端畫地何期入呼天獨未安自憐收北海誰念繫南冠鳯或遭維縶鴒方待急難祇將形弔影無由羽接翰池非斷芳草臺豈敗叢蘭望日微須監飛霜夏亦寒徒懷宣室對坐使夜空闌十一月十三日胥江泛月旋舸登城歸詠寒江湛澄徹華月輝相鮮乘流載尊爼瀉影發樓船翠巘合杳靄蘭臯帶長煙萬艘雜燈火千門紛管絃飛蓋攬崇堞輟棹回前川曽經故宫裏為照荒臺邉情非烏棲夜迹是鹿遊年登高與臨水行樂併悽然哀張兩生孝友悲張仲才華伯氏先憐兹雙白璧同爾閟黃泉薤草何曾宿棠華遂不妍鴈飛春隴外鴒斷夜臺邊過客徒懸劍生交或絶絃臨喪獨無涕齊物詎須年觀虎跑泉自昔開僧舍言疏禮佛泉忽從衡嶽外幻涌越山前金穴神龍吐銀牀善虎眠響幽宜間竹色瑞併成蓮定識調心偈流知出世緣從兹功德水常普法華筵廬山道中漢江非逺竄廬嶽此經行陟險憑雲氣尋幽認水聲香爐時隱現石鏡晝隂晴綴壑青蓮淨懸崖秀瀑明煙霞一投迹松桂乃遺榮雅抱丘中想猶迷物外情將從逋客謝徒愧昔賢名今夜東林月寥寥猿鶴驚明逺樓嘉運開文囿祥光引畫樓星疑聚奎野地似接瀛洲鳯以飛甍起龍將刻柱浮梯雲遙入漢忩月淨含秋南嶽神攸降長江藻並流懸知堯室敞應是楚材收遊四祖寺若夫嶽擅雙峯師稱四祖據蘄黃之上遊迄隋唐而獨盛訟牒暇日成服暮春侣狎向禽禪參支許惟時兩稅方嚴衆僧莫聚鳥耘非幻鼠竄為災龍聽法以猶來鹿銜花而自獻因探上乘聊賦兹篇談經聞四祖結宇在雙峯玄籥留真偈𡨕筌出慧宗招提懸白馬欄榥架青龍泉落時浮鉢山深午罷鐘金河遙證果石徑悉盤松屐往香泥印衣歸寶霧封同兹探象教一為謝塵蹤獨惜僧徒散空堂客思慵遊五祖寺别有髙僧因傳正印禪宫並建化域非遙夫支遁愛山託名都而寄迹曇摩泛海遡定水以調心仁智互樂彼我同情矣嗟乎余幼敦詩書長叨軒冕然潘令誠拙崔宦奚工隱朝市而莫容謫江湖而獨逺將欲入空門以投老登覺路以啓迷受想徒嬰業緣未了幸兹歷覽安得亡言説法俱成道尋山並起禪言由六銖契教以一燈傳峻嶺標靈鷲香池吐異蓮金雲春不斂寶月夜恆圓檻涌湘江水忩通廬嶽煙凌虛情更逸觀寂思愈玄自忝黃州謫將尋白社緣寧知辭纍劫即是渡迷川觀音崖覽蔡子木題壁因賦斷壑疏靈竇巉崖出異泉標雲因建剎閲水遂安禪琪樹春將夏瑶花嵗復年回風度緑竹流沫綴青蓮定處堪浮鉢鳴時或詠絃幽生香積裏寒落鏡光前客有同心彥詩留寡和篇經過悵往迹歎逝在兹川皇甫司勳集卷二十三
