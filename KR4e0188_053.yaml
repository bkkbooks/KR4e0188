body:
  text: 皇甫司勳集卷五十三明皇甫汸撰志銘明中順大夫思南府知府王公墓志銘王大夫既卒之三年將圖襄事諸孤來乞銘余以不文讓孤泣而固請曰是先人之遺命也願徼一言之辱以慰九原之靈展狀季翁中舍君所撰云大夫諱延素字子儀别號雲屋姓王氏光祿大夫柱國少傅兼太子太傅户部尚書武英殿大學士贈太傅諡文恪公鏊仲子也其先汴人宋室南遷從而渡江居吳之洞庭東山遂為吳人大父諱朝用仕光化縣令以良稱自曾至高並以太傅貴贈如其官榮躋三公恩逮四世乃知佩刀之授有徵列戟之施無爽克紹祖烈者矣大夫生而厚重偉丰姿有器識甫冠以太傅三載考績蔭入太學恥居紈袴被服樂與諸生遊太傅方在樞密乃杜門絶不通賔以謝請謁者曰毋以纍家大人為也其虔慎如此時當中葉毅皇倦勤閹瑾竊弄朝政日非流毒搢紳赭衣關木暴於轂下者以百數太傅秉正嫉邪事每與忤瑾心銜之以相公望重終莫敢侮稍為斂容褫氣人咸為公危之尋上疏避賢者路竟遂祁奚之請不失大雅之哲歸卧東山海內歎其為完人云時長子中舍君窮治宫室苑囿凡輿馬服食靡不華腆粉黛聲伎充於後庭玉帛玩好實於外庫將以娛其親公悉屏而不御焉仲獨沉靜寡欲折節讀父書翩翩然佳公子也相公亦喜謂成吾清德者此兒矣亡何謁選銓曹太宰為長洲陸公執其卷曰非王太傅子耶真可謂得青箱之學者即取父第何有但朝廷盛典不可虛稽昔司空導右軍羲之皆由門第起家著勳簡册偉然成大丈夫是君家故物也仕貴及時尚奚待焉適有左軍督府之缺擬銓授乃以親老求南冀便省問衆益賢之因拜南京中府都事履任即恪守職司值畿內諸衛所類進表箋詣府多冗費一切裁革人稱便焉正陽諸門官軍領鎖鑰恆夜候風雪中行視憫焉捐俸葺廡以庇之此何異陛楯郎得休居自旃始哉在南都三載多所禆益甲申丁太傅艱服除補中府尋升經歷嘗有中使夜呼索阜城門鑰將出為章聖召醫叱曰禁門一鑰安敢擅啓然事關太后奈何詰使者言頗驗乃飭踐更卒嚴禦躬導出入旦日上疏言醫官召用無時不宜處城外以備緩急時嘉其奏焉舊制都司及各衛所武臣兩月詣京一比試第其能否懲勸有差邇來監臨者徒以虛文姑息視之法漸廢弛率為釐正不少假借士卒皆嚴憚參軍矣嘗奉詔淮揚有司餽遺一無所受丁酉六載考績妣胡氏由太孺人進封太宜人兩承褒寵實異數云是嵗遷宗人府經歷秩高而事簡銓曹亷其有治材不宜置散地乃就闕下拜為思南守歎曰余豈不能奉天子之威德漸被逺人為良二千石乎母老且病惡忍忘垂堂之戒驅峻坂之馭耶遂投劾歸太宜人不久背養獲奉終事孝思無憾矣既除服或勸之仕曰吾有先人之廬足以託處具區之田足以自給桑麻橘柚之饒足以比户封而鄴架之書可以委懷湖山之勝可以展眺人生行樂豈在一麾五馬間哉吾弟壯且謝秩韜隱從事著作縱不能附子臧之節獨不愧少遊之言乎吾其已矣士論高之性縝密寡言笑事必熟思而後行雖造次未嘗失色於人𢎞度有容犯或不校亦無脂韋睎世之態少喜臨書字畫遒徑得太傅筆法間占屬短律亦清逸不失家風涉獵聞見隨手籍記他日人有忘之者悉為陳説較若指掌殆今之崔林也居無虧攝強飲食壬戌四月朔偶嬰寒疾越七日卒距生𢎞治某年月日享年七十有一悲哉配陳氏初封孺人進封宜人乃先公卒子男四並秀發能文長有輔國子生次有夔次有龍邑庠生次有玘孫男女八人可謂蕃衍矣輔等卜以乙丑十二月初九日奉公柩厝于洞庭王塢之新阡越丙寅正月初四日合陳氏宜人兆葬焉銘曰倬彼王裔起自太原居吳震澤由汴來奔天挺太傅身任斯文扈聖熙載炳耀台垣兩朝毗化四葉蒙恩邦侯纘業亦貴而尊懷金剖竹皂蓋朱幡踐榮知止膏施自屯誕生哲嗣雖死猶存阡開幽隧儼對湖濆赫赫中順題墓之門刋石頌烈永詔後昆明文林郎浙江台州府推官張公墓志銘吳四著姓而張為一若今天台公者其先濠梁人也勝國時有仕平江路者避偽周之亂徙金陵再徙吳為長洲編氓自五世祖賜始也賜生彥達彥達生昶昶生凖世服賈以貨殖聞生子四人並好遊北走燕南走越結客少年遊間公子日馳逐於章臺狹邪間歸而務然諾輕財好施能趨人之急則又以俠聞仲子滂字應霖母李氏所鍾愛也始折節讀書其在燕也鼓篋入雍盡棄其裘馬之習從博士掌故講同異多所發明為大司成所知積分考行升諸上舍世廟戊子以尚書古文舉於順天疇昔五陵諸少年咸指目而訝曰張仲豈久人下者哉向以鴻鵠困於燕雀中耳自是十上春官竟不遇乃卷志長林躬理家事稍治第宅葺園囿地僅一區而池館島嶼之勝備其中花木禽鳥亦相稱自號青陽居士杜門掃軌以謝貴人惟二三密友時為開徑食不重味酒才三行輒罷去乃出所藏書籍圖畫彞鼎樽罍劍匕錞鎛咸千百年物賞鑒之暇則延師訓課其子而已內而諸從外而子壻各以别舍折劵畀之或婚喪不克舉者咸為周之有敦睦之風焉踰三紀嵗甲子季沖子鳯翼燕翼並舉於應天里中謂古有三戟張家將復見於今則又駸駸乎以顯聞矣乙丑春忽戒其紀綱曰為我趣裝將謁選于天官氏人莫知者先是嚴相公為司成時嘗拔太學俊異者得馬氏一龍從謙輩十有一人隆禮以優之仲蓋與焉後登上第者九人嚴既柄用凡受知者趨之多得巍科腆仕仲獨謝去曰吾寧不仕豈可以權貴致身哉相國敗始有此行或以其事寖淫聞於秉銓乃拜台州理官遂自號天台仙吏而人稱曰天台公云時侍御龎公尚鵬按浙之命甫下持憲良峻大署其門屬吏母得上謁天台公徑造其門閽人止之乃排闥而入御史驚而進之庭參未已遽升其堂曰未嘗為吏不識吏局然下僚謁長官承問治道亦禮也胡深絶焉御史斂容而謝京師傳以為美談視脂韋磬折足帖帖面赤汗背者何如哉不疑之諭暴公子天台近之矣將之官過里中猶攜諸從獻翼輩為竹林之遊忘其簡書可畏也移檄促之單車入郡偶觀察使者委以訟牒而名犯其諱入而作色曰理官與囚名伍豈有意辱之耶觀察引咎謝之其不為屈志媚上多此類期月之間疑獄多所平反弭大盜之逋捐弊田之罰郤鹽賈之賄俸祿之餘盡散以飾學宫廣浮梁士獲藏修民歌利涉又建正氣樓以祀方正學倉吏耗米將鬻女以償出槖中金代贖之人心咸為感動台郡為之語曰張君為政樂不可支麥穗自昔蔓草在兹以庭虛罕訟獄蕪寡逮擬堪也然同官嫌於伴食郡守甘之坐嘯忌才害能譽之所在謗亦隨之矯矯者汙不信然哉遂以年免聞報之日歎曰吾豈不知耄無能為耶聊效一官以見志耳矧兹地也稱仙都福庭傍郡去龍湫鴈蕩密邇間得馮霞御風躡石梁探海嶠吾生足矣昔稚川求丹砂於勾漏靈運娛清暉於永嘉某雖不敏請附二子矣或占綴詩篇間婉可咏也角巾東歸士民遮道車不得行尋建祠肖像為享祀焉抵家發裝圖書之外惟鵑蕉蘭蕙數種而已間居兼屏紛雜闢園濬池崇臺綺閣覽衛生之經談緩齡之術仲長眷懷於山水馮亮廣適於栖遊殆未涯也忽膺痺疾涉旬而卒隆慶己巳正月晦日也生𢎞治丙辰十一月二十八日春秋七十有四配沙氏相夫以才淑克昌厥家沒齒敬慎不衰男女各二長鳯岐娶陸氏次鳯儀娶徐氏皆太學生孫男二天台公病方革無他言惟曰我即不諱魂魄猶思越鄉昔人託葬南陽台人豈不能血食我耶卒之後果有屬吏素車白馬千里臨哭者悲哉彌留之夕召獻翼曰汝吾家千里駒也為撰述平生乞銘於司勳氏彼雅善文又汝忘年交也獻翼泣曰唯唯是嵗鳯岐輩卜以十一月十又幾日即逺于伏龍山祖塋之傍遵治命具狀來請夫張子藝苑名流得馬遷敘事法且所聞於家庭罔溢而徵余奚加焉聊刪次而系之銘曰張仲務學克振儒風肇由俊舉恥以資雄避權謝仕韜光固窮晚效一官烹鮮愈治爵服匪榮聊展吾志民號神君自稱仙吏不習塵容引年解紱樹碑留思建廟享食官豈在崇民懷惟德伏龍嘉麗卜宅妥靈赤城遙緬騎箕鞭霆餐霞吸瀣安知委形皇甫司勳集卷五十三
