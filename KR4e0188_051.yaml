body:
  text: 皇甫司勳集卷五十一明皇甫汸撰傳張季翁傳張仲子者年少而有才人多樂與之遊余亦締交焉仲子遇余良謹一日造余跽而請曰家君被褐隱市然而有古俠行年且六十矣懼其湮沒無聞也願先生賜之一言以圖不朽此與酌大斗稱千金為壽者孰久暫哉余曰敬諾乃作張季翁傳季翁名沖字應和中都鳯陽人也勝國時有仕平江路者避偽周之亂徙家金陵留季子賜贅長洲徐一貴家遂為長洲編民自賜始也是為高王父生子彥達彥達生昶昶生準季翁父也並善治産積而母氏李孺人又能持隂教相之富埒吳中季翁綺嵗即慷慨負氣不為崖檢從師學求知大義不習文辭事父母處晜弟以孝友聞凡中外吉凶之禮有疑皆質焉所議務協於義曰禮求其平易可行令通乎人情耳奚必拘學泥古哉甫壯嘗歎曰丈夫處世不能冠纓結綬乘軒擁麾以快其志當遊俠四方安能僵卧牖下事一室乎乃齎槖中裝去之京師與長安少年為鬭雞走馬蹴踘樗蒲博塞之戲間與高陽之徒酣飲壚肆擁姬促坐哀筝順耳食揮萬錢即貴人過之睥睨不為動色也都人士咸嚮慕之莫不延頸願交焉後語人曰偉哉皇帝之居乎賤臣何幸仰覩宫闕之麗基扃之固衣冠玉帛之會奇貨雜賄輜軿輻湊之殷與官儀之美乎蔑以加已請止矣遂歸省庭闈叩首泣謝棄養之罪親亦撫而為之歡勞焉及視家人産力勤自約與童僕同甘苦至營堂室必華敞所蓄器物玩好必精巧雖巨室未嘗有也其衣裳戍削之製輒為增損俗尚褒衣高幘曲襟侈袂故為狹小以矯之所簮帢帽服襜夾佩鞶囊人皆效之終莫能及也對密親良友詼談謔浪一坐盡傾而卒歸於正類託諷焉客有匱乏好為贍給或窘迫來歸能為之拯護族人忿爭決訟不取邑令之命而信季翁之言雖里中無賴亦善遇之而勸之改悟由是人益多其義烈貴人長者轍迹日盈户外而季翁益為醇謹母敢驕詡所生三子長曰鳯翼仲曰獻翼季曰燕翼並聰頴能應對有所占屬如宿構焉廣延明師誨之三子彬彬文雅矣貴人長者忘年與之交先為季翁起居乃日設賔客可供十人饌旨腆充於圓方焉長子仲子俱為太學生分遊兩都季子選為郡學弟子員將鼎立以盡友海內藝苑之士矣中嵗婚嫁稍畢因好山水之遊年躋六十輕捷如少壯時往來虎丘石湖之間或操小舟載酒肴以行或與二三交知徒步徑造令童子攜壺榼以隨誡其子曰汝曹不得與吾此流飄飄然有乘槎上漢意因號雲槎叟示無繫礙云此其細行也若夫倒篋而慕孟公之風折劵而𢎞馮生之量推産以敦愛讓刲肉而致孝感庶幾篤行君子之槩焉三致千金而再散之此與齪齪守財者安可同日道耶司勳氏曰太史公謂戰國四豪皆因王者親屬藉卿相之富厚招天下賢者顯名諸侯不可謂不賢矣然其勢易也至如閭巷之俠修行砥名聲施於天下莫不稱賢是為難耳矧聖朝法禁之嚴不得捍網踰軌惟信義節烈足以回風而激俗使人率履向化季翁近之矣夫生也有涯而名垂無疆古稱三張今濟其昌遲今顯揚善者之獲報彰彰哉王隱君傳丙辰之嵗余解宦自南中還聞周子以言捐館于虞山之陽未嘗不悲且歎曰吾蘇自是無醫矣即被病緩急誰可寄哉居一年所季氏子乘病迎王君診視之余從旁察其語病狀及所得如響竟不起如其言猶謂偶中未甚奇也又二年所孟氏華陽公病復往迎君診視之如語乘狀亦竟不起余始憮然曰周子不可復作乃今幸得王君哉君名來賔字國光别號玉田吳邑鴈宕村人也高王父暨厥考並善堪輿家至君獨小之乃從師學儒覃究經義丁辰坎壈被褐為衣含菽為食棲趾環堵中惟憂用疹因患耳竟瞶乃歎曰小子志欲以儒業顯今為廢人天乎命矣夫即不能自治設以治人有所效於世其醫乎遂好古方書隱於潰川之上訓童子自給廣購素問本草脈經難訣五色奇咳鴻寶諸書畫則手抄夜則口誦每至忘寢同舍人不堪其苦而君獨安之時越人吳生世魁日與之遊心竊異之常謹遇生而生亦知王君可教也間與語曰我有簡要診脈運氣禁方欲傳於子子幸母泄君乃敬諾生果出諸囊中君受而覽之因頓悟史所載長桑君事信非誣矣由是醫術益精診視人悉知病狀藥一再飲即愈病者嵗中多所全濟事具醫案中故不載里中長老貴人益為曹丘而君名浸淫上聞縣令而下賔待之郡守而下士待之又晉之臺司及開府行部迎君者檄使交於道矣前守林公版授散職謂章服便於趣召或曰與其冠帶從步吏後孰若褐見之為貴哉君亦殊不樂御也病家持金來即散而築室城西之隅頗耽幽寂焚香端坐委懷緗素課子絃誦暇則引流灌園交植花竹户外則結駟沓屨爭來迎君惟恐溘朝露而填夜壑也君聵於耳而聰於心問者以手畫几輒了悟雖仲車面壁周知四方曷過焉君性溫坦而有節槩重然諾口不言利而好施豫友人程禹謨欲以女字其子未請而夭君後揣知其意悵然曰余負程君哉越三年復生子而程復誕女卒踐舊約程貧且死臨其尸而聘之又客有貧欲火其親者君力阻之涕泣曉諭百計營貸乃獲地葬焉其信義多此類此豈獨伎足稱述抗行懿烈所謂賢而隱於醫者非耶今年五十矣而色若女子以恬淡養生殆黜聰而神完支離而德劭者也嘗著醫案二卷具載所診病者狀所立何方所處何藥死生驗者若而人及邑里姓氏言悉本於血脈經絡隂陽表裏與順逆之所由寒熱之所宜守數精明世莫能窮也又素問臆説一卷雜言一卷藏於私篋云司勳氏曰生民之所大患莫急於病世之拙工不習文理徒執古方妄意於厲針砥石湯尉醴灑以冀其生一或不救輒諉諸司命夭札可勝計哉本朝醫院之設崇以華秩優以清班然授非簡良失罔蒙罰甚則藥物且未諳覩矧息至之微癥結之祕乎使王君膺蒲璧之徵參闥庭之侍奏功何如哉而巖穴之士抱才湮沒名不出户者王君幸為遇矣錢居士傳吳自泰伯讓王季子辭爵厥後甪里興歌於搴秀披裘高盼於遺金世多隱君子云我明王賔氏而下志不絶書乃今見錢居士矣居士名榖字叔寶武肅王苖裔也世為越之臨安人後有壻夷亭張氏者遂為吳之長洲人父早卒事母有孝行家無儋石儲因號磬室以自况夫原憲環居非病馬卿壁立晏如奚戚焉性木強敦厚謝却紛華恥蒙滋垢嗜學耽藝晝夜誦覽不輟將修祕書永嘉之業以繩其祖尤攻繪事既善山水兼精人物圖花卉則管下生枝寫羽毛則屏間飛去至題詠亦間婉可玩由是馳譽丹青卿士大夫得其寸楮尺幅愈於百鎰千縑高車結駟日枉其門居士每長揖不為屈又不樂曳裾懷刺以通曰吾食吾力足矣何假縣令給肝王公貸粟也其槩如此而母氏亦有介山偕隱之風焉所交遊非文苑佳士則俠客酒人隆慶改元甲子一周季冬除夕初度之辰交遊悉載酒肴賦詩為壽而請余作傳以傳先是學院檄下郡邑各舉博學茂文者纘修世宗皇帝實録居士亦在聘中以多識前言往行可當世叔云司勳氏曰昔人謂求士當於其所不取及其所不為諒哉若錢居士者砥節勵行以立名聲於天下豈矯俗抗世者哉亦率履適性而已彼求富貴利達者炫赫於生前湮沒於身後不可勝紀較居士孰輕重耶使其脂韋磬折少自貶損於富貴利達何有而獨安於貧賤以肆其志蓋皭然自拔於塵滓矣尚何待青雲之附哉皇甫司勳集卷五十一
