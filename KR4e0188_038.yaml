body:
  text: 皇甫司勳集卷三十八明皇甫汸撰序集代作祝氏集略序代張中丞景賢作自昔文蔚吳中才臻江左言偃業於孔氏獨得精華厥後嚴朱並緯漢典顧陸競掞晉庭方朔寓為書師伯喈隱兹談藝彬彬盛矣其為俗也民有輕心士多師古伎尚奇巧物必精良故覽左生之賦而驗山川之巨麗誦平原之詩而測土風之清嘉考持正之序而覩氣狀之英淑至乃翕輕清以為性結泠汰以為質煦鮮榮以為辭美稱竹箭粲等春葩且至德造自泰伯峻節亮於延陵故士之生也往往玩睨爵服跌宕琴史雖輡􅀈未遇而撰綴不輟申孤憤於一朝流芳聲於千載此王孫之詡我公子者也余家食時蓋聞祝枝山云逮遊京師每學士大夫持其片言寸翰爭相傳視咸加歎賞惜乎未覩其全也丙辰之秋叨奉簡命來撫兹邦軍旋之暇躬厯山川周爰土風延眺氣狀其嘉麗英淑固無爽於乘諜所載也奇巧精良物産工師猶昔也握珠抱璧文獻之彬彬具在也間詢所謂枝山公者則己物化三十載矣而公之元子方伯續謝秩屏居亦久矣訪其廬蓬徑蕭然也索其籍珍發篋中也翰墨僅存其一又蠧所殘缺也蓋公少落魄不事家業而方伯克守其祖參知公清白之遺力莫能梓翰墨為時所重書竟人皆持去家無餘也世德其賢矣哉公諱允明字希哲性靈夙授機敏默成五嵗而手作徑寸之書九齡而目兼數行之覽稍長益篤於學夏無卷帷冬有穿榻遂綜貫百氏銓析九流窮鏡𤣥緇覃研緗素雖輶使未譯爾雅闕載靡不究而習其說焉其為文也芳腴融於心極雕繢暢於辭鋒取無竭源叩有餘響分吏占牘則十紙互通對客揮毫而千言立就同時乃有楊儀曹之博極都太僕之沖淡徐迪功之俊婉唐處士之縱誕公將兼之自謂取高第反覆掌耳乃僅舉於鄉晚嵗試宰興寧超倅京兆著有異績皆非所好也因自免歸而四君者仕罔通顯業並終窶謂非伯季之風節激之然邪諦閲公集述道德則闡而弗畔紀象緯則核而有徴論政治則可推而行陳事情則委曲而欵談名理則標顯慧宗志靈怪則不誣幽祕至夫賦綺靡而有則詩藻贍而寄深辭託諷以感物聲諧律以赴節神構匪襲肺吐必新體裁具備意無不逮者矣鴻匠如公不獲振鷺羽於彤階奏鳯音於清廟亦命也方王文恪掄材之初徐春卿揚譽之日豈直以鉛槧垂聲哉思欲銘彞鼎而不偶者也悲夫悲夫再閲大遊一篇則又譾䝉叟之巵言陋公孫之繩辨逸騁雕龍指深喻馬探其襟抱將扶搖宇內豈區區搶榆所可控而笑哉昔魯肅披卷以臨麾燕公視學于戎幕豫愧非其人悼往哲之不作而懼斯集之久湮也又先大父與方伯公同登進士忝兹世誼圖為鋟梓時則蘇守雲中溫君飾吏右文樂任其事用廣其傳云集之分類凡十有二曰騷賦曰樂府曰古調曰歌行曰近體曰古體曰論議曰書牘曰碑版曰傳志曰紀叙曰外教勒為三十卷總曰祝氏集略皆公手自編定富矣哉其四君著作都未間於辭賦唐則篇章寂寥楊復簡帙散失傳者徐集耳公别有祝子通祝子罪知蘇林小纂浮物蠶衣太中遺事野記興寧縣志祝子微祝子雜語怪槧鐸音江海殱渠記多未遑及後有好事者因豫興起庶搜輯羣玉不使韞韣名山也是為序楊忠愍公集序代林中丞潤作楊忠愍公集成其子太學生應尾屬序於余余讀之輒為掩卷興悼不自知涕之霑臆也嗟乎余安能知文又安忍為公序哉昔人有云文以氣為主而才以昌之王充著養氣之篇劉協廣程才之論栁冕謂才多而養之可以鼓天下之氣天下之氣生則君子之風盛斯又世道關焉而文之時義大矣觀公所述年譜蓋自綺嵗英敏夙挺艱阻備嘗混跡牧豕之羣研精掛牛之日即以天下為已任學以談道德務經術而恥為富貴紛華之習既而發科登仕紲組兩都含香三署每痛際運康熙而不免有壅滯之患遇君神武而未屏操弄之姦思回聽於逆耳圗蔓於脫距乃由車駕上疏乞罷馬市斥其謬者五不可者十書忤權侯使仁人之言不䝉其利而反構釁稔公死且不畏奈何以播遷怵之耶復由武選上疏乞誅賊臣數其姦者五大罪者十語侵彼相使忠臣之言無益於國而竟取滅亡緣司刑者承望風㫖文致其罪惜乎寃哉昔賈生不容於絳灌李雍受抑於林甫古今同慨矣至誦其言猶凛凛足以鼓天下之正氣而激天下之士風雖被笞箠關木索暴體裂膚受辱慘酷而志不為亂氣不為沮非素養有定能然哉方其深念於燕居未遑以暇逸其所著作多綴毫牢户之中染烟胏石之上此與演易受書曷異焉故辭多宏麗語罕怨誹江河一瀉乃徴其才光焰萬丈悉由於氣豈假雕篆以逞伎摛繪以求工哉公在南司封自謂肆力於詩文之學信非誣矣夫靈運藝苑中散清流猶能占藻俟時鳴絃揆日愴霜葉之餘生歎廣陵之絶響公詩欲還浩氣於太虛矢忠魂於圖補胡悲且狀哉余在南臺罔識忌諱因獻狂瞽謂將從公以遊幸䝉採納卒之故相編氓凶子棄市少泄天下之共憤慰公等之幽魂且知向之遇害非先帝意也天道有知人心不死幸而聖君嗣極追録諫官擬公為首贈爵太常諡以忠愍建祠以享血食䕃子以裕後昆報亦隆矣雖昧大雅之哲終成烈士之狥垂聲宇宙爭耀日月視仇嚴獨安在哉遵巖先生文集後序代郡守劉公溱作遵巖集者晉江王君所撰著也君諱慎中字道思人稱為遵巖先生云大中丞芳洲洪公為君同鄉又同志也因刻其集并序諸首以傳謂余小子嘗董梓事不可無言嗟豫鄙安能文又惡能窺先生之藴而為之闡揚哉聞今之掉鞅於文囿者咸推轂遵巖凡卷冊所傳詩歌及錫山所刋家居集閒亦嘗覽其略已心醉其言延頸想見其人而不可得兹獲誦其全又厠名於簡末顧不幸哉先生自束髮綴文未冠登第內踐吏禮華階外秉文衡憲職屬辭英敏殆出天才而不知沉思通𤣥悉由學力兼之負氣抗俗不習塵容趨時因出倅郡稍遷參嶽竟爾謝秩甫踰壯齡耳由是杜門却掃研精覃思探討彌邃著作益宏四方馳書走幣爭來乞言者足交於道仕於閩者以不得其言為憾君以次應之隨題命藻略無難滯得者寵於握珠懷璧歸矣具載集中罔可刪棄夫其為文也長於持論而不尚雕繪原本六經採托七略綜括九流至下筆特創新意罕襲陳言追議古昔較若目前逆策來兹信如左劵事有明徴語無牽合非博極能然哉雲蒸霞鬱變幻百端河决川流一瀉千里循其言可以入道行其說足以成務人皆稱今之曾氏也觀所撰南豐文粹序則其所取法而自期負者端在子固矣其言曰極盛之世學術明風俗同道德一而文行於其間三代而降士之能文者徒取之於外以悅世之耳目有能道其中之所欲言而不免於蔽若公孫𢎞徐樂枚乘谷永相如董賈馬遷劉向之屬或駁而不醇或曲而不該皆無取焉至宋南豐曾氏傑然自名其家庶幾有本於中而非掠取於外將折衷諸子之同異㑹通於聖人之㫖而思出於道德無不醇不該之弊此非其自况也耶至其為詩亦必緣情止義由漢魏六朝以迄三唐靡不融貫亦以自名其家者惟求合乎麗則不詭於風人而非在一字之巧一句之工也雖退處巖穴而言多華郁暢朗不為窮愁怨誹之態所養蓋深逺矣或有以先生位不閲於崇品年不躋於中壽不果舉其言以行於世致惜焉者即使君登三事總百揆功業雖𢎞著作未必底於成也言既可以垂世不朽又惡彭殤之足論其年哉按閩之晉江自唐歐陽詹始舉進士與韓愈李觀崔羣輩妙一時之選史稱其文章回復明辨為愈所推厯數千載而先生出焉殆亦氣運之相值歟皇甫司勳集卷三十八
