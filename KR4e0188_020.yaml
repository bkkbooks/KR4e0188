body:
  text: 皇甫司勳集卷二十明皇甫汸撰五言律詩初至京同諸進士集羅山人館探韻各賦得東字十年違冀北一壑卧江東歸去同元亮重來藉子公鶯花新漢月燕麥舊春風祗自持團扇慙恩女伴中諸君乘月攜酒見過遲謝山人不至席上作芳樹長安道春宵動旅愁一尊良宴會四海盡交遊玉漏寒頻度金河靜不流清輝憐謝監何事隔南樓經司直兄故居平原寓東洛參佐接西鄰履跡都埋草琴臺尚網塵徂年同過客華屋屬何人獨有空梁燕飛來攪暮春題張子言故居未果逃人世居然託帝城一區留敝宅千古謝浮名枯樹昏鴉集頽墻蔓草生空餘四愁在誰復擬張平見月懷鄉巖居遙對月時復望長安一作西京客翻憐故國看關山經戰後烏鵲繞枝殘多少幽閨恨刀頭欲問難子約弟調官因寄同是冥飛羽俱為世網牽金無漢廷譽玉有楚人憐興減彈冠日情違襆被年何如賦歸去偕隱密山前上巳日同友人集大寧寺得幽字帝里冠裳集禪堂禊事修人天春駐景花竹暝通幽香積開芳宴金河引曲流誰云王逸少陳迹獨千秋首夏集姚令園亭分得君字㑹有幽棲地能招好事羣草芳殊未歇鳥語更相聞掃徑花飛雨留關竹護雲無須謝車騎心逺為徵君過廣平懷吳二純叔爾昔承麾日余兹趨府情棠陰覆聽事苔石見題名夢裏叢臺月愁中漳水聲何如窗岫色能憶謝宣城登廣平借寇樓寄體乾于浙省同是皇畿宰回驚二十秋人隨台嶽迥年逐滏河流月黯琴疑在花深舄詎留寇恂那可借日暮倚高樓贈朝翰檢在告金馬沈方朔文園卧長卿何如狎鷗鳥暫此返柴荆草就編年目花餘愛日情庭闈自可戀詎是厭承明寄子約弟兩地承嚴竄同時罷省郎因書問舟楫何日下沅湘客夢頻棲月征途欲戒霜平生題賦意那得倦遊梁秋夜集李守衙齊政閒庭每寂吏散日猶曛下榻生秋思傳杯語夜分暗花微泫露纎月淨開雲失路聊相倚何期御李君生朝寄兄弟白髮逢初度清尊思惘然鶺鴒原上夢犬馬客中年眉宇將雲結心旌共月懸朝來淇水望時問渡淮船從事河上昔官淹水部兹役愧飄蓬散帙觀周傳尋源念禹功荒城下寒日落葉送秋風獨有逍遙意將從河上公簡長垣劉尹獨坐臨流處彈琴最憶君降霜花發候落日鴈來羣縣外夷門路齊中少室雲裁詩寄劉尹佳政欲相聞訪同年葉給舍北闕因言政東莊早拂衣人從泗水别書到廣川稀素業存荒徑清宵夢鎖闈相逢惟勸飲世事已俱非邯鄲道邯鄲臨古道車馬此通津錦瑟空埋恨緇衣易染塵王昌非蕩子趙女是才人併逐漳流盡荒臺蔓草春吕公祠金榜標新界琳宫接舊城暮扉煙樹紫春水石橋清遺寢仙翁蹟崇祠聖主情塵勞俱夢客非止一盧生懷沈二儀曹地重留司後官清建禮初江間堪吏隱天外惜離居草合春回騎氷開日望魚西京訪遺事還擬賦憑虛永嘉登江心寺雙塔峙琳宫諸天一水中回看雲島合直與海門通荒寢憐文相高樓憶謝公潮聲無日夜流恨古今同題郤金館兹山有崇構本自薄黃金荒草空成昔清風猶在今鋤揮曾不顧裘敝亦何心願得無相贈逃名寄已深臘月晦日酌酒贈王生一龍湖海逢除夕衙齊戀故陰感時行路歎落日倚門心竹葉傾難盡椒花坐已深南州留榻在且莫賦歸吟訪周氏舊司勳隱居南郭裏秋色越江前道訪鴻䝉後名聞畫省先示人惟杜德守己只雙𤣥一謝金門路寧知玉蕊年天寧寺遷內柩翠翣辭官舍靈筵啓梵宫香銷灰劫後淚盡雨花中棲處知魂寂歸時悟色空一從羅帳冷不敢問春風方山人别我括蒼今㑹于殊勝寺官舍春懸榻僧齊夜落帷暫來休汝日一為訪君時望裏分鄉樹愁中惜鬢絲不知何戒律可以斷歸思早春寄子約弟余方有悼亡之戚獻歲思吾弟何時報徙官夢勞池上積書到洛中看太史身猶滯潘生淚未乾梁園飛雪盡欲下剡溪難子陵祠問水下桐津看山入富春花源别是路魚鳥自為鄰獨作垂竿客多慙薦藻人滄波流不盡何以遡芳塵崇道觀登試劍石同龔溫州采秀臨丹壑攀蘿踐白雲仙源那可測巨石已中分劍化靈猶在爐寒火自焚今宵看斗氣一為問夫君晚登棲霞寺在青田縣南野寺投鐘暮禪燈隔水明來尋種芝處但見桃花生絶頂圍青嶂彌天邇赤城坐談空色理徒有駐顔情馮公嶺經桃花隘辨壤猶通㑹分途稍入甌凌空惟仄徑界道有飛流山鳥看明滅關雞問阻修因懷簡書畏曾是不遑留石門洞門紆徑引飛瀑半空聞掛壁常看雪開窗但弄雲帆輕過鳥疾衣冷落花紛何事淹歸馭清暉戀謝君白雲山青山行處盡始覺白雲深錫化無僧在鐘鳴有客尋花溪遙隱壑蘿徑曲通林坐得浮生理悠然忘我心三巖洞峭石何年斷飛泉竟日聞虛堂秋易入晴樹雨難分夜似觀廬瀑朝疑帶楚雲坐深羅袖冷猶自戀氤氲送王亮卿遊天台嶽路從兹始仙源信可求客情臨海嶠鄉語永嘉舟天外看霞起林間聽瀑流無能解纓去送子欲神遊答吳二純叔江城一别後已是隔年春棄置同遺跡相逢但愴神産因淹宦減鬢以悼亡新徒奉平原藻嗟無可贈人五日松江道中積水雲間杳輕帆雨後孤紅巾橫道路白髮滯江湖客夢遙驚鶴鄉心欲問鱸干戈正滿眼空對辟兵符秦駐山萬乘留秦蹕千秋紀越山水從溟海外雲自會稽間草樹回窮髮魚龍候聖顔不知徐市去靈藥幾時還海鹽勘事訪王世廉不值荒城罷兵火溟海尚波瀾詎意徵君里俱為暴客殘短書無自達長鋏倚誰彈始悟平吳易空嗟得俊難萬象山崇福寺蓮城最高處蘭若此中開水見東溪去僧聞西域來啼烏喧梵座花雨淨經臺觀萬俱空境何須得象回縉雲尋唐陽氷吏隱山贈李方伯隱吏久不作青山名已虛窪尊花下蹟科斗竹間書沉飲非妨政耽遊為惜餘藩侯實宗彥曠代此懸車東溪寺源自大盤山東溪斜帶郭數里接仙源嵐氣回盤嶺灘聲到石門僧開翠微舍客造白雲軒訝可無機事看鷗代晤言九日寄子約時海寇甫戢聞河中盜起漫有登高處兼當逺望何對花驚白髮見鴈憶黃河亂後書來少霜前木落多不堪羇宦日同是阻干戈送客之濟上訪金君舊吳守臨淄路何許之子謁賢侯昔受千金顧今懷一飯酬刺修緣北海榻解為南州若問長洲苑傷心荒草秋贈王生維楨仲子世業本青箱詵詵後益昌談應呼小友書已授中郎鵬路瞻霄近雞窗惜晝長阿翁雖善賦輟草待靈光訪萬師寺居行營辭細栁開府寄東林對塔占雲氣安禪就樹陰輕身驅白馬收士散黃金何自除煩惱澄公誦法深别我兄弟之滇中少年迷善宦中歲尚投荒同氣分花萼驚飛折鴈行蒼山官舍近炎海客途長莫漫愁烽火音書早寄將贈黃梅令張九一新蔡人也解褐趨朝日腰章宰邑年人同潘嶽少政並子竒賢楚地從兹始梁園若箇邊更聞兩峯勝政暇一逃禪邑有四祖五祖山登赤壁萬古滄江上清秋赤壁開浴鳬知舊渚橫鶴見新臺妙齒瑜非昔雄心操已灰愧無題賦手猶欲記重來己亥歲余謫黃理官嘗遊赤壁擬蘇長公製賦一首越甲寅余有滇南之役道復經此欲撰後賦征途未暇聊占短律巢縣昔覽先公傳常懷高士名今來洗耳處益感讓皇情郭外箕山色林間潁水聲能令車馬客延竚愧塵纓重經四祖五祖山慧宇接巖阿塵鑣惜再過鄉書吳鴈盡客淚楚猿多鐘梵凝青靄銖衣掛碧蘿那堪彈指後年鬢已蹉跎清平九日重陽頻作客萬里動離思况此牂牱路兼之風雨時孟生高興盡陶令去來遲霜後猶無鴈攀花欲寄誰寄所親故國吳關外遙心楚水東九秋日易盡萬壑路難窮民俗非夷舊人言與蜀通因書報親串行始達黔中關索嶺斫石微通路攢峯儼作關雲中馬嘶去天上鳥飛還水向盤江滙坡從香樹攀平生慣履險於此亦摧顔香樹坡名顧參軍於板橋驛贈别寄憶昔感驪駒賦辭君金馬關河橋相送處猿月共荒山烽火猶傳警田園未遂還梁溪如借問芳草夢魂閒早春五華寺淑氣南中早春遊上界清寺緣雙樹建山識五華名積霧鄰滄海餘霞似赤城沉灰如可辨浩劫在昆明圓通寺緇流棲梵處不與俗情諧花雨藏春徑松風掃夜階欲觀一切法來叩八關齊漸覺忘言好探遊愧詠懷馬跑泉漢將長驅日黔關夜度年千盤雞背險百折馬蹄穿梅盡難銷渴河乾不受錢從來踈勒外知有耿恭泉溫泉靈泉㵼溫液灼水沸華池煦沫看流處凉風來浣時花凝百和氣樹偃萬年枝詎說驪山上痾銷神女祠泉上有無名樹四時不凋升菴詩云瑶草蟠千歲是也曹溪寺寺有泉源一日三至名聖水云鷲嶺知何處螳川去不遙仙巖鐘夜月聖水梵時潮浴罷衣聊振風停幡屢飄逺公一相謝乘醉下溪橋邀李憲長同李侍御登海上浩然閣夕泛建閣賦詩者吳姜公龍也閣與詩皆無恙而姜為異物矣因次其韻繼之以慨焉高閣與雲浮平看洱水流相邀二嘉客來泛一仙舟烽火堪愁思煙波幾浪遊望鄉因歎逝陳跡已先秋宿太華山寺昆明積水上特秀太華峰寺逺雲間塔山深午後鐘庭花閒自落海鳥偶相從一就松齊宿晨關報己慵宿太華寄答周子移文謝周子余在草堂眠竹徑雲初合薇軒月自懸秋光涵一水夜雨淨諸天即境雖云異看心共是禪訪周子籲小酌水木軒愛爾官齊裏居然隱者同逺山當戶入瀑水隔溪通蔓草牽風碧薇花墜雨紅故園經亂後翻不似南中夢子安兄作一為生死别獨宦尚飄蓬白首行荒外青山值亂中九原人豈作萬里夢猶通今夜看春草池塘思不同九日寄子約三吳猶轉戰萬里共含愁苡薏蠻中老茱萸海上秋懷仙入靈境為政見風流自愧投荒者何時逐少游得王南安書并詩因寄越鳥一相失同時别㑹稽忽傳千里札因奉八行題庾嶺看天末章江帶郡西新詩仍自好名愧四生齊滇省監試武士鎖院此重開登壇屬異才花非桂子落月似栁營來漢業銅標在邊塵鐵騎催行看投筆去竚爾勒銘回送陳水部還朝奉使來金馬徵錢助水衡歸程望閶闔别酒餞昆明歲序看湘鴈春心報省鶯因君問鄉土何日海波平滇南雪後閏月凝寒早炎方見雪稀六花金馬上一似玉關飛素積昆池練晴連華嶽暉吳兵猶挾纊未報解征衣送董道夫還大梁歸心年不待高蹈古來聞牽世俱為客辭官獨見君到家春草合度嶺瘴煙分去去嵩山迥何由係白雲萬憲使招遊龍華寺寺臨交水而萬江州人也城陰尋古寺日午報鐘聲豸服防僧避龍華護法明雪殘雙樹冷溪抱二流清為問廬山客何如入社情遊清溪洞洞壑何年闢緣溪五里間探竒披瘴入眺險拂雲攀泉暗惟聞響花深不記還始知窮海外别自有名山青華洞暫輟臺中鞅來尋洞口春壑幽經窈窕石怪訝嶙峋氣潤常含雨明通不受塵鑿空非漢使到此定迷人歲暮齊中作一作南荒客常懷東海思流芳忽改歲尸素已多時薄俸僧堪施閒心吏豈知朝來華山爽聊復對支頤為張含追悼少君二首聞遺孩孝慧云舊事徵彤管新詩哭繐帷一朝謝膏沐誰復嗣音徽入室看遺桂臨堂問卷衣世人無李少空望彩雲飛埋玉嗟之子寧馨有令兒多應憐鳳羽非止為蛾眉夜壑長留恨春風祗益悲名香産西域不驗返魂時始發滇中荒外倦遊日南中歸去情春心同社燕旅跡任江萍自恨拂衣晚誰云脫屣輕獨憐山太宰門下絶嵇生貴陽阻雨農家正喜雨客路不堪愁白馬吳門逺商羊楚水流眉隨朝靄結心待夕雲收余亦歸田者山中幸有秋郝憲使招宴嶽陽樓高閣倚清虛長川落照餘從來風景處能使興情舒垂翼同歸鳥冥心不羡魚因君念傾蓋聊此駐征車過蒲圻弔廖學士碧山成葬地華屋但荒居衆女爭相妬明君恨不如甘泉無獻賦鄴架有藏書獨惜招魂處湘江夜月虛潛山五日卜尹惠酒故國兵戈日長途風雨時忽驚芳草歇猶恨及瓜遲仙令回雙舄良辰贈五絲朝來皖山樹渾繫隔江思皇甫司勳集卷二十
