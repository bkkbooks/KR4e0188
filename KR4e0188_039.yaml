body:
  text: 皇甫司勳集卷三十九眀皇甫汸撰序集題辭北嶽編題辭嶽者何捔也捔考功德者也若稽古帝舜十有一月朔巡守至於北嶽朝后覲牧協正同修僉如西禮兹謂非功德也邪北嶽何謂謂恆山也風俗通云恆常也萬物伏北方有常也而白虎通亦云北嶽有常山者何隂終陽始其道常久故曰常山云易曰觀其所恆而天地萬物之情可見矣此聖人法天圖治久道化成者也孰非功德可捔考者耶秦漢而下登封錫號代崇喬嶽旅名視公之說附㑹於鈎决比䜟間矣且侈心黷履遐放祕祝雖一禱三祠神弗福焉肆我高皇帝膺符御極奄有冀方稽古率典誕乃釐名秩祀懷柔嶽神暨我文皇帝受命作京宅兹天邑俾朔易之疆奠為輔鎮神肹蠁焉功德不恢恢耀乎可考而知邪逮列聖纘緒燔柴加牲引望靡替無俟駐華警翠泥金瘞玉而靈貺假矣夫今之兩畿若十有三省嵗以監察御史持節往按其境顧將命於天子巡者也時則有若施公山省方展邑眺嶽侍祠告文陳饋禮也越若許公宗魯以中丞咨命來撫猶古四嶽之職總領侯牧以司嶽祀者焉公蒞厥土亟使登禋祈殫民祜亦禮也然施之感於功德也無從曰嗟嗟盛美弗録曷以永觀台職其攸愆用是編嶽云編成而公式遄歸君子曰巡循也其義大其責艱是編也可以復天子矣乃有屬令皇甫汸者為之第其次比為題辭編公志也侯丞廷訓之請成公志也編首帝制者何尊時也詩首周頌其義一也曷以工言次之工以揚言也王者所至陳詩以觀風御史采風者也古碣盛矣久將泐而湮焉弗志後奚以稽君子多見則識而畜是故以拾遺終焉題許員外安平十詠詩後安平十詠成許子以示余余覽而歎曰緬自渡淮攀鱗遊燕晞駿路首南徐途指西楚觀吕梁之險望泗鼎之氣峯標浴日臺起歌風未嘗不弔故疆之遺蹟興登嶽之長謡攬征駕以躇蹰溯歸艎而延佇者也若張秋者星分奎婁之野地控齊魯之墟固澤國之雄鎮而漕河之要津也𢎞治河決孝皇震憂沉馬下捷殫役倍於宣房導熊障瀾課功嫓於積石是雖一旅之圻百家之邑板築既覲禦衝斯固由是車挂䡺袵連帷檣櫓紛為㕓閈孳貨鬱為都㑹矣嘉名肇錫是曰安平煥龍章於璇榜峻雉堞於金隄洚流同之警堯𤣥貺終於告禹唐哉休哉休哉唐哉余嘗窺龍潭之浸而得順下之性登戊己之山而驗五德之運誦武功之碑而知底定之艱撫帶劒之枝而感季札之信詢蒞阿之治而慕子奇之化訪辟榖之遊而訝黃石之事然時無酈生莫辨泉脉世乏魏氏疇記土風將問千秋以烏丸探九域於魚豢詎可得哉信美地靈誕生人傑許子兹産也才稱掞藻識妙窮源十詠區分七言各賦篇稽乾曜什闡坤維陳列隨刋禹貢之㫖也原本山川青兖之針也荒奄海岱頌閟之辭也奠厥禔福歌瓠之響也渢風乎可以傳矣許名用中初仕水部澤土是掌載陟地曹財賦攸司擬裴秀之輿圖資張華以武庫皆經濟之心也豈徒摹景物括形勝快少文之萬里悵平子於四思而已哉十詠者詳於自序故不重述云題吳純叔堅白藏稿吳光祿堅白藏稿六卷共詩若干首皆其從宦兩都豫告家居及遊楚越時作也光祿幼挺獨秀早臻博極學修史走業紹𤣥成三百而下靡不殫心六代以還並能經目遂乃蓄藻於建安騰聲於天寶希躅於少陵泛駕於長慶兼綜潘陸妙契陶韋故其綴辭婉以麗其御氣雄以健其抒思優以俊其援事典以則其振響和以平才情信美而興寄尤深矣通篇如曉出左掖夜集𤣥寧易水流操淮隂展圖臥疾叢桂園送馬吉士歸江東標之今代奚謝英靈厠諸古人何慙風雅又汝官漳水北今得定州書工於發端詎稱謝朓寒空一鴈去離思繞山河逸於終奏無羡江淹矣至雲來山閣雨風過石池秋大隱非人外微言乃道初月映蒼松徑雲生白石臺玉虛香火清齊地紫禁烟花悵望時獨有馮唐頭已白青袍郎署自年年並若神構足稱警策又雖家北闕下白雲常滿園棲情閒適得句超曠是以奪鳯池而不驚解龜組而無愠者也言可以知人諒哉余識非仲偉賞乏元禮妄意大都取裁來哲云爾顧給舍二集題辭東白顧給舍示余詩集二編一曰使蜀志役也一曰居庸志寓也君登壬辰進士拜餘姚令以賢徵為禮科給事中拾遺補過有古諫諍風丙申之嵗蜀府與閫司各以其獄上天子詔讞之侍臣咸推君遂簡往核治還報當上意益嚴彈之將大用戊戌之嵗上書言事忤上意乃笞之闕下徙為居庸民有是編也夫顯晦異遭皆發諸歌咏其致槩可想見矣及展卷玩味盡合風雅得詩人忠厚之意其使蜀也藉寵靈奉綸綍走郡吏以負弩降藩王而擁篲風物啓其興山川助其思故其言多藻麗之辭若馬卿移文以喻蜀田叔毁案以存梁職無忝焉其在居庸也謹管鑰犯霜露襲氊裘甘湩酪駭邊聲於鼓鼙寄鄉愁於笳管其操心也危其慮患也深故其言多悽婉之辭若定逺生願入關營平老猶留塞又曷恨焉載觀蜀中之作如發京之賦皇華宜春之詠四牡潼川之嗟伐木郫縣之感采薇皆小雅之音至於塞上之作保安即式微之悲中露南關即匪風之懷好音卜室即柏舟之歎覯閔宣城即鴇羽之悲何怙間出國風之辭所謂哀而不傷怨誹而不亂者也君之作大都昉於少陵故杜甫草堂子雲書院武祠昭墓全似劔外巴西蜀郡䕫府諸篇居庸雖地鄰邊塞而境接畿輔故昌平八達望陵出塞則似秦州諸篇矣計戊戌之去丙申才兩閲嵗耳較詩頓超上乘豈窮而後工信非虛語耶君於暇日每談經以引諸生或枕戈而激將士圖實塞之議籌當關之策憤伊吾而北馳望長安而西笑有請纓之志焉昔陳思不欲以翰墨垂聲上表求自試君豈徒以賦詩為事哉使恩覃在宥罰示差級將建勳竹帛此特其緒餘耳君尚朂而俟旃二詠編題辭二詠編者吳苑諸英眺飛雪於春朝邀朗月於秋夜有是作也若夫竹寺禪探芝館晤集亦并附焉古人凡遇宴㑹必相賦詩或命物以爭妍或占韻以逞捷撫時對景締歡賞於同心唱豫和汝嗣徽音於合響若蕭介美専即席李端推為擅場皆一時之選也况授簡擬梁園之勝飛蓋昉鄴駕之遊木微脫於洞庭霰初零於灞岸悲興志士愁鬱詩人豈徒袚褉蘭亭逍遙韋谷竹林酣飲罔覩幽辭峴首顧瞻惟聞永歎者乎今覽編中握珠抱璧光奪圓暉摛藻研思瑩欺積素並足驅馳鮮能甲乙江左風流盡在是矣因憶余兄弟舊有冬㑹之章秋宴之什傳諸二京此則烏衣追謝情洽諸昆桃園餞李誼敦羣從然俯仰易陳觴咏難再懼夫後之視今亦猶今之視昔展誦斯編寧無薄三公細萬物棄銘勳而思秉燭者乎㑹凡十有四子詩共六十五首以次列名於右鋟之梓者文學史臣紀為之序者司勳氏皇甫汸云皇甫司勳集卷三十九
