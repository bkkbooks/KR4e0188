body:
  text: 皇甫司勳集卷二十六明皇甫汸撰七言律詩九日懷楚中舊僚去年九日登高處野寺深山厯楚臺黃菊正堪攜酒過青蓮却為散花開閣中雲氣千峯入檻外江流萬里回欲問同逰今健否衡陽不見雁飛來寄憶任黃州漢室任延最有名楚邦為政盡稱平相逢已覺新知樂一顧翻將逺竄輕雲淨滄江春與泛月明赤壁夜同行歸來故國愁無限總是間居賦不成故園對子安兄相與談及竄逐事悵然作詩得罪同君承帝恩為邦兩地各飛翻楚山正列窗中岫衛水常流郭外門靜對棠陰思棣樹遙憑雁序望鴒原今日相逢倍相憶此生堪歎不堪言春日感懷因柬子安平居每憶在長安却羡雲霄接羽翰騎馬每從雙鳳出逢人憑作二龍看春逰西禁才舒柳夜直東曹併是蘭轉盼不堪成往事誤身翻自笑儒冠雪日感舊因柬長兄季弟同君對雪題詩處直是陽春屬和稀滿泛金尊揮麗藻頻燒銀燭送清輝年來勝事應難再歲首瑶花不耐飛為説袁安愁病在只堪高卧掩柴扉午日獻子安兄午日遙憐獻夀儀省郎同記拜恩時九華承出雙紈扇五色頒來雜綵絲見説賜筵臨浴殿更傳競渡從昆池不堪身事如蓬轉強飲花前酒一巵間居柬吳二純叔王二祿之北山歸卧各風煙西望長安思惘然直散聞鶯蘭省畔朝回飲馬玉河邊府中盡道逢時少闕下爭看被服妍為憶同遊雙鳳侣銜恩記否十年前送王維楨量移台州使君仙棹且徐開岐路離筵未忍回乘月遙從石梁度看霞幾過海門來山名郡中共識宣城藻闕下誰憐賈傅才吳越相望一水隔思心日夜向天台晚興答子安謝秩家園今幾時病身丘壑轉相宜坐憐落日閉門靜起看間雲出岫遲誰寄靈魚思逺道自同烏鵲在南枝揚雄寂寞何如此白首談經世豈知琴友張子扶病還雲間久不相聞寄憶歲晚蕭條最憶君琴心一片向誰云啼烏半落亭前月征雁遙迷泖上雲白首先驚垂老别青山恐作斷腸分廣陵仙曲從來祕莫遣人間遂不聞辛丑至日再從故國逢長至始信幽居得自間旅迹秪驚江漢外愁心翻寄酒杯間雲依北郭浮難定歲入東流去不還莫向夜深懷往事却隨清夢到朝班至後酬子安兄感遇見貽之作朝來江郭已回陽春近湖山興自長寒日閉門聊謝客晚年執戟笑為郎冥冥鴻雁棲雲徑寂寂魚龍卧水鄉聞道平原賦招隱桂叢深處幸相將歐陽憲使過訪時在山居奉謝卧病年來與世忘故人何事到江鄉新從北闕承恩下遙指西湖去興長鄭子隱居鄰谷口石家别業在河陽多慚門外堪羅雀猶遣高車過草堂冬日郊原作竹下翛然自掩扉晚來西郭藹晴暉江邊歲晏逢花落天外雲寒見鳥飛將欲乘春入山去何妨終日灌園歸間居莫怪無相訊漸覺人間知我稀鄒憲使見訪奉贈兼柬故舊靜數交遊憐海內半傷搖落在江南一朝門巷煩回轍十載風塵愧盍簪岐路青陽驚客夢禁城芳樹與誰談山公自昔能知我可信嵇生有不堪送吳純叔北上為先大夫乞恩典閶闔門前望淮水漢京遙隔幾重雲清尊斟酌人難别白馬遲回路忍分祕器從來頒上相敝帷何用乞明君朝中故舊多相問莫怪盧家獨未聞送吳長洲調官陽穀看君移舄魯門東莫向南枝歎轉蓬邑是桑麻舊時地民多絃誦古人風城連黃石尋祠外家隔青山望越中却憶河陽春色裏桃花欲寄恨無窮春日聞任黃守擢憲江州年來芳草動離憂别去湘潭今幾秋已拜觀風辭郡邑猶聞遮道借君侯城連滕閣朝雲黯門對章江春水流總是公庭號煩劇也應廬嶽暫攀遊冬日吳子新見過偶憶殊勝寺之别逢君忽憶越江邊正我辭鄉入楚年野寺暮鐘留客棹溪橋春酒醉離筵歸來南國仍飛徑悵望東林隔逺天更欲相期訪幽社此生猶未謝塵緣濟上謁周司空叨宴扶疏亭漢室宣房久未安以公為楫濟無難門牆為許平原謁尊酒翻承魯國歡見説揚州通禹貢憑將泗水作淇看清風盡日芳林下不待霜飛亦自寒出京曉叩天關别禁墀秋深江路是歸期談經王式重來誤薄宦潘生屢出宜漢室朱顔翻見嫉梁園白首未相知此身去就何曽繫一似浮雲任所之顧武祥免官寄柬聞子陳情聖主憐一朝報許遂言還長卿謝病非因慢康樂懷歸不待年松菊久荒彭澤里煙波重泛太湖船慙余亦有東山興却戀南枝未忍宣南旺道中逢張水部薄遊自苦為形役却笑深秋在異鄉使者星槎逢造次征夫岐路借輝光相忘湖上同魚樂遙指雲中羡雁翔莫道佳期容易過黃花留醉是重陽江都代柬寄親故吳鄉遙接楚雲東潮落寒江一水通王粲經秋渡淮上張融纍月駐舟中朝攀桂樹身將隱夕眺蕪城思不窮若問官家近時事積薪惟説後來功送郡守王君廷入覲看君鳴佩逺朝天聖主方思良二千轂下重過避驄路殿中猶記上書年潁川治行偏能最蜀郡才華不啻先總是吳公知賈誼勿須言向漢文前早春柬蔡法曹逢時總是翻飛侣失路俱為留滯人白首何曽離畫省素衣聊得謝緇塵風光自向湖間轉柳色先從郭外新為語麟臺暫相賞勿因愁思厭看春盧龍觀和蔡法曹芳辰締賞許心同獨見玄暉擅藻雄曽是江山開勝地尚餘樓閣待春風青溪水繞龍池匯緱嶺雲來仙掌通不信金門堪避世花源何事帝城中送大司寇顧華玉獻績北上名疏玉扆已多年身厯南臺未是遷約法獨持三尺重生民奚止數千全袖中啓事人稀見囊裏刑書手自編聖主久懷求舊意滿朝誰在絳侯先靈谷寺寶公舊日安禪處雙樹依然初地開歲久丹青凋畫壁春深花雨落經臺招提境接橋山外功德池分灞水來聞説此中容吏隱濫巾時向草堂回同省中諸僚餞别勞憲使於徐氏西園王家池館甲長安許客相過更不難花下候人思負弩林間飛鳥避彈冠綺筵却遣離觴入金谷翻將岐路看他日攜羣能再至坐無車胤未成歡春暮柬包孝侍御一春離索意何如獨坐懷君花鳥餘都下相逢驄馬後雲間爭識士龍初間居數月能題賦守藏千言解著書總是漢家無事日封章時見奏公車薛吏部見過同時分省漢西京得暇相過蓋屢傾户外不知芳草歇林間已是夏蟲鳴為耽玄理輕辭賦因卧滄江減吏情坐接高談心自醉從君將欲棄平生南省齋居漢家祀典盛如今幾處郊宫駐輦深燕月懸知臨太乙淮流爭得向汾陰齋居宛記分蘭省禁衛仍聞集羽林靜數從臣枚朔輩同時零落忽傷心過馬光祿舊寓一區西接禁城垣大隱曽於此避喧過客尚思文舉座居人猶説李膺門清泉自繞花間去幽鳥如窺户裏言家本秦川遙不見重來翻謂是迷源歸自牛首同諸君攜酒訪徐公子青山别後每思君獨卧朱堂絶世氛共載酒肴逢好事淹留車馬為論文曲池新水鳴殘雨隔院芳陰入暮雲公子從來能愛客無言不醉遂離羣答蔡子木初秋約遊之作官間似與病相宜朝謁俱無起獨遲禁苑蟬聲移物候空山木葉報君知薄逰丘壑何嘗廢雅興琴書每自隨聞説潘生歸騎省却因詞賦動秋思七月六日訪蔡比部作中郎身寄白雲司户近青山秋早知樹下聞琴蟬噪後花間倒屣客來時迢迢榆漢雙星待冉冉蘿陰滿徑垂行樂漸宜清夜永從君秉燭向南皮王地曹初至同蔡比部攜酒訪於徐氏園居洛陽年少似君稀誰道多才與世違得罪一從燕市别銜恩重向越鄉歸無言契闊惟傾酒到處風塵任滿衣為視園林今夜鵲繞枝猶自共南飛同王子集蔡子館相逢西府訝初筵為語當時一惘然户下鳴螿頻帶雨湖邊落木似催年人傳台嶽題詩後客向長沙奉召還機事對君渾遣盡莫嫌爭席主人前同省中諸僚遊徐公子鳳臺園名園似與辟疆同載酒時堪集上公户裏羣山能自入林間三徑若為通穿池半引長淮水種樹多移禁苑叢不是䇿勳麟閣後誰應開第鳳臺中送朱參軍入賀千秋令節東朝初進九齡籌南國歡逢拜舞秋數報寢門回鶴駕新從馳道出龍樓世家共羡韋賢後記室爭推阮瑀流君去分明窺盛典還將禮樂頌成周送太學王生還齊安從知楚國多材地況復韋家奕葉人博士見時推講席中郎迎後動儒紳霜前雁起搖歸思月下猿啼愴别神若問長沙舊還客賈生今日尚沈淪贈太司馬張公邦奇清朝供奉早知名黃石傳書解論兵每奏軍機憂北闕時揮麗藻動西京營中校士輕裘坐門下憐才倒屣迎文武古來誰得似留侯麟閣羡功成奉贈張補之學士同蔡比部作生逢明主幸同時侍從常看列禁墀賜出祕書延閣校奏來辭賦掖庭知西京舊史聊相訪南國人倫正在兹更道張華能愛士席間荀陸最承私寄唐應德編修避世曽看隱石渠幽情終自反班廬門前愛樹因栽柳郭外疏泉學養魚談笑每從林叟晤浮沈翻混野人居年來尺素長相憶莫作嵇康不寄書寄許夔州城開白帝錦江連見説仙郎出守年虎患已從鄰境去猿聲偏近郡齋前相如文藻流巴蜀黃霸功名在潁川應是漢庭求吏治非關相府賤英賢寄王地曹湖上禁湖秋盡渺芙蓉憶爾幽居定幾重掌賦久應知户口披圖一為辨提封雲深自指橋陵樹水靜如聞閣道鐘信是仙源人不到惟餘明月得相從寄孔督學憲府新開越水東瀛洲似與海門通談經直采先秦上文學多陪後乘中一自西京辭宿衛遂令南國奉餘風幾人修刺懷衣袖猶恨無從謁孔融得稽勳報漢廷不調已多年中歲何期得再遷薄祿祗緣貧仕纍非才幸取聖明憐回看舊省真如傳乍拜新銜豈是仙裴楷清通方自愧逢人莫訝玉山前募兵作漢家西域有烽煙列郡徵兵詔護邊吳楚輕剽亡命起幽并遊俠感恩先身從都尉新承鉞名係良家盡控絃為語鳳樓休借問功成龍塞遂言還江山觀發兵用韻江門選士擁旌旄臨發猶聞贈寶刀脫挽新承戲下命吹簫曽授匣中韜月明隴水鄉堪逺雪度陰山路豈勞鐵騎經年隨苜蓿金盤何日薦葡萄靈應觀長安西指望仙宫蜚觀崇臺杳自通候氣還如逢柱史采芝一為訪園公澄潭盡是桃花路幽徑俱成桂樹叢欲棄人間渾未得年年辟穀漢庭中得子約弟過海印廢寺之作因寄先朝敕寺總知名初地曽逢御輦行寶閣近隨荒草沒金河翻共曲池平鳥來尚識聽經處馬過空聞繞塔鳴獨往題詩憐小謝了看塵劫得無生簡王户曹少年君是馬遷才何事周南未遣回夜直每看趨騎省春心幾許寄麟臺官間不羡緍能算性懶翻嫌篆屢開莫道舊宫風物異年年柳色過墻來户曹席上贈王進士宗沐少年獻䇿承明後遂見乘軺出漢關司馬新為巴蜀使買臣初向會稽還江邊路轉通吳苑天外霞標指越山不是絳紗門下客何由瓊樹一相攀春日偶成春光強半去清明著處逢花併鳥聲鮑照避人多纍句李聃貴我謝浮名何須食祿過千石便可持杯了一生長日省回無俗事城南惟是訪僧行次韻奉贈父友羅公八十自夀年同渭叟罕能躋況復功成謝釣溪典郡昔聞人盡慕歸田早與世相睽輿間載酒稱元亮座上談詩數稚圭老眼平生書癖在尚堪散帙對燃藜贈華子潛學士暫辭供奉在西京南國聊兼吏隱名信美江山多勝事更餘花鳥寄春情校書藝閣編應就給札蘭臺賦已成聞道青宫開講幄早陳車馬待桓卿皇甫司勳集卷二十六
