body:
  text: 皇甫司勳集卷三十五明皇甫汸撰序集三吳水利圖考序昔禹抑洚水疏九州陂九澤諸夏乂安功施於三代自是之後滎陽下引則宋鄭陳蔡曹衛與汝泗㑹於楚西通漢川雲夢之野東通鴻溝江淮之間齊釃淄濟蜀穿一江於吳則通三江五湖皆可行舟餘用溉田百姓饗其利而水利之說興焉子長著論於河渠孟堅推廣於溝洫而水利之書成焉鄭國始開而秦以饒足宣房未塞而漢遂不支此其利害之大較矣吳本具區涌川開瀆吞江納漢出乎大荒之中行乎東極之外浸莫大焉若夫壤壚映野畛畷帶郭灌注則埆瘠盈鍾壅閡則腴衍枯粒海陵之儲天府之所仰給也元嘉肇苧溪之功大業興京口之役蓋地勢西北髙而東南下也其要在於導之使趨故曰三江既入震澤底定是已矧揚州之域厥土塗泥易於淤積厥田下下難於漳流加之淫雨告災稽天示牛馬莫辨而民其魚乎甲辰之嵗侍御新昌沃州呂公際靈長之運立寧晏之朝奉輶軒而來巡緬澄清以寄慨甫肅吏軌亟求民瘼乃諫議陳疏條列五便酌賈讓之令猷殫及三慮存郟生之往鑒上當宸衷下協羣算詔報曰可言悉施行民罔懟勞職司惟恪緣撫臣驟遷雖功未克竣而惠亦霑浹矣間又考迹往牒綜核舊聞搜桑氏之經詳周官之制逺追韓牧近昉謝琛時則文太史氏雅善輿圖窮河源於筆端收祇軸於指掌草未殺青而瓜代行矣圖置郡齊書存私篋越嵗己未大守陽曲王公承麾蒞止留心民務周省阡陌勸課農桑每思白公之遺歎召父之羡因覽兹圖爰購全帙校而刻之屬序於豫其為編也總圖一郡圖四州圖一縣圖十有八為水二千二百九十有竒為岸一為堰十壩二十有五閘三十有一各系以考說凡奏疏二工計一以至諸賢論述名臣奏記並采而附焉缺嘉與湖者以非管轄之地驄未遑駐也夏書載禹治而篇名貢者重邦本也逮公總憲西臺督儲南甸今日成賦之逸咸昔底績之勞若心計而預定焉者經國其有徴乎夫治水必躬厯山川非妄意户牖可測而知也以禹之神而不免蹈毳即􅀈者蓋地有卑高土有沃鹵湍有緩急脈有淺深勢有迂邇非咨詢相度力曷施哉其次莫若智智者亦故而已謂循禹之舊也余嘗登姑蘇望五湖求源於宣歙遡委於苕荆乃知水由五堰百瀆東滙於三江載折而之海白茆七鴉尤要害也大都水渟則為害流則為利泄則不渟蓄則不竭濬則長流而後浸溉適宜漕挽稱便弭謗者取喻於防川衛生者致察於榮絡合單子之書殆思過半矣我明若夏忠靖公已試之績吳李遵之功特最焉漢延年之言曰河須按圖書觀地形令水工凖髙下雖桑海或遷而歸墟則一是編也實千載可率之典功與言同不朽云守令懿範叙記曰儒有今人與居古人與稽泛言人當法古以為行也傳曰不習為吏視已成事專言吏當法古以為治也古人往矣其良法美意方冊具載典型猶存非事之已成者乎自馬遷著循吏之篇若叔敖子産之徒咸奉職循理以道民禁姦西京而下海內蒸蒸嚮乂若吳公文翁謹身率先居以亷平不嚴而化乃獨稱仲舒𢎞寬三人為儒者以經術潤飾吏治屬潁顧出其下耶而又别立儒林豈直守功令誦說詩書文以禮樂未達於政遂使秦疑儒為無益人國而吏將為法家流耳舛哉吳郡守廣平蔡公敦尚儒行以聖賢之心求帝王之治其蒞吳也興舉學校孝悌力田勸課農桑教養樹畜通渠廣溉銷兵戢盜崇儉去奢大都昉西京之遺軌至明斷精識本於信義篤誠又推尊宋儒周程朱陸而允蹈焉故其弭災捍患格天感神藴之為仁心施之為仁政醇乎儒治殆毫末罔有假者使我明遵漢法徴所表二千石拜為三公堯舜其君用此道矣間取古守令政蹟彰彰可法者自周末迄於宋季總若干人采掇其略分為儒牧循牧二編總曰守令懿範思與當官者共之此亦伯玉之心也夫循吏之政無畔於道謂之儒亦可也儒者之政非出於循望其治不能也然循吏若鄧攸贏糧以自給介失其中李離伏劔以申法剛傷於矯此亟功狥名者之過而儒牧庶乎其免矣夫漢反秦敝與民休息相國蕭曹以寬厚清靜為天下帥延至文景遂移風易俗幾至刑措武帝外攘四夷內多制作民始凋瘵國亦虛耗矣孝宣興于閭閻知民事之囏難謂太守吏民之本思與共之于是良吏獨盛今皇上居潜邸最久知民務益深嗣位世宗猶宣之繼武也首詔天下减服御節財用裁冗貟省工作郤貢獻慎簡守令惠養元元相府並有蕭曹之風焉正右儒時也是書當如崔實政論置之几案以為楷範稍加變通師其意不泥其跡斯善於治矣由是捨筏忘筌斯神於治矣公嘗以示余僣為揚榷妄有譏評每虛心翕受復命占述并綴如此云鈐山堂詩選序遊赤水之津所見無非珠者而夜光明月獨耀於目登荆山之麓所見無非玉者而苕華垂棘獨駭於魂越允之冶無鈍劍而湛盧盤郢五枚著其利周穆之廄無凡馬而奔霄絶地八駿擅其雄物誠有之文亦宜然故尼父刪詩悉翦蕪纍梁昭選藝特采菁英以故代不數人人不數篇如崔皓鶴樓之詠太白覩而輟翰王灣北固之作燕公揭以表署微雲淡河漢踈雨滴梧桐才聞兩語已歎服於羣公不見祇今汾水上惟有年年秋鴈飛曾不終篇遽增悲於時主由是觀之美豈在多而傳匪由愛者哉詩之為教沿自二京靡於六朝迄唐而詩之極則闡矣宋元降格殆無取焉明興作者調宗正始格祖開元寖淫至於孝武之朝如崆峒李氏大復何氏昌榖徐氏彬彬乎振藻詞林而海內亦且嚮風矣然識者譏評三集未嘗不病何李之繁而取昌榖之精也師相介溪嚴公誕秀綺嵗夙諳四始博綜軒年妙契六義若夫避喧玉署棲痗鈐山窮研不倦斯業益臻朝綴家園夕流京輦至於從宦燕吳祇役郢粵之作真足以晞軌曹劉軼駕沈宋矣載陟禮曹則儀章填委允升政府而幾務殷積雖若思靡經心占惟信口然神來天縱動合大雅即展卷而誦仰山諸詩設使置古名家集中誰復能指目為今人詩哉汸素遊門墻叨承奬誘辛亥之春免慈桑謁選部時公寓無逸之直廬招余參下陳於禁籞劇談彌日歡賞忘年因出全集屬加詳核嗟乎汸之謭瑣安敢議割於屠肆代斫於班門乃撝謙虛於吐握假視聽於聾瞶公之甚盛德蔑以加矣嚴命莫違竭才從事佐刺之暇三復華編始則藻繢都盈罔可筌棄既而玩味稍久心醉𤣥㫖乃因王司馬之言而繹之於是乎取諸沖邃閒逺明潤婉潔者十之八九乃又因唐太宰之言而繹之於是乎取諸達而和淡而平者十之六七乃又因劉司寇之言而繹之於是乎取諸渢渢其聲雍雍其度燁燁其文者十之三四凡得詩若干首類而分之勒為幾卷兹蓋連城徑寸時共為珍太阿天馬世罕其寶者也汸也才慚任昉猥以筆札見知識謝殷璠妄以蠡管效德負罪悚息載拜而為之序盛明百家詩集錫山俞君嶽率輯我明之詩上自洪武下迄嘉靖二百年內自宗室相府以至隱淪閨淑釋氏羽流凡一百五十四人得詩若干首勒為四十九帙題曰盛明百家詩若高廷禮品彚計敏夫紀事特未標立正始大家諸目及載述作者之源耳每集各為小序紀其籍履非有甲乙如殷璠仲武也自起家以至謝秩還山幾三十年而書始成尚思購而續也其用心亦勞且密矣余兄弟濫厠集中嘗貽之詩曰愧非河嶽藻猶得纍殷璠蓋竊比冉曾云夫詩自三百篇而下代有作者漢魏去古未逺猶有詩人之遺風焉晉宋而下齊梁麗矣陳隋靡焉唐以詩賦取士其教盛行然聲音之道既與政通而文章之興又關氣運政有汙隆氣有醇駁而詩係之矣當時君上咸典學能文楚襄詡宋玉之辭漢武慕相如之作曹家父子蕭氏諸晜由此其選也運革六代唐數三宗上好而下從亦風起之也况宰相房魏在前燕許在後皆藝苑之英耶明初猶沿宋元之習詩無足采新安程氏所編文衡止及樂府意亦微矣髙楊張徐四傑崛起浙東宋王二學士倡之椎輪於輅增氷於水貞觀永徽此殆萌芽𢎞治正德之間何李二俊力挽頽風復還古雅長沙李文正誘奬羣乂摛藻天庭世宗嗣位之初己丑而後文運益昌海內作者彬彬響臻披華振秀江右相君亦厪吐握開元天寶庶乎在兹庚戌而後參軌於大厯防漸於元和矣嶺南類選蜀郡詩鈔繁簡雖殊芟掇未當是編備矣其他祕在私篋藏諸名山未及流布者猶倍屣於此然要之不能敻出集中所存也我明之詩余所著新語與昌榖談藝元美巵言略示掎托互相詆訶大都體格法乎漢魏聲調凖乎三唐所未盡合者寄興之間性靈異秉才情頓乖耳觀者由似而求其異即盛而慮其衰則思過半矣自後賔館丘墟至為馬廄婢室惡聞詩書指為雕蟲小伎于是乎有以言承譴者即使供奉流於夜郎襄陽終於韋素亦何憾焉嶽率君䝉謗左遷竟爾棄置乃不忘初好可謂深於詩矣夫釋氏嗜佛雖罹八難而一念恆在菩提郢人抱璞雖至刖足猶三獻以明其為寶是編豈徒果於自信而羣玉將為昭焉足以鳴國家之盛傳諸後世不朽矣奚避哉文選雙字類要後序易曰觀乎天文以察時變觀乎人文以化成天下文之時義大矣哉若代謝羲繩書契攸造時滋苞籥載籍彌彰至乃金玉三墳笙簧五典矧都存姫監斐妙尼裁𤣥風寖揚麗藻逾蔓家稱成誦人尚含章莫不踵其事而增華緣諸情而綺靡瀛炎以來於斯為盛乃有梁儲講藝選輯羣言唐采博聞廣釋厥㫖然渺泛滄流罕識涯涘雜陳鐘磬莫辨宫商至宋學士蘇公易簡芟翦繁蕪掇摘菁粹門分彚别璧合珠連言成數千都為三卷題曰文選雙字類要紛乎具美哉夫比屬義意則漢雋非工弋釣篇章則左奇為劣由是精義者沿洪波以討源輟辭者茹蘭芬而吐秀庶幾錯綜斯文不徒鼓吹小說而已或謂雕琢瓊瑶遺恨抱璞刻削杞梓取譏不材嗟乎寸圭尺璧咸足云寶製錦裂繢奚病為華此固玩物者之致曲而非忘筌者之通津也得失大較罪知蓋半矣柱史莆陽姚君虞負俊逸之氣擅宏衍之才耀組二京持㦸三楚驄馬所及每御縹緗簮筆之餘不廢詞翰惟時海內作者颷起之子雲集各思追述大雅步驟前英遒軫爰邈濫觴在兹乃擇循良俾授梓匠聊副選部用翼騷經固韶樂之元聲法乘之正印也引而伸之存乎其人云爾皇甫司勳集卷三十五
