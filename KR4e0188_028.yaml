body:
  text: 皇甫司勳集卷二十八明皇甫汸撰七言律詩子約方有南役而余亦將北上作自憐出處何嘗定為戀明時更起家路指兩鄉紆宦轍江分八月引仙槎峯回雁信傳來易嵗晚蘭芳欲寄賒到憶燕昭臺上望楚天西盡是章華答子浚兄客心半在去留間忽漫稱詩慘别顔淮海風生花落後瀟湘秋冷雁飛還貧因減産耽微祿晚更趨朝愧末班為語白雲開徑處此行那得負何山聞警軍書插羽達齋宫聖主停祠賦小戎燕地笳喧榆塞上漢家月照柳營中師從節制猷偏壯將熟韜鈐氣自雄慷慨即思投筆去一朝開域佇銘功淮上謁何中丞看公清嘯坐高樓淮海風來滿院秋地是桂叢淹客處山非桐柏訪仙遊軍輸歲入多稱便國計年來待運籌總説西陲方有事君王南顧已無憂早春下邳遇談兵使夜宴驛樓作君從西楚新開府日對龍山坐擁麾臺下曽過戲馬路橋邊一遇訪書時樓含柳色窺春早盤剩椒花卜夜遲聞道漢朝今好武揚雄行欲謝文辭濟上訪汪中丞同年看花同在曲江傍一散天涯二十霜禹貢導河由泗水漢家歌瓠以宣房才堪作楫川能濟髮愧成絲路轉長日暮樓前思貰酒得逢任令更清狂淮北寄故園兄楚邦弟晚從吏役自堪嗤況是人情重别離氷雪寒深南盡地江山風似舊遊時花知吳苑春回早雁憶衡陽信到遲為説朝中方貴少白頭郎署不相宜客京解嘲承恩二十已餘年薄命那知屢播遷曽向郡齋吟處眺亦從鄰客醉中眠書藏名嶽翻嬰網賦就長門未賣錢裘馬五陵同伴少白頭猶草子雲玄送吳子充遊北嶽兼赴塞上謁蘇司馬玄宫高建曲陽隈登嶽長謡亦壯哉更為邊關增感激不因婚嫁重遲回軍中魯仲飛書去馬上陳琳草檄來談笑功名須自致許公幕下最憐才柬白貞夫十年蹤迹愧飄蓬二陸聲名半已空追憶子安洛下曽收才子疏江州猶繼古人風鬢毛盡變兵戈後心事都銷杯酒中喜見謝家丹鳳羽承恩同在省曹東子啓京登進士寄許東侯中丞防禦昌平東山歸卧久辭喧北闕重來慰至尊分閫正當三輔地侍祠多在茂陵園黃金盡散因收士白馬長驅為報恩舊日忘年文酒客帝鄉猶阻孔融門獻座主太宰李時言山公今受聖明知典選勤勞退食遲闕下每聞傳啓事車前聊得奉光儀慙持手版迎州使懶束腰章拜里兒為問門牆春色道幾多桃李沐榮枝謝嚴相公分惠大官攢品幸逢開閣謁平津忽拜堯餐及阮貧漢主每聞推食暇姬公仍見吐哺頻函題黃紙頒從禁饌出朱盤訝是珍慚謝分甘無以報祗知飽德荷陶鈞上李亞相汝立玉署仙班第一流甘泉終日奉宸逰填門賔御同元禮滿架圖書似鄴侯春色散朝揮麗藻夜深當寧待嘉猷車茵坐擁沙堤上爭羡台臣正黑頭送張尚寶謫淮南轉運繁華自昔數揚州君去無嗟奪鳳遊試訪名花弔隋苑好攀叢桂對淮流河橋月上開官舍海縣潮回放客舟年少辟疆猶作吏功成誰復念留侯送陳兵曹謫官興化舊為中舍佐邑官間莫厭卑昭陽山下正花時愁中襆被辭蘭省夢裏揮毫憶鳳池淮海潮聲流别恨都門柳色贈離枝漢庭才子多承譴立馬須瞻董相祠闕下送王水部時獻軍器聞留省免官君除戎器謁彤墀檢閲忘勞匠氏推南國鑒人非有道西京憐士愧無知傷心白璧那應棄揮手青門從此辭雁宕山前逢故老少談邊事更憂時送尹兵曹擢河間守聞君初解尚書郎出守雄邦邇帝鄉命下不殊馮翊詔腰間爭似會稽章食前借筯籌多中地上成圖料已長莫道宛王將獻馬防秋日夜念遙疆程孫二禮侍見訪上公聨珮出西清訪客城東為掃荆問樹不言溫室祕看花猶記曲江情同承睿藻賡歌就共草祠儀典禮成早晚黃麻聞拜相由來房杜得齊名白符卿免官文章憎命不堪論留滯官階二十春病裏金丹思服食晚來銀艾笑垂身明珠道上誰知己紅粉宫中慣妒人歸去名園多勝事投書一為謝平津送司寇顧公應祥調南省尚書門接古崇岡信是人間吏隱鄉檻外鍾山瞻王氣鏡中湖水閲年芳兩都去就原無係三尺平反總舊章聞道民窮輕犯法願教刑措佐時康送郭侍御謫令閩中閩中為令似非輕猶勝長沙逐賈生花縣暫看飛舄去柏臺爭憶避驄行山當劍浦雲常暖溪帶樵川水最清他日臨軒訪民瘼封章留得直臣名應謝二兵曹見訪不值城東聊寄逐臣居何事頻回長者車南郡才華推謝晀西園辭賦重應璩朝聞散佩罏香裏時共談兵樽俎餘却怪披帷人不見壁間鳳字謾留書送王令重補武康先宰仁和著稱王喬仙令謁明光再見飛鳧指越鄉莫謂勞人憎案牘須知飾吏在文章綬迎天目晴雲入琴拂英溪流水長借問政聲誰得似試看懷縣興河陽發京貽諸同好朝攀瓊樹思依依身似先秋一燕歸失路豈能連羽翼停雲惟有戀音徽亦知手版迎人懶無奈心旌去國飛聞説漆園兹地近將從傲吏息塵機贈譙司法才華蜀郡古來聞況是譙周更不羣早歲揮毫驚白雪明時射䇿致青雲衙開恆嶽鵬宵迥家憶巴江雁字分共道持平能讞獄坐令三輔號神君得李伯華書期余往晤感今追昔詩答之逢時四海羡彈冠每過龍門卜夜闌忽漫東歸依泰岱幾憑西笑當長安瓊枝願見何由得尺素傳來亦自難更道輞川多勝迹相邀裴迪共揮翰訪同年李伯華於章丘拂衣歸卧一丘安命駕何辭千里難書插高樓蟲蠧盡棊拋别墅鳥汙殘雄心每向詞中發變態都將戲裏看自愧交知成白首猶持長劍倚人彈新撰寶劍傳奇訪谷繼宗識自丹陽令匹馬茸裘下北平亂山殘雪賦東征清時解綬聞陶令白首談經數伏生載酒花間逢好事結廬泉上不為名練湖舊繞丹陽郭猶記鳴琴在水聲趙景仁宴贈童時名已動儒紳曽是南宫第一人痛哭上書思悟漢從容辭秩遂歸秦東朝再起銜佳命北閫重分禦敵塵雪後擁裘無所事祗將壺矢漫留賔寄蔡衡州一官報爾今河朔千里懷人楚水長花發幾回思建業雁飛何處是衡陽訟庭不廢京華牘燕寢其如留省香日日江頭聞送客空於詩卷恨錢郎唐人贈送卷內以不得錢起郎士元詩為憾子昔與子木在南省時頗類此子約弟使楚被譴會於澶淵春風河上駐征驂河柳初回淑氣含得罪十年辭漢省采芳何日下湘潭情憐棣萼來相倚迹似浮雲去不堪君到梁園好題賦莫將留滯嘆周南始登南明山名山終日俯南郊出郭才聞十里遙直向千峰探化閣暫依雙樹息塵鑣梁橫斷壑雲常覆澗落疏泉雪未消莫訝使君非好靜桓伊今受逺公招武林追憶子安曽見褰帷向越城非關為吏厭承明身隨零露朝先盡恨落江潮夜未平芳草不傳池上夢薇花猶繫省中情湖心諸寺聞題遍留取山僧護姓名椒山訪葉令羡君辭邑賦歸田信有椒園在輞川松下持經間相鶴花間洗藥候鳴泉支離自愧猶耽祿邂逅何期一問玄更道聖朝容傲吏賜骸聊得樂餘年送金比部謫官北上莫因得罪歎明時君去應逢聖主知坐對越山傾别酒行攀淮樹寄離思省中執法憑三尺闕下銜恩戀一麾豫亦周南留滯者春城揮手各淒其答王維楨同是西京作賦羣省中年少特推君早承恩寵遭時妒誤落風波幾處分白首相知那可説紅顔薄命古來聞越禽更接卑棲羽猶恨南枝隔暮雲懷龔溫州江縣逢君春草生禪林趺坐正啼鶯離尊秉燭流連醉歸棹乘潮信宿輕閣內嘯聞劉越石郡中吟憶謝宣城相思忽漫秋風起南雁來時一寄情浙闈中秋呈諸同事鎖院深沈秋氣中德星今夜聚羣公清憐月色能留鑒香泄花枝欲待風靜覺濤生枚發就回驚年少獵心雄亦知龍頷先探取不遣驪珠落海東聞警漢將防秋力已殫年年遣戍出長安賔鴻聲斷傳書少鐵騎蹄穿踐雪寒止見亞夫屯細柳不聞介子斬樓蘭欲知塞外思鄉淚為賦軍中行路難雁宕千山行入雁山中猶道仙源路未通鐘落風濤知近海衣生雲霧若凌空奇峰指點憑僧話幽壑攀躋只鳥同别向龍湫訪飛瀑一林晴雨石梁東同周將軍入龍湫訪白雲與雲外二高僧不可得雲林路斷信溪聲天柱峯前落照明刁斗響山泉盡沸旌旗渡谷鳥還驚却憐細柳營中騎亦向蓮花社裏行無著天親那可見獨令摩詰坐含情發平陽王子追送飛雲渡感泣而别因寄相逢忽漫路岐臨相送停舟酒重斟目引海雲飛處盡心隨潮水渡時深芳洲總惜人遲暮花縣那堪嵗載陰李白從來稀下淚問君何事獨沾襟老婦詞香銷閨閣夜深沈自恨無媒嵗轉侵女伴嫁衣頻與做鄰家花燭幾回禁羞將玉鏡論前事留取氷壺照此心自分紅顔非舊日承恩聊贈白頭吟送沈禹文還朝時余將赴南都故鄉亂後惜離羣倚棹江邊一送君咫尺龍顔行自愛迢遙雁信數相聞薇花漫對滇南日瓊樹長懷冀北雲海內兵戈須草檄定知開府待參君答吳純叔夏日即事江城五月颯如秋帶雨潮聲咽更流塵滿空梁聞燕語煙銷殘樹見花愁登樓自可悲雙鬢臨俎誰將獻一籌却憶題詩李嘉祐獨緣烽火歎長洲三塔寺唐朝敕寺蒼山裏石壁晴嵐護法輪樹冷陰崖常帶雪花深幽徑不凋春燈聨寶塔傳三昧香拂銖衣斷六塵西竺本來開教地葉榆流處是洹津太華寺詠落花綴幌霑筵各有因長安萬樹總辭春殘粧帶雨猶含泣薄質隨風易損神信斷御溝爭似葉香消清路不如塵朝逢鹿女銜將獻證却從前色誤身得報寄王維禎君從闕下解龜還余亦長辭金馬關散職已除朝籍裏虛名猶詿黨人間才疏晞世應成拙年少懷居未是間聞道陵陽多桂樹相思何日得相攀皇甫司勳集卷二十八
