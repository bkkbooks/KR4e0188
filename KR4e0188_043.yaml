body:
  text: 皇甫司勳集卷四十三明皇甫汸撰序贈送送陳子克修還吳序天王九年秋七月陳子自燕言歸張伯子暨王仲子皇甫叔子㑹于燕丘維是陳子來飲餞張伯子曰我自昔舉於鄉也維我二三兄弟靡不惠好既而嫁于燕也亦靡不周旋以偕在昔逸詩有之曰舟張辟雍鶬鶬相從言攸攝也今子歸矣值兹悲候於我心惄焉有蓬吾子其何以處我觴一行陳子避席曰豫不佞淹兹天邑載厯寒暑枌梓綿邈依依在望夫窮者楚奏顯者越吟我思古人異遇同心我是以夢寐乎洞庭之野胥水之隂兹將歸也夫張伯子曰幽哉是言吾子可謂不忘其鄉矣為之賦衡門觴載行陳子避席曰豫不佞淹兹天邑載厯寒暑瞻望父兮天一方矣曰豫行役不遑將矣我聞一日之養不以三公換故臯魚隕涕宣門羣渙我是以明發不寐有懷二人兹將歸矣夫王仲子曰孝哉斯言吾子可謂不忘其親矣為之賦陟岵之首章觴三行陳子避席曰豫不佞淹兹天邑載厯寒暑賴我二三兄弟朝夕是與貽我懿矩夫君子遊必擇士居必擇鄉故蘭以漸而芳絲以染而蒼逖爾令德實懼終焉無以允臧我是以秣馬脂車執手踟蹰兹將歸也夫皇甫子曰貞哉斯言吾子可謂不忘其友矣為之賦伐木之二章夫安貞以輸忱思孝以成仁履幽以禔身若陳子者於天下行矣陳子乃覆觴欲起皇甫子止之曰毋我其益子我其益子繄子之自燕歸於吳也不越嵗又將自吳嫁于燕進于春官録于主司賔于天子服于王官時維王事于邁雖欲昵於友私於親久於鄉也其可得哉夫京大也師衆也君子觀大畜衆可以居業矣在昔先正有曰人豈鹿豕也哉而常羣聚乎欲吾子其不忘四方由是陳子恍然失怡然悟曰我行維斯言是繹贈和順令霍氏歸田序天王十又一祀春正月越在外臣僉考績于朝霍子以和順最往獻時惟良哉居無何歎曰功名富貴我知其若是矣歸休乎君奚自苦為也乃上疏謝病太宰弗克泥果命下曰俞閈人里士聞且駭焉遂齪齪議其後夫霍子强可仕也兹不待年胡骸骨是乞彼其弗良於和順已乎皇甫子曰我聞志意修則驕富貴道義重則輕王公今干祿縻爵盱豫食嗟脂韋䝉耻遒軫不返老死行邁斯其蟬蛻囂壒鴻漸雲逵者矣霍子其賢哉侯子曰我聞女無美惡入宫見妬士無賢不肖入朝見惡今上官苛禮僚友構讒下民咨懟飾僞售巧逐浮傾危恬鈍倒用斯其脫帽青門投傅當路者矣霍子其智哉孟子既吳子曰我聞君子得志則大行不得志則龍蛇其身故歸閒郤掃食鮮茹美履幽葆貞偃息明時以養餘日斯其徽纆軒服桎梏纓緌者矣霍子其樂哉是故賢以稽政張能弛也智以存身明且哲也樂以達節壽而康也彼雖劇遷仍授閲崇據要不愧於霍先生者幾何人哉乃相與賞之酒而歌考槃之亂于是閈人里士聞而譁之曰嗟嗟霍子豈古之所謂遺榮者耶匪公等言吾儕小人不復知霍矣請公識之遂書以歸霍子送僚友李君還蜀川序蜀李子之倅楚黃也政惠而化輯黃人宜焉然履坦而度夷行圓而𠂻亮弗習守谷突梯是用弗媚於瓦合之伐磬折之朝政巧者庭李氏乃殿周容者右李子乃左持憲者弗亷乃數其細以上下之宰司徵素弗核咨僉罔同久未裁可李子乃浩然謀歸援者咸曰心苟不愆何恤乎人之言止哉李子或曰無據而去曷少俟旃李子止哉李子曰謂瑜者瑕被褐懷玉胡求售焉謂白者黑賁於丘園胡自咎焉魚網之設不能冥冥鴻飛為弋人所得翕羽晚矣皇甫子曰嗟嗟古人所為難進而易退李子其哲且勇哉若夫夸夫慕位閲崇陟要致身嶻嶭黯干阽危自召淵墜貪人縻爵脂韋淟涊褫華絶隆曾不朝夕幾不恧於李子者哉于是舉酒酹江為李子祖道郭子賦逺遊時俗迫厄質薄無因悲臣節也聶子賦赤壁山川信美合并異跡思友誼也皇甫子賦蜀道難人情翻覆濤波非險慨世變也李子乃登舟擊楫揚帆遡洄而去詩云瞻望不及佇立以泣黃人之謂也贈水部郎吳子知姚安序蜀郡吳子以水部郎刺姚安聞命而弗豫焉曰逖矣兹土乃古炎徼荒裔也矧兹土之氓胥靡莫之屬夷獠之種類也我是與處其於政不有治絲而棼噬臘而毒者乎艱哉行也皇甫子曰君侯行毋弗豫也奚其艱在昔君侯司士于華州華州之教刑焉此可以教姚安己司賦于陪都陪都之法新焉此可以法姚安己司漕于通惠通惠之令平焉此可以令姚安己余天子之水官也請與子言水知水則幾於政矣夫人性之善也猶水之下也豫無搏之激之而惟疏之濬之决之導之又從而隄防之而水無有不治者矣江淮河漢暨于海皆然也覆坳濫觴泄閭歸壑其幾神焉天下之政何有於小大何有於逺近何有於難易哉若兹姚之域越在滇之濵楚粵之墟列帝耀德羣哲宣化遹世漸仁其賔服而輯綏者蓋有年矣不徒招攜羈縻之而已也今子藉天子之寵靈往為之牧將有獸馴而狙悅者豈曰絲棼臘毒之哉夫水元命苞曰五行之始萬物之所由生元氣之􅴪液也有理道焉說題辭曰荷精分布懷隂引度有順道焉子能順而理之遍與諸生普之以公淖約潛達燭之以明流而不息居之以勤以此柔逺逺人有弗治哉水之於民親而不尊父母之謂也愷悌君子民之父母吳侯以之是故知水則幾於政矣無私而蹈之不知懸水之為千仞也無事而行之不知姚安之為萬里也吳子乃始怡然豫浩然不疑其行矣祖宴既陳僚友攸集僉曰斯言也可以贈吳子請書之皇甫子曰匪言之贈惟言之鏡庶可以從政贈古黃姜判官擢守慶源叙古黃姜大夫判天雄之幾年有籍甚聲乃移守慶源大夫弗豫曰郡也而州兹命也不亦左乎劉令進曰二也而守兹庸也不亦寵乎公奚弗豫哉若稽古建官昉於虞十有二州惟兹州牧以亂邦服逮秦分天下為三十六郡始置郡守隋尋廢郡以州統縣至唐復沿焉自是州郡更相為名如魯史晉乘侯牧一也奚必左州而右郡時王之制凡府州縣雖秩相崇卑勢相臨制其於専任而責成猶夫一也宋設判官以佐郡守雖曰元僚語稱半刺焉耳欲承流宣化熙政庇民理繁剷劇又孰與守大夫曰慶源即古趙郡今為圻內衝余非薄守顧患夫繁之弗克理劇之弗勝剷也矧兹承宣熙庇民之攸暨胡敢拜命之辱劉令曰大夫奚趙之有哉台小人聽於民矣天雄之民慮公之去也其言悲以思曰公其去我誰獲我所慶源之民幸公之來也其言懌以慕曰民力已殫公來毋晚夫思者實也有其實者著慕者聲也有其聲者漸漸則入著則形而公又能持之以亷勵之以勤普之以公牖之以明政是用成知公不久淹於趙而趙民又將悲以思矣某也忝厠末屬公行無以為情也因道民之言以占公之政遂書以泄其思慕云爾皇甫司勳集卷四十三
