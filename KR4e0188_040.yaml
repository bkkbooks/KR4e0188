body:
  text: 皇甫司勳集卷四十明皇甫汸撰序家集高士傳總序在昔先公玄晏丁辰末葉抗志幽人遡洪崖於上皇緬巢許之遐躅乃采身名於玉潔核終始於蘭芳嵗厯二千人才九十目為高士竊附同流峻節靡諒則孤竹不登緇染稍經則兩龔並外將樹此風猷激彼波蕩仲尼致慨於作者季札託慕於子臧又曷故焉世多蒙垢書遂殘缺醜女諱形棄捐明鏡殆其勢也伯氏子浚覃加摉討銓次成編仲氏子安復廣公意自晉至宋亦拔百人勒為十卷嗣軌前書良足光照先烈禆益淳化矣覽者謂公棲痾丘中遺榮區外一辭束帛之徴再謝翹車之使彼何為也二子者方嬰情於圭組晞功於竹帛口異言朝迹懸在野是編寧免逮躬之恥乎或出或處道乖君子非隱非吏見詆通人於是乎有河陽誠拙柱下非工者矣嗟夫矯意殉名則羮讓而色變委情順物則席爭而心夷若我伯氏獻策違時掃軌絶俗耽綜羣籍無忝書淫著論盈箱何慚釋勸逮我仲氏效郭伋以辭憲甘顔駟之潛郎調滯十年仕恬三黜昔曼倩陸沉於金馬子雲寂寞於天祿豈必逃虛斯為高尚乎矧彼金德韜華運終戢羽之期而此璇符回耀世際攀鱗之代詎非消息乘時龍蛇互用者哉季弟子約合而梓之傳諸其人可謂濟美同好者矣各有序説故不重述云皇明嘉靖庚戌日長至讀兵論序弟汸曰伯氏華陽君著兵論成以視客或曰將之用兵猶醫之用藥必候證切脈檢方處劑乃可十全儒者之談端坐牖下隃度行間徒飾空言罕臻實效余曰不然兵家者流貴乎觀天文諳地利通物情審時變斯樽爼之上可以折衝帷幄之中足以籌決故吕氏隂符垂緡而輯黃公祕記脫履而就孫子武經止輜修列任宏兵法杜門論次奚必躬冒矢石足蹈鋒創始可與之料敵哉華陽君自昔少時好覽孫吳之書頗耽左丘之癖每抗論軍容高談劍術甲寅之嵗海寇外連島夷內奰插羽傳警枕戈綴言慕子文以申威懷士雅之慷慨勢在目中較若指掌其論青齊之兵卒至地非平原騎射莫逞卧而仰給坐以要賞白晝磔人於市剽吏奪金恬不為怪民間乃有倭來猶可兵來屠我之謠明驗一也其論田州之兵卒至長戟不攴亡矢無獲縻費公家疲頓逺道謀及婦人貽笑羣醜明驗二也其論永保之兵卒至紈袴驕豎椎辮餘孽黷貨無厭擁姬高燕繇是金鼓不揚旌旗無色舍兒干紀取笠自恣明驗三也其論東吳之兵義存土著法凖團保苟能行之則荀卿之節制朝錯之服習可練而精也寧至棄民豫敵之恨乎奈何當事者稽古之謀不詢通方之言無采自恃輸金輦璧足以浮功而掩罪也一切姑息寇玩師老而國之大事去矣庚戌之秋敵犯京師君方書違上漢裘敝辭秦覩烽火以興嗟聞鼓鼙而流涕因著論兵書一十六卷藏諸私篋蓋已氣憺幕南志馳伊北矣使售計於繞朝回聽於廣武則是論也殆兵家之左劵豈儒生之巵言而已哉戊午嵗上巳日司直兄少玄集敘兩儀奠位二曜揚輝經緯其間書契攸作文之時義逺矣哉雖有懿德鴻勳非假典謨曷由宣闡故壽不固於金石而名可齊於霄壤者以此世之談理學者詆為末藝守吏局者謂非適用殆猶茹藜糗者難與道蹯膄之美蒙旃毳者不足與語綺縠之華也矧言本心聲詩緣情靡遊心內運應物外感性機妙發氣運天成爰稽作者良亦艱矣匪作之艱知之惟艱匪知之艱言之惟艱此輪扁不能臚斫而伯牙終於輟彈者也犧軒既邈虞夏寖湮宣父釐正之後卜氏泝其源申毛貫鄭沿其流咸能詮風人之旨窺作者之意厯世近而習説真也倬彼我祖敦詩明雅皇考纘業哲昆嗣響乃誕仲氏聿秀厥宗七齡夙悟即懋藏膏之志九嵗綴文遂精雕篆之技至乃研討六籍旁覽百家朝帷不卷夜榻幾穿室人讓麥而莫知侍兒竊饌而無見其篤如此由是學臻博極思覃深湛緬豪士於西州追玄風於東晉家稱千里國號無雙矣兼以氣資爽邁儀容儼肅後進資其善誘末學藉其人倫而余分則友于義同師授雖士龍特眷於平原惠連最鍾於康樂蔑以踰也每有述造輒相詔視商𣙜砥奬可得而言方其家食含章與徐生二黃定交筆札之間篤嗜工部既而何李篇出病其溪徑専意建安嘗曰詩可無用少陵也至解巾登仕與蔡王二行人廣搜六代之詩披味耽玩稍回舊好雅許昌榖乃曰詩可無用近體也又與王文部李司封唐陳二編修劇談開元天寶之盛而心醉焉乃曰詩雖選體亦無使盡闕唐風也至為歌行一本樂府而參以太白櫽括鐃吹之餘猶曰七言易弱恐降格錢劉也故其詩特工五言而七言近體薄不經想余與聫組二京方珂三署被竄則郡檄交移承諱則倚廬同戚雖伯季具邇而敦賞獨深矣試為標論詩蓋錯綜魏晉而託宿於唐英賦則馳騁屈宋而逸駕於散騎文則陶鑄班賈而呈範於中郎其為篇也幽玄以通思舂容以御氣婉麗以陳詞和易以達理憤悶以抒情綿暢以該事雋永以歸趣其始構也隻字不愜於心片言無艷於目踏壁窮思擁衾寤索曾不少休是以吟苦則彌日不就神來則下筆立成今稿中或兩字未竄或二語並存致蓋密矣若夫錦必有襲巵非無當苟慙博物疇發斯藴欲倣胡廣於官針擬劉逵於都賦病未遑也奈何覩姱容而決驟過屠肆而垂涎妄意吠聲詎曰知味哉方其潛心經術晞軌儒林若易序詩説春秋考原周官雜志亦略槩見早謁陽明洞析道體亦其性靜得之若與東郭鄒氏揚山方氏往復諸書鋒辨莫之能抗至其佐郡分臬坐有餘嘯案無留牘魏懷慈父越畏神君固知戟臣歎辭賦非夫蕃侯恥翰墨垂績良有以也然才高妨位命達憎文淪落一官見嫉衆女不令第嘉頌於屬車備清問於宣室是皇猷無潤於掞藻而國典不寄於方聞也嗟乎當寧按圖詎攬燕臺之駿開閣倒屣惟羅葉邑之龍匪今為然振古同慨矣嵗在丙午丁辰荼酷頗有憂生之纍貽余春日齋中讀丹經一篇系曰夜來更加竄定庶幾可觀詩之難言如此後世誰相知評定余文此陳思所以興悲也亡何長逝命矣夫命矣夫然年雖中促而名則宏逺矣胡云未究厥止哉余知兄詩庶能言之不特可比申毛貫鄭亦卜氏之亞也昔孝常次補闕之編王縉表右丞之集顧余謭劣曷克勝兹幸而伯氏運斤二孤命梓芟采精核都無遺誤猶謂標譽騰聲以俟宗匠聊以習聞余兄之言揮涕而告秦樞俾知先人制作之艱若此云爾子約弟水部集序皇甫水部集者季弟子約所撰也吾家世擅藻藝並妙聲詩取友于塤篪接翼於鳴鴈子約生而聰頴不凡方臻童烏之齡即占詠鵝之句子安所敘基稿是已其為人也釋戀域中抗情物外雖志薄三公而不忘一第遂帷研時義案輟雅音世廟甲辰果擢南宫第二猶以屈於一人為恨取忌銓曹兩授水部非其好也乃玩㺯爵服厭棄簿書覽衛生之經求引年之術朝謁屢違省期不顧賈傅承譴馬卿倦遊子約近之矣至奉使楚甸左宦梁園稍遷郡佐地接武夷每探厯勝境物色畸人既輯客郢之篇復積居閩之草嵗在丙辰沿牒入覲投劾自免臺檄交馳堅辭不就其山居也誅葺三畝披味雙玄戒閽者勿妄通賔惟高僧大士時獲瞻晤郡庭邑室絶迹罕臻歎曰余既長揖當路逺謝交遊煙霞成癖豈更屬念纓緌魚鳥相忘抑何取榮車騎至其逝也枯楊無帶劍之枝蔓草無動輪之路悲哉晚耽詩品永托琴心悉屏垢氛洞析名理故其為詩每出間曠彌覺沖逸兼好緑華紫清之章貝葉珠林之偈景純振響於仙遊摩詰攄懷於禪寂興到斯成曾無造次應酬之語總得樂府五十一首五言古詩一百七首七言古詩三十四首五言律四百六首排律三十四首七言律一百五首五七言絶句一百六十首雜文十三首勒為二十卷傳諸詞苑始自甲辰之後附以癸卯之前由仕始也子約可以不死矣昔人謂詩人例作水曹郎吾家世為工官而皆長於詩豈其數歟往嵗選校華陽集序次少玄集兹又收子約遺草芟定之捐賣賦之金用登梓事辛覩華萼之輝良抱人琴之痛曾未終篇幾為掩卷者哉皇甫司勳集卷四十
