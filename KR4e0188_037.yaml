body:
  text: 皇甫司勳集卷三十七明皇甫汸撰序集沈太僕環溪集序稽昔嘉靖八載時膺昌厯運際熙朝帝方典學崇文右賢左戚拔我多士三百二十人庭攬振鷺之儀階肅漸鴻之羽含章鸞藻彬彬乎得人之盛推是科云當斯時疇弗欲彈冠晞世策足要津紆朱懷金出入禁闥君臣相得坐致卿相然十罕其三者奇於數也又疇弗欲攀附鱗翼炳績恢紘俾臯䕫衡旦之業顯枚馬淵雲之辭修勒勳彞鼎垂聲竹帛然十罕其二者厄於時也奉身林壑委懷圖史託諷詩歌闡道綦訓藏之名山傳諸來裔十罕其一者拘於才也余解憲屏居踰十稔矣曾是在位皤首晨星徽猷煙燼海內詡聞著作鋟布則羅達夫有念菴集唐應德有荆川集陳約之有后岡集揚汝承有濟南集任少海有吏部集李伯華有閒居集羅熙載有華原集吳純叔有玉涵堂集僅若而人猶或守儒說而失則固或慕仙遊而失則誕或學綜博極而擇未精或天不假年而造未竟才難不其然乎環溪集者雲間沈大夫鳯峰所撰也君自束髮為弟子員即厭棄時義研討古墳非經緯之書不流於目非漢魏之作不畜於心逮紲組而躋上蘭剖符以領劇郡尋端臬軌復秉藩條所在䝉化去輒留思然非其好也雖訟諜叢積而鉛槧間操吏局塵棼而占綴自適觀其乞改南署引疾東江諸疏可以想見其槩矣昔人謂閎眇之製必湛思以宣綺靡之辭由緣情而得兹茵鼎之貴不能奪蓴鱸之思熊軾之華無以挽扁舟之興不既深於詩乎子游學擅精華士衡才稱俊秀皆吳産也君今其人若梁推文士隱侯居先唐品詩人雲卿其選然雲卿之詩進於歡州以後而隱侯之文妙于郊居之餘夫豫章漢沔之流廬嶽衡山之鎮風景又不特崇山瘴癘也而環溪在九峰三泖間詎减墜石磓星懸氷縈雪之勝乎蓋君之作實宗家範無替世美矣且卧高謝傅尚繫望於蒼生年迫趙昌猶堪承乎清問初服乍反薦剡屢騰終不以彼易此矣集凡詩賦四卷諸文十卷萬有千言大都妙悟神解俱造𤣥乘並可永傳而雜著連珠尤所最得意者余才劣之問敢竊譽於比肩識乏王筠愧要賞於撫掌聊書簡末為同榜得人慶爾馮侍御芻蕘録序侍御馮君子仁以上書忤㫖詔獄所斥大臣方用事乃窮按其罪以殊死論逮繫三年所先帝察知其寃減戍雷陽又三年所㑹赦還家幾三十年杜門却掃惟以著述為業晏如也今上即位首召諸言事者銓司舉君拜為大理丞引年不就尋進階朝列被服金紫前後所遭遇如此云令子行可取所收草合詩與文彚次成帙將梓以傳題曰芻蕘志忠也持届吳門請序於余顧余非士安奚足為太沖重哉既而梓完則徐沈二君業已序其端矣沈叙事稍詳徐銓藝頗當至論氣節則同夫文以氣為主昔人蓋言之矣司勳氏曰自孔門立文學之科言游得精華之藴大雅振於江左二俊起於雲間善乎班氏作史儒林文苑析為二塗儒家者流著論以宗經文章家流修辭以闡道要之不可偏廢也君嘗從陽明涇野二先生遊則固談道德而趨儒術矣今覽集中如奏議條陳星變推驗天人子政仲舒之㫖也蓋深病乎歡兜舜禹雜處堯朝管蔡姬旦并居周室欲帝策免三公刑于百辟痛哭立談之間兾回聽於逆耳屏奸於脫距豈可得乎志雖壯而計則踈矣然侍御猶為之者匪身謀也其序記咸閎大暢朗多禆世教端風軌退之仲淹之槩也賦贍麗書亮直析理淵極則藉為南車揚𣙜時務則較若左劵至於碑銘將昭潛於蓋棺非溢美於諛墓以至詩歌發乎性情止乎理義竊比陶韋蓋不襲古調而頓超時格每出新意而悉去陳言故雖橫逆屢加而不為寂寥淟涊之辭艱阻備嘗而絶無牢愁怨誹之語氣使之也波百折而不回光萬丈而愈厲其所養可知矣即於閒居之暇展卷三覆緬嵗月於桑隂追山川於萍跡能不為之撫膺興慨乎君素履忠孝遂使抆涕叩閽母氏矜乎孟博刺血汙牘令子甚於緹縈言心聲也由是感天地動鬼神隂佑而默相之乃至今日心卒不動君子以為難讀是集者可為忠臣烈士勸非以其辭而已若雕藻逞伎務華絶根豈侍御之所尚哉集凡二十卷萬有餘言白洛原遺稿序老子曰身與名孰親又曰生我名者殺我身名之為纍若此烈士猶務狥之湮沒無稱每以為恥亦其志然哉若夫以文名世尤造物所忌而謗缺因滋媚蛾誨淫於謡諑雲韶輟響於靡曼由是高才之士位不閲於崇品年不躋於中壽今昔同慨矣我友洛原白君晉陵人也少挺英資長鎔偉器承軒皇於乙丙踵居士於元和太傅誕祥於先中丞嗣美於後射策發科者凡四世冠冕佩玉者二十人苖裔逺遡洛陽鼎貴鬱居江左因號洛原不忘本也君精研六典泛涉九流三謝蟬聫獨秀靈運諸劉紈袴共推孝綽擅雕龍之伎際附鳯之期嘉靖改元嵗在壬辰上方右賢左戚稽古禮文君釋褐南宫彯纓東省始𨽻司徒之門尋參秩宗之屬時禮官前後以典章不習相繼罷譴厥職惟艱君草郊廟之儀條山陵之制凡所創議悉當上心本曹賴以折𠂻政府因之為憲而君名茂著於闕下矣海內操觚秉槧之士雲集京邸君與之討論風雅譏評甲乙詩道益振焉嵗在己亥皇上圖省方之遊允建儲之請由是膺宫僚之選簡輔道之任忌者羣起而交攻之坐不扈駕當外調而北平之命下矣量移南銓僚友猶以私憾中傷之坐徼改官當外調而河間之命下矣劇郡兩遷承明再入稍署符臺復僉江臬坎壈違時奄忽委化悲哉在昔中丞昉石家以治園霜晨靃靡擬鄭莊而置驛星旦繽紛君復任俠樂施趨人緩急里中以翩翩公子稱之凡舟抵京口道出閭江不遊白氏園者以缺事負愧不覩白公子者以俗物興譏君名聞於海內亦久矣其奉使也於秦則炎漢之故都也周厯三原極眺二華尋灞滻之源踐鄠杜之境於梁則魏武之肇基也兔園漸蕪雀臺亦莽鄒枚之遊已邈伊洛之軌猶存由是登太嶽以長謡訪峴山而寄慨乃遵樊郢涉湘漢則歎曰此無忘歌風沛上修功代來時也既又問道於靈鷲探奇於建陽謁武夷之居弔道陵之宅山川信美盡發之於詩其所至必先友名流秦若王子九思康子海梁若崔子鋭高子叔嗣楚若王子廷陳廖子道南閩中相與酬贈咸共嘉賞焉兼以丁辰中否動忍既深牽世播遷牢愁彌結由此其工也今覽集中調暢朗而思沉語婉麗而致逺音和平而易感㫖雋永而難斁文足闡道圖徽所得於古人者多矣元子尚寶君早能纘父之官晚能修父之業與其兩弟克承先志廣葺遺編同年考功郎宗子相取而芟其繁類彚其菁英余見或異同復加增損乃得賦若干首古詩歌行五七言律排律絶句若干首序記贊頌碑銘表狀書啓雜著共若干首勒成幾卷題曰洛原遺稿雕木以傳其題石攔華棟童時作也賔王載詠鵝之篇張嚴存賦犬之句殆性靈天授妙悟夙成矣夫造物之於人也豫之以富貴若恆豫之以才藝若吝故人之生斯世也求終身尊榮則易求片言幾道則難君有言復有子可以不朽矣篋藏鴻寶家炳鳯毛使紆朱而草腐垂白而馮生奚足重哉余素託金蘭之契復締絲蘿之好兹序君集深有愴焉蓋余兄子安與君同擢進士同拜禮官改宫僚謫郡倅又同也同由南部再逐冠並止於豸簮綬不踰於銀艾而聲名則相伯仲矣子安年才五十君差過三齡神劍兩埋白壁雙碎不重可惜乎司馬餘風緬江州之匪謝虞人藻撰知長慶之必傳為君幸者將不在斯集乎將不在斯集乎劉侍御集序侍御劉子威以所編詩二帙視余一為客建一為越覽云夫劉子早嵗以明經擢第拜中書舍人選為侍御史著聲南臺三輔至今猶欽挹風裁同官嫉其能竟遭播遷乃謫理興化移倅吳興有是作也諦覽閩中詩凡所賦樂府盡合古調及所擬名家咸類其人雖鮑照代東武諸篇宫商雜奏而並出雅音江淹擬陳思諸作丹素互施而悉呈艷繢又曷過焉非妙思通方兼才具體能臻是耶載覽越中詩麗則自成沖襟超悟盡去雕篆都棄塵筌如境閒花稍落林靜鳥忘還華滋紛易歇芳願坐成乖自是煙虹驚藻思可煩花鳥入閒情足稱秀婉又江路愁能盡鄉園夢懶尋聊慿寄衰鬢為道未歸心哀而不傷得風人之㫖矣矧靈巖仙鯉地接武夷天目苕霅溪通罨畫足以展眺興懷余弟子約與侍御同榜亦由水曹出二兹郡凡有占綴每相商榷江山助藻於燕公羊何附聲於靈運實一時勝遇非獨窮愁而已若其明允折獄庭寡諍詞沉靜當官坐惟長嘯乃克殫心於藝焉夫詩闡成周漢魏繼作齊梁稍靡迄唐始盛蓋唐以詩賦取士故士之工詩猶漢之經術有専門焉如從遊應制必品其高下學士競掞於外昭容評可於中雖宴集賡唱亦私為甲乙推其擅場故詩益精焉稽古柏梁而下從臣第嘉於屬車華林以前副君課美於即席蓋同揆矣今輦轂之下絶口不敢談藝遷謫之人尤所深諱乃使仰楹而纂言杜門以覔句侍御之作有未及覯而賞之者文本關運道固因時寧不重可慨哉侍御業已遷臬終太夫人喪將赴闕補職嗟乎長卿輟吟於巴嶺夢得申詠於𤣥都其家範驗之此行矣錢侍御集序余弱齡嗜詩究心作者間有占綴不敢謂握靈蛇而得珠至所譏評實若操龍淵以議割嘗著解頤新語以示梗槩焉以故宰相石公有熊峰集介溪嚴公有鈐山堂集許中丞有少華山人集吳文部有玉涵堂集皆屬余選次而題其端若但請叙以傳者陳后岡集戴秋官集龔溫州集王巖潭黃五嶽諸集殆二十家云末學謭識聞桀犬以吠聲覩遼豕而駭色奚足與言詩哉姑熟海山錢侍御者童時誦詩即能成咏思若神來語同夙構以大父命改授尚書竟以此取高第然詩固其所好也擢第時貴溪夏公方在政府甚愛其才有所作每示君賡和之輒加嗟賞將引署玉堂期儷金艧業以資拜遂安令公深惜之在任三載以最被徵拜為南臺監察御史摛藻兩都持憲三輔所寓有詩製錦之鄉鳴琴而流咏避驄之地緩轡以成章故潘嶽河陽之什頓掩前輝堯藩江南之篇殷堯藩為侍御有江南詩無慙後躅倦情亮組托跡融舟擇勝探遊寄興恬曠其為詩也語取暢心不由雕刻占惟信口奚假深湛遂能微欵人情妙臻物理婦人女子皆通其義兒童厮卒並習其辭使羇客緘愁非關見鴈征夫下泣何待聞猿萎華喻好於香風芙蓉比妍於秋水無意求工自然追雅矣尚論古人若光羲之真率居易之沖淡太白之敏捷浪仙之縱放才足兼之人罕能及焉仲子寧以鴻臚典客豫告家居侍綵之餘殺青唯亟乞余删次併為之序總五七言古風歌行近體絶句凡若干首詩餘雜著附焉勒為幾卷昔大厯才子仲文錢起字仲文獨秀與劉長卿郎士元齊名今集中如落霞暉寶剎寒月映晴峰月瀉湘江水花明楚岫雲湖聫疑跨海山擁類環滁獨憐遊客興猶逐野雲飛月寒暗度飛鴻影山靜遙聞落木聲共嗟江水流難返且喜山雲斷復連思入蛾眉殘月皎夢回牛渚逝波寒贈君惟有燕臺菊願佩餘香到逺天野寺苦空僧更少莫教寒色上禪衣傳諸其人奚忝厥祖者哉皇甫司勳集卷三十七
