body:
  text: 皇甫司勳集卷五十六明皇甫汸撰碑表明資政大夫南京工部尚書贈太子少保何公墓碑會稽之墟實維於越禹陵降神克生英哲乃誕何公爰振休烈身沒名彰宜表豐碣公諱詔字廷綸號石湖越郡山隂人也少秉淵懿之資長負頴拔之槩嗜學綴文藻德砥行為諸生冠遂以明經起家解褐登仕通籍三朝耀組二京厯試郡藩載綏畿甸所在以能稱自分工署迄拜司空翊世平成典邦水土終始懋焉蓋秦漢以來司空與太慰司徒參為三事並超九列赤符舉梁素絲崇衮公無忝已若夫江艘海舸不愆以綜陵工廟役勿亟而集示儉昭朴昉橋山之制疏㑹通漕奏宣房之績乃增秩賜金錫宴褒璽近代司空未之或有若初出知永平地鄰京輦中官撓法舊莫誰何至則恤灾零雨亷枉章電民悅慈母囚畏神君嗣蒞于楚郴桂告警議發窖積用給軍需民既稱便賊亦就殄廣漢之摘姦孺文之持法宋均之徙蝗龔遂之弭盜殆兼之矣由是參知西遐則風行百粵稍遷右轄則化偃八閩羣獠內欵罔不即序可謂祗服忘勞盤錯别利者也雖漢史之采循吏唐典之咨嶽牧又奚讓焉至陟中丞持憲三輔整肅戎務繁殖黎元糾按巨豪裁罷冗費關夫敵愾遐方震懾北門鎖鑰倚公為重亡何徑踐卿佐矣于時識治者謂公宜居樞管隱憂者謂公宜任韜鈐剡書交薦柄用可期而公知足乞骸遺榮反服暫允歸田之請未寢當寧之眷昊天不弔奪我刑獻海內惜之今上悼焉然星精雖隕而鳯毛不死矣方其立傾否之朝丁履尾之日遏劉襄苖克壯其猷突瑾礱宏卒免於禍大雅保身有如彼既而際亨嘉之會遇攀鱗之代龍蛇互用身名俱優又如此設天假公洪毗金鉉協贊玉衡盛德大業詎可量哉至若孝友繕性雍睦成風銜哀毁瘠展親翕孺教篤韋經宦减仲産守萬石之醇謹幾慧度之纎密疏公罕贏餘之儲行父無衣帛之妾考旋月旦籍甚鄉評凡兹大節以及世美具載亞相陽峰張公之志司成涇野吕公之碑彪炳雲煥垂光霄㝢而仲子大中丞鰲以余中憲先君與公誼為聨榜分則通家屬余甄次遺絢闡發幽潛稽昔執中為宋名相公侯子孫必復其始其在中丞公乎公之夫人唐氏先公卒卜兆於容山尋改卜於西余之陽而合窆焉帝給營葬秩贈宫保湛恩汪濊寵靈攸妥堪輿家流謂得善地亮哉徵哉辭愧不腆而事核則傳矣系曰漢何武居無赫去見思流遺德明司空承先則良哉稱二千石曰于藩維方伯暨中丞揚憲職夙夜寅在公直胡憖遺嗟奄忽經西余筮從吉山蜿蜒水抱一竄𤣥廬返真宅鏤鴻勳樹道側居永哀行者泣於萬年長靡極明鴻臚通事顧公墓碑嘗讀太史公世家諸篇乃知尚貴尊賢禮之大經也勾吳著姓有四而顧為稱首今太保惠巖顧公可學紹肅侯之家聲挺彥先之人望早嵗擢科列郎署參外藩遺榮恬處幾十餘載值皇上求舊搜隱馳安車之徵賜清燕之接言每當聖意由是寵眷日隆數嵗中超拜禮部尚書晉秩宫保自父率祖及曾咸贈光祿大夫如其官世祿之家鮮有踰於錫山顧氏者公有弟為鴻臚通事諱可文字與明别號惠崖同母馬夫人産也粵自宋季不競民多南奔占籍錫之芙蓉山高祖福五生壽山善治生富埒吳中明興法網漸密豪猾易梗有俞慎者聚而構亂邑遭株染父子逮繫雖獲矜釋而門户傾圮矣時大父信尚在齠年匪友人錢氏存下泣之仁念把臂之誼幾不能全至芹軒公某修業而息之稍復其始與其弟比部泉州公各訓誨其子誦法詩書繼武科第五世之後莫之與京謂非天道與善之報耶通事君生而容貌魁梧性姿倜儻馬夫人知非凡兒愛之特甚而芹軒公聽其任俠亦未嘗苦為繩檢乃棄弟子員授興邸舍人竟投檄不屑就居嘗敬事長公相與翕孺推衣讓果有李孔之風太保公從宦逺違曰以二親纍君生能奉養獨勞歿則哀毁共茹輒歎曰有子如弟吾愧多矣東山既起移書召弟促之如京至得改授鴻臚攜入直廬縱觀禁籞之麗日所頒大官醪饌退而燕私都人榮之乃告其兄曰昔吳季札之賢以來聘獲觀周樂為幸漢蘇卿垂希世之節而位不過典屬國余所叨誠已踰分尚安覬乎懇辭以歸都人賢之太保笑曰君殆諷余思少游耳公卿大夫聞而賡為詩以贈并為之壽今彚為集云雅嗜山水之游兼有花癖嘗築别業於城東結亭葺榭疊石穿池踈篁夾軒叢菊被徑日邀賔朋觴咏其中夜或寢處花下不知露之霑茵也又構凝雲書院繚垣飛陛飾以丹漆置蒲滿砌葱蒨逼人因號為蒲仙性落魄不事家業嘗曰人非無財之難立而無令名之為患大丈夫不能策足要津以𢎞功烈胡與賈人攘攘逐利爭尺寸於市肆間哉家無長物而好千金之施義所不平而専趨人之急敦睦洽比無小大親踈多䝉其惠者嘉靖己未嵗旱為虐忽病熱流火之月愈煩躁家兒汲山中第二泉置几榻間滌之始蘇竭則如故而體益憊矣因歎曰周詩云我心憚暑憂心如薰安得清風靈雨俾延餘息哉既望四日而卒卒之日無問知與不知皆為悲慟聲震里中方在彌留言不及家務曰以余被華食甘乘肥御豔七十餘年志亦足矣子孫並能文不墜先業更何身後之戀哉第令移蒲菊數本設水檻以娛魂魄此與魏武上脯􅖲陳妓樂者清濁殊致矣先配陳孺人繼郁孺人並先君逝長子起經出為太保公嗣次子起綸為從弟可觀嗣俱官嶺外祗役歸覲躬視考終二子奚憾哉乃各命一孫斬服行三年喪禮以義起制由情生君子謂能達權矣太保公敦鞠子之哀流終鮮之痛手自勒狀不逺數千里請銘於甘泉湛公葬卜十二月某日懼道阻愆期請余為文以表其墓嗚呼世如通事君者亦翩翩然佳公子矣嘗擬樂府作調曲又倣唐音為律詩集行於藝苑雖乏顯位而有令名宜歌以表之辭曰惟孝與弟行於家太保之言微而匪誇惟信與義著於鄉無間昆言欲蓋彌彰芳聲籍甚聞於朝彼都人士式歌且謠積善餘慶垂於後宜爾子孫克昌以茂恩錫幽隧惠之陽别開宅兆祔以藏表兹潛德百世永光明朝列大夫湖廣布政使司右參議吳公墓表鬱鬱蒼蒼有山曰陽𤣥廬帝錫永祔寵光此延陵吳仲子之墓也曷表之公諱子孝字純叔别號海峰晚更龍峰自延陵而降世為長洲山塘里人生而頴悟絶倫考文端公愛之甚五嵗占對七齡賦詩敏出過庭美由即席且機辨響捷長於典謁遂使字父謝愆呼友起敬云李文正程篁墩並為學士一代偉人文端公時為編修攜以往見咸深器之至弱冠博覽得於兼行𤣥思成於宿構將濟世匡時乃著說守以見志焉隨任留都喬司馬座客常滿至則盡傾王新建門不妄通見輒嗟晚名益振於諸生間矣壬午舉應天越己丑皇上臨御之八年也天下士舉於南宫者三百二十人吾蘇十有六人公為之首及賜第選為翰林庶吉士上方稽古禮文鋭情經術延攬俊乂殷潤皇猷有若吉水羅達夫會稽楊汝成陳約之西蜀任少海熊叔抑東魯李伯華上黨栗仁甫江左唐應德公與余十數子者敷緯國之華摛掞天之藻雖枚馬之輩相得而快甘泉之遊然綘灌之屬交嫉而興洛陽之譖矣厥後曹給事數相於闕庭王中郎忤宰於省闥曾楊二侍御批龍鱗而抗萬言視鴻毛而輕一死其餘敡歷中外蜚英聲騰茂實者莫可勝算我明得人於斯為盛矣然不克久奉清班超踐崇品命之所遭亦略相似也先是文端公喜業紹於池毛懼途迫於鐘漏由南吏部尚書乞骸東歸避賢者路哲哉公初授台州推官便道過吳獲展家慶圖欲陳情奪於父命而止居台三載擢廣平通判夫以藝苑之英出為理官以臺諫之器置為郡尉大乖常格人共駭惜恬不為意恪供職司折獄平反越號神君典牧蕃息趙稱良吏豈恥視刑案不對馬曹徒守文墨而不間吏局者哉文端公聞之移書嘉勞亡何以廣平最拜為南文選主事至則堅請侍養竟蒙豫告酬其初願孝哉歸乃竭力娛親大構别業昉平泉以治園擬東山而營墅臺榭亭館之華林竹花石之盛甲於吳中罔有踰者鄭莊開驛賔客響臻鄴架儲書子孫絃誦他若賜金樂施懸車許借雖文端雅量能成其志者公也里人慕其風曰生男當如吳仲子矣今三賢堂所集後學彬彬向化皆公造焉壬寅文端公八十有三薨執喪毁瘠恤典加隆備其哀榮從公請也乙巳起家補禮部精膳主事尋升光祿寺丞去羡裁冗著為甲令所减大官之費嵗以億計自是寖有列卿常伯之望以性剛毅介直好面折人過兼之持論峻激不為脂韋淟涊忌者媒孽其短政府銜之銓司希㫖出為湖藩右參議分守下荆南道提督太和山公歎曰天台武當世謂福庭靈窟何幸兩為仙吏他日溘死牖下魂魄當遊二嶽間也褰帷行部齊服謁祠暇則延眺於鹿門致慨於峴首曰龎公叔子獨何人耶太和嵗例出納悉委所司乃稽其贏籍記之權璫斂手錙銖莫敢私者隂畜憾焉庚戌察吏坐讒免官亷吏可為而不可為信哉由是浮湘江遵鄂渚下赤壁遡采石而還如弔屈原懷賈傅諸作辭多不載閉關卻掃葺其先人之廬觴咏其間家鄰虎丘每花辰月夕或杖策攀躋或操舟沿泛狎魚鳥以留連從林巒而忘返辛壬癸甲之嵗師旅方殷飢饉相踵凡備倭輯盜禦旱防潦臺省造門咨訪規略多出公議較若指掌賴以輯綏終不自言家居數載余亦自滇免歸把臂甚歡命酒慰勞相信益深凡有述造示余商𣙜評定之玉涵集余所選次并明珠集皆為之序昔左冲假寵於士安沈約邀賞於元禮其槩一也追昔彈冠京輦策馬交馳聞雞蹴起當是時入思論道於東觀出思銘勳於西域乃今徒以雕篆為伎鉛槧垂聲即使不朽豈余二人之志哉所期共保玉體俱享黃髮癸亥之春忽染痰疾步履稍囏言語遺誤竊為憂之七月八日避暑虎丘再宿疾作返舍危坐揮藥不御申旦長逝矣距生𢎞治丙辰正月十一日春秋六十有九天胡不稍假俾臻古稀也悲哉公配顧氏封安人所生五子長曰尚朴以文端廕應拜京職次尚儉郡學生又次尚默尚潔尚遜俱太學生潔先公卒孫男八人亦皆駿發所締婚媾俱鼎族云公善誨諸子逮孫並為儒流一洗紈習雖竹室别開銅盤異饌將以勵之而龍翔桂挺方之荀竇友于觀摩之力也小有過差不為譙讓潛自改省無傷和氣焉公豐頤便腹朗目修眉聲如洪鐘每酒酣耳熱引目微盼掀髯宣吐謔浪唾咳文采煥發聽者咸避其鋒嵗時伏臘薦享䖍肅至敦睦宗姻䝉舉火之惠矜恤孤寡殫分宅之仁人有緩急力能解紛事有不平慷慨為理奬拔善類掩護瑕疵皆人所莫能及也所著有說守問馬集仁恕堂日録玉涵堂集明珠集防敵論及序記碑銘若干卷行於世重修宋史殺青未就以俟後人字學虞歐稍變戈法詞宗朝晏尤長小令下筆輒成倚馬可待得之者列開府之屏題蕺山之箑照乘掩輝徑尺非寶也卒之時朴承諱自京數千里徒步來奔䝉犯霜露不浹月而抵帷堂一慟幾絶孝行若此公其有子哉越明年甲子閏二月十日偕弟儉等奉公柩權厝於陽山文端公賜塋之側俟吉乃葬彭徵君狀其事王嶽伯著為銘互闡幽光都無遺絢矣謂余與公最為相知司直兄子復嬪於儉兼有世睦之好屬余表之夫萬石孝謹公儷其醇太丘長者公驂其風顔氏義方公迪其訓河陽拙宦公戒其多子長史才公纂其緒少陵詩律公嗣其響從公游者易名於蓋棺稽法於史氏諡曰貞毅不亦宜哉系曰延陵亮節千載以還德徽匪墜季仲之間鴻筆色絲刋石永堅余表其大揭之名山明吏部文選清吏司員外郎王君墓表吏部文選員外郎王君卒其門生陸尚寶師道狀其行友人王參議庭為之銘足以闡懿生平垂休來葉矣諸孤謂余與君乙酉同舉於鄉己丑同升於朝交最篤而知更深也謂表其顯且大者聊補志狀所未備云君諱榖祥字祿之惟辛酉君以降而上世嘗頌酉室者適符其生因題其居而自稱酉室云系出大原晉末徙閩之福清唐水部棨為世譜載其先大雅慎微皆起進士傳至八世祖仲舉贈奉議郎始遷吳之長洲生蘋仕宋為著作郎中大夫生敏精於醫生觀能世其業即君之父也子孫守其方書往往全活人吳中稱醫家者流必首王氏云君生而器雅童烏之齡即能屬文樂安之嵗選充縣學弟子員文恪王公一見奇之曰吾宗千里駒殆此子矣時文待詔蔡孔目尚在諸生中引為忘年交二王諸袁以才齊名既舉進士改翰林庶吉士先帝疑政府私樹桃李詔悉罷之乃授工部屯田司主事少宰徐文敏公乙酉座主也薦調考功尋署文選員外遇正郎缺朞月不拜謂君明慎銓藻咸當其人力足攝也時太宰為婺源汪公鋐専伺政府賢不肖一切倒置選法幾壞君每與忤將中傷君君稍覺乃以母老不便北土乞歸侍養而忘其有兄不得輒引是例命下豫告仍敕按院核之遂出貶真定尉棄不拜兄榖禎尚官嶺南郡幕先有傳其物故者妄也嗟乎為母承譴無忝人子矣時鄺子汴王子慎中任子瀚唐子順之並以才居吏部不利為伍君行而諸子亦相繼謝去鄒陽入朝見嫉之言固不驗耶後周恭肅公故吏部少宰也再召入京謂汪曰公不足王子者奚故汪曰本部左遷非止一人彼獨薄尉者非矯耶周笑曰公謬矣員外初以母不便於北土真定去京師才數百里獨能安耶既以母老乞歸今可捨之而身自之官耶是猶欲其出而閉之門也江浙間寧無散郡可迎養者乎公頷之意終不釋而君亦矢心不復仕矣亡何太安人背養居喪敦禮以父事兄以母奉寡姊友睦蓋天性也杜門却掃委懷圖史絶戀紛華既無塵網之嬰亦無山水之好有田在東郭外課農自給殷春閲耕逮冬納稼間一往與田父老談笑移日不知為吏部郎也胡安人亦時往饁之君曰昔介子與母偕隱龎公將婦以遊向恨失之綿上今幸得之鹿門矣撫按諸司交相推薦疏纍上未報厥後太宰為甌寧李公默己丑房考也素重君諷御史特疏舉君又移書所司為趣駕終不赴時倭夷構亂兵火戒嚴人皆以墳墓妻子為念奚暇計爵位哉安人痛姑之亡鬱鬱喪明君素不畜妾媵躬視家事雖灑削胃脯酒漿之瑣悉理周密或以此少之而君恬不恤也君既不出而李公竟坐讒死世益賢智君矣今上嗣位簡用先帝舊臣君業已補尉大名至是超拜南京文選主事地近而易即僉謂由此可立致崇顯而君稱疾堅不就衆為惜之而陸君由南儀曹起僅遷尚寶君殆有見也郡守永年蔡公甫下車首書清德表其里枉駕造其廬坐牀笫間相勞苦君口不能語咄咄書空稽首作謝狀里中嗟歎謂賢哉蔡侯也隆慶改元丁卯春二月十二日安人胡氏卒君震悼幾殞五內俱傷又力疾為治喪事痺遂劇非藥石刀圭可緩息也越明年戊辰九月九日卒七十稀年未躋二稔耳悲哉先是文待詔方負重名吳人士多因之起譽君尤所親愛其所否者余安定與黃江夏耳君為詩冲淡而不尚綺靡文亦典雅有則書倣晉人不墜右軍大令之風寄興丹青追工摩詰之技篆籀八體並臻妙品晚抱書癖手自抄録無間寒暑讐校魯豕略無脫誤雖大亮之百卷繕寫子孺之三篋刋亡曷過焉今張燕公陸放翁曾南豐三集南唐書野客叢書手澤猶存所纂郡學志并著詩文若干卷行于世君性整潔不為苟簡室中器物置必有恆所衣服巾履雖敝無㸃膩可浣足跡未嘗入公府有以事干請者挹其風槩不復敢言客有詆人短者以他語亂之慙色而去自唐宋以降數百年遺像封誥璽書之類必加寶護此外無長物也子男三長仲友國子生次仲恭郡學生季仲序孫男四婚娶皆名族詳具志中兹不載君亦可以不死矣是嵗十二月二十八日卜吉祖塋旁仲友等奉二棺合葬云司勳氏曰若王員外者表署於鄭鄉稽評於月旦勒有道之碑展季子之墓易名斷諡其在陶趙間乎夫嗇君者年完君者天夷清而聖臧節而賢嗚呼先生之清節足以起懦激亷矣靈巖之境橫山之巔白楊蕭蕭爰起新阡灼灼桃塢夫人從焉奮猷樹烈後其考旃明奉訓大夫知夷陵州蔣君墓表夷陵刺史蔣君卒其友人徐隱君繗狀其事同年林太史公樹聲為之銘亦足考裔於往牒流輝於來葉矣元子太學生宇志猶欲表其墓乃請於司勳氏將以昭潛德而永孝思志誠可嘉矣夫包山之陽消夏之灣堂而封者大夫之阡歟君諱球玉字國華别號平邱生其先自成周時封旦子伯齡于蔣以國為氏傳至漢山亭卿澄宋戈陽之奇皆以通侯顯子孫散處河洛間高宗時司樂瑎扈蹕南渡始居毗陵載徙包山遂為吳人云曾祖渾祖旻父軫皆褐玉韜光因山修業有桑麻橘柚之饒比素封焉伯父詔武廟時登辛巳進士超拜御史稍復其始君生而英敏絶倫八嵗誦詩書二七善文辭嘗攜之母家外曾王父翰林蔡公一見器之曰繼侍御者此兒矣弱冠博極羣書咸通大義補鄉校弟子員試輒居諸生右里中巨室爭遣子弟從之遊今上改元庚子嵗當比領薦南畿後屢試春官不第歎曰吾自謂下筆言妙天下取青紫若俯拾地芥然厄於數奇非文之罪也裘敝金殫鬢凋顔改不復能與少年馳逐矣且古人或以推擇垂勳或由辟舉熙績奚必區區一第乎甲子謁選銓曹先是夷陵缺守荆楚方有戎事地當巴蜀孔道素稱繁劇難理天官氏亷得君才乃就闕下拜為夷陵刺史一命而為大夫朱幡皂蓋握銅符而綰銀艾亦足為榮矣捧檄歎曰豈不懷歸畏此簡書我之謂矣暫圖將母而後之官未晚也乃戴星叱馭扶疾遄征渡江愈革竟卒於舟中去家僅百里乃不克死於牖下天乎命哉年才五十有六耳宇志嘗遊太學司成而下若博士掌故咸敬禮之曰是平丘子耶蔣氏代不乏人矣諸孫並森森秀發君其不死哉詳具志中或曰大夫未嘗蒞官臨民展采錯事曷用表之司勳氏曰昔仲弓以懿行表鄉萬石以醇謹範族故刑于之化可以御邦孝友之善是同為政詩書所稱曷戾焉君處晜弟間推財讓産取老甘瘠家賴舉火户䝉燔劵者多矣又好為然諾専務趨人之急包山去城府頗逺湖卒風濤險莫可涉人有忿爭不聽於邑令而折於君之一言倭夷犯山中君出數千繦召募義勇授以竒策一境獲安山有津曰鎮下水潦泥壅舟觸輒覆乃捐槖中百餘金修治之民免於患以此數端往試一州則其興鄭國之渠弭渤海之盜空太丘之獄棄高陵之田何有哉而今已矣天不助楚殱爾父母悲乎夷陵之民聞訃輟春罷市曰祀子産於東里葬朱邑於桐鄉吾儕小人敢忘兹義乃想魂流涕而為招曰坎坎伐鼓傞傞屢舞我歌惟些俟侯沱浦侯之來兮完襦與袴侯之不來兮捨斨及斧生不䝉其澤兮死願受其祜余既表其事并采其言書於墓石皇甫司勳集卷五十六
