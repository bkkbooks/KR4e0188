body:
  text: 皇甫司勳集卷十明皇甫汸撰樂府芳樹芳樹九華邊春風一度妍飄香承輦路弄影向甘泉綴葉紛千種濯枝幸萬年不作淮南桂空山徒棄捐臨髙臺髙臺望不極臨佇意何窮茂苑花為苑吳宫錦作宫管絃虛夜月羅綺罷春風獨惜烏啼處猶聞曲怨中有所思春風吹繡户明月鑒羅幃同心阻芳訊千里悵清暉歌絃塵屢積舞衣香漸微别有關情處梁間雙燕飛巫山髙蜀道連巴水巫山接楚陽情來為雲雨愁起見瀟湘楓葉吟秋早猿聲入夜長何能降神女髣佛夢襄王隴頭水隴坂去何長隴水復湯湯咽處堪啼淚流時更斷腸三秋邊草白萬里戌雲黃辛苦交河使西來憶故鄉折楊栁不見隋堤栁長條大道間絲隂流水去帶影逐春還妬眉銷翠黛聽笛損朱顔日暮行人盡思君可重攀梅花落早見梅花落江南春未遲如何上苑葉不似故園枝影怯臨粧夜香憐逐吹時無人問消息獨自寄相思關山月故園千里月流照入秦關弓影同看曲刀頭未卜還迷雲度容與映水咽潺湲莫遣青樓去摧殘少婦顔邯鄲行寶馬邯鄲道金裝遊俠過一朝罷歌舞千秋傷綺羅臺榭風花盡郊原煙草多客心將夜月滚滚向漳河昭君怨含悲辭鳯掖結束事龍庭環珮從兹逺琵琶詎忍聽泣將蛾眉恨仰視旄頭星獨有長門草猶向夜臺青長門怨長門永夜幽團扇早迎秋望幸非同輦含情是倚樓容華翻易歇恩寵最難收君自觀魚樂寧知妾淚流冬宵引冬宵不易曙耿耿朔風淒沙鴈寒猶起城烏半未棲孤舟泊江上征馬渡遼西豈但金閨裏能添玉筯啼烏夜啼長樂宫中秋夜長美人新得幸君王别館不愁金作屋曲池無羡玉為梁門前數報公車過樓下時聞脂粉香總是啼烏聲轉切歡娛那解曲淒涼江南曲錦帆西去繞橫塘畫舸攜來悉粉粧旭日籠光流彩艷晚雲停雨淨蘭芳飛絲帶蝶粘羅幌吹浪逰魚戲羽觴自是江南好行樂採蓮到處棹歌長春江花月夜空負芳樓約愁逢江上春月華天外潔花影浪中新詎是沈珠浦將非濯錦津爭言蘭作舫復擬桂為輪圓缺同今夕飄零異昔辰關山猶自隔攀折贈何因擬中婦織流黃金閨方永夜翠袖理殘機燈花斜落鏡月光低鑒幃寸心共絲斷雙淚與梭揮作伴除蛩響驚眠惟鴈飛織就當窗素裁為逺道衣徒令芳訊達不及早旋歸擬伯勞東飛歌二首蛺蝶雙飛燕並棲秦樓燕市花成溪誰家玉人當户窺含羞斂笑橫波馳寶髻珠鈿明月光羅幃翠帳秋夜長秀顔皓齒才十五時向芳筵作歌舞雀臺露寢生暮雲空留可憐猶為君夜烏悲啼朝雉鳴青琴絳樹無限情誰家臨鏡總新粧雲鬟刻飾出意長翠屏錦帳花連理洞房仙居暗香起年幾二七奉下陳光彩流盼姿絶倫春風東來吹落花緑窗可憐虛歲華自君之出矣二首自君之出矣坐令衣帶緩思君如懸蘿纏綿不能斷自君之出矣何處不相思在物願為筯君前無隻時岸花臨水發三首止水如瑶鏡繁花似寶粧為憐影相照詎是意相忘江疑濯錦處花似浣紗人莫逐東流去還待上陽春名園紛幾許臨水獨如何所思迷望石欲往會淩波賦得處處春雲生春色藹無際朝雲最可憐金枝紛映帶玉葉綴聯翩弄影交疏裏含情飛蓋邊長安遙向日何處奉非煙烏散餘花落春來啼鳥伴相逐百花中棲處迷深緑飛時帶淺紅祇惜香霑羽非關嬌惹風回看意不盡猶自戀芳叢空梁落燕泥金閨春色早玉關芳信賖人歸翻後燕淚盡每先花户暗香泥積梁低舞影斜不作雙飛去東鄰王謝家邊馬有歸心應瑞來宛國銜恩入漢家邊兵犯燕塞驃騎出龍沙為報千金顧寧辭萬里賖蹄穿朝踏雪聲斷夜嘶笳逐北名空在征南賞未加詎隨班定逺生作玉門嗟夏日湖泛作採蓮曲雀舫疑杯度虹橋似帶縈湖光湛處全無暑雲氣浮時半有晴此時流水歌聲起此日採蓮殊未己帆回櫓轉逐橋斜樹裏溪邊是妾家翠裙妬殺風前葉紅粉嬌於水上花花開花落獨含愁人去人來不斷逰玉斚醉霞何惜晚瑶華零露易驚秋秋露蒹葭沒秋水芙蓉歇菱鏡年年非故顔荷衣夜夜空明月門有車馬客行贈李少卿驅車吳趨市被服一何妍叩閽懷敝刺云是李青蓮家住齊東里裔自隴西傳觀道汶泗上探竒泰岱間舉手捫星漢躡足凌雲煙昔拜符璽郎侍從清華班姱行遭時妬修名為世牽一麾佐宣守理案有餘間試問長江練日對謝公懸傾蓋惠良覿振袖發瑶編瑩如夜光儷粲若春葩鮮且勿出關去邀君著五千皇甫司勳集卷十
