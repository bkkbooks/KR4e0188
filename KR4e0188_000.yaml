body:
  text: 皇甫司勳集别集類五明提要臣等謹案皇甫司勳集六十卷明皇甫汸撰汸有百泉子緒論已著録其詩文有政學還山奉使寓黃家居南都禪栖潭州栝州南中山居副京來鳬司勳北征南署赴京浩歌亭安雅齊諸集黃虞稷千頃堂書目皆不著録晚年手自刪削定為賦一卷詩三十二卷雜文二十七卷冠以集原一篇其諸集之名仍分注各卷之未刻於萬厯乙亥范惟一所校訂也朱彛尊靜志居詩話稱汸集六十卷即指此本黃虞稷亦不著録偶未見歟集原自述其詩始為關洛之音一變為楚音又一變為江左之音又一變為燕趙之音又一變為蜀音縷舉其師友淵源甚詳今統觀所作古體源出三謝近體源出中唐雖乏深湛之思而雅飭雍容風標自異在明中葉不失為第二流人馮時可雨航雜録云皇甫百泉與王弇州名相埒時人謂百泉如齊魯變可知道弇州如秦楚强遂稱王王士禎香祖筆記以時可為確論云乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c9a230e70b245b46c2ecaf040d6b834c77c9094b483f6fd17e799ffc1ac7e0de
