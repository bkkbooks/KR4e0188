body:
  text: 皇甫司勲集别集類五明提要臣等謹案皇甫司勲集六十巻明皇甫汸撰汸有百泉子緒論已著錄其詩文有政學還山奉使寓黄家居南都禪栖潭州栝州南中山居副京來鳬司勲北征南署赴京浩歌亭安雅齋諸集黄虞稷千頃堂書目皆不著錄晩年手自刪削定為賦一巻詩三十二巻襍文二十七巻冠以集原一篇其諸集之名仍分注各巻之未刻於萬厯乙亥范惟一所校訂也朱彛尊静志居詩話稱汸集六十巻即指此本黄虞稷亦不著錄偶未見歟集原自述其詩始為闗洛之音一變為楚音又一變為江左之音又一變為燕趙之音又一變為蜀音縷舉其師友淵源甚詳今統觀所作古體源出三謝近體源出中唐雖乏深湛之思而雅飭雍容風標自異在明中葉不失為第二流人馮時可雨航雜錄云皇甫百泉與王弇州名相埒時人謂百泉如齊魯變可知道弇州如秦楚强遂稱王王士禎香祖筆記以時可為確論云乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:1238c5071d546ff84502a02ad8521300607809c28d76c85f067f2ce0c6056d1b
