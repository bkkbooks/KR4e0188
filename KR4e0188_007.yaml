body:
  text: 皇甫司勳集卷七明皇甫汸撰五言古詩補官澶州行經曲梁作弱冠陟明廬腰章宰芳甸方齒蒞阿竒希聲治單賤愧乏操刀長懼遺製錦譴桐絃坐屢鳴桃花歷三見北闕忝嘉招東省參羣彥牽世值衝飈徂年倐奔電驅駕邁新邦褰帷經故縣悲哉丘隴非悵矣閭井變猶煩父老迎爭識使君靣德汝匪惠心式歌詎成抃始至澶州作自我謝郎曹朅來守吏局塌翼懷奮飛低眉就羈束驅役遵旄丘興歌睇淇澳愧乏沂海謡何以佐明牧幸寡宣城辭間可理尺牘升既等陵喬沉亦悟陂復芳草合江程清猿佇旋轂衛水日東流因之鑒心曲廣平郡觀蓮寄翁守舊南比部郎留京白雲司原廟青山路眷此湖上芳期之省中顧俄承畿輔麾遂抗邯鄲步繞郭帶澄溪朱華湛秋露燕寢晝亦間襦歌夜安作徒爾奉清香無由展良晤移官越中初返家園奉答伯兄虞山見寄薄遊逗京邑獨往眷長林始奉越鄉役因愜故山尋曠兹二載别良晤展斯今誰謂百里間猶自邈徽音未結丘中賞先枉池上吟睇燕悲稍戢懷荆慨以深花源回俗轍蘿徑斷塵簪且駐稽東駕雲扉期此心役行至檇李值親故作放舟窮越水息駕見吳山山近殊易即室逺竟難攀徒以大夫守悵兹遊子顔密親載尊酒晤面語鄉關歎逝嵗不待恩存淚已澘春來芳草際魂去白雲間無勞猿獻誚會見鴻飛還于役吳鄉值伯兄下第來集余來自越郡君至由燕京解裘洛塵積對酒鄉思生為語北征事猶多西笑情紫塞方傳箭潢池復弄兵受釐在宣室遣使出蓬瀛上書或不御投筆竟誰成防秋邊騎入何日海波平年已非軒冕志豈眷緌纓願守箕潁節還就河陽耕聞斯倚增歎從此欲遺榮謁劉文成祠璿璣既舛運寶鼎亦乖移海宇蕩無象誕聖鬱有期陽九值傾否明兩遘重離俟清乃契渭顯允聿興姬探符洞赤伏懷韜臥青溪居擬王佐匹起為帝者師羣策參多士獨算莫與偕禹志晚睎帛良謨日陳帷立談不解褐肆伐竟承麾陳張井蛙器妄干神龍姿一舉已就殄崇朝遂于夷摧漢若電掃卷吳類風馳功成奉身退書上賜骸歸且棄人間世帝鄉寧久羈貪天自貽戚震主或見疑伊人信大雅榮名安可追報享式嘉薦像寢示崇規蹇劣淹末宦竦踊企前徽稽首曷容贊撫心投此辭郡齋作雅志懷山棲復得理山郡蒼岫入南楹白雲帶西徑雖事簿領勞時與煙霞并心曠眺已遐迹沈尋亦近下車芳載徂牽牒明兩迅仁靜樂有餘拙遲淡無競命藻酬清暉濡毫愧靈運得月亭清溪一何湛源深白雲曲望舒忽東升浮光漸西陸蕪趾匪舊存芳亭煥新築碎璧時復沈散金如可掬雖乏謝監悰聊寄庾公矚誰謂曠音塵古來共幽獨遊仙都同樊侍御寡諍謝書牘懷仙抗晨旌怪石儼壁立危峰類削成陽火伏未息隂湖鑒以清下有干霄木上有承露莖漢武建柏寢秦皇慕蓬瀛惜哉無靈氣安得遂沖升軒后獨不朽鼎實垂鴻名柱史良地主邀我鈞天行黃金九奏發白玉雙童迎聊從避驄路一展攀髯情養疴江寺招長公不至理人愧無術攝已徒嬰患假息贊公舍披味醫王觀逃虛行滅迹執熱坐揮汗空桑豈常廬聊得慰懷安美酒非上藥亦足寄情歡鷲峰斂夕霄鶯湖回清瀾心將碧雲合目隨弦月殫所期殊未至還寢獨長歎二郎回溪詞事載青田邑志謝公永嘉守在郡宥無為敦賞值令弟華萼每相攜躋險既山頓窮源亦水嬉溪名沐鶴是人覩遊龍非駕言輟棹際並影浣花時凌波餐秀色拾翠逗芳儀援琴挑未就解佩贈猶疑高唐侈宋玉洛浦悵陳思抒章但唇動締心空目馳來同湫風止去作飄雲辭停聲三婦艷嗣響二郎回樂清登簫臺訪洛簫泉仙蹤詎可攀荒臺尚堪訪簫弄清泉中舄振紫巖上波動若鸞沈雲飄似鳬往浮筠本無垢托心在塵想花溪如有靈應流蓋山響從軍行二首寄贈揚用修鴻運纂丕基龍飛起潛邸聖孝亶淵衷徽猷邁前軌聚訟紛盈庭批鱗抗羣議徒逞折角雄猶取越樽忌在宥蒙至仁承嘉逺投裔稽首金馬門傷心碧雞戍幕府雅好賢辟君掌書記三紀踰瓜期數口尚匏繫朅來秉憲章欲往問竒字為賦從軍行聊展懷人思思文際聖君稽首萃羣辟子雲侍承明胡為去荒域被命事犀渠差勝下蠶室憤志酬八書榮名重三策丁年子卿嗟皓首仲升泣看鳶窮瘴煙放雞定何日業既違操觚勳還期裹革五月行渡瀘千里望巴國瀘水向東流巴雲忽西匿相思持寸心願附雙飛翼滇省述懷承嘉理齊安幸校長沙近秉憲按滇中始覺在遐境譙相反見嗔揖侯乃成釁喻夷辭豈繁威𤏡法當峻昆明鳶作池太華雞為鎮遲夜召賈生經年淹許靖霞難駐令顔霜易改衰鬢故人滿清班誰其枉芳訊龍性未可馴鳳翼胡由奮聊從達士觀無嗟小人慍皇甫司勳集卷七
