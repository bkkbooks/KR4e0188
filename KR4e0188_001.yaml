body:
  text: 皇甫司勲集卷一明皇甫汸撰賦禱雪南郊賦歲屠維赤奮若兮朔易正乎𤣥英歴固閉於暢月兮練望幾之翼辰皇帝有事於南郊禱也何禱爾繄鱗運之迅傃兮氣憯懍而葳蕤詫隂伏之莫競兮恒暘若而淹期金方傷而木沴兮亟春令於僭差薄氷履而易冶兮杲日出其尚熙虞介蟲之為孽兮終旱瘨而癘滋豈嘉承之弗嗣兮胡元元之逢此罹也先是天子祗祓宗伯崇禋野廬清術司烜綘旻氊邸閲掌次之則旌門詰羽林之兵是旦也曶霍䝉合爛燦星陳望舒先抶飛廉後奔張急繕以按招搖之隊振殷轔而走夔魖之神天子乃離齋宫辭靜室侑方祇款太乙馳道既警乗輿乃出雲引縣常飈分列㦸駟文螭之襂纚兮六素虬之絡繹翳端路之翠華兮旅中庭以蒼璧樹羽崇牙執紱秉翟鼉鼓金鏞雞竿玉戚雖九奏之樂未宣而萬舞之佾咸集少焉清塵起而烟煴於屬車紫熏颺而苾芬乎趣席紛總總其將羾兮班峩峩之入覲帷弸彋其在窅兮衣綷䌨其斂敬玉佩鋗而陸離兮金鋪鬱其晻映天子于是乎奏芝檢而遵㙺屏華蓋之承宸俄改步於靈陛兮緬稽首乎帝閽肆普淖之充簋兮縮嘉栗之盈罇既而皇命祝史為我陳詞愬睿圖於慿翼兮庶明徵其鑒之怳陟降之弗爽兮豈須搖而逖斯禱曰同雲為我興連氛為我積噫不周其惠來影扶桑其暫暱闢西域啓東國剪瓊蘂之六霙染瑤壇之一色燔柴焰而霰燼兮醴酒凝而氷瀝拂旋途兮絮為旂擁回鑾兮玉為軾藹藹浮浮瀌瀌奕奕普潤中田偃液上陌夐白眚之衺文兮兆豐年於盈只率土播謠乎兩岐兮踰沙受獻於三脊斯萬姓洽其懽心而百神歆其明德者也有若酣璇臺舞瑤室端皮弁曵豹舄將獵之鈃山騖於萍澤則非所以掩身安形而亦亡禆於昭假焉矣迺有新進小臣叨扈従覿盛節第嘉頌揚休烈辭曰禋粥粥其帝軫維兮維匪䘏𦙍恫吾黎兮帝赫延竚神宴娭兮登我百穀戎叔為兮課功減五三與偕兮菟園者誰負薪咨兮工賡黄竹帝考祺兮陽湖草堂賦王子庭濱於陽湖遂肯堂焉以藏以修乃自謂陽湖子而人亦曰陽湖先生云嘉靖上章攝提格𤣥月既望爰自國子博士拜陪都之祠曹臨觴愴别抽筆而為之賦其辭曰若夫揚州之大澤吳郡之具區有五湖焉是亦天下之至水也胥貢注其上善洮滆㵼其𤣥靈别有一𣲖滙為陽城表淞瀦之神委混崐沫之巨津光涵金鼎波撼洞庭奔溜則三方灌溉吹澇則百川沸騰溭淢濜溳漩澴漰拜㶖㴸疊躍潏湟砰磕涓網澮絡嵒襟㟽帶駭浪雲間驚濤天外爾乃呴雷激電泐霧蒸煙洸洸汩汩汗汗沺沺粲若錦濯淨若練懸蘋藻擾溺菼蓼新鮮翹莖瀵􅀢翠翳穎潛魚龍出没鷗鷺聯翩豈返歴陽於一夕盡底定震澤而偕之千年矣宛中央之美人兮紛淖約而鑒徳敞苕亭之邃構兮宛清沚而嘉客此亦足以大觀寧必彼焉是適爾乃褰荷裳兮曵蘭佩櫂桂楫兮方松舟既將進而容與復欲去而淹留望洋向以增歎溯洄従而莫逑于是幽壑斂霏他山吐月采芙蕖雜杜若喁赤鱗狎𤣥鶚勔咏嘆以興思怳乗虛而超忽若石鴈杳冥金牛怪誕孫啼或神徐酣終幻爾若澄江對謝炎海浮張匪智斯樂亦情相忘若夫釣渭之叟飢泌之士服在王官媚于天子極北九重江南萬里俟濟川以歌説將歸湖而覓蠡瑞爵軒賦癸巳𤣥月之吉曲梁令式燕于堂凡我僚友暨幕屬若而人咸預下陳觴一行有黄雀集於堂隅少則搶榆而起騰躍而上北向雲霄莫知所止邑氓請曰瑞哉瑞哉雀爵之義也黄中之色也君侯握爵中朝殆不逺矣在昔董仲令不其雀乳聽事前桑民為歌頌吾儕小人敢效兹為皇甫子讓之再乃題軒之楹曰瑞爵而為之賦辭曰繄式燕之自公兮實撰吉於兹辰敞初筵之秩秩兮藹來止之薫薫被宫商之雅奏兮薦脾臄之雜陳賓酬主而百拜兮觴引滿於一行乃有黄雀止于華軒若鼓若舞載翻載翩暫窺檐於下集兮終軼漢而遐騫僉馳目於罕覯兮倐矯首而去旃嗟伊鳥之弱羽兮粲瑤光之景星飾元吉以為裳兮錫慿霄之令名於時也仰無茂樹俯無白糧豈綴綵之汝求兮遂避珠而我翔儼依人而呴呴兮儷嘉賓之在堂孰為來哉氓曰君侯之慶也若夫潘氏徵肩魏生占手性狎陳前聲蜚崔後諒昭徳而匪愆謂報恩乎奚有又若獻自西域集彼東園出貝多而迅翮望含章而奮翰非鴛非鷺非鶚非鵰同海燕之呈瑞並谷鶯以遷喬物雖細而表大兮福無門惟自召紛吾扈此南金兮世方慕夫孔翠展好爵之爾縻兮願乗軒而列位流清音於以侑兮酡赭顔而既醉瑕時潛之方翕兮亦利賓其用舉晞上林之寵珍兮巢桂實而容與傷世網之我嬰兮聊斂翼乎兹處苟一枝足依兮又焉假夫全樹爾乃揖上客感微禽命芳酌揮瑤琴爰紀其事以慰我心亂曰園有矰繳鴻則罹兮野有枳棘鸞則棲兮劇途黯黑鳴梟鴟兮割鮮鼎俎委衆雛兮鳳翔千仞盍攬輝兮鵬絶雲氣鷃見嗤兮嗟嗟黄鵠志安知兮相彼鳥矣將鳬飛兮義鴿賦余客居陪京嘗養鴿十餘尋被流言將圖歸計乃命童子悉放之一鴿夜去晨來徘徊瞻顧意將戀戀因感而作賦焉詞曰何斯禽之靈哲兮乃戀主而踟蹰若含意兮未展猶弔影以相於遶空梁以託宿兮嘅故棲之在除方其馴擾晨軒和鳴夕砌飲啄閒暇毛羽鮮麗或命侣以將雛奉清光以娛稚顧以鳥而養鳥胡觀仁而取義逮其主人不樂羣鴿已辭翼將翔而復止聲暫背而仍依豈無匹而守獨舎寥廓而安卑似楚姬之怨别類田客之相隨痛雞鶩之鶱舞兮俾鸞鳳為之摧頽乏冥鴻之遐舉兮悼鸚鵡之罹灾衆方嫉余之修能兮鳥何意而憐才若夫雀處堂而孔懼兮鵩止舍而賈悲翳鴿非野鳥兮奚昭慝而示危又若海鷗不驚庭爵斯集愧未盡乎塵機亦何徵于報徳若其張仲之廬乍偃翟公之門尚開朱生絶謁以謝往敬通却掃而杜來世之喪道人亦何心昔時結駟今日遺簪請息交於良友恐負誚於微禽感别賦戊申之秋八月初吉季弟水部郎子約以制滿還闕而余羈紲都亭移書告别發函披誦悲不能勝嗟夫丈夫之生自懸弧矢以來孰不有志於四方故曰人豈鹿豕也而可常聚乎此光禄之賦惜其淵雲詞靡而病於兒女情多蓋别不足以興悲而情有所感於别則悲可知矣因撰兹賦以代餞云爾辭曰别方異緒離狀殊端在有情而必款豈同氣而能堪軺車陳於坰側舟檝戒於江干或感慨於川逝或行嗟乎路難涕臨觴而共收心執袂而俱酸善哉江生之言曰黯然以銷魂值我愛弟遄往帝閽愧雙鵠之並舉兮矯乗鴈而孤鶱若夫未營四方聊事一室侍讌庭闈聨經几席辯索研墳遊璣討厯繹孟氏之有三詠詩人之既翕至其恭承嘉惠忝竊龍光仲兮叔兮乃以軒而以翥伯也季也復載翺而載翔或彯纓於建禮或結綬於文昌或馳麾於趙魏或沿牒於楚湘乍乖雲雨少别闗山旌指洛而將赴裘滯秦而未還行行路何極去去情不忍寄芳草於春池攬素毛於秋省夏暑溽而扇違冬飈厲而衾冷顧奚别而非悲抑奚悲而云甚迨夫丁辰荼酷軫患纒綿乾覆奄奪慈景俄殱悼金昆之脆質凋玉樹於華年同朝露之溘盡展夜壑之已遷繄慶往而弔來亮福倚而禍伏豺狼逞兇蜂蠆隠毒構曾參為殺人收張儉而屬吏謂死灰其不然詫凝脂之可畏投清流使合汙惡獨醒而强醉胡人心之險巇兮亦天道之冥昧賂苟輸而在宥兮囊無金之可致鄒投珠而遭盼兮和抱璧而䝉寃乏文姬以請駟兮望融弟為急原得與喪其齊塞兮退未遂而觸藩肆蒼鷹之亂紀兮實桀犬之餘孽隕東晉之𤣥風兮㸃西州之英烈誰百口其相明兮空撫鏡而存舌中郎奮於鉗徒兮應相起於溺摺尚錄過於代門兮布揚芬於漢闕將逆施于末路兮終雪恥於前哲斯時也雖具邇其含悁矧駕言以逺别遵首路之逶遲兮睇蕭晨之悽緊慿江閣之交疏兮見中洲之㠶影淮水落而彭城荒燕雲飛而冀門近想天上之仙班恍夢中之幻境粲西笑而心搖托南棲而跡警追二陸於疇昔兮緬兩到之徂征置美酒以高㑹兮列祖讌於華楹徵綺羅之妙舞兮被絲竹以新聲懼堂中之蠟燼忘户外之驪鳴雖擬迹而同别亦原悲而異情憤世道之黮黯兮請以余為殷鑒衆女嫉兹蛾眉兮均自沉於明艶客方誡乎用光兮嵇弗戢而罹患雲賦就而晩疲賈書上而早譴齒何貴而象焚鞹乃災於豹變庶養徳於木雞毋處才以能鴈辟涉海而獲濟兮諳風波之苦辛傷虎口而幸脱兮猶心悸而告人疢已痼而復初兮舉藥石以具陳羽有落於虚彈兮咎無蹈於震鄰紛余季之玉秀兮又襲之以蘭芳振逸響於寥漢兮赫掞藻於明光恩被命而攸渥兮徳潤身而彌彰𣺌岐分于川嶽兮瞥星散於參商季昔時兮送余余今日兮送子若迭代於天運匪往復於人事喜何劇而無悲悲何窮而無喜情生文以敘離詞因情而斂思腸屢絶於停毫泣欲盡而盈紙願行者其勉旃惋居者之已矣弔言子祠賦循故戺以延盼兮儼初地之猶存風蕭蕭而塵黕兮日慘慘而霧昏但見荒榛蔓草斷礎頽垣狐鼠夕走鳥雀晨喧並咨嗟於行道毎邅迴而過門若夫四禪經始二梵肇基既流銀以僝殿亦布金而墄坻力窮土木之麗工竭雕鏤之竒疏寮綺綴櫨栱丹施覩莊嚴而恐怖示寂滅於慈悲由是息心之侣仰止銷迹之衆皈依研經味品擁錫䝉緇信毗邪之勝境而迦葉之宏規者也詎知道有隆替業有興亡恒河㵼於金谷祇園表為㦸閌鴿散林逺之舍燕巢王謝之堂寢唄響於鐘磬奏艶曲於笙簧誰其嘅嘆良二千石侵者八九餘者十一乃建學道之宫爰邃精華之室禋祀言公肅瞻像飾斯文在兹嘉名允錫綘帳霞披青衿雲集洙泗翔風絃歌振邑教思無窮胡侯之澤迺有中丞因之開府鈴閣崇威旌門耀武衞士操戈縣令負弩内有靖柝之廬外設嚴更之署一旦市兒弄兵博徒構釁崑燎方揚驪灰倐燼遺簪履於東牆弛扃鑰於北閫民之無良德則不競森栢將雙樹俱凋甘露與稜霜共盡烏繞枝而倦棲馬號塔而却引嗟乎經云火宅律曰化城浩劫靡爽幻理有徵胡然而釋胡然而儒胡然而堂胡然而墟法淪於空孽罹其害測平陂於前因垂傾覆於後誠皇甫司勲集巻一
