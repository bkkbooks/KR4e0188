body:
  text: 皇甫司勳集卷十一明皇甫汸撰七言古詩桐君山題贈盧職方江右典試朝登桐君山下有澄江四繞流潺湲暮謁桐君祠上有古木一望懸參差昔人採秀山之巔桐䕃未徙凌雲仙瓊漿石髓世不識丹崖翠壑空年年越鄉自古窮嘉麗弭節停軺幾留滯嚴陵瀨靜秋漲沈香爐峯寒暝煙翳盧君揮斤宇內游昨來奉使潯陽舟直躡盧峯探奠服又從瀑布挹飛流江山能使才華盛况接朱繩與青鏡登覽何如司馬雄文章自是歐陽正君鳴玉珮上金鑾桐葉聲銷日已殘鐘鼎山林緣底事不須回首憶江干送尚醫陳通政南還東風吹花駐芳甸都門此日開郊宴車馬爭來四岸聞冠裳自結傾城餞借問餞者云是誰為儒十載方為醫逃名未得潛廬嶽授訣應曾飲上池少年寵食王官祿白首歸田嘆知足磬折非辭彭澤腰倦飛欲振祁奚躅由來出處本難同珮玉鐶金仕已雄君不見男兒讀書破萬卷至今落落猶泥中夢二生行陳與言周詩憶昔同心友陳生為之首更憶投分交周子逸且豪陳生竒余言在耳青雲置身果如此惜爾早世不憗遺九淵慰爾應無悲周子知我雖相新膠漆不異我與陳睥睨一世爾自許落落誰忘竹亭語吁嗟二子來夢中鬢毛不改容顔同風塵慘愴旅服改燈火蕩漾芳尊空綈袍猶戀當年别覺後使我心悲咽二子一死嗟一生我欲於子知交情長沙行送胡子胡子堯時以給事謫長沙簿同事者劉安也賈生昔被長沙謫湘水千年動顔色弔古空勞憶芷蘭世途久已生荆棘當今天子稱聖君論恩豈復如漢文垂裳穆穆日南向鋭情稽古非謙讓直氣常懸青瑣間愁雲更鬱烏臺上胡郎胸中書萬言夕方拜官朝叩閽劉向况有五行傳挺身悟主爭繩愆即今亦有長沙行此去應知聖主情早晚定膺宣室召肯使人徒說賈生長安十六夜歌長安十六夜如洗千門萬户煙花裏閨中少婦夜出逰陌上行人忽成市粲粲珠鈿映月來翩翩翠袖搏風起風前月下逞嬌姿愛惜春花能幾時無那蓂荃先落莢只愁楊栁漸飛絲逰絲飛入黃金地撲牖穿簾果何意鳯甸常懸禱雪憂鼇山久罷觀燈戲燈光却照五侯家列炬然膏滿絳紗豈謂鋪金能作埒亦知剪綵易為花銀花火樹開佳節遂令觀者相環列霍氏門牆有後塵魏其池館空前轍淒涼往事已為陳恨殺懷春似玉人莫賤蘭房今夜女故多椒掖舊時親明璫盡結瓊瑶麗袨服爭看錦繡新襦曳􅉅時香散靄襪移蓮處暗生塵香塵冉冉隨芳步共道非煙亦非霧馳目還憐梁下期冶容又為桑間誤闉闍今已羡如雲夙夜誰當畏行露鐵鎖遙開天上橋漸臺何必待符招二南倘被翹薪化四海應回廣髻謡長安行贈陳子克修長安昔日花如綺走馬看花事已矣吁嗟歲月無停晷回首又值春風起陳生久客長安裏按劍誓將歸故里嗚呼陳生歸且止古來晚暮多豪士桑弧蓬矢志四方區區肯效兒女子君不見今燕臺樂劇不賓胡為哉他年自識公孫對暫時豈為劉蕡哀駟馬車黃金印他時乘此佩之去花栁迎人故山處憶昨行贈夏都諫憶昨天王下手敕辨方經野開蠶室稽古真卑漢未遑鋭情直所周無逸王假還宜照日中聖作何須守明述君不見洄沿川水映柔桑窈窕郊宫護棘牆𤣥黃欲獻夫人繭朱緑聊為公子裳又不見青壇翠幕藹中田縹駕新從此上旋遂使鰩魚呈瑞象頓令銅雀頌豐年嗚呼天子勸耕后勸織王業艱難果誰測七月重歌姬旦詩一朝實賴黃門力嗚呼今之黃門古遺直抗言朝寧生顔色馬客逢君時已來豈俟吹噓到上台北郊更起匡衡論前席遙憐賈誼才男兒志於立功慎自擅掀天揭日奔雷電退食方依青瑣闈傳宣直至黃金殿稽首親承玉語溫威顔咫尺君王面書錫絲綸龍鳯蟠幣頒錦繡雲霞炫紆紫圍金未足榮致君堯舜應爭羡嗚呼致君堯舜應爭羡玉河怨玉河西堤栁青色含煙弄霧金門側水接昆池波欲流日升翰苑光先得日光照耀九龍開萬騎千官天上回伏影迥迷飛絮去珮聲遙雜囀鶯來鶯囀皇州春漸暮曳珮鳴珂漫如故物態那禁鱗運催人情總為繁華誤一夜秋風歇衆芳萍水悠悠枉斷腸不見曲眉顰舊黛祇聞羌笛怨斜陽題魏時苗返犢圖宋趙子昂所繪評事應果所藏君不見盜泉水不飲長行寧渴死夷齊共餓魯連恥古來達節皆如此漢室猶能重禮教茫茫海內徵廉士火德下衰風斯靡昊穹垢氛蔽邐迤魏亦有賢曰時子激揚異代仍興起憶昔乘車令壽春牝牛自足隨吾貧車來既空去何有迢迢不染民間塵犢非爾騂育爾土安用汗我車傍輪褰裳扶杖走相送提兒媚婦多苦辛趙公本是清白者眷此丹青為誰寫應子收藏今幾年拂拭素練生雲煙操持豈羡鬱林石慷慨不但山隂錢賦魚毁象爾何者常使氷壺照眼前青州行送褚寶令臨朐君不見茫茫青州本東土吕公封齊姬封魯海岱何如四塞雄萊夷自是千年撫方輿星粲子雲針大國風存史遷語五月報政齊何神古來平易俱近民天子上嘉更下樂先王之道非沈淪褚子夙著三都賦昨奏明堂比韶頀天子勞賢眷爾才暫試臨朐豈遲暮芳桃不羡河陽花甘棠欲滿營丘樹挽今之齊仍為周異代絃歌盡如故烏臺仙吏青瑣郎有時待爾鳴朝陽隴上曾經笑鷃雀棘林豈足棲鸞凰迢迢東征出霄漢相送且覆清秋觴天風行有客騎驢何處來髙巾短褐俱塵埃自言今晨萬乘出道傍親睹鑾輿回龍斿逺拂瑶壇降鳯扇徐承金殿開文工武僚皆肅穆秉笏鳴珮趨蓬萊先生落落何為者抱書獨卧蓬蒿下長卿猶陪上林從子雲亦扈甘泉駕君不見邇來白晝天風高沙飛礫走人呌號出門舉步動齟齬何如閉門與子且覆杯中醪明禋歌送朱子隆禧捧詔南邦天王玉詔宣金鑾黃章粲爛龍麟蟠行人之官捧之出輶軒直下青雲端惟時朱子意氣盛昨方拜職今拜命長卿能無諭蜀文仲宣亦有浮淮詠君不見帝主龍飛今九年夢寐堯舜遑遑焉稽古真卑漢文讓陳疏更遇匡衡賢聖謨豈俟卿士協况爾龜筮開其先遂使北郊祀地南祀天朝日夕月東西偏儀文匪徒守宋末制作直欲凌周前辨方畫野此經始勿亟還應庶民子圓丘峩峩睿想建帷城日射瑶壇紫君行要俾萬姓知王者明禋本為爾長安二月雪後歌二月欲破春過半六霙猶自飛零亂塵氛四野鬱昏霾瓊瑶一夜堆璀璨沙栁含煙未吐絲宫花壓雪空成幔甘澤應懸畎畝思凝寒更起衣裳嘆天意從來未可諶物華奈爾無由玩君不見寶露新傳楚國來銅盤捧出龍顔開齊心萬乘躬郊祀稽首千官進壽杯嗚呼古有災祥說昨冬胡露今胡雪博極真憐劉向才條陳詎職匡衡訣尚賴金門燮理臣好調玉燭太平春朝中自是咨虞嶽海內何須憂杞人塞下曲壬辰仲冬許中丞略地紫荆賦此寄之斾旌悠悠班馬鳴中丞十月行紫荆易水氷堅夜可渡隂山雪積雲為平毳幕遙懸徼外落烽火直接單于城候城獵獵天風髙墮指裂面吹如刀草宿寒侵壯士鐵露下霑濕將軍袍袍袖音書字不滅蘭閨玉筯空啼血朝廷本望樹功勳關塞那應怨離别天子臨軒試三輔中丞秉鉞巡行伍落日籌邊上封事衝霜與卒同甘苦男兒龍額志封侯勒石須盡燕然頭羽書瀚海昨猶急金繒通和非逺猷𤣥冬願挾諸士纊紫貂肯獨䝉輕裘君不見在廷頗牧文臣擅一范能令敵心戰别墅或校謝安棊理案常披左氏傳鎖鑰由來重北門衣裳自是垂南面此時月向隴頭明蘆聲吹入漢家營昭王臺上中丞帳可使門無孺子纓秋風嘆秋風淅瀝秋露微為君今夜搗征衣花從金素變鴈向玉關飛羽書未報捷征夫何時歸總使君身貴寧知妾顔非忍為麒麟閣棄捐鴛鳯幃南粵行南粵由來本受降置亭列障賜稱王丹砂歲歲通勾漏白雉年年獻越裳曾是金繒忘漢德也因玉帛阻炎荒炎荒迢遙限疆土君王中葉恢英武校獵誰云漢武雄安民不讓周文怒昆明習兵深鑿池細栁行營逺勞師羽檄流星飛甲胄樓船橫海蔽旌旗樓船羽檄下繽紛刁斗銜枚處處聞甲胄夜開魚麗陳旌旗朝合虎賁軍神謨不戰已威加陀王納欵遂踰沙指顧泰山盟作礪并吞瀚海化為家馬援功期勒銅柱捐之議寢棄珠崖珠崖銅柱古如此瘴癘氛祲萬餘里奮身欲屠象郡城膏血直濺龍門水始知陸賈善行成肯學張騫虛奉使留滯周南望九重請纓天北恨無從六月凱旋歌薄伐一朝書奏願登封淮隂行君不見王孫未遇釣淮隂相留一飯是恩深知己此心懸白璧封侯他日報黃金黃金匪為薄聊自意所託咄嗟蓐食兒揶揄覆羮鑊韓生將略本多竒可憐猶受婦人知若非仗劍從英主徒然執㦸老明時採蓮曲秋日經濟寧萬水曹招宴池亭作朱英翠葉儼仙葩繡浦金塘特著花漣漪江畔明秋水的皪城邊綴晚霞晚霞秋水正芳時桂楫蘭舟處處移舟移菡萏波間動楫繞芙蕖鏡裏披本緣傾蓋追歡宴翻作牽裳送别離夫君自是軒冕客不惜瑶尊永今夕試問看花限北津何如折栁停南陌折栁思應長看花愁更積醉君羅綺筵為君歌採蓮蓮花萬種出吳閶歲歲年年狎景光此日荷風迎素扇此時蘿月照新粧可憐共蒂邀同伴勿願飄蓬在異鄉濟上相逢華已暮菱歌一曲斷人腸秋鴈篇寄故園兄弟虬分銀箭夜鴈度玉關秋隨陽向蘭畤依暖背蘆洲蘆洲蘭畤總堪棲霧裏霜前陳不迷避繳空聞來塞北傳書幾見下遼西西去南來鳴噭噭顧侣攜羣更多少也思映月集通宵也怕因風失清曉風飄析羽遂分行不及回翔在故鄉一枝自合同荆樹萬里徒嗟愧稻粱使回歌詔命因山啓地藏珠丘卜在翠微陽黃圖翼翼千峯拱𤣥灞悠悠一水長聖世有為昭有象王情無逸恤無疆惟王制作紛何已土木之功從兹始别館離宫相蔽虧復道回軒亘迤邐獻節乘軺遣使臣徵材取木下江津吳越錦帆懸子夜秦淮寶馬繫青春也知桐梓生南土也知松柏稱嘉樹一朝際遇棟梁成萬年封植煙霞扈自甘瓠落本無庸肯隨輪囷託先容夕向綺樓瞻五鳯曉叩朱閽排九龍九龍金鎖玉關開芙蓉新殿儼蓬萊橫汾初返巡逰駕宴鎬方行慶壽杯共言帝幸多仙從漢武應憐臣朔來早朝獻儀曹家兄南去北來年屢換側望長安倚增嘆五雲還詔入金門八月乘槎渡銀漢銀漢迢遙秋夜長玉河清淺映明光却看濟濟夔龍㑹爭羡雙雙鴻鴈翔結交篇贈張兵憲昔奉輶軒使因參幕府前今承江海謫持贈結交篇交情安可見翟門署貴賤金蘭更結此時心瓊枝豈異當年面旅迹徒嗟兩度來世事那知一朝變也悲昏夜眩明珠却向西風泣團扇相逢岐路已堪哀况復相思隔楚臺試問張華敬愛客何如李白獨憐才河干輟棹多容與城隅張組屢徘徊徘徊南浦意何長見說東山召繡裳却羡雙鳬入霄漢為傳尺鯉到瀟湘送張子還廣陵張子别我黃鶴樓飄然騎鶴歸揚州駕言返吾初服去安得為此斗粟留君不見嵇生疏散長卿慢不善希世稱巧宦獻玉明時秖自悲投珠昏夜遭人盼聞說淮南桂樹芳澄湖一曲似滄浪莫須北闕徵書下自許東山隱興長張明府送吳釀戲作短歌君不見閶闔朱樓十二開酒旗髙結綵雲隈誰家寶馬非留住若箇金貂不換來吏部甕邊狂亦甚文君罏前嬌可哀此時新釀勞相贈此夕鄉心醉裏回皇甫司勳集卷十一
