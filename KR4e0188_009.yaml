body:
  text: 皇甫司勲集卷九明皇甫汸撰樂府乗法駕乗法駕者正德壬午武宗晏駕大宗伯毛澄奉昭聖皇太后懿㫖恭迎興王繼序即天子位也當漢朱鷺乗法駕出潛邸辭蘭坂臻楓陛握乾符奉慈㫖橋中傾碣呈字従臣觀稽首喜應帝期稱天子泰階升更化始陋代來劣舂起乗法駕曲凢十六句句三字釐廟制釐廟制者嘉靖甲申追封皇考獻皇帝越數嵗九廟成也當漢思悲翁典禮成四海謐享祀禋九廟翼考明堂筵太室獻皇躋烈祖匹故鬼小幽靈假詠孝思歆明德釐廟制曲凢十二句句三字秩郊禋秩郊禋者嵗庚寅上可給事中夏言議創建四郊是嵗日南至肇祀圜丘也當漢艾如張壇畤凖圓方神祗奠南北夕郎奏既俞春卿議僉集睿想孚筮従鴻圖表景測膋燎迎初陽寅威練嘉日祼獻戾上公參乗簡元戚八駿夾電馳六龍戴星出天路抗旌旄雲門間琴瑟殷薦升紫煙告成瘞蒼璧齊幄肅華班旋塗厲清蹕靈貺展斯今仁孝光自昔秩郊禋曲凢二十句句五字宬皇史宬皇史者嵗乙未上命考古金匱石室之制以藏書寶祖訓也當漢上之回宬皇史函帝籍金為匱石為室籖彚綈緗部甲乙邇文華充武庫簡鴻儒讐豕誤於萬斯年守之錮宬皇史曲凢十句其八句句三字二句句七字展陵展陵者嵗丙申上以壽陵之役廵遊昌平臣為都水使者除道西山也當漢翁離帝眷園寢謁款丘陵馳道旦築行殿宵營亘帷成屋列幔為城般雲謝巧周日非靈乾行玉輦坤御金輿六宫婉従萬國賓趨鑾鈴響逓環佩聲徐五臣供帳百辟燕酺朱明司辰清和肇節草樹䝉恩禽魚騰悦周歴皇畿軫兹民業遐攬邊闗洪思祖烈去遵鸞輅歸泛龍舟山開陽翠嶺名川效安流源出固安柔情並暢睿藻揚休枚朔第頌翊贊王猷展陵曲凢三十二句句四字思舊邦思舊邦者嵗己亥上以章聖皇太后喪卜宅原陵駕幸承天臣左遷黄州獲預従事也當漢戰城南南巡紀臚岳東幸緬懐豐白水循往轍丹陵訪故宫江漢眺吾楚霜露愴宸衷電奔翼八駿雲興扈六龍不有居者誰監國皇儲旦截馳道出翟相行邊細栁中顧公鎖鑰青門北晝發邯鄲道夜渡黃河湄軍容肅肅間官儀豹尾後載班姬隨衛火弗戢漳流半湮憲臣褫爵服邦侯械以徇旌旗蔽日指樊城簫管具舉叠金鉦父老稽首遮道迎椎牛置酒宴鎬京山川遍喜色禽鳥逓歡聲闢朱閽掃青室思履綦存衽席齋心望祀純徳山名間周爰園寢悽天顔詔發郢門邁燕闗格祖特告鑾輿還思舊邦曲凢三十二句其十四句句五字十二句句七字二句句四字四句句三字海波平海波平者倭夷間釁辛壬癸甲殆無寧嵗越丙辰司馬胡宗憲受命與司空趙文華盪平之繫王直俘麻徐等奏功太廟也當漢將進酒島夷日本稱最雄髠首駢拇炯兩瞳乗舟截險洪濤中跳梁若蝶聚若蜂掲竿烈炬耀日紅攻城掠邑誰嬰鋒紅女休織田無農帝命祀海惟司空授脤秉鉞有胡公狼兵苗卒集江東夜縦巨艦突䝉衝俘海繫直奏虜功窮鳥盡艱厥終海波平曲凡十三句句七字更極更極者嵗戊午三殿災帝命新之更奉天為皇極華蓋為中極謹身為建極也當漢有所思三殿災雙闕燎天子避寢厭勝以禱朝右个御西清玉食有減金懸無聲誰其梓慎窺大庭流烏化雀將焉徴除舊布新承天意司空飭材俾壯麗宅中建極欽哉從事更極曲凡十三句其四句句三字六句句四字四句句七字遣仙使遣仙使者嵗癸亥上慕神仙之術遣御史王大任姜儆分道采訪冀遇異人授祕書求長生不死也當漢邕熙周穆窮寰宇漢武慕蓬壺東生遊調笑西母讌懽愉顛既厪纁幣丰亦枉蒲車緩齡韜上藥御氣祕真符臺端兩侍御將命發天都齊梁厯南楚甌越盡東呉姓名河上隠物色市中趨金簡探綠籍瓊笈訪丹書曾未三載還幸與百年俱築館理上士授粲出中厨行聞避驄馬歸見綰銀魚稽首願玉體壽考永無虞遣仙使曲凡二十四句句五字考芝宫考芝宫者嵗乙丑獻廟産芝瑤光映室乃建玉芝宫以時致享昭孝感也當漢太和河清社鳴誕聖人握符纘厯靡端不臻天垂卿雲景星現地出醴泉澤曼衍𨗳禾六穗麥兩岐嘉𤓰並蒂連理枝三足軒翥肉角嬉龜鹿雀咸素姿包匭驛貢賮四馳芝草凝祥處處生獻廟忽産屋之楹瑶光瑩潔秀九莖銅池芝房惡足稱帝命作宫時享以報子孫千億昌𦙍允紹考芝宫曲凡十八句其十二句句七字六句六四字皇甫司勲集巻九
