body:
  text: 皇甫司勳集卷五十九明皇甫汸撰祭告文祭費文憲宏文嗚呼元老一旦捐館隕其台星天子震悼國人涕零乃輟金縣乃給祕器羽儀送哀王官臨視禮也乃有元子司馬即逺東都工僚設奠酹酒上餔嗚呼哀哉凡台小子緬在夙齡操觚弄翰綴文繹索將游上蘭即知有公以弱冠擢第明經起家圭璋其器斧藻其華願見公者辟彼高山思仰其巔辟彼滄海思泳其涯矣私淑懷賢窺觀談政誰其優為公也籍甚乃𤣥髮聨樞赤心司衮典胄青宫秩宗扃禁尚父周昌阿衡殷靖光輔四君逮踰五紀日贊謀謨風行化理北門屢遷東山載起鳯矕標英狼跋遺美時則願見公者辟登諸龍辟附諸驥矣既而濫翼雲漢睎跡天階疏廣未去文潞復來或揮麈承顔或珥筆受知契劵猶溫典刑未隳木壞而人將安放鑑亡而帝實勞思嗚呼哀哉胡幸識公胡遽哭公昊天不弔小子有恫若公者司勳載之洪烈典册備乎徽章銘德垂於彞鼎世美纘其冠裳我思古人惟杜惟房史稱藏用不顯其光卒莫能揚惟以永傷祭盛中丞應期文天乎痛哉哲人萎矣繄公之降實東南之美矣射策發科弱冠登仕籍甚水曹踔絶雲署郡績憲猷臬揆藩最燕京粵服楚邦雍市所戾罔弗乂焉乃志度淵宏悻直方潔不畏强禦毖躬就列清揚濁撓堅磨白涅夷獠德綏權寵威懾歷試諸艱利器攸别望夙閎崇行馴覃化雖絳灌嫉賈而蒼生繫謝故何武留思寇公願借緬公善在鄉邦則範在鄉邦身在朝廷則功在朝廷足跡在天下則政在天下凡履台之老薦紳之士司剡之官秉鈞之二僉稽首以讓百口以譽而聖天子方軫求舊之思遺遐之悔胡然奄忽殱我明懿匪人莫容抑天見忌也耶嗚呼痛哉公之生也天下之人執鞭而企慕焉謂吳之濵如嵩之神矧台小子公同産也又曷勝其登龍之歡附驥之情哉公之歿也天下之人輟㫪而於邑焉謂吳之隈若泰之摧矧台小子公同産也又曷勝其承睫之涕衝襟之哀哉嗟乎𤣥廬既竄素旌載靡長夜無由旦而帝鄉不可期已乃指吕梁而興悼擬長沙而抒辭慨宣房之未就悵彞鼎之已隳束芻于匭升蘭于巵道逺莫致我心之悲溯風延佇曷來騎箕祭何司空詔文嗚呼瞻彼天姥惟嶽降神滙兹若耶惟川濬靈德門慶族育秀甄淳篤生俊乂誕發竒英通方奉義漸階賔廷登夏之箭為周之楨爰厠華省聿劭其猷綴辭嫓遜繹經擬休一麾出守氓曰循侯載移之藩澤洽化流敡歷孔艱公為實優漢刑靡謝唐軫非遒帝嘉爾勳乃眷北顧俾居憲臺往撫畿輔載剖之符載持之斧恆關鎖鑰滹河砥柱桓桓司空赫赫令譽邁跡古人文武吉甫公懋厥德克昌後𦙍有子雄飛聲名籍甚紆朱鐶金嗣閲崇品懷梓南圖遺榮東引芳風彌煥危星遽殞乃反斯丘乃安斯寢哲人云逝哀訃遙傳王之藎臣天胡奪焉棠由政芾碑以淚鐫同升在位協恭有年老成是失悼憤莫宣陳詞奠饋神其吐旃祭張司馬邦奇文𤣥造宰物吹萬不齊恆豫難諶孰隆厥施故淵雲掞藻而飾治或匱𢎞舒儒雅而宣力則虧遂乃褫鳯池而興懟違京輦而喪奇皆才謝經世道罕通時也公弱冠登仕解褐禁墀出入華清而嘉猷懋著敷揚德教而令聞四馳陶鑄三省銓管兩畿贊戎授律齒胄得師文武為憲天子是毗耀威尊爼晞功鼎彞奄忽委化胡不憖遺中台夕隕梁木晨摧鴻烈不朽榮名在兹乎或者悼公齡不躋於大耋位不晉於衮司殱明懿於未究先慈景而背之則殆非達觀之論而淺之為公悲矣某等服官南署獲奉光儀今將安放凄其永思祭周中丞采父文嗚呼先生奄其亡耶其弗亡耶元子中丞公譽逮承休爰自嶽牧秉憲之章遵彼蜀道臻於滇陽入里展覲既豫且康黔黎跂轂以炳曜炎徼覩旌而凛霜矧我下吏咸荷末光憑威徼寵俾西土用乂南夷于襄胡然捐背馳諱震惶公抱荼疚幾于隕僵嗚呼哀哉先生楚産也降神于衡誕秀于湘斧藻其德金玉其相發潛昭隱緬山高而水長若夫試邑從政民曰循良過庭敦教貽謀式臧每振窮以排難不茹柔而吐剛其篤行也如彼太邱表正一方其知止也如彼彭澤三徑徜徉手解十惑成一家言此其不朽者久而彌彰嗚呼先生曷乎云亡莊生達命荀卿非相先生兼之死生之際亦大矣曾奚足以介其心乃委順而安常楚俗志怪而尚巫屏紛史與祕祝惟禱以清夜之香匪求吉宅亦遇佳城靈其攸妥而魄永藏中丞簡帝晉陟廟廊履綏錫𦙍厥後克昌冥報弗爽積善致祥嗚呼先生可為不亡昔我仲氏為禮曹郎厠中丞之榜末忝通家而莫忘夙懷令問未奉清揚晨趨開府夕拜帷堂繼慶以弔斂笑為傷蒼梧白雲瞻楚之鄉陳詞歌些敬酹兹觴祭座主李公默文人生代間動嬰時網一切身外咸足為障等彭於殤齊得於喪名苟不完忠亦胡諒早晞雲陛晚總天曹赫赫李公未為不遭蘭以薰焚金以毁銷刑不可近義無所逃莊云委順釋示忍辱軒冕雖華繫若桎梏哲乏大雅進退惟谷顧訟殷寃習流孔哭魂返甌里道假吳城門牆之誼嗟豫小生昊天不弔冥理焉徵陳辭薦酌飲恨吞聲祭顧方伯夢圭文嗚呼天道無親恆與善人有不然者天其難諶若我姊壻溫溫恂恂古稱善士謂非其倫束髮擢科甫冠躋仕緤組陪京彯纓銓署既總臬司亦領藩二敡歷多方所在稱治嗣先之軌秉文之衡談經覺後河洛諸英閩粵偃化齊魯捐刑德功並立學宦兩成歸不待年超然止足抗跡幽棲恬心寡欲宜享遐齡胡奪之促追想平生可為痛哭上既用酬下亦奚負計君所遭未為不遇齊物彭殤則各有數情忝渭陽實惟親故君有令子出自吾家所不死者其在兹耶酒匪曰㫖羞匪曰嘉靈其來鑒聊以永嗟祭林中丞潤文王紀方流珠徵圓折嵩既誕祥閩亦挺傑洵美林公夙懷英烈頴脫黌宫駿登天闕剖符宰邑操割臨川仁風遐偃惠化𢎞宣躬率禦寇鄰境獲全像寢爰飾豐碑用鐫茂簡臺端南巡畿甸抗志澄清封章屢獻武遏江防文釐闈彥輪擬埋綱驄思避典權相竊㺯納子於邪彰賂干紀實繁爪牙側目瞋視重足怨嗟朝揚于庭夕覆厥家乃有强藩憑寵怙勢如火燎原弗戢將熾疏入回天詔出震地宗社永寧剪兹二戾亟超司馭驟閲中丞妖氛潛殄鯨波不興十郡元元咸乂蒸蒸農棲于畝士飽馬騰國有藎臣民食其福甫踰强仕胡奪之促慶閭弔門奄忽倚伏罷市輟相百身可贖欽承令譽幸挹光儀樞管位謝竹帛勳垂撫膺展饋裂肝陳詞丘首云邈箕魂假斯祭友人周詩文我友周君抱淵朗之賢懷跅弛之節抗跡垢氛比景英哲甘遌俗流不省家業言或非義絶不置口心所不平輟形於色道乖非千金可回造次能振人之急任俠樂施略無長物詩極研思而未滿其致負恨孟生醫擅神授而不展其良寓情韓伯睥睨一世遨遊二京卿士大夫浸淫聞其聲矣然但知君為山人而不知其有國士之風也余家與君三世締交踰三十年君亦自謂知己而吳之人孰不為然今既撰述懿行芟輯遺篇可永傳矣嗚呼生主於我死殯他室生前接杯酒之歡聨衾榻之好死後乃不克㑹葬松丘望塗引紼忍愧束芻之賔騰譏動輪之客哀哉已矣周君代奄辭矣生妻去帷魂靡依矣悠悠琴川心傷悲矣幽冥路隔見無期矣虞山匪邈悵焉違矣酸𠂻不文揮涕馳奠靈而有知庶其來鑒祭王吏部榖祥文幼挺淵姿夙成偉器既發巋科亦遊中祕簡陟銓曹日鄰禁陛懷恃陳情遌權蒙戾遂奪省郎恥為郡吏爵服遺榮丘園高賁翰墨馳聲丹青餘事三紀于兹曾無愠悔山公舉知屢召不起文翁欽賢清德題里悉屏垢棼宜躋遐祉霜露忽零日月云逝未就蒲迎遽隨蘭萎令問靡湮芳儀潛翳同榜弟兄通家猶子瞻格帷堂敬陳奠饋夜壑流悲晨星引涕天乎邈斯神其昭只祭沈僉憲熙載文學以文藝為戲而竟取高第仕以爵服為玩而聊以晞世不顧尚書之期復何簡書之畏寧知御史之尊抑何驄馬之避脫屣滇徼反服丘園絶赤牘於當路摽緑尊以命軒客偶乏而强飲婦奚知而苦言家無長物杖有餘錢左挹卓袖右拍伶肩自謝疏傅之産誰請叔敖之田願為步兵不樂憲職我有子孫遺之清白大間靡踰突梯胡益交錯觥籌繽紛履舄擊缶歌烏處褌誚蝨悲哉斯人奄隕斯疾設醴中山想魂采石萬物如萍千載一息祭李邦直母文懿彼靈修誕兹洪胄彤管嗣徽璇閨挺秀惠問方昭淑德允懋猗歟相依唐哉王後乃眷南越爰自西平之子于歸厥𦙍惟楨式𢎞閫範益劭家聲宜有顯者莫之與京軒昻褐玉時潛未曜蟬蛻華榮鵾齊𤣥造鉛粧罷御氷壺砥操㷀羭在疚鞠育用悼溘我良殱爾孤翳存義方靡迪柔訓斯溫漸鴻要路容駟高門潘令殫化陶母貽言福履既綏泥章載錫弗遑痛薪胡遽艱棘承睫無從叩心罔極翠葆悽雲素旌慘日卿子司馭發跡水曹先哲是景同官曰僚流風匪謝謂天蓋高延竚慈魄來假香醪祭倫以訓母文奕奕倫氏耀德南陬高山景峻洪源衍流既申𤣥貺復協神休世及為禮述作恢猷豈伊外刑實惟內贊任以興周詩人咏歎孟陶啓哲列史炳煥誰謂克昌匪由聖善良配肇合巨卿奮庸翩翩五鳯矯矯羣龍敷文緯典掞藻亮工三朝籍甚四海罕雙玉署清班蘭臺妙選里表鳴珂司移銓管輝映二京母遺云逺眷戀堂闈豫告迭返象服鸞章何福不茂鶴髮鯢齒實躋遐壽竇樹偃芳常眉謝秀天錫慈慶亦孔之厚蒼梧欲從板輿遂傾賢哉母氏曰余友生朝承凶諱夕戒遄征逖矣用饗悽其為情祭孫升母楊夫人文名閨誕媛蘭芳玉潔卜諧鳯占縭承鸞結肅肅中丞惟邦之傑靖忠徇身竟寢藩孽伊誰相之申以大節夫人知微荼艱茹血天眷藎臣篤生俊哲耀武掞文熙紘纂業鼎甲巋登旗常換揭銓宰崇班符卿清列繩武者孫華組嗣紲萃兹一門孝義貞烈家慶斯臻國恥允雪福履優游宜享耄耋霜奄萱萎星俄婺滅從宦僑京孟鄰雅接母儀式欽傳訃哽咽靈輀南遷備員東臬束帛瓣香以告以爇潛德幽光千載靡歇祭徐母王夫人文赫赫東海時惟徐公尚德秉哲纘稚之風太原有子淑慎其容以相以勗興我徐宗既奉女教亦間婦則行不越閫言不踰閾孝敬有儀喜愠無色化染湖濵媯汭斯匹雖殱鳯德實産麟姿彯纓雲陛紲組天墀國史允賴邦衡是持帝曰介爾福履來綏顯顯徐母承休受祉肅肅宰臣敷文佐理彼構之言豈渝令美思樂閒居駢列孫子優游偕隱俾壽而昌胡不滿百九十方將朝捐鏡閣夕啓帷堂慈景潛繄徽音弗忘諸生在門熟聞聖善敢告執彤爰采遺絢載酹之觴載陳之奠延佇柔靈歔欷永鑒亡妻談氏遷柩文自爾作嬪迄於委化凡二十有二年中間升沉榮辱得失欣戚余所備嘗爾與周旋蒙犯霜露跋涉山川相期偕老中忽棄捐奪我內理孰嗣爾賢蓋棺郡舍歸櫬寢筵宦遊兵阻日月其遷兹始卜吉於彼上方爰啓新阡靈輀往即永閟幽泉爾子若婦爾女若孫下逮妾御靡不悲號涕泣懷德銜恩聚族中外亦皆咨嗟嘆息追慕芳魂奠饋既設樽酒若存以此思哀哀其可言𠂻惟神鑒辭莫能宣皇甫司勳集卷五十九
