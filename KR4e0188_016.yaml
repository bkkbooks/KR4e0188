body:
  text: 皇甫司勲集巻十六明皇甫汸撰五言律詩西禁值雨油雲翳百常興雨及羣方灑殿黄金濕添池白玉凉栁邊迷晩翠花際擬新妝頓使煩囂息從霑聖澤長秋夜夏晦秋俄代星虚夜忽分鑒帷㣲露月臨檻淨披雲旅思隨桐葉鄉心及鴈羣蟬聲雜砧響併是不堪聞月下柬子安兄奉使將歸纎月吐簾帷清光到酒巵似分奩鏡影已卜佩刀期桂惜飛花萼荆憐别樹枝預愁江上夜千里共相思正陽城樓西角二鷺巢焉並負青雲翼来眈紫閣棲攀龍窺殿北隨雉卧城西顧影依霜潔鳴儔侯月迷振雝殊可詠聊此謝塵泥聞熊叔仁疾聞有悲秋客秋来屬病身還丹思海嶽行藥傍城闉休沐違朝謁焚香了性真欲知消渇處惟是著書頻九日同省􅒼歐陽清陳乙俞咨伯登慈仁寺閣值雨作二首寳地蟠香閣金天軼化城慈雲當牖綴定水過軒明座演沙尼梵杯餐楚客英𤣥探兼節賞併與暢髙情地擬龍山勝天開鳯野雄玉移蘭省散金泛菊尊空鴈度慿髙外猿參習静中忽聞飛法雨真欲御歸風九月晦日鴈序逢秋杪鵬霄睇日斜帝階蓂罷葉客館菊猶花信美非吾土紛廻是物華詎堪霜露變臨水悵蒹葭送段水曹奔母䘮百年慈景秘萬里訃音傳逺道風霜改輕旗涕涙懸婺星從夜隕萱草罷春妍無復閒居賦空過題柱邊臘月十五夜坐惜青天月能餘此度圓乍来梅蕋下猶滿桂叢前江浦潮難落闗山思可憐催人三五夜含照入新年發京仲甫將周命相如出漢廷一朝看改服千里去揚舲鳥亦思南樹鯤方起北溟鍾山佳氣裏遥見使臣星過東昌訪包子不遇王事勞明府侯邦擁使車嘉聲閭里頌芳草郡齋虚過客慚題鳯懐人為贈魚清揚不可見臨水意何如清源逢子安兄鷁首聚江濆鴻飛得鴈羣萍同岐路轉萼共異鄉分漢殿行看近吳門念獨紛忍隨東逝水遽散北来雲再過徐君墓季子秉髙誼徐君欽所思吁嗟去住别遽作死生期地失藏舟處林餘帯劍枝非闗一諾重要自兩心知晩征落日啟王程凉颸拂使旌六朝嘉麗地千里壯遊情鳥影山前月江流樹裏聲重来棄繻處闗吏詎知名感舊玉節將新命金陵覽舊遊秦宫雲似葉漢苑月如鈎萍跡山重陟蓬心水並流感時叢桂發攀折昔年秋絡緯吟卧病聞䖝聲作漢宫秋夜静别院錦機張斷續隨砧響凄清雜漏長隠憂遑恤緯圖報未成章但遣廻文就邊庭逺寄將贈徐使君丹地開麟閣朱門接鳯城如何金谷裏别有漆園情叢桂當忩馥長松蔭戸清解鞍輕射獵披巻學儒生中秋日遊靈應觀值雨紫舘凌虛入𤣥宫泝水開池經龍濯後壇記鶴飛迴雨即真人洞雲疑神女臺為燃芝炬引不假桂輪来同鄉諸彦邀遊朝天宫帝京饒麗地神府出叢霄虚牖金枝綴層壇寳樹彯龍經逢散帙鶴馭待吹簫仙跡俱成幻鄉心徒自遥東麓亭候月人世應難㑹天都豈易遊蘭尊煩載酒竹徑共登樓雲抱山河壯霞藏洞壑幽最憐今夜月翻似勝中秋春日偕程趙二子集霍宗伯園亭覽所註周頌因賦二首第列鳯城中園開虎觀東山光懸日近潭水映雲空絳帳承歡洽清尊命賞同將因二三子歸詠舞雩風墳圃崇新構台園麗舊京寧知典禮暇别有説詩情竹下披圖坐花間載筆行一聞頥為解徒此謝匡衡冬日同宜甫子新游恵山寺濕雲亭厭世思遐托尋山得再過葉經霜稍薄花散雨全多定水分泉竇慈雲濕薜蘿攜尊藉朋好捨筏坐嵓阿金山百折迴孤島中流起四禪花臺承寳霧香澗瀉珠泉黿解迎僧梵獅嘗䕶佛筵寧知潮與月併可悟慈縁焦山長江流福地結宇聚僧家忩拂城頭曙峰廻海上霞榛披非世界萍轉是天涯何日逢招隠隨縁了法華九日扶侍桂塢登髙桂嶺茱茰節蘭軺綵服遊凉生青女月花滿翠㣲秋帽似登龍興尊疑戲馬留晩来香近酒勝採落英浮冬日寄唐應徳因懐横山之遊二首山館同君别江城嵗載隂簪情期更盍屐興憶重臨月掛松臺寂雲盤竹徑深唯餘流水曲終夜待鳴琴聞君慕陽羨嵗晩竟移家有興堪乘雪忘言學卧霞臨江擥蕙草迷洞問桃花肯向金門裏㣲官忝物華贈思隠傳醫士投隠藉醫方逃名恵嶺陽書探五色秘藥售萬金良多病時從問髙情乆不忘柴車東市裏誰識有韓康江上夜帆江水浩無涯乘流拾月華兎来驚鵲渚鷁去􅑴龍沙逺岸㣲分樹歸帆悉帯霞寧知避暑宴今日在星槎奉太夫人夜汎揚子蘿月映芳洲蘭輿在桂舟萬山雲入夜一水鏡為秋惜别渾忘渡承懽强作遊明朝斷腸處不與共東流真州送客東歸孤舟泊江渚萬里眺心長月吐山頭白雲披水面凉海門潮汎汎吳苑樹蒼蒼為有雙魚贈因君逹故鄉丁酉夏值邵伯河决舟幾衝溺適凃郡侯治水隄上爰藉神威遂獲利涉因賦短律用代晤言凃葢侍御左遷今官也掛帆憐水使飛葢阻陽侯玉祀堪沈馬金隄豈辨牛伏靈徴上善習險渡中流自慚非謝傅安能不解愁雨次沛上帝昔歌風處人今聴雨来寒催豐戌早聲咽楚江迴野鳥啼荒壘浮雲翳暮臺徒令過周客一灑廢宫哀秋日二首玉露零清夜金風戒早秋不堪人北去已是火西流月皎如迎扇星低似犯舟鄉心軫兹序起坐為悠悠闗山廻素節水月湛清虚暑氣銷蘭酌凉颸襲桂裾露疑仙掌後葉似洞庭初願得逢南鴈他鄉一寓書獄館書情棘館坐如焚蓬心詎可云膓非一夕逝情是百憂紛直道難容世孤操每離羣從来汲長孺曾揖衛將軍得黄州命有作二首十年為漢吏一朝從楚臣感兹承嘉恵况乃及蕭晨情同哀郢客迹似弔湘人極目衡陽鴈相將辭宻親竄跡未云逺離憂遂不堪從兹謝朝市言徃涉江潭斯地有餘慨昔賢良所諳自應齊塞北詎敢薄淮南過虎丘訪雲上人兼懐釋秀僧居苦空寂人世與相違自拂銖衣去誰傳燈梵歸覺花飄處盡慧草藉来稀獨有聴經鳥依然繞座飛過半塘寺登閣寳閣開星刼珠宫擅水鄉入林飄法雨繞陛落天香山逕尋方近雲霄眺更長忩前金塔影時現玉毫光殊勝寺留别舍弟野寺隨林建幽扉靣水開上方今夜月千里故鄉臺酒為聞鷄散帆應逐鴈迴佳期迷後㑹含意問如来釣臺自學堯年隠羞稱帝者師虚聞前席待不遣後車隨灘是垂綸處星非犯座時祗應鷗與鷺猶此伴荒祠途中遇周舍人因寄天保給事時奉皇太后哀詔含悲辭玉几將命發瑶京鳯藻銜春思龍江事逺行無由躡仙駕猶自阻王程㑹向天台去傳書與步兵滕王閣遇王道思飲餞清章流勝跡丹閣儼宏規雲雨知何處江山見徃時芳筵難再合萍水易相思王勃君身是才華復在兹桃花嶺曉度桃花嶺花枝併作春源深迷去馬谷暖佇来鶯石壁生霞早澄江濯錦新傍巖誰獨住曾是避秦人東林寺逺公禪誦處精舍宛然開廬嶽當忩見溪流涌杖迴𤣥風真可揖幽興𣺌難裁尚媿浮湘去何年入社来夜泊江州潯陽江上夜春月映殘輝風静㣲聞柝潮廻悉露磯夢隨吳地盡魂向楚鄉飛豈但琵琶曲能沾司馬衣承天候駕四首東幸方過沛南廵乃至衡翠華臨楚地黄屋駐樊城雲以朝歌白河因夜渡清寧知天子貴别有故鄉情金輿移舊邸玉輦出離宫侍從多方朔參乘即衛公褉堂逢徳水獵館報春風猶指邯鄲路分明愴帝衷兹地承嘉恵仙班喜復從天行傳駐蹕月出候鳴鐘禮樂河間事山川㶚上容由来江漢水何處不朝宗周王初宴鎬漢武更之回栁向帷城繞花隨帳殿開復憐豐邑賜功悉代時来尚説恩波在何曾慰郢哀宿黄陂縣鄉人宋司士攜酒過話花縣停驂處芹齋送酒来客身俱是寄鄉思若為裁夜静月當戸秋深露泫臺無言一官冷猶自樂羣材送劉明府還浙中二首時因母罷官江郡勞承檄都門報罷官雲歸越嶠外雨散楚臺端黒髪還家早清時行路難誰憐湘水上一夕有波瀾棄置本非罪看君翻宴如拂衣從此去反服遂吾初松識歸田徑花攀别駕輿故鄉佳麗地隨意賦間居孝感道中託宿觀音菴為客倦秋暮投僧忽夜深臺雲藉草色簷月徙松隂過去空陳跡歸来違素心此時猿與鴈併是助霑襟九月廿五日郢中遇雪嵗閠生寒早秋深遂雪飛雲連荆樹宻日遶漢江㣲園或疑梁是溪將作剡非但令聞妙曲詎惜和人稀閠月十五送客清光將閠月併是惜流年蓂枝承處盡桂蕋映来偏賞異西園後情同南浦前無言一夕阻翻得兩重妍過古城寄憶熊郡長二首時以父䘮還豫章空山嗟獨徃古寺惜重来花暗清宵榻藤交隔嵗臺春風難遣駐夜壑易成哀此地王陽馭兹時可復迴廵岳方南狩朝宗盡北流同来預從事俱幸奉宸遊山水依然在庭闈不可留惟餘幾馴鳥相伴一荒丘浮湘作行役本非意逹情聊自諳波濤𦕈天末風景别江南衡岳雲為柱湘流鏡作潭徒然表靈異世逺詎能探雪夜訪王稚欽投贈二首清時不善宦幽谷遂遺材秪自焚魚卧從人結駟来漆園寒罷灌竹逕晩猶開更有相忘樂何言興盡廻倦遊東觀後招隠北山前不與公卿事翻多農圃縁臨池宜有翰掛壁但無絃余亦懐歸思誰能更待年閠七夕情是經年約歡逢閏月催臨粧憐窈窕欲渡思徘徊鳥訝香車轉鸞驚繡閣開今宵絳河上應不厭重来寄贈馮子二首時移守叙州無雙江夏士海内自来聞釣倚磯頭月門連漢口雲乞歸非薄守招隠似離羣莫漫題鸚鵡曺家最忌君自君歌出守相與别長安還楚因求艾浮湘為紉蘭交情空嵗月世事但波瀾誰惜馮唐晩猶嗟蜀道難過東山寺訪王岳州名柄聞有蓬莱處因棲鸞鶴羣坐溪看定水登閣藉慈雲清浄生秋色明光隔世氛從来摩詰興偏解誦靈文秋思羇客本多憂江城况屬秋折腰縁斗粟浪跡任孤舟遇竹啼湘涙逢蘭握楚幽鄉心將逝水日夜只東流九日聶尉邀余江遊至定光巖登髙鳯刹元侵漢龍宫况倚臺慈燈乘月起福酒薦花開雲氣空中現江光定裏来還將吹帽興併作泛槎廻由定光巖歴西竺寺登閣江上茱茰節山中祗樹林攀巖披霧宻登閣倚雲深歸駕因風御當杯待月臨自傷揺落候空有佩蘭心皇甫司勲集巻十六
