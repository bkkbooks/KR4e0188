body:
  text: 皇甫司勳集卷二十一明皇甫汸撰五言律詩解官歸奉答子浚兄早歲從羇宦終年辭密親長蘿謝逋客芳草遲歸人廬幸存先敝家徒減仲貧故園華萼在何必日南春答子約弟出處本無定分飛任所之如何挂冠日况是阻兵時宦惜潘生拙歸嫌陶令遲北風待高翼莫學守南枝答陸子投劾謝當路因書報隱君從兹返初服聊得慰離羣棹處汀洲月耕時洞口雲北山期共入那復待移文過張子新居早學樊生圃初歸平子田蕉陰清簟上花氣緑窗前客每攜樽往豫思借榻眠墻東喜相接無用買鄰錢酬子約秋日齋中宴集憐君暫休汝留客賦郊居琴興聞蟬後秋聲落木初白雲間北牖芳草歇前除即序方盈念貧交已漸疏重挽周以言二首委化同桑户嗟來弔寢門迷途非敏夢顧影似嵇魂繐帳風偏瑟松丘日易昏平生金藥祕無復枕中存把臂成淹忽傷心每泫然笛聞堪有賦琴在已亡絃訪宅為幽里尋溪是夜川襄陽多棄草何處購遺篇答黃志淳憶爾因兵火攜家住石城嗟余解纓絡稅駕返柴荆夢裏秦淮逺愁中歲月更如何書寄語猶是未歸情送唐應德遊武夷那堪逢亂後重此對離羣歲晚崇江道天長幔嶺雲靈魚尋漢祀仙掌謁夷君獨往清溪夜啼猿幾處聞題屈氏廢居海上逢殘冦山中憶敝廬可憐虞仲里誰卜屈平居棟沒秦灰後臺傾蔓草餘秋螢飛不散猶似照遺書送陸子還西山湖山招隱地歲晚獨歸人寇亂惟衰鬢途窮共此身門間嵇散釣甑滿范生塵别後毛壇路花溪夢裏春冬宵柬子約曼容歸念早逸少宦情闌詎是淮陽薄其如蜀道難長林扉獨掩永夜榻同寒為謝閩中使江臯歲已殫哭姪阿乘三首生期嗣芳軌奄忽撫靈車竹下銜杯盡苔前望履虛膏帷初息照塵榻尚留書魂去依長夜心傷十起餘夙齡稱獨秀弱質竟罹災一旦隨朝露千秋閟夜臺為山成復止逝水去無回始悟蘭芳促何應夀不材長魚疲侍疾季琰妙通禪毁性安疏節無生得大年松邱成異代花徑隔重泉一見西河泣誰能不泫然登天平廢寺古寺空山裏重來感廢興尋溪迷蔓草攀壑藉危藤繞樹多寒鵲燃燈止病僧獨憐青嶂外猶見白雲層錢侍御賻亡友周子仙於虞山感賦嗟君成物化何事得仙遊術向青華祕名從緑簡收空棺存敝杖藥市即丹丘柱史生前契靈筵永夜留四月八日讚佛四禪開孟月八解應芳辰香梵迎祥蓋燈筵候法輪觀空成彼岸戒寂示來津髣佛金光裏如來此現身四月十四仙誕日因憶以言令節啓朱明羣仙降太清蓂猶虧一葉芝已秀三莖磨鏡非凡迹懸壺豈世情不知塵市裏何處覓周生頌藥師燈洹碣留真諦維摩習病禪欲除諸障染聊示一燈燃生滅俱成幻光明即是緣蓮花如有悟何必待薪傳詠扇吳繭新傳製齊紈舊得名塵來聊障面歌罷尚持情學月何曾滿懷風不奈輕莫須逢內史價始重稽城坐忽春暮擬結山遊簡我兄弟二首春芳餘復幾塵戀苦相仍負杖才堪起單衣已自勝溪留花共入山待月同登欲往招公子無言病未能長兄病初愈聞君閉關處趺坐學維摩春色遙相待流芳惜易過逢鷗機事少攀樹隱情多不稅東山駕投簪意若何姪秦宅觀玉蘭玉樹傳吳産幽枝異楚叢競芳春色裏留賞夕陽中弱質全矜素繁妝最妬紅況逢佳子姪不忝謝家風子約日耽內典因贈積雨淹幽徑高雲翳逺峰披經詮范績就佛禮何顒華悴觀朝槿清虛鳴夜蛩非緣禪悟早那使宦情慵寄雲谷上人棲霞信靈境滅迹企前規松覆梁王宇苔荒江總碑鱸歸秋興後猿定夜禪時怨别心千里惟應江水知夏日吳橋見訪逃暑掩柴關清風喜乍攀噫歌出嵩洛招隱入湖山離亂空凋鬢窮愁為損顔梁王方好客何事倦遊還悼甥吳彥先家在吳江曾隨余括州别後竟逝云獨行嗟難合玄思惜未成泉幽流壑恨楓冷咽江聲鶉結那堪襝螢飛更不明向來臨渚淚何自對韓生賦得郊臺送張子讀書楞枷寺高臺臨水曲吳國此郊禋輦路名猶在壇柴事已塵那知薦璧處空對下惟人欲賦興亡恨愁看芳草春哭兄詩四首阮籍生前慟黔婁死日貧素書遺稚子今事問何人泉閟臺空夜阡開路豈春緇衣一以斂為謝洛陽塵物化居然盡吾生詎有涯援琴堪灑泣展卷但興嗟大被虛薑寢烏衣減謝家一乖棠棣詠幾欲罷看花才高翻見伐曾是貴無能滿座思文舉同時惜彥升門庭猶置筆帷榻尚懸燈祗自留遺草將誰訪茂陵昔共歡娛地今來倍愴然隙駒驚電後行雁斷霜前易悴同朝槿難回似夜川愧非摩詰弟含涕輯遺篇送吳山人之洛川訪弟兼謁西亭王孫聚糧何所適逺與故山違客路猶吟草王門欲曳衣行攀楊栁别思逐鶺鴒飛莫作梁園賦淹留待雪歸贈嚴叟聞有君平隱湖山不易逢溪藏幽處塢雲合曉來峯啼鳥間中興馴鷗物外蹤尋君迷九曲花樹一重重偶過長兄故齋作一自空堂掩傷心今幾回故琴流水盡散帙任風開物有先秋恨人同急景催徒看芳草合那復履綦來吳吏部館聞陳氏洞簫雅樂初調夏賔筵颯已秋將聲傳鳳翼合曲度鶯喉咽處非關怨危時似寄愁翩翩公子宅直擬接秦樓偶述抗世迹長屏端居心自遐檢方尋五石行藥問三花嵗逝同流水顔衰欲駐霞不知車馬客何事滯京華寄憶盛二仲交與君何地别遙自舊京歸日日寒潮落年年旅鴈飛山川白雲間烽火素書稀莫問平原宦幽情已拂衣七月十五日頌盂蘭佛會蕭晨凌上界孟月會中元綺供千花綴芳筵百果繁流悲咽笙磬佇想現燈幡解脫徵冥理俱來聽法言九日觀騎射同子約作江東少年子結束逞雄材夜宿歌姬館朝登選將臺輕飈連騎發彎月抱弓開二謝登高處聊同戲馬回題山泉卷贈蒙侍御霅水原標勝分泉更有名乘流逢世泰用汲荷王明蘿月琴中調松風枕上聲夫君驄馬客三輔佇揚清九日登半塘寺閣舊識諸天界今為九日遊寒塘但蒼靄何處訪緇流鐘帶西林寺帆通近郭舟憑高攬風物搖落不勝秋寄題沈儀曹虞山别業虞山白雲際梁日樹長秋為託煙霞好因辭軒冕遊荒臺仍舊葺涸井詫新流不作郊居賦猶言似隱侯哭洞庭友人陸梓二首蒙叟能齊喪榮期了悟終一朝奄委化萬事若淪空問字竒偏識臨書法最工今來隱几處長夜起松風老就青山隱驚聞白日開貧交復存幾死友重嗟來僧舍依為寢仙壇閟作臺臨流送歸處逝水竟無回崑山道中延福寺逢琴僧維舟探野寺取徑度溪橋宿雨鳴才歇寒雲濕未消琴聲入林細幡影隔花遙流水原無著歸心緩落潮寄宋大理三輔平反久無寃定有謡年隨芳草換山間白雲遙花色留潘縣鶯聲憶漢朝莫因辭賦苦宋玉鬢先凋寄何白二儀制帝里承恩日仙曹典禮時共趨門下省同草殿中儀文藻推西蜀才華重左司鶯花春色逺何處寄相思送徐紹卿還洞庭兼訊方子臨水朝來望還山西渡人栁情非逺道花恨是殘春稿澤聊吟楚尋源若避秦祗應方處士白首共垂綸題息機館改館託幽居寧知即敝廬塵清新解榻藝覆舊藏書迹逺冥鷗外心間賀雀餘何因機事少惟是抱玄虛題項二秀才半華書屋永嘉古名郡山水勝嘗聞幽館逢初構華峯已半分亭虛堪聽雨徑密若迷雲康樂娛情處清輝直待君送章參嶽之蜀兼訊楊太史移藩因重寄倚棹惜離羣路向巫山去江從巴水分鄉書秋鴈逹客夢夜猿聞聖代文誰似行當薦子雲七月六日張幼于館燕别將赴豫章祖席叨君燕蕭齋與客過旱雲涼思少江月旅情多著作慙金馬遲回戀薜蘿欲知臨别恨來日視星河富春道中范憲副舟宴已謝塵中鞅猶同使者舟清尊聊卜夜白髮幾悲秋山色分蒼靄灘深遞急流獨憐垂釣處閲水自悠悠鄱陽鄱口曉來望潯陽路此通頽波銷霸業蔓草沒王宫霧色香爐上秋聲瀑布中禪心與遊思并落楓林東贈既白宗藩昔從開邸第常此集簮裾月似西園夜雲疑南浦初遊梁先已倦入魏左頻虛别建藏書閣銜恩賜祕餘贈龍沙宗藩父子偶作洪都客因承清燕私秋風蘭被坂夜雪竹交池授簡何能賦吹竽謝所知傳家自有學並善楚元詩匡南宗藩别館不識王孫貴翻同隱者流池開半畝曲地即小山幽霜冷蒹葭夕天長鴈鶩秋何須章水上懷眺倚空樓寄羅達夫於雪浪閣二首一自看花罷俱為泛梗人余棲吳苑月君卧洞門春道在惟宗魯文成欲過秦關山戎馬後何處嗣音塵抗疏辭金馬談經就碧山閲川嗟浪逝忘世覺雲間即了期言下相逢恐夢間兹遊非泛雪詎作剡溪還袁州九日信美登高日宜春有舊臺花非吳地發鴈是楚天來郭外千家盡忩中萬壑開此鄉多旨酒聊覆使君杯與鄭司士夜話故國經年别他鄉會面難人疑天外至花似夢中看山瘴侵氊濕江流繞舍寒不知臺省客誰念一儒官寄鄒謙之祭酒豫先子與其父為同年曾覽先朝籍君家名與通著書稱馬走問道得鴻蒙嵗月别來久雲山歸去同幽居應不逺負郭即牆東渠稱東郭君答張聚之惠問六橋花下酒送子返柴居為别清秋暮相思章水餘塵驅慙駟馬道逺望雙魚何處詢流寓匡山欲著書寄子約桃塢别業隱居思令弟行役愧豫昆花隔南州榻蓬深北郭門委懷惟素帙寄興有清尊鄉夢因之望時能到陸渾宋之問第三衢道中山居無别業民俗半為農樹杪開山閣溪灣置水舂採薪朝候艇乞火夜聞鐘嵗晏收盧橘猶堪比户封庚申元日立春常年同正旦今嵗獨兼春蓂砌才抽莢椒盤併具辛不知頒厯後遇此幾何人拂曙蒼旗轉風光一倍新虎丘北院只疑山路盡别自隱叢林草緑知春半花飛覺雨深到門餘野色燕坐得禪心一悟生公法傳燈直至今送叔氏遊齊雲新安春水緑乘興謁名山石磴和雲踐金庭就日攀暫來辭竹下獨往出花間若遇壺中客應知得道還送金憲使之蜀少隨父經此蜀道遙天末巴江春水分嗟余遊少小送客想氤氲燕坐琴臺月褰帷劍閣雲知君能諭俗無待長卿文沈雲卿小度巫峽後有一想一氤氲之句送孫生北上拜爵生子當如仲孫郎更少年丹書藏祕府兵法守遺篇仗劍都門外揚帆春水前銘勳會須早塞上正烽煙吳山遇張幼于讀書僧舍棲寺猶言近尋山入更深拂帷花作雨喧坐樹鳴禽乍可辭塵鞅無須滅照心西河索居意今日在東林送宗兄擢憲之嶺南南顧勞宸眷西曹特簡良行為持節使暫解尚書郎華萼離筵散瓊崖别路長莫令庾嶺外音斷鴈來翔王舍人邀遊故相文恪公園亭二首東閣輕簮組西園盛履綦石聞窮海至花記洛陽移栁色縈城合槐隂夾路垂吳宫清蹕水留作養鵝池疏傅遺金少為園不買田樓臺卑緑野花石減平泉徑草萋春雨城烏起暮煙臨池俱欲賦誰在鳳毛先悼釋宗衍并示懋公竹房一夕掩蓮宇幾時開乍禮新封塔空餘舊講臺香飄林木變月落水禽哀為問傳心偈誰應更悟來虎丘如公關齋寄贈行苦能違俗心空尚閉關有時花自落何處鳥飛還觀止風幡後禪參水月間城居愧張祐春事隔青山唐應德挽詩二首卒于揚州矢心懷北闕扶病起東山迢遞蕭關外驅馳戎馬間龍韜聊自試鶴馭竟無還落盡淮南桂悲來誰為攀奄棄人間世空留海上營三軍齊灑泣一市罷言征凱樂成蒿唱牙旗表素旌更聞遺草在猶是出師情由罨畫溪登玉陽山院溪水鏡中渡風帆畫裏看潭猶名玉女地即傍銅官向夕山常雨先秋樹已寒洞霄供奉日歸隱聖恩寬惠山簡汪沛閉户沈冥久尋山感慨生靈泉常淨色空梵亦秋聲花雨行間濕松隂坐處清不逢雷處士臨眺獨含情端威道院悼莊羽士素善琴偶來芳草地更上紫霄峰出岫知今是尋源感舊蹤故宫啼鳥雀落日下杉松一自琴亡後壺中遂不逢送叔氏入京客思輕千里官儀望五雲林間傾别酒菊下贈餘芬北雪衣先授南鴻信早聞倘逢相識薦無忝晉徴君赴崑山悼顧武祥東山辭滿日北郭送歸年駐馬旌方舉鳴笳座已遷傷心宿草地灑涕菊花天賴有徐卿子寧云似舅賢悼過叟二首吾友嗟凋喪斯人歎屢空高情非俗物隱迹是園公客散茶煙冷丹銷藥火紅祗餘花徑在誰為掃春風詎有容成術能躋衛武年春山聊别後朝露忽驚先櫬向梁溪返旌從虞海懸平生竹林飲流涕酒壚前送侯憲使之滇因悼楊太史站嶺炎雲路盤江毒水津君方遙奉使余是倦遊人鄉淚猿聲夜離心栁色春揚雄今物化芭也欲誰論過張子愁思何自遣寂寞訪張平雪後持經坐花間抱甕行感時聊復隱玩世已能輕終日蓬門掩那知春草生挽張允清二首尚説遊名嶽寧期作逝川銀臺非舊署石槨是新阡花恨才經月松悲似隔年夢迷元伯路驅馬詎能前奄忽成捐館平生不問家旌書卿士貴簀稱大夫華草聖留山寺萍蹤斷海涯藏舟向何處那復是乘槎送槃姪讀書竹堂寺不逺違親舍尋幽就法堂夜禪寧避虎晨誦忽亡羊寂滅銷塵想常明引隙光無令竹林賞春草遂荒涼簡釋懋齋關何日閉燕坐罷春風五藴方持戒諸緣頓悟空禪參花雨後法喻鳥聲中自笑無安著將心問逺公寶林寺訪徐紹卿疾不遇客思因秋極禪心獨夜持乍來行藥處曽是散花時空梵留支座殘經罷董帷東林但聞鳥日暮悵何之寄項生校書一自開東觀經年滯北畿再逢芳草合兩見朔鴻飛積雪應穿履緇塵定化衣高樓如借問夫壻未言歸皇甫司勳集卷二十一
