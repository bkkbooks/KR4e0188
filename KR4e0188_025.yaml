body:
  text: 皇甫司勳集卷二十五明皇甫汸撰七言律詩曉出左掖贈吳純叔同年珮聲初散紫宸朝仙侣同攜數並鑣眇眇鳯凰回日馭翩翩鳷鵲隔雲霄詩成賈至香猶在文似相如渴未消君署玉堂非忝竊余從蘭省慰招邀簡周給事祚東臺雲書鬱微茫獨立臨風寄夕郎青瑣每移天上拜黃門真接日邊光漫將令色思瓊樹會有新詩貯錦囊漢室名儒今侍從好陳清論答君王七夕飲張子言偶偕田希古山館淒清城日闌花開荏苒引杯盤俄傳令節驚秋候漫喜新逢得地官烏鵲故飛霄漢迥星辰不動露華寒七襄僅有橋邊度一笑應知人世難送吳二純叔便道省覲玉堂仙客錦衣回畫舫輕帆莫漫催入里便趨嘉慶拜隔江須惠好音來落梅恨早聞吹笛叢菊愁偏照别杯自古越鄉形勝地赤城霞起即天台榖日候旨左順門值雪長安榖日仍逢雪撲殿翻階竟日看豈謂農祥先獻瑞亦知郊祀近回鑾爐煙細裊麒麟氣扇影輕開孔雀寒天上封章今更下陽和早已被江干陳憲使察入賀萬夀節還浙中使君來獻天王夀親捧龍章拜衮旒建節漫誇唐氣象鳴驄曽識漢風流謝安屐為蒼生起賈誼書應太史收北極朝廷終右命西湖山水莫長遊寄田希古江州清秋閉户悲離索京兆田郎望爾賖憶昨獨趨江右命只今誰對省中花雨餘滕閣朝尋碣月落潯陽夜泛槎嵗序驚心渾蟋蟀煙波回首又蒹葭九日酌鄭子館欲遊水頭不果水上何言九日臺城西草堂今好開霜前醉倩茱萸把雲外愁連鴻鴈來宋館淒涼無客賦楚江遲暮有人哀不堪殊土飛蓬鬢那遣流光到菊杯謁悼陵作庚寅冬十月作萬山回合引仙源紫翠深沉鎖殿門鸞掖昔憐人寂寞蜃輿今閉日黃昏豆籩更肅霜前禮環珮難招月下魂涕淚何須怨金屋嵗時不斷是君恩立冬日早朝值雪搏風攬霧冬仍見急霰翻霙曉未分銀燭實增光照耀玉罏猶鬱氣氤氲漫揮鳯藻酬黃竹已辦龍裘想翠雲安得向來詞賦客揮毫常侍聖明君送李伯華使寧夏年來念爾勞王事塞役衝寒兩度違雨露喜迎新使節風塵愁見舊征衣春先豳谷花應發臘盡函關鴈不飛到日從容登華嶽慿高一覽漢京畿庚寅至日飲鄭有度昨年迎日開閶闔今嵗明禋出建章留滯難陪天上從氤氲真想殿中香吹葭律琯朝浮氣燔燎瑶壇晝閃光萬乘郊回雲物異子真谷口有和陽送程惟光之越黃河氷開春水生河上春風送逺行薊北雲山堪墮淚越南煙樹亦含情牙檣自起中流鷺粉署空啼二月鶯到日西湖好吟眺由來水部有詩名過大興隆寺訪鄺子元蕭寺尋君春獨過移藩新拜楚江沱千年閣眺題鸚鵡五月湘行佩芰荷有詔豈嫌宣室晚著書曽比茂陵多金雲寶露談玄地他日相思當奈何同鄭子慈仁寺雨中登閣寶閣蓮扶出上方雨臺煙徑晚蒼蒼雲霄步識爭梯健海嶽懷披倚檻涼妝鏡鳯樓傷異代戲湖龍舸憶先皇回簷忽射千門霽淨對西山醉不妨雨朝周學録示宫詞六章戲答臨風吟望憶周郎對雨題詩傍苑墻麗藻異時誇樂府綺羅何事怨昭陽愁來班女應能賦老去明妃祇自傷金谷寂寥人可在彩毫拈弄意偏長過興濟寺作璇宫玉宇先皇賜福地名都淑女鄉一自經營傳內使至今供奉禮空王論恩實冠昭陽裏問水虛疑媯汭傍載過倚舟回落日暝煙行望柏蒼蒼定州過開元寺登塔壁間有武宗宸翰貝殿花飛二月春攀逰那負衆生身翠華象輅來先帝丹壁龍文護有神塔倚雲霄非世界蓮開燈火自星辰不辭酩酊歸清夜直擬扶搖向紫宸暮春雨後病遣庭間坐對日仍斜邑小猶堪早放衙已過一春才見燕乍來微雨亦驚花桑麻自擬勞民事桃李何緣競物華正是茂陵多病骨好從勾漏覔丹砂送李子植卿自圯縣遷和順可憐潘嶽仍懷縣猶憶河陽桃李時年少有才今共忌風流為政去多思太行日暮鳬堪逺上黨雲回鴈獨遲人世别筵那遽促天涯後會渺難期過龍興寺登大悲閣寶閣何年起法門金身十丈佛為尊雲移祇樹看俱渺天近曇花落更繁檻外青蓮開北嶽忩前赤日淨中原憑髙忽望長安路即擬雙鳬此奮翻人日偕馬李二僚孟吳兩文學并張子過朱氏登樓王家種竹開三徑人日留賔擬七賢潘縣桃花晴弄日漳河栁色淨含煙青春好趂登樓閣深夜猶聞度管絃自笑微官淹墨綬幾時嘉會召金錢辭邑晚發斜日揚帆衛水濵長風吹浪下天津心懸鳬舄辭花縣夢入鱸魚憶釣綸江畔白鷗晴對客野田黃雀暖依人疏狂自笑三年尹漂泊猶為萬里身夏日登廣平城樓贈冦體乾城東樓閣排雲建極北河山抱日浮身上百層懷更放眼當三輔望還收愧無辭賦留王勃幸有絃歌駐子遊為問長安何處是莫因殊土憶并州彭城逢王中舍捧毅皇后哀詔之南邦乍聚遂别千里軺車天上來百年鸞馭夢中回漫於萍水聨舟楫更瀝蘭心向酒杯春漲已平揚子渡夏雲先引秣陵臺相逢異地情難别為賦長門思可哀懷歸故園獻夀親能健春夜開筵興不違兩地離懷人惜别暫時歡賞客忘歸醉聽錦瑟歌猶度仰視銀河落漸微今夕月明江上路煙波回首淚沾衣西苑二首瑶宫翠殿標雲外珠棟雕欄照水邊花萼御樓唐詎數露盤仙掌漢空傳啼殘禦宿無凡鳥長出昆明盡異蓮共道靈臺成不日寧知睿想自經年萬花遙引緑雲衢一水回沿紫禁隅月向妝樓懸作鏡星分太液瀉成珠天門韶濩聞難識海嶽蓬萊望不殊見説君王頻幸此夜來遊賞倍歡娛中秋篇是日先雨後霽孤坐對月感時託興漫爾成篇朝來細雨落繽紛向晚清光散彩雲自是廣寒貪皎潔不隨巫峽傍氤氲髙樓張宴停杯待别館吹簫度曲聞玉筯深閨啼少婦關山終夜望夫君送王少儀給事罷官還楚憐君得罪出梧垣最是難招楚客魂匹馬鄉關從此别一尊岐路復何言未須操樂聆鍾子便可為文弔屈原木落洞庭堪涕淚月明湘浦况聞猿侍朝頒厯和吕兵曹君王厯數與天長正朔還宜奉萬方馮相悉傳宣夜法司分親掌授時章年華預識乘春轉火德從占應運昌自是玉衡懸象緯賜來金殿倍恩光册嬪恭賀玉册金函降御墀彩幢華扇引昭儀賜著翟䄖香未散教乘龍輦寵新移蘭宫夢月瑶光貫桂殿占星紫氣披正是君王延茂祉會應仙媛助昌期大祀南郊天子迎陽禮上玄翠華深駐紫壇前欣逢掃地觀周典絶勝橫汾幸漢年帳殿旌旗寒映月松門燔燎夜升煙未奉神休陪扈從羞將辭賦奏甘泉五日立春庭宴青旗應律轉韶年綵幄迎祥慶賜筵五莢蓂敷堯砌日千條栁拂漢宫煙雕盤行菜春光泄寶鼎調蘭淑氣傳獻節已占陽令改銜恩偏在物華先觀燈篇華燈芳苡競時新絢鳯蟠螭莫辨真漢室明珠元不夜秦宫青玉更宜春三殿瑶光承素月六街花氣藹香塵歡娛何處非銜照願借文園映字人春日宴夏宗伯第得嘗御賜長春酒兼聞忠禮書院之勝學士留歡宴玉堂書生何幸奉餘光華燈不夜猶元夕御酒長春出尚方東觀雪殘融作瑞南宫雲起結為祥更聞賜第銜天藻豈數平泉李相莊馬豎有談武宗時事者感而賦詩傳聞遺事詎堪悲今日長秋異昔時産出神駒官盡牧獻來天馬帝親騎千金購賞原非惜萬里長驅為不辭一自攀龍留劍舄何由陪駿向瑶池駕謁七陵按謁陵之禮昉於漢明帝朝于原陵如朝會儀云法駕雕輿出禁中仙原黼帳結行宫金支羽衛橋山駐玉碗靈筵隧道通漢主此時親上食小臣何處泣遺弓更聞雲起悲歌就不是汾遊睿藻雄駕幸西山先帝瑶宫起翠微今皇玉輦歷朱扉諸天香靄紛仙仗百道祥雲繞御衣花影數移幢扇過簫聲遙雜珮環歸靈池望幸魚龍躍福地銜恩草樹輝春日聞怡山文人治園因贈為園更喜逢春早開徑還宜引興深南國小山聊地隱習池新水足淵沉栽花種栁年年事語燕鳴鳩處處音自笑玉顔真忝竊無緣金谷日相尋揚州朝來投璧渡淮河日暮江門感慨多流水詎隨羅綺盡春風無復翠華過粧樓明月難留舞楊栁長隄解贈歌見説小山叢桂早相招兹地隱如何答陳魯南太史入牛首山作歸來學士隱城西曠覽人間萬物齊玉笈早探玄訣祕銀魚已遂碧山棲同僧蓮社經春入與客花巖竟日躋卧病檢方無上藥倘逢石髓幸相攜簡蔡孔目羽髙帝投戈宅玉京兹邦定鼎創金城鍾山總是黃圖勝江水流為玄灞聲隧道松杉原廟在禁宫花草曲池平欲向西賔訪遺事共言平子賦方成諸同年邀遊徐氏東園王家别業帝城隈髣佛離宫天上開仙榜曽看中賜出名花多自逺移來千山鑿石崤函似百道疏泉太液回勝槩不殊金谷裏兹遊欲賦謝潘才顧公子邀遊清涼寺陳後主避暑處清涼靜域逺煩囂淅瀝天花散雨飄笙磬雲間聞演梵帆檣江畔見乘潮瑶宫貝殿開三界翠輦金輿駐六朝更道上方堪避暑一尊河朔正相招宿茅山道院逶迤仙徑禮神君縹眇三峯鎖白雲丹洞桃花春正發星壇瑶草嵗常芬山間鍊藥人難識天上吹笙世詎聞獨宿便思成道去夜深鸞鶴幸來羣發松至京口作嘉樹言從南國移君王方有灞陵思根靈合遣煙霞鎖蓋偃何妨雨露滋聖夀長如千嵗實橋山虛扈萬年枝此日使臣遙拜命多慙草木被恩私立夏日至虎丘郭外青山數里遙扁舟探賞過溪橋珠林樹色含雲綴香澗泉聲雜雨飄鳥狎春光啼處盡僧逢塵想坐來銷共言招隱堪開社也學翻經懶入朝首夏偕張李二少府遊赤壁分得坡字人留勝地臨江上客有高軒得並過雲起楚臺聨石壁水從湘浦接煙波漫因明月傷千里更遣回風入九歌自愧清時承逺譴可無辭賦擬東坡憩四祖寺閲藏經清涼蕭寺倚城西避暑因來上界棲為乞經文開寶藏遂探諦語照金箆晨披貝葉生巖石夜誦曇花落水泥自是逺公容小謝忘言終日對招提秋日奉謁太宰顧華玉司空無事晚開衙叢柏霜寒半宿鴉地向河間存禮樂山從原廟見煙霞間披圖史常堆案别起樓臺即寄家流落陸雲方自笑也容門外候張華郡齋秋思郡齋忽漫秋風入芳樹先凋一葉梧雲際早看衡鴈起月明愁聽峽猿呼綘侯不肯容才子漁父無勞問大夫一自銜恩違省闥何辭飄泊在江湖皇甫司勳集卷二十五
