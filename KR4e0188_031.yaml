body:
  text: 皇甫司勳集卷三十一明皇甫汸撰五言絶句四月晦同吳純叔憩劉氏園亭各賦以花下一壼酒為韻五首苒苒葵方朵娟娟榴亦葩不是河陽尹那應縣有花簿領不知春園亭忽逢夏幸有盈尊酒與君醉花下執熱就東臯陶然坐西日無言會不常所願心相一林深堪駐馬鳥宿不驚鳬坐遣花間月殷勤上玉壺江南千里心極北一回首感兹水上萍忍負杯中酒桃花塢三首為沈霍州瑩作龍門萬年樹潘縣一叢花多少迷津客皆因戀物華生長桃花塢不識桃花樹試問𤣥都人已是春光暮卜地聊棲趾成溪自不言秪疑閶闔裏遙接武陵源詠燕來似隨鶯侣歸應却鴈行為問東鄰社何如王謝堂有所思魂去何須夢情來即是思非緣悵兹夜翻似恨當時十六日對雨夜月當空滿朝雲送雨來隂晴能復幾并遣嵗華催雨館鳴琴和子約回颷送雨來嵗暮寒雲起鳴絃雜散絲隔坐聞流水臘月十五夜月和子約清光十五度此度倍堪憐再滿應同夜重看却異年二月十五夜子浚兄燈宴再賦再吐金枝焰重開玉樹花非關耽夜飲直是眷年華彩縷交花艷明珠减月輝君能留顧盻時得奉芳菲送周以言再入越中二首湖山重到日風景悵當時越客清江上猶吟弔鄂詩日落西陵渡秋來姻草萋已無孔九在誰問若耶溪賦得有所思錦席承君宴青樓寄妾家無因挽紅䄂留恨與桃花謝璇公惠藥文園多病日蕭寺客居時未得無生理持方問藥師西天寺傍即虢國墓彌勒禪林雨將軍隴樹烟長安今罷笑留恨向西天能仁廢寺殘雨鳴秋殿寒蕪翳夕廊老僧諳寂滅何處解荒涼過句曲劉生家鄰西晉寺門對大茅峯劉向傳經處空齊落夜鐘偶述惴惴懷隱憂咄咄嗟異事端誦陽生言千載同心契陽尼云我昔未仕不曾羡人今日失官與本何異然非吾宿志命也如何張比部園玩仙掌蛺蝶花二首碧葉仙人掌清秋甘露擎文園方病渴願爾賜金莖蛺蝶幻花叢因風自飛舞移將漆園中夢寐同栩栩題美人蕉帶雨紅粧濕迎風翠䄂翻欲知心不卷遲暮獨無言寄侍二首遇花思舞夜覩栁憶顰時可道錢江上行雲有夢知家住吳趨市書傳越踐城病來因染色魂去為鍾情過潜山寄嘲卜令自無錫遷此商也能為政明時尚棘棲萬公忩岫色何似對梁溪桃川宫昔為避世鄉今是朝宗路桃花春水間猶是尋源誤蘇黃渡東坡山谷經行處劉阮林中路蘇黃渡口津不知之楚客何似避秦人響水關飛泉來斷壑聲咽不堪流何以函關客遙心寄隴頭友竹居扶踈北忩下坐處挹清芬為問延三益何如對此君緑隂軒嘉樹壓繁隂流芳閲荏苒念昔植者勞願言留勿翦吕合昔人自羽化枯骨尚安存青冢藏金藥難招緱嶺魂郡學八景地本宋相居宫由素王闢嘉樹既敷榮澄流復凝碧右南園仞由寸乃積高以下為基攀躋一延眺仰止良在斯右道山璧水湛圜流金波漾清沚中有遊魚戲荷香隨風起右泮池瑶壇茂文杏得地嵗華深時有青襟子橫經坐晚隂右杏壇託根上干霄偃蓋久承露不念植者勞但知匠者顧右古檜仙源渺何處鏡接太湖長奇峰七十二隱隱在危梁右來秀橋言采泮水芹因登道山岸斜日抱亭扉春風集童冠右采芹亭條風將化雨一夕灑南園門下多桃李芳菲總不言右春雨亭梅花水仙弄影俱宜水飄香不辨風霓裳承舞處長在月明中題桃花園粲粲先春綺盈盈媚晚粧回思少年日騎馬出河陽題茉莉二首萼密聊承葉藤輕易繞枝素華堪飾鬘爭趂晚粧時香慣臨風細花偏映日生若將人試擬小玉定齊名題牡丹一種天香異千株國色傾應憐花似臉半醉倚華清哀葛姬姬號曉雲本出教坊雅善琵琶兼通翰墨尤工於寫蘭一朝化去遺蹟猶存忽聞藏夜壑非復繞陽臺何似行雲意猶堪入夢來妙手能操管芳心解贈蘭香魂隨宿草祗作斷腸看經龍虎山訪裴法師墓草宿青山寂松林白日寒丹成人已化猶自閉空棺其二海上遊梅福吳門更不歸仙源流夜壑何處有花飛師本吾蘇人六言附泊江口大别山前暮雨漢陽江口孤舟祇自臨流送酒無因挽日登樓皇甫司勳集卷三十一
