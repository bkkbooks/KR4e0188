body:
  text: 皇甫司勳集卷二十九明皇甫汸撰七言律詩秋興滇中别去二年多海上歸來末息波借箸何由聞妙算輸金豈合許求和不堪郊壘生荆棘且喜山居有薜蘿莫訝少陵秋易感詩成底是詠兵戈簡文待詔寂寞山居興自寬厭聞海上有波瀾蛩鳴北户秋聲起鵲守南枝夜影安老至相如猶抱病歸來陶令已辭官㸃蒼山色渾能記欲乞丹青作障看虎丘送趙司空虎丘締賞逢初地麟閣圖勳慶此筵已見兵威銷草木更看喜氣滿山川諸天香梵留清嘯子夜吳歌當凱旋自愧陳琳老書記欲從幕下賦燕然子約好談𤣥理嘗養一鶴每清宵唳徹余齊偶獲其匹賦詩識喜屬余和焉蘇耽雅好應誰似日對仙禽絶世氛行傍瑶琴聊獨引飛來緱嶺忽成羣雪中弄影時同舞月下和鳴幾處聞覽物與君渾念昔乘軒曾亦濫機雲贈胡開府平戎今代推司馬屢奏飛書達漢家雪後三軍䝉挾纊月明千里聽吹笳周瑜旌節屯江左王濬樓船出海涯聞道西湖罷歌舞春來依舊見繁華送周子籲總憲入蜀昔督學兹省巴江雪後回春水遙見揚帆逐楚雲花發錦城多藻思猿啼巫峽奈愁聞節宣番部新持法門引諸生舊論文最是羲之心戀蜀裁書時欲訪周君寄嚴左相平津開閣直城東門逺雲天豈易通政治古來推魏相文章今復見燕公蒲車特賜因優老彤矢先頒為報功聞說邊疆頻奏捷也知神算自帷中寄許中丞馬上相逢關右使䄂中因出隴頭書功髙自乞還私第道逺猶煩問索居涕淚吳臺仍走鹿傳言秦地半為魚年來無限蒼生恨總臥東山可晏如春暮春盡餘寒衣尚重朝隂黯黯戀芳叢鳥聲渾隔雲山外花事全銷風雨中塵纍未能遊五嶽宦情曾是薄三公年來防海催科橫浪說歸田賦最工送張中丞還蜀防海年來力已殫一朝談笑靜波瀾功成詎免中山謗贈别應嗟蜀道難叩闕請租回帝眷磨崖留頌與民看峨眉髙處雖堪臥祗恐徴書起謝安聞報紀事五樓鐘鼓不聞揚三殿同災特異常憑玉須頒罪已詔止車應受直臣章堯心自是安茨室漢祀何能救柏梁遙想千官趨走地却於西內拜君王送范于中楚憲移任東藩新辭憲節荆襄上更引藩旌齊魯間基訪靈光題賦去邑聞絃誦采風還虛傳金藥生蓬海無復泥函祕岱山長白祠前頻駐馬獨將憂樂係時艱簡王舍人閒居為語鳯池賔曾共當年侍紫宸五夜趨朝聨劒佩一朝豫告謝絲綸湖山别業青箱在兵火移家白髮新獨憶題詩賈中舍歸來誰復嗣陽春答董子元太學山居寂寞誰相問海內交遊半不通雙鯉將心傳夜月一帷垂老閉春風新城聞鶴因兵後往事看花若夢中情忝通家生校晚思君惜未見嵇公詠架上練匹練髙懸素影微魯邦東望是耶非漫因龜手求靈藥欲趂纖腰製舞衣浣處詎須悲墨翟晴時長似對𤣥暉秋風夜報砧聲起誤落空房恨未歸寄呈孫宗伯於南都陵山遙帶石城東信是雲霄路莫通紅葉晝題傳妙句紫薇晴對憶高風將移相印新提上暫掌綸箋舊陛中勿謂散曹忘夙夜漢家典禮二京同寄劉諫議畿經年尺素未曾題長夏郊居懶自宜北地塵飛榆塞日西京灰滿柏梁時中朝望屬陽司諫左掖吟憐杜拾遺定有封章回聖主莫須焚草避人知上巳日盧次柟宴集同周公瑕黃志淳伯氏季氏作千里相逢在闔閭坐談長鋏氣凌虛曹家見妬因題賦梁獄傷心幾上書白骨東連新戰地黃河西繞故山居古來俯仰俱陳跡莫惜春風禊飲餘送淳甫之南都憐君避難頻為客非是干時謁貴公百畝已荒吳苑上全家猶寄冶城中鶯啼驛路關春意帆落津亭候曉風年少相看頭易白無言江夏是黃童江淹作恨賦李白擬之余因作恨詩世事年來與願違春深無語對花飛曹王座上空陳伎襄子橋邊但請衣鏡裏顔銷恩寵薄牀頭金盡結交稀出師未報隂山捷身沒沙場竟不歸吳純叔招遊天池聽講解今為中丞墓石徑緣源此共攀香林深處逈塵寰尋遊始訝春將盡入室何知客到還坐見雨花飛户外時聞流水響松間蓮峯祗合開僧社却笑滕公浪卜山送陸子還洞庭朅來城市不堪居歸去湖山得自如林屋樹深無暑到石門雲偃覺塵踈歡娛勝事還能幾零落交知太半餘借問風帆何日下將因明月遲秋初答客問客問當年作帝臣朝儀曾覩內家真佩隨鍾漏趨丹陛衣染爐香散紫宸一謝仙班那再得將談盛事已難陳容華未盡恩先盡回首鶯花夢裏春秋日莫憲副以寄懷之作書扇見貽賦答經年林臥無芳訊一雁雲間每致書禾黍總荒新戰地蓬蒿猶滿舊幽居瓊枝想見勞顔色紈扇題將慰穆如潘嶽平生惟用拙相如誰得似長輿答施平叔寄示詩刻解官聊得遂吾初華省榮名竝是虛遙憶峴山同調客每從苕水悵離居兵戈亂後音書少零落平生故舊踈展誦新編懷往事萍踪一散十年餘寄寇體乾方伯與君結綬分畿縣並是看花年少時闕下鳬迎仙令舄省中鴉散尚書期别來嵗月空陳跡悵望雲山幾夢思何事越邦頻得借西湖應起寇公祠哭趙司空同時奏賦謁承明中歲論交嘆死生晞世有才非善用道家為將忌功成忽看馬鬛新開塜愁說燕然舊勒銘烽火秪今東海上幾多人哭趙營平送王甥受福重謁相府作歸來貧賤幸相隨何事韓生復别離供奉慿將三世術遨遊仍戀五陵私慣諳客路如平地祗恐人情異昔時記得燕公曾誤采省堂應見舊題詩贈黃侍御中北上君王遙待侍臣回况御陽春左箇開早為乘驄仙闕去猶煩羅雀翟門來盤餐獻嵗聊傳菜驛路輕寒已見梅一自南中持憲後至今六詔想風裁贈蔡子木林間車馬不相聞說却長安隔世氛何事故人成白首猶看羇宦在青雲重開火樹因留客乍熟春醪若待君莫問平生詩思苦一從身隱更焉文送唐應德視軍海上玉關此去朔風寒瀚海東來血未乾曾謂軍容非爼豆慿將經術靜波瀾邊情已向帷中决師過還須席上安借問王章舊時友幾人相慶貢公冠長兄祥日悲賦歡娛舊事不堪論細雨空堂倍愴神三徑落花誰是主一丘荒草已為陳因來上食登君座索盡遺書斷客輪愁見梁間新燕語可能飛喚夜臺春將有章江之行書懷棄置何言宦不工逍遙只合臥江東仍遊逺道傷心外却覽方輿指掌中給札蘭臺存盛事投書相府愧嵇公老年懶賦滕王閣錯笑時來欲趂風一村叟傍村新卜小齊成坐對門前春水生雨過西山多爽氣日長髙樹有啼鶯香醪隨意遺鄰舍車馬無喧逺市城何事明時有好隱古來丘壑本同情尹山留别子約野寺維舟日未曛越江從此路初分酒酣南浦聞驪唱夢逺西堂憶鴈羣草閣呈秋來爽氣石床過雨絶塵氛青山堪臥那堪别祗自將心愧白雲重經西湖西湖原是舊離宮烽火那堪四望通山邑重開圖畫裏年華猶在夢魂中沙閒鷗鳥心相得水冷芙蓉跡頗同多少遊人爭解說歡歌留却使君功胡開府招宴太虛樓吳山髙處謁氤氲幽閣晴開一徑分嘯倚樓臺逢越石心懸廊廟見希文湖中風景平堪攬海上煙波靜不聞樽爼勝遊戎事簡揮戈直欲駐斜曛謁鈐麓書院秀江東注繞鈐岡曾是嵩高生甫鄉雕拱龍盤瞻賜閣垂溪虹飲訝飛梁年年身隔丹霄逈日日門流慶澤長總說平泉花石麗何如此地沐恩光别何中丞遷獨擕書劒客南州早見章江樹色秋閣上題詩思帝子門前修刺謁君侯亦知地隔猶風馬忽漫星分在斗牛徐孺才名誰得似無煩解榻欲相留錢江夕泛舟人因指括蒼感賦冬霽寒輕樹未雕丹楓江岸似花饒半帆布影懸初月幾處漁燈㸃落潮漫世不將辭賦賣端居何用簡書招白雲東望蒼山路曾記當年誤折腰送日者朱氏逢君布卦似公明盡道朱家有建平獨坐垂簾聊著易人來叩户已知名吳中再至還輕組洛下相招果郤兵為愛隱居何處是澄江一曲對宣城寄吕光祿聞買山莊天姥連千峰紫翠一忩前陪京散署聊堪寄光祿司勳是右遷勝事暫將圖畫檢音徽近有尺書傳年來太白東遊興鄉夢時從剡水懸皇甫司勳集卷二十九
