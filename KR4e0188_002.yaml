body:
  text: 皇甫司勲集巻二明皇甫汸撰四言騷體相彼古泉贈吳公也相彼古泉湜湜其清君子吸之顯允王明曰既受福羣小是愠肅肅嘉征彌邵彌濬峩山兩峙泉侯深矣懿彼泉源胡自今矣之子有懷嘅其臨矣泉之混混睇彼髙岡伊誰命之我思隴鄉于以瑩心亦異之覯于以逮下亦孔之厚兹其方可胡鞠焉疚民之繹思侯泉浩幽彼其之子莫匪令猷不瑕自天裒澤方州相彼古泉六章三章章四句三章章六句潏彼上善賦也君子濱於水南遡洄而従者賦焉潏彼上善滙厥靈長滔滔其逝在河之陽彼美人兮于焉遨翔潏彼上善滙厥漣漪滔滔其逝在離之湄彼君子兮于焉委蛇潏彼上善二章章六句歴田歌題張兵憲卷我所思兮在歴山山閴寂兮水潺湲徂畛學稼慕有鰥希世謝兹桑者閑龍翔鳳舉鵷鷺班深山鹿豕安可攀承麾東邁齊魯間側身西望阻蒲闗欲往従之虞坂艱悵隔嵗兮草空綠渺佳期兮桂屢丹美人貽我明月環思公子兮何時還大隠在朝不在野田園何為懷憂摧心顔夜泊魯橋胡中丞馳翰至披襟起坐秉燭讀之渢渢樂章聲中金石口占奉謝見君晴别君雨人向巫陽去别君雲作雨思君月出雲疑是湘江上猿啼不可聞河水瀰瀰獲此雙鯉贈比琅玕報匪瓊玖夜中不能寐起坐理金聲山月為我明河水為我清思君不見那為情題施比部四號詩苕水滙兮霅水長美人容與兮在中央翠竿嫋嫋思得璜藏以巾笥貢明堂烹鮮守鮒兮屯以康功成網弛兮筌盡忘従任公兮憺方羊右苕霅漁長窪尊兮𤣥鬯玉瓚兮黄流羌器用兮各有適行潦之水可以羞美人既醉朱顔柔身後榮名焉足求屈平獨醒兮衆方忌善乎劉生之沉飲兮細萬物以輕世右窪尊醉客峴山高兮苕水深陟窈窕兮眺嶇嶔朝騁駕兮東麓夕弭節兮西岑啓玉齒兮坐芳林横鐡笛兮吹龍吟洪濤震兮𤣥雲隂參差管籥難為音右峴山鐵笛桂為楫兮蘭為舟揚擢歌兮泛中流滄波興兮碧雲合佳人不來兮心夷猶溟溟商川待汝濟迢迢天漢従君遊攬春芳兮屢歇眇秋水兮含愁右碧浪蘭舟春江辭贈諸比部越鄉兮深處姚江兮攸注將考築於盤渦遂逸釣於幽渚春日兮載陽桂檝兮蘭槳泛中流兮容與榜人歌兮慨慷攬物華之駘蕩鑒水徳之靈長朝騁騖兮天姥夕弭節兮雷門臨禹穴以探秘遡耶溪而討源起渭濱兮捐吾土濟商川兮排帝閽滄波悵公子芳草憶王孫春來脉脉江注悠悠河清不可俟胡為久淹留羌銘功於石室終畢願乎丹丘蠢爾海氓一首贈中丞平寇也中丞孰謂謂夏公邦謨也蠢爾海氓慿險構患聚徒實繁飈起滋蔓法網凝脂因緣反汗伊誰之愆階之為亂亂既不逞嵗亦薦饑脱耒為挺裂裳為旗焚廬掲篋沉艎奪輸盤汚窟據􅢨􅡰魁棲鯨氛方煽羽檄來聞皇赫斯怒迺命中丞秉鉞之帥執憲之鄰司疆之彦扞圉之英寵靈是藉嘉謀僉同顯允元老時維夏公建牙賈勇開府臨戎在帷運算對俎折衝肅肅中丞申命有赫革政以仁授師以律厥角先崩回面内逸一鼓作氣曾不終日於廓青海丹艦宵濟止必鳴桴動必舉旝天吳効順雲祲斂翳渠醜斯獲脅従罔治佳兵載戢爰居載寧商無弛市農無輟耕旋凱奏膚于周之京皇心既懌慶賞攸行桓桓中丞致天之屆徳威溥將神風潛駭共帝波臣易我鱗介化衍遐圻聲流海外皇眷東顧視民如傷中丞法令皎如秋霜治絲去棼更絃解張若降時雨若熙春陽鉗徒殊劉甲士振旅燕樂承休式歌且舞稽首萬年受天之祜小子作頌嗣美吉甫送憲使蔡公督晉學政十二解維揚肇域泰伯始都因江為浸藪曰具區列國秦并置郡首蘇海陵壯麗畛畷膏腴其一劇矣兹邦艱哉惟守漢簡二千虞稽三九績以政成官由徳懋寵以緹輜華以章綬其二桓桓蔡侯産自昴精誕嶽之秀挺國之楨為民司牧與士作程南參馮翊東寄專城其三勸課農桑發摘姦宄被以仁風臻于化理河内同聲潁川共美匪直望舒逮及朞已其四暫去留思再來快覩絃誦千家菽粟萬戸爭勞以迎式歌且舞嗟爾羣黎咸侯昔撫其五載遷楚憲俾飭吳戎郵無傳箭幕有懸弓折衝俎上制算帷中娛枰謝傅緩帶羊公其六奚奪之吳遄臻于晉戢武崇文敘倫興行甫憲斯兼契敷在敬下民疇援天子有命其七鍾姚哲吏韋白詞流懷貞陋邵砥節方攸瞠乎後躅邁種前修恩隆父母令讋君侯其八今之士子咸詭於藝或失則浮或失則靡通闡其微瑄揚其㫖侯執厥中務納於軌其九今之使者怙勢作威民不見徳惟辟是貽罹以宻網搆以厲階公聽惟平和易以綏其十遐攬堯墟顧瞻舜澤迭紹迭興復禹之蹟水遡汾漳山探姑射考俗辨疆典學之職其十一奕奕蔡侯秉粹履醇允文允武惟清惟寅志舉三代用弼一人鼎鉉鴻烈社稷藎臣司勲作頌耀世弗湮其十二贈周侍御東南之美産於㑹稽竹箭有筠珪璋與齊一解爰挺霜稜來耀法星洪濤允戢瀚海底寧二解辟彼巨川用爾作楫亦曰砥柱中流是掲三解帝閽雖逖宸聽實卑封章朝抗聖慮夕移四解軍旅妨農旱魃為虐民乃薦饑賜租䝉澤五解殿中簪筆都下埋輪貴戚斂手威憺披鱗六解既稱臣直亦昭主聖元氣以調壽國之命七解奉揚天憲出納王言紀綱攸賴朝廷以尊八解文武周君為古柱史五教敬敷譽髦多士九解三吳振徳稽首興歌小子作頌刋石弗磨十解皇甫司勲集卷二
