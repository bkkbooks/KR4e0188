body:
  text: 皇甫司勳集卷五十八明皇甫汸撰哀誄恭擬世宗肅皇帝哀文惟嘉靖四十五年嵗次丙寅十二月丁亥朔十四日庚子大行皇帝崩于萬壽宫旋殯于白虎殿越嵗丁卯三月十七日壬申將遷座于永陵禮也雕輼移輴畫攢撤帟風咽酸笳霜凝悽紼嗣皇帝心隨去劒目送遺弓昊天高而悵罔極泉路渺而悲奚窮小臣汸念昔己丑賜策彤庭分符赤縣猥授華銓載司清憲罪荷曲矜恩蒙微譴敬昉册命恭述哀辭少報君臣之義仰宣父子之私其辭曰惟明應運慶洽天人還資聖厯誕挺聖君高帝倔起恢烈鑠勳周漢驅除曷足以云列聖纘服克邁徽猷七葉中否八駿荒遊閹瑾搆釁藩濠逞謀治乖端冕殆鄰委裘懿問惟興光昭伊昔善埒東平仁歸西伯姒母樂推啓賢師錫嘉靖殷邦修功代邑祗命允協格來其勤踵堯蹈舜稽古禮文創建九廟懷柔百神享祀咸秩燔瘞攸分爰覃孝思並𢎞德教敬一垂針農桑屢詔宣后崇儒軒皇問道精意執中玄心觀妙雪由欵集雨以祈零甘露嘉醴卿雲景星秬六穗芝草五莖恬鱗牣沼肉角儀庭皓質緇章黃耀赭異胡瑞不臻胡休不畀化浹中區聲漸遐裔象德象功盡倫盡制軼漠航琛踰沙匭賮百蠻歸化韜弓斂袵禮樂可興干戈底定秦漢以還唐虞斯盛登必元愷簡必俊髦穆穆布列濟濟盈朝于淵網致在藪旌招內寧外輯陽長隂消方祗表靈高禖恤胤始正中闈旁充燕寢粉黛蘭郁褘褕翬映魚貫承私麟祥衍慶既咨四嶽亦闢四門躬閲封事洞察邇言威以克愛義以割恩剛斷惟獨權攬則尊匪窮土木麗軌宏圖匪慕蓬瀛嗇神葆軀璇題瑶榜綺綴椒塗飛亷望氣阿陛凌虛嗟金藥之未就懟瓊蕊之無徴巨迹空履仙掌徒擎宫車晏出扆几宵憑居諸急節霜露頽齡嗚呼哀哉小臣汸昔也通園陵以馳道今望履綦而苔沒向也扈清蹕於屬車兹奉衣冠而月出採松柏於江南樹成拱而風瑟引灞滻以為池遡逝川而流泣嗚呼哀哉探大隧之寂寂兮預鴻算於睿營瞻豐丘之冥冥兮協龜筮以考貞攀龍髯兮百工躃踊封馬鬛兮萬姓悲鳴嗚呼哀哉若帝者父作於前子述於後日照月臨天高地厚刋德難名垂聲不朽從七聖以皆迷慰一人於在疚嗚呼哀哉弔淮守張君文并序淮守張君守約少以楚材挺為周楨漸翼鴻逵早膺龜組單車入境仁風被於初蒞家糧自運苦節堅於素履使東海卧治假以嵗月則南陽坐嘯殆其庶幾亡何蒼頭構厲白創倳胸奄以循良之身隕於臧獲之手嗚呼痛哉夫習在難養患生易忽如得其情則異類之感可通於肉骨苟失其道則萬乘之尊不畜於臣妾是故姦宄發於牀第而羌胡生於袵席詎獨子密不義彭公昧於幾先中書寡恩顔氏載以誡後而已此古人所以守黑於淵魚智士所以納汙於蜂蠆也詩稱肅肅在宫之容異焉易繫嘻嘻間家之節隳焉寬猛相濟威愛厥克範斯存矣極而論之當伯廣州之役非同申池之怒便奴貰酒之忿異乎鵠亭之貪何發之暴且慘也夫弒逆行於二千之吏禍變起於股肱之郡是曰人妖匪由天作之孽曾是在位罔恤震鄰之咎哀哉先是客曰守居嘗鞅鞅如不欲生蓋亡徴焉朱季強直以自遂杜陵慷慨而請掾守不能然則恥之武夫憑寵而作威少年據津而黷賄守不能禁則恥之關吏囁嚅則終童棄繻亭尉沉湎則故將止宿乃使利賔之士懷懟而越疆載馳之夫望風而回轂守不能振則恥之志乖政閡氣沮神靡然後隙開釁作至悲震外户血濺同官方且指掌鳴心瞋目示意亦晚矣室乏窈窕之御囊無金玉之藏末命陳於死友愛子未遑託人寧不痛哉余與守也交非平生罕叔向苧衣之酬如此邂逅有徐君寶劔之盼兹於返國望嶧山而興嗟遡淮流而出涕遂獻弔云爾慨斯人之委化兮吉凶昧於所研傷中道之夭閼兮匪獲考於天年春叢摧於秋荼兮鳯鳥縶於鷹鸇胡君侯之不競兮身既沒而名湮負明哲之雅訓兮禍自召其奚愆登昭丘而想魂兮望洞庭而抽思表素旌於千里兮告巫陽為我招之謂江蘋其可薦兮悵臯蘭之焉貽苟桐鄉之足葬兮又何必逺從乎湘纍弔葉秋官文嵗在丙午余承母夫人諱毁瘠棲廬屏焚掃軌不通御史之顧御史銜之乃構細人訟牒文致其罪越明年丁未上書闕廷詔下撫臺移之京兆余業將有白下之役方是時鄉人士皆心知其寃而莫敢議曰此御史讐也浙省參知廖君叔愚持節過吳詢得其狀悵然曰吾輩責也即移書勘官援筆數十言陳其梗槩逮余聽理京兆都人士亦皆心知其寃而莫敢議曰此御史案也比部大夫葉君體仁亷得其實扼腕不平悵然曰吾輩恥也起而力辨以百口明其必無夫排難釋粉造次而懷仲連之風憐才彰義慷慨而存文舉之烈二君於余良可謂知己者矣又明年戊申聞廖君一旦捐館亡何而葉君奄亦辭代矣嗚呼痛哉語謂愛之欲生惡之欲死乃人情之大惑至為善獲夭為惡蒙壽又胡天道之無徵耶二君者生而聰明死必正直幽冥之中必有以考見余之心迹者苟當得其情必將幸其事之未竟而悔昔纓冠者之誤也使罪浮其實必將痛恨其憤之未雪而隂欲推創於其人也嗟乎余不過獲罪於一御史耳脫或身墜昭憲怒於明主則糜爛虀粉殆不旋踵是公車無覆讞之條肺石罕更生之惠虞典何以宥疑於惟輕漢法何以差級於使過哉德修而謗興寧免負俗之纍行非而心是詎徇通國之情二君知余亦深且篤矣余自昔好覽莊列之篇凡齊物巵寓纍數千言而頗達其寵辱得喪之故兹息淨土披味釋氏之書凡阿含上乘復纍數千言而尤殫其因果徵報之驗一時矜炫名勢侮弄威權者視之若燕雀蚉虻相過乎前坐見其漚消燼滅落迦於後也二君雖位不充其才齒不滿其德而流慶於苖裔受福於輪劫者可際量哉是故以彼而生安知非嬰網桎梏彼云障礙者也以此而死安知非超度涅槃此云縣解者也葉君之病亟也猶瞋目而語人曰惜乎余友之白其寃余不及見也當事者頷之而已斯言余忍聞哉嗟乎壯夫快怨而途窮國士酬恩而日晚悠悠蒼天負此良友撫膺增悼泣盡何言因束芻酹酒東向載拜就位而哭葉君并西向載拜望風而哭廖君二靈其鑒之哉葉太倉人廖茶陵人諫議沈公誄并序諫議沈公者吳嘉定人也毅皇帝時以射策發科為行人選充給事彈劾不避權璫仄目時閹瑾方用事知公家贍於財有求不遂輒欲中傷之乃遣往雜治邊獄歸報謂所當不讎矯詔逮繫將坐以危法尋得減論謫近戍瑾敗起家署桐廬簿稍遷廣東僉事嵗餘免官公夫人亡繼而元嗣思道夭死妻子自經以殉所司上聞有詔旌其閭公宦不通顯家復多罹居嘗鞅鞅疽背而逝嗚呼哀哉公之仲子余故妻也愧乏河陽之才爰述荆州之德聊託素旒以誄鴻績其辭曰天道無親恆與善人江都來宅纍葉方振丁辰之缺坎壈終身嗚呼哀哉公生俊發期於奮庸恥徒以資埒於吳中折節敦書鬱為儒風公有偉烈揚于帝廷彈劾不避諫職允稱承嘉一蹶位遂不登權閹作釁致公於理咎召多財情乖寡悔匪天照微公其溘死嗚呼哀哉公有至性友于兄弟奉母間居孝亦不匱拙類安仁忍幾公藝公有賢妃嗣先之徽既諳閫德復贊庭規一旦潛翳家道以隳嗚呼哀哉公有元子誕淑才質弱冠遘閔秀而不實烈媛自殘隕兹雙璧嗚呼哀哉家君分省舅為瑣臣顧余國士眷余嘉姻每懷芳問屢奉光塵杜門却掃拊缶興歌霜露委幹風日損柯彌留不起痛也奈何嗚呼哀哉余方祗役薄遊上京承諱酸鼻感舊凄情既嗟東武復悼射聲嗚呼哀哉視履若此獲報若彼謂天蓋高人道孔邇欒後必大懋哉小子靈將即逺乃弗克會抆涕江干想魂天外綴兹誄辭聊以寄愾嗚呼哀哉明徵君吳公誄并序維嘉靖二十五年正月二十二日明徵君迎曦吳先生卒嗚呼哀哉厥配李孺人先奪一載季子國倫痛慈儀之奄背悼乾履之俄殱茹荼銜諱勉襄協禮除服起家擢省試第一越明年庚戌登進士第昭嗣遹德闡兹令名公亦可謂不死矣然猶感鼎養之匪逮虞潛懿之或湮乞余作誄以纍芳行古稱大夫之才臨喪能誄是故序悲婉切逺劣潘生綴藻纒綿上慚陸史嗚呼風摧寧樹嵗閲陳根榮始哀終亮爾情素爰采遺絢辭惟永慕詞曰邈矣延陵猗歟祖烈奕世育靈乃誕英哲繕性毖躬抗迹砥節幽履金貞清標玉徹曾是古心先民有逸抱甕灌園帶經力穡蹈道遺榮陋兹乾沒緬彼漢隂機將永息傳稱萊婦針頌鴻妻化刑偕隱式敬賔儀間家禆壺福胤有基鄉閭表正籍甚音徽具邇懿親推財克贍疇大吾宗寵弟曰憲敦賞斯朂遂膺嘉薦無忝郭君人倫洞鑒慨昔披裘捐遺不拾管但揮鋤視金如礫公介與齊楊生感泣義薄高雲心光皎日亦有平子託死巨卿堪也抱臂申訣友生嗟嗟曾氏彌留在煢躬視醫殮善匪近名娛情墳典委懷琴尊屏騎而徒栖遲衡門餘慶垂裕子孫實繁天恆與善人亦有言衛生有經致柔甘寂可以引年胡然奄忽梁傾外庭蘭偃中室冥理難諶扄臺易即嗚呼哀哉荀令猶存謝公不死鳯羽攬暉駿發季子文蔚楚材屈宋方軌溯源會稽東箭之美些魂允慰茂行孔彰振振欒後俾熾而昌椒非林實寶異池隍贈級賁壤國著彞章嗚呼哀哉卉秀珍舒孝思不匱優遊考終自同蟬蛻光塵雖戢芳猷靡墜述德徵辭庶幾黔惠嗚呼哀哉徐東臯誄并序重光紀嵗維暮之春豫解南省司勳赴闕聽補職時長興徐子中行甫擢第拜都官乃從闕下締交焉竊聞東臯公之風未嘗不延頸想見其人逮余免歸吳門徐子出守汀洲嵗且九易矣吳距苕霅才踰百里知公固無恙也一旦走白馬之使惠素書之音聞公於二月二十日先已捐館徐子居苫塊期而祥矣神魂震越申緘嗟惋覽莫能竟至斂悲收涕載繹來旨欲豫為誄昭宣盛德兼示王子世貞所為序傳謂公為隱淪任俠宗子臣所撰志銘稱公為有德仁人二子交汀州最為莫逆知公特詳又皆秉倫鑒善屬文言固信而徴矣愧豫才不間於述哀因掇二子言庶乎受成於廣意比次於嶽辭若公者生有下榻之慕死有報劍之知附青雲以永託沉白日以遐思昧平生於傾蓋聊髣佛乎音徽竄玄廬以啓路表鴻烈於旒旗嗚呼哀哉其辭曰哲人砥行烈士徇名挺時介立不為資營矯矯徐公籍甚英聲處垢斯槩在濁能清􅑴彼濠梁實其苖裔徙兹苕霅逸情莊惠居惟堵宫門多結駟片言解紛千里誦義操贏惟許積而罔捐多財構釁窘於少年公數其罪蒲伏謝愆散金高會椎牛擊鮮庇我舅氏實情所鍾遼賈方厄里豪逞凶既脫其網亦挫其鋒朱家往誼魏客遺風謂公任俠是耶非與中嵗折節從事詩書縱橫談世慷慨興渠謂公仁者言出利俱負兹才哲惜未效用位匪眄睞世若玩弄彈琴自娛耽酒揮頌稽弦輒響阮杯興動嗚呼哀哉公邁隂德賢子克生錫爾郎秩賁爾簪纓屏華弗御舍車徒行志意苟修爵服所輕汀州乞養曰豫康強諭以清白誡以循良人貌榮名孰短孰長履終獲考裕後克昌昔漢叔持爰著英烈班生製誄載諸史諜采公潛懿視彼猶劣小子斯文流芬不滅嗚呼哀哉皇甫司勳集卷五十八
