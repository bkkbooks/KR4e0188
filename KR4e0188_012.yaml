body:
  text: 皇甫司勳集巻十二明皇甫汸撰七言古詩化蜀行送周子籲提學使君結駟引華軒抗旌西指靈闗門衆賔引餞且莫起聴我揚㩁巴蜀始黄苖帝裔蔓本支蠶叢魚鳬爰肇基儀兮城太啓都㑹氷也疆理饒沃滋叔世漸革密促政晩蒞乃被中和詩置酒宴樂從禽荒郤卓餘風稱難治銅梁玉壘靈氣開碧鷄金馬神降來貝錦黄潤産奇貨木蘭丹青紛美材靈氣日以宣哲士日以繁相如作賦凖騷經君平著書道徳鄰揚子深湛秘𤣥㫖王生暐曄流英聲使君夙齡贍斧藻含章下帷劇幽討恭承嘉命辭天庭奉揚文思振南表鑄人自有尼父術化俗更似文翁造雅儒濟濟升君堂齊魯斷斷兹足紹錦官城外錦江流浣花溪邉花可遊髙楼結綺宛然在琴臺卜肆今尚畱馬蹄豈憚劍閣險猿聲忽報瞿塘秋瞿塘秋已晩思君路方逺敷教向岷峨探奇到處過萬里欲識凌雲思三峽遙聞流水歌廣思行長兄造思舊賦乃歌以廣之美人奄忽委明艶氷心怳記芙蓉面麗魄香䰟何所棲婉態柔情獨不見青楼朱户生網絲文軒綺忩虚履綦誰家窈窕出新粧當筵一顧情内傷名姝絶代本無二玉顔祗訝前身是歡笑千金歌舞塲欷歔萬種悲悽地冶容髣髴已驚盼新聲靡曼復增嘆陳思總謂洛神奇漢武飜疑少君幻多情宋玉起獨立衆賔無言主嗚邑翠袖全迴燈下羞青衫半沾座中泣門前栁色慘江烟檻外飛花隔楚天請看今日勞相憶莫向他年留可憐昔日行贈許應元使君昔日與君相别處越江一夜秋濤去今日與君相見時吳宫三月春風吹人生聚散何草草春來秋逝傷懷抱轉盼流光安可知䇿足要津苦不早少年避世漢廷中俛首潛郎畫省東不事簿書羞問馬空將詞賦擅雕蟲賈生果遭綘侯妬汲孺亦被公孫怒謫去䰟銷湘水濵歸來淚盡燕城墓敝廬蕭蕭落日曛髙車門外過繽紛已掃松蘿謝逋客猶隨軒冕對夫君夫君倜儻青雲器奉節聊為蒼水使酌酒何闗世上情論文且發囊中秘白首相期在令猷榮名莫遣為身累君從北闗謁丹墀余守南山偃桂枝詎堪𤣥度孤明月却照楊朱兩路岐夏時對酒歌春光奄忽朱明移華丹委謝柔緑滋白日幸長走苦熱清夜雖短坐忘疲美人邀我入蘭室臨池伏檻待月出左宦空嗟軒冤年閒居忍負琴尊日萬物萍浮無定蹤一身瓠落竟難容江邊冉冉老將至世上悠悠時未逢文章自古俱寂寞富貴何如且行樂雲夢徒誇獻賦田天禄終慙校書閣黄金為壘白玉漿朱絃錦瑟泛清商若為勸飲須酩酊我為髙歌生慨慷明月漸昇燭方滅凉颸徐來纓欲絶莫愁殘夜已栖烏但恐先秋早鳴鴂今辰行五月十二日先忌辰作今辰何辰心煩傷無言竚立涕霑裳悠悠蒼天安可問肅肅𤣥寢神如將憶昔承恩拜家慶初筵白髮雙相映採蘭不顧尚書期及瓜每後君王命此時嘉賔四座傾滿堂宴笑春風生繁絃促柱發雅奏白華朱萼敷鮮英人事分明有代謝慶者在門弔在舍申伯虚傳崧嶽靈方朔奄隨歳星化髙臺垂雲為我隂密室含霜詎知夏昔日千金獻夀人今飜上食繐帷陳悲風南來少寧樹頽波東逝不迴津以此思哀哀更泣亦知予告何嗟及豈復殷勤杯酒歡空餘髣髴畫圖看黄門且念奉母去清河欲誄痛才難閶闔行贈朱大理少年為儒不習吏天子試政謁廷尉耳剽刑書非所堪手持法律了莫謂是時朱博材過人平反輕重稱絶倫讞常八九中意指談每一二相開陳冉冉府中趨獨久迢迢忽拜遐邦守萬里驅車仗此身一朝投劾遭多口世事升沉安可知人生聚散更難期海内萍蹤各飄轉天涯栁色㡬相思我本與君同里閈十年不寄雲中翰閶闔門前㑹面時把臂道故兩增歎自言彭澤早歸來却笑平原尚羈宦看君遺世有髙情失路何曽氣不平薄暮乗舟入湖去似聞撫缶作秦聲荅周山人惠鏡囊歌山人以寶刀持贈司直家兄乃製古歌詶之奇鋒厲鍔雖價重三鄉繢句雕章亦氣雄百代所謂金錯英瑶報施亦稱矣間以鏡囊一枚餉僕僕戲曰物則細耳才復劣焉是故短歌㣲吟不能長也我有古鏡字明月愛惜相持走燕闕少年被服方冶容矯首勝冠正𤣥髪此時明鏡炯無塵一片銀華四座春青鸞每開寶臺曙丹鳳雙盤玉匣春山精辟易不得近嫫母羞窺何敢嗔願葆明光虚室裏絶勝氷壺與止水察見淵魚似不祥况復蛾眉最相忌周郎解贈錦綺囊繩窮緘發迴龍光誰家窈窕濯素手當忩刺繡結衷腸規形恰與美璧合藻艶巧奪菱花妝由來尚象乃成器拜君佳貺感君意姱行驚時亦易汙神物深藏豈輕示守黑須從老氏謨用光却笑稽生累與君結交肝膽見世上紛紛盡如面一朝慷慨愛已捐萬金揮斥心能賤皇生佩囊如佩韋韜精埋照承餘輝觀唐太史吳門射歌君從弱冠起明經文藻争先掞漢庭蘭臺給劄因成草石室紬書屢殺青此日公車承寵渥詎言金馬棲方朔昨來上疏批龍鱗不獨談經折入角飜疑君厭承明廬詔令歸就碧山居減盡瘦圍憐沈約病多消渴類相如隠姓潛行吳市東却求劍術想英風繋筑夜宿專諸館袖錐朝過闔閭宫清秋獵騎平原上白日張侯矍圃中左肘能教置杯水右手引弓輕發矢風前報道百葉穿雲際驚看兩鴻死是時觀者愕相嚮我亦心雄氣增壯灞亭醉尉苦莫嗔漁陽老將嗟推讓聖主同時最好文諸賢幸厠從官羣那知好惡多更易况兼蹤跡有離分公孫客館丘堪甚鄭莊推轂遂無聞但云海外求方士更傳天上出將軍勿向長門奏辭賦請從遐塞勒功勳林酒仙歌君不見昔日林師東習禪常時乞食闔城邊牀前不學維摩生甕下翻同吏部眠從此市人皆識姓醉呼酒仙歸每應通好何須法器貽相逢但遣香醪贈飲者家遭雷電來延師秘呪不為災驅石遥從洞門至返風曽渡太湖迴梅侯為郡有賢聲雲漢勞思濟衆生鉢内龍鳴晨作雨錫邊虹見晩移晴君不見自古異人多變幻葛陂神應偏能慣左慈却被世主嗔長房亦受諸魔患弟子傳燈生道晤厯厯猶能語平素已知前是辟支身安用親承刺史顧我歌酒仙爾試聽處世由來忌獨醒為問六牙求證果因看萬物若浮萍嘯别虎溪攜䇿去莫向羅天苦誦經壬寅歳除歌端居冉冉速流光往事悠悠耿不忘擊劍總為行樂地鬬鷄曾結少年場晩慕詩書才十五因耽文史三冬苦夜見螢飛車氏囊朝看魚出萊蕪釜從此家園懶不窺長無鄉曲譽相推且甘寂寂龍蛇卧安用區區燕雀知一朝謁帝承明上不慣隨人走俗狀言將調笑恐侏儒謂可優游取卿相轉盼今經二十年循跡誰知事不然由來直道時方忌重以修能世豈憐浮湘賈誼空投賦執㦸揚雄獨守𤣥君不見朱雲四十始改節逺從博士受易説逢時吐膽漢廷中遶陛争呼丹檻折又不見山公四十起郡吏投傳羞為部從事遇主遂厠三公間總揆還稱百官治我却無聞强度春宦游減産久沈淪未果官階能復祖非闗郎署可潛身坐驚芳歳明朝過爛醉香醪勿重陳送顧子懋涵應貢北上尚書璘子古來江左多英烈顧榮人望尤超絶班生豈好紈袴間公子能持布衣節早年作賦思凌雲同時幸遇聖明君未果先容因狗監徒然落魄在鷄羣一朝起就賢良薦却向金門請褐見横經論難諸儒前夾陛惟聞帝稱善此時折角動朝紳還須吐膽奏天人為語洛陽新進者更誰得似晚平津天津荅子安兄别家五月渡江水棹拂炎雲入淮汜行殘六月臻衛流凉颷一夕秋聲起眼中金闕已在望手持玉盃喜相向聞道長安有狹斜明朝走馬踏晴沙莫將潞水橋邊栁看作𤣥都觀裏花天津對月歌天津城外海潮生楊栁堤邊月正明岐路終朝堪下淚闗山此夜倍含情昨見光流金闕裏分明影傍瑶臺起懷璧虚從上國來投珠莫向都門倚迢遥蘭槳旅人舟寂寞羅幃思婦楼失寵翻憐圓似扇和光秖恨曲如鈎自同烏鵲枝間戀那知蟾兔須臾變秉燭南皮尚雅游飛蓋西園憶芳宴幾許清暉三五期争得朱顔二八時且共髙陽縱飲去安用成都訪卜為太平隄行余兄子安並友蔡子本皆南移法曹而余亦淹水部徃省家兄時一至焉既而出補越憲間因蔡子徃者月僅再至耳蔡復考績北征經月不一至也偶過兹地山色湖光宛然在目鴈行鳳侣悵爾離羣延佇久之賦詩展太平門外古崇隄嘉樹扶疎夾路垂負郭盡為芳草地沿湖直遶白雲司當時王貢總仙才况是承恩非闕來御史府中烏半宿尚書門下騎雙回青山幾度朝陵節𤣥水曾流祓洛杯鳴珂再過平沙道問舍多為後來少已看奏賦甘泉宫每憶傳詩臨海嶠驚心歳序易經春舉目湖山宛自新含香不覩遊蘭客息影徒逢愛樹人由來聚散皆無定欲寄相思那可因送駕部王子督楚學中興文運應圖開聲教遥知薄海迴共看濟濟多周士更道彬彬悉楚材楚鄉今上龍飛地代來總是攀鱗起里社鳴時河正清鑾輿幸後雲常紫騷壇屈宋本稱雄誰為操斤向郢中明堂豈羡菁茅貢江漢先歌棫樸風奉揚徳化勞宸眷蜀郡王褒被嘉薦藻鑑曽推吏部郎才華况屬瀛洲彦君不見伯樂不生良驥缺鍾期死後朱絃絶曲學翻為弟子嘲離經徒守迂儒説作範如君夐出倫文從三變一朝新道傍散木猶蒙顧徑裏幽蘭併沐春寄言和氏私相喜千載今逢辨玉人佩蘭引謝友人惠香星漢沈兮月華没寂寞𤣥亭夜無色海上仙槎去不歸夢中迷路常相憶美人尺素逺寄將玉函未啓先生香謝家羅囊豈郁烈楚臣紉佩空流芳蘭麝何須煉寶鼎芰荷早已凋金塘思昔吳宫爛如綺璇館娥媌鬭妍美鑪内常燒百和花腰間不斷三薰茝芙蓉帳暖籠芮光薔薇樓髙棄脂水裊裊輕烟飛四時藹藹香風度十里那知麋鹿臺畔逰尚愛驪龍沫中死芝室蕕途化有因願把清香託君子七夕嘆朱明早謝清商變衡紀年華逓如箭新月初懸天上鈎寒濤欲湧江間練玉井輕銷桐葉聲金塘細委蓮花片嗚嗚不斷緑隂蟬去去誰留紫泥燕沙塞音書催擣衣綵樓風物羞穿線鏡中潘鬢飛素絲篋内班腸裂紈扇撫幙空房妾更悲驅鞍逺道君應戀試看星牛夜度縁可怪人情重相見陪都行以上三首㓜時作陪都八月夜氤氳名姬結伴逰繽紛明珠為珮曳綵裙臨風百和蘭茝薰箜篌輕調聲遏雲當筵嬌舞歌向君君不見朝霞難挹日易曛三五月缺江水分何如金尊美酒常在手與君及時聊樂員皇甫司勳集巻十二
