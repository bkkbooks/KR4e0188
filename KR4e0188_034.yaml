body:
  text: 皇甫司勳集卷三十四明皇甫汸撰頌贊銘清海奇功頌若稽古昔重華纂厯爰書猾夏之文祇德握符猶載叙戎之績蠢兹倭夷弄兵濡沫中奚足為聖朝蠧哉當其竊發也始逞貪殘卒肆桀驁乃至焚城䘐邑斬將䖍史釁構纍年殆無寧嵗禍延四省半為丘墟上厪宵旰之憂大奮赫斯之怒簡命元老授以斧鉞召募習流置為材官仰藉寵靈式遏寇虐尋就剪滅悉為蕩平然民疲於征遣師困於行間財竭於轉餉力殫於防守得不償失功僅凖過此其往事之大較也夫日本諸夷僻處海島洪濤巨浸天之所以限華夏也然浮艎駕艦乘風遡浪倏往倏來千里一息敵騎之蹶踶不捷於此也跳梁盤舞且戰且怯邇則創接逺則火攻胸奴之長伎不銛於此也議者方軫北顧而忽南圖向非高帝神武察見狡譎謝欵罷互羅衛布堠而嚴為之防鄞漳之間不胥而為夷乎逮今烽火稍戢瘡痍甫定而師處生棘田卒汙萊遷徙之民未盡歸農蕩析之婦未曾還織方且收骨四郊想魂千里乙丑仲夏風汛忽作閭閻震驚蓋傷弓之鳥羽落於虛丸遇毒之夫色變於談虎無足怪也時則有巡按御史洛陽函野溫公霜稜所蒞風裁著稱嵗及瓜期圖上剡草方駐節義興羽檄星馳鷹揚電發乃令總帥郭君為先鋒别駕劉君佐之兵備憲使耿公將中軍而躬率勇敢彈壓其後𤣥甲耀日朱旗絳天申以旦誓刻以宵征有言三沙瀕海賊勢叵測不可輕蹈者立斬以狥由是三軍股栗拔㦸爭趨耳懾於迅雷目眩於流矢桑䕃未徙而藁首傳矣生擒三十六人斬首數百級其他沉尸汨羅自相蹂躪而膏野者又莫可勝記也神哉王師乎竒哉侍御之功乎或曰倭昔崛起民不知兵乃斬木揭竿烏合蟻聚以此而戰折北不支今訓練已久器械益利信臣精卒非向之屠販亡賴也長鎩徑弩非向之鉏擾棘矜也殊不知久安者弛常勝者驕以驕心而御弛衆父兄緩帶稚子咽哺卒非不練適以豫敵器非不堅操以倒授食非不足齎為盜糧豈可謂今易而昔難哉矧倭夷之深入我土也不習地形妄意空藏阽不測之危冒重關之險昧利黷貨幸而距脫者徒以中國之姦為之嚮導也今則造舟除器非一朝一夕矣士效智謀師有紀律探知要害覘得虛實即所就擒者咸髠頂睅目闊足駢指無不一當百者非復雜以鄞漳愞弱也又豈昔難而今易哉乃使戰無遺鏃返無隻輪而我民無乘障之勞填塹之苦婦女無繫鞍之辱嬰兒無貫槊之慘農不輟耕商不易肆靚粧袨服之遊如故方響棹歌之聲不絶而寇已亡矣伊誰之賜哉獨不觀之療疾乎已在膏肓投之烏附而愈病者德以為良醫而不知元氣耗矣孰與切脈望色攻于湊理者功上也又不觀之救焚乎將在煨燼不避燋爛而赴者主人引以為上客而不知玉石燬矣曷與曲突徙薪止燎於方揚者功最也以此觀之今日之功豈减於癸甲之時乎嚴未遑戒而師已班警未及聞而捷已奏焉於是天子喜曰破敵神速不以賊遺君父真御史哉一二執政皆吳産也歡然釋其故鄉之思君臣交慶於廟堂之上罔不嘖嘖賢侍御者而公則曰聖天子威德逺加元輔訏謨素定小臣何力之有哉時巡撫大中丞㑹稽周公巡江御史新安尹公先以王事祇役於外乃由大江來奔㑹於海上殄其餘黨俱蒙白金綵幣之賚郡邑諸屬各亶乃心衛尉而下悉聽縱指勤勞並可書矣稽昔裴晉公亦由御史建勳超拜將相公歸上毗天子平玉衡銷金鏑張樂洞庭之濵放畜長洲之苑江左之民非公大造而誰哉司勳氏曰玁允于襄吉甫興歌淮蔡既平宗元製雅不有藻辭盍彰鴻烈乃為頌曰東南嘉麗吳嬴越饒爰及中葉寇亂是遭軍疲於戍民瘁於徭褐靡卒嵗藿不謀朝十室九罄千里蕭條坐憤棲㑹寢思報殽我有黍稷齎為盜糧我有金繪胠為盜裝嗟我父子驅之海疆雕甍綺棟燼于燎揚帝命元老威武肅將廓清大憝汔可小康康休亡何妖氛載煽鯨浪飛帆羽書遞箭聞者禠魄談者槁面桓桓侍御從容應變戴星出師䝉暑與戰申令六軍寇不可玩遵海而陳遇于沙穴甲未及擐鼓不成列渡沉其舟逸亂其轍集從天降散隨飈瞥一日之間三獻其捷不識不知罔奪民業赫赫膚功實偉實奇折衝于爼制勝于帷勢如破竹算若發機渠醜既殄餘孽亦夷民安以慶士飽而嘻舍爵髙宴攬轡徐馳謙謙侍御載拜稽首帝德誕敷臣力何有賔服百蠻天子萬壽昭格上𤣥靈貺是祐司勳作歌宣之凱奏勒石海堧永耀厥後匡靖翊隆頌有序當覽王子淵聖主得賢臣頌而有感於君臣相與豈不章哉若夫雲龍風虎㑹逢其適鴻毛巨魚勢乘其便元首股肱之資腹心腎腸之寄備易而儲難求勞而享逸稽古盛帝顯王曷嘗不用此術哉我明若蒲州楊公博弱冠解褐負洛陽之才腰章製錦流東阿之譽遂以循吏徴拜曹郎僅踰二紀超登三事羣望屬焉在昔世宗之朝氛祲未寧邊圉多警以公為夏官大司馬以詰兵戎以勵將士龍旗飛藻鼉鼓樹羽爪牙之任若堯命羲叔周任祈父由是威震殊俗風偃遐裔凡東寄南象西鞮北譯罔不獻琛來廷回面內嚮部曲憚其威德君長識其姓名肅皇帝垂衣裳銷鋒鏑志牒之所未載舟車之所未通踰沙越漠輸琛納賮者以億計公之力也逮今上即位海宇乂安以公為天官大冡宰統百官咨四嶽口代天言手握王爵樞斗是司若左雄卓絶於前山濤莫嗣於後由是舉士歌牧之中辟才琴釣之上凡內而司府監寺外而藩臬郡邑罔不銓分涇渭藻别朱紫天下謂其公清時人目以貞固聖天子平玉衡升泰階凡奔走疏附先後禦侮濟濟在朝野無遺賢者公之力也在昔嘉靖己丑世宗御極之八載也鋭精圖治稽古禮文延攬俊哲寤寐幽人設天網以該之築黃金以招之由是鴻羽漸階振鷺充庭海內去奧離泄持粱齒肥攀龍附翼以赴功名之㑹者上下歡然交欣工用相得也有若文華敷於藝苑治行著於郡邑忠藎攄於臺諫徽猷宣於藩嶽得人之盛首是科云然位不閲於崇品年不躋於中壽者多矣滁陽奄忽未竟齊安留滯周南矧陟台秉鉉非公一人而誰哉垂聲竹帛銘功鍾鼎列爵殊稱剖符錫壤公曷以臻此哉惟天縱公思啓行翼咸可也而獨俞咸否也而獨咈䇿共揆也而獨當力共奮也而獨克高論廟堂之上而千里若見不越几席之間而百世可知聖主待公以𢎞功熙績矣且公西晉世家也纍葉簮纓繼武科第侍御作於前祠部述於後公奚憂焉宜乎享黃髮渥丹顔天壽平格為國元老兹嵗戊辰甲子始周夏五草又四日懸弧之辰也天子令宗伯司馬大官錫宴上尊漬酒宰夫胹饌教坊陳樂衛士騰舞八座稱觴百寮結駟詞臣賡歌乃有同榜逸史竄跡虎丘翹首龍門載拜而獻頌曰嵩高維嶽峻極于天中條有岨作鎮蒲川惟嶽降神申甫乃誕條亦育靈楊公攸贊姑射異人綽約駐顔公參其術呼吸引年皤首絳縣甲子胡考公介遐齡永錫難老文武為憲周美吉甫桓桓楊公實惟其伍將相兼權蜀稱武候奕奕楊公爰與之儔昔在匡靖司馬受脤蠻方輯柔如民之馴今乃翊隆為帝冢宰以統百官以均四海乃武乃文多男多壽何福不臻俾爾單厚秉云不惑震曰遺清功德並劭身名俱榮顧孺人頌給事存仁母牒稱軻母史頌鴻妻赫赫武肅垂範中閨徴士尚德淑媛與齊始修挽鹿終誡鳴雞哲嗣駿發職司諫議爭廷犯顔排閽冒忌謇諤不回遐徙曷懟屺岵增勞社稷苟利賢哉孺人大義實聞爰迪厥子爾獻於君惡不可為隱焉用文前史所載異代同芬黃門寧親曹家逐子一旦背損流悲徴仕火焰帷堂反風獲止匪籍慈靈孰昭懿美蜀國關侯像贊矯矯關候史稱虎臣乘時拔跡奮不顧身勇略蓋世英武絶倫生為名將死為顯神火德中微妖氛構亂慷慨辭曹驅馳翊漢國步斯頻王艱于扞地厚天高精誠可貫寶刀淬鍔鐡錡嘶鳴笑談雲霧叱咤風霆萬夫莫敵千里長征正直而一凛凛猶生雖有𢎞勳身殁氣燼孰若我侯靈威不泯貌肖美髯心紆義悃家祝户禋世劫共盡張簿贊為少宰張公潮作矯矯張公被褐懷璧曹侯試掾蕭相發跡小往奮庸奚假推擇智效一官莫匪王役權閹作威奴使羣吏鼎貴脂韋鮮不喪氣辭爼遜言投章抗議螳蜋之怒讋彼虎眥諸司填委貪敗蠧成公在易州砥節惟清時㑹竒羡嵗出有經誰謂簿寢流其頌聲公拜湖藩遺榮遐引知後必大髙門容軫肅肅宰臣閲崇籍甚本固斯蕃源深斯濬易氓懷德敞宇崇祠載勒其績載肖其儀曾是要位湮沒罔知苟業斯劭胡秩云卑杜陵庇令按劔詆傳爰延為長不聞郡縣古人與稽剛亦可見世濟休光天恆福善許中丞像贊西京巨麗闡於慿虛華嶽降神誕自奧區時惟許公奮庸在位爰奉末光式參下吏嵗月云邁山川間之願見顔色邈若瓊枝嗟吾匪故繄公猶素展圖端拜恍若神晤湛乎其思晬乎其形若昔待詔掞藻天庭目裂以眴髮怒而指若上封章攬轡而起春風以披秋陽以烜若進諸生讐經辨難司馭肅肅鳴鑾噦噦又若持版支頥數馬而對裘帶閒緩羽檄孔棘若在軍旅坐嘯而䇿慷慨登遊從容燕語若攜賔從觴奕别墅公髮雖改乃葆其真公齒雖宿而思則新既抗𤣥流載𢎞雅致威稜所憺翹緬增氣陸義姑姊贊姊事詳載其弟給事粲傳中烈士殉名偉夫蹈義豈伊女德亦與之比婉娩克斷柔嘉能制賢哉陸姊在寡而貞乃有哲弟為王諍臣譏彈時相抗疏於廷批鱗逢怒竄跡遐徼妻疾彌留家遭不造哀哀二雛影形相弔秖役戒言不遑內顧匪我無家爾家曷附匪我無子爾子曷怙父兮萬里母兮九原耄矣太姑曷能爾存往鞠往育展誰之恩魯婦存姪齊師却兵矯矯陸子異代同情險阻備嘗憂戚用成聶姊砥節傷勇獲咎第五譎善內省實疚急難之刺是圖是究國曰直臣家曰義姊爭光日月流聲閭里小子執彤敢告司史王氏三貞贊澶州侍御家也皎皎常氏弱嬪於王曾未三稔夫溘夭亡遺孤是孕冀延以昌在襁幾殞籲天乃康精誠之假懿行孔彰清風激俗澶水流芳肅肅侯妹中丞之裔偕老是期中道奄棄姑欲見奪指天以誓譬草棲塵無後可恃處情尤難端操愈勵嗣厥徽音無忝常氏赫赫趙女誕自鼎族荆布是甘乃厭繁縟降而能聄在饋惟榖良人早殱微𦙍是育婉娩柔容竟謝膏沐伊常與侯粲爾賢淑緬昔三仁君子之貞三良是殘烈士狥名何如三婦慰彼九京率禮蹈義匪愛其生內德既諒外教實刑刺臣作頌敢告司旌讀朱中丞遺烈論贊蓋聞皎皎者易汙磽磽者易缺豈不信哉余觀朱中丞遺烈未嘗不廢書而嘆也嗟乎若中丞者可謂强直自遂者南陽之風者矣自發科起家承麾出守稍遷郎署載揚憲度厯典藩條所在以能稱其治大較尚嚴察操下束濕而發摘如神惠逮於單微威行於貴戚以故德怨恆相半焉至開府兩浙坐鎮八閩官由新置法罔舊章事聽便宜權得專攝其襄同安雙嶼諸山寇及翦漳泉甌鄞諸海夷前後數百餘戰斬首千餘級雖營平圖金城之略定逺恢玉門之勳曷過焉少假嵗月聖朝將賔越裳而賮楛矢矣奈之何豪右不利飛文巧詆黨虐構舉遂使當寧回鑒於萬里執政過聽於三人禠爵服以屏居顧妻子而嘆息念塌翼之莫奮悼司鳴之無晨乃仰藥杯中溘死牖下徒僵尸寓諫抉目觀兵不亦悲乎卒之後曾不三載而夷患孔熾禍連吳楚毒流閩粵蔓延烽火幾為丘墟貝錦之夫始靦顔以噬臍切齒於戎首亦何及哉追論是非折衷功罪當優以廟諡爵其子孫然不聞理伏波之寃訟深源之枉者豈漢德之少恩抑天道之爽報也哉贊曰肅肅中丞才猷經世既逢其時亦履其位致果用剛道家所忌渟海回瀾長城撤蔽夕輝可收朝露不待所至䝉利乃身受害前虧厥成後亦尋敗三復甓餘千載增慨五旅銘五旅者皇甫子旅於黃而其居有五也堂曰含暉室曰枝亭曰友鹿軒曰清風臺曰蘭芳云先是黃令奉御史臺檄業己為治理官外館矣有餘材焉乃構堂三楹扁曰含暉取謝詩山水含清暉也前臨大江後枕赤壁山川信美余讞暇居之未嘗不超然適也暉曰含之豈時當用晦道尚守黑耶世之抱仁而腴懷義而華者一切以才短之不識古追琢斧藻曷所指哉而彼堇堇弗語象恭浚衷而逸行者果皆得為有道之士否耶銘曰上德守黑良賈深藏其暉允吉君子之光堂之後遍室僅容膝曰枝莊生所謂鷦鷯巢林不過一枝者也余退食每端居深念理以遣已情以恕人不知奧窔之在廣莫湫隘之在昭曠也昔蘇長公被放多就安國定惠間游息省過而余經嵗不再至束縛又可知矣銘曰爾心之寬爾處而安曲士小知達人大觀堂之前除有支屋欹焉堪輿家謂弗可也乃構小亭翼蔽之余燕坐慿檻啓疏二鹿輒麌麌然馴而不擾也余出而有上下之交必矜持伺察稍慢易弗中履度輒獲罪而余姓又素夷也豈若二鹿於我相忘哉乃知茂陵長薄麋羣鷗侣有足投老者矣銘曰委爾形葆爾真無役爾機心厰故有軒曰清風云曰清風軒者大夫夏廷芝建也毅皇帝時大夫以御史被謫稍遷同知府事因建兹軒修竹夾植而臺榭中峙也余始開徑自含暉通矣江光嵐氣藹然户牖杜門謝吏即野人之居不似使君衙舍矣昔長卿慕相如之風延陵附子臧之節士固有曠世相感者謂非此類也耶銘曰王者尊賢容衆不失細微則行葦受之爾堅爾節于時懋之軒臨高臺可以延眺然荒蕪不治皇甫子芟夷而新之荆菉稍翦叢蘭始被故曰蘭芳臺云或曰子之來黃寄耳非久當棄此去惡用新之余曰人生代間皆寄耳奚直黃哉彼赤墀青鎖而紫闥也豈子息所耶銘曰蘭生幽徑不以無人而不芳君子修道立德不以困窮而易其常紛吾有此內美兮奚忝爾楚鄉皇甫司勳集卷三十四
